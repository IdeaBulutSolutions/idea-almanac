name: Release

# Publishes the `idea-almanac` package to npm via OIDC trusted publishing —
# no npm tokens stored anywhere. Configure on npmjs.com: package settings →
# Trusted Publisher → GitHub → IdeaBulutSolutions / idea-almanac / release.yml.
#
# Trigger: publish a GitHub release whose tag is v<package version>, e.g. v0.1.0.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; Node 22 ships an older npm.
      - run: npm install -g npm@latest

      - name: Check tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./packages/scanner/package.json').version")
          TAG="${{ github.event.release.tag_name }}"
          if [ "v$PKG_VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match package version v$PKG_VERSION" >&2
            exit 1
          fi

      - run: npm ci
      - run: npm run ci # lint + typecheck + test + validate
      - run: npm run build -w idea-almanac

      # OIDC trusted publishing: no NODE_AUTH_TOKEN needed; provenance is
      # generated automatically.
      - run: npm publish -w idea-almanac
