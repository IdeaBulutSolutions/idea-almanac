apiVersion: "62.0"
release: Winter '25
reviewed: true
entries:
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (enforced Spring '25)
    summary: Aura quick actions that launch modals now redirect to the newly created
      record after save, instead of returning to the originating page. LWC
      stacked modals return to the original page by default, but non-stacked LWC
      quick actions redirect to the new record.
    detail: This release update changes post-save navigation for quick action
      modals. Aura quick actions using force:createRecord should migrate to LWC
      quick actions with lightning/navigation if you need to preserve the
      return-to-original-page behavior. For LWC navigation that should close
      prior modals, set replace:true.
    upgradeAction: Audit Aura quick actions that rely on returning to the parent
      record after save—these now redirect to the new record instead. Convert to
      LWC quick actions with lightning/navigation configured for your desired
      post-save behavior.
    source:
      document: v62-winter25.pdf
      page: 128
      heading: Enable LWC Stacked Modals (Release Update)
    confidence: high
    id: v62-lwc-001
  - apiVersion: "62.0"
    release: Winter '25
    changeType: deprecated
    impact: deprecation
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; orgs created Winter
      '25+ cannot enable Sender ID; existing orgs retain current behavior
    summary: Sender ID email authentication is deprecated and unavailable for new
      orgs created in Winter '25 or later. Existing integrations using Sender ID
      (records prefixed with v=spf2.0) continue functioning but the option to
      enable it in Email Deliverability settings is removed for new orgs.
    detail: This deprecation aligns with RFC 7208 published in 2015 which
      effectively obsoleted Sender ID in favor of SPF. Organizations already
      using Sender ID are unaffected, but new orgs must rely solely on
      SPF/DKIM/DMARC for email authentication.
    upgradeAction: For new org provisioning or org migrations, ensure email
      authentication relies on SPF (v=spf1), DKIM, and DMARC rather than Sender
      ID. Review any documentation or runbooks referencing Sender ID
      configuration.
    source:
      document: v62-winter25.pdf
      page: 131
      heading: Sender ID Deprecated for Email Security Compliance
    confidence: high
    id: v62-auth-001
  - apiVersion: "62.0"
    release: Winter '25
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - Integration
    behaviorArea: soql-sosl
    appliesWhen: org-wide regardless of component API version
    summary: A per-user search rate limit now caps SOSL, Apex search, and REST
      search at 3,000 queries and 200,000 ms cumulative CPU within any rolling
      5-minute window; exceeding either threshold triggers an error.
    upgradeAction: Audit batch processes or integrations that execute many SOSL
      queries in tight loops; add retry/backoff logic and consider caching or
      reducing query frequency to stay under the new governor limits.
    source:
      document: v62-winter25.pdf
      page: 133
      heading: Search Query Limit Is Applied to Improve Performance
    confidence: high
    id: v62-soql-001
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Flows can no longer resolve the $Api.Session_ID variable at runtime.
      Screen flows that previously displayed or used the browser session ID will
      no longer have access to it, breaking any logic that depended on capturing
      the session ID.
    detail: This update was originally enforced in Winter '24 but is being
      re-enforced for some orgs where preferences were inadvertently reverted.
      The change prevents flows from accessing session IDs to close a security
      bypass vector.
    upgradeAction: Audit all flows that reference $Api.Session_ID and remove or
      replace this variable with alternative approaches that don't require
      direct session ID access.
    source:
      document: v62-winter25.pdf
      page: 139
      heading: Release Updates
    confidence: high
    id: v62-flow-001
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Flows triggered by bots now run in user context rather than system
      context, meaning the bot's profile and permission sets determine data
      access. Flows that previously accessed or modified records beyond the bot
      user's permissions will fail.
    detail: First available in Summer '23 and enforced in Winter '25. Bot-initiated
      flows will be restricted to only the objects and fields the bot user has
      permission to access.
    upgradeAction: Review all flows invoked by bots and ensure the bot user has
      appropriate permissions for all record operations. Adjust permission sets
      or flow logic accordingly.
    source:
      document: v62-winter25.pdf
      page: 139
      heading: Release Updates
    confidence: high
    id: v62-flow-002
  - apiVersion: "62.0"
    release: Winter '25
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: The lightning/uiListsApi module gains eight new wire adapters for
      programmatic list view management—creating, updating, deleting list views,
      fetching records, and handling preferences—expanding beyond the previously
      available getListInfoByName and getListInfosByName adapters.
    source:
      document: v62-winter25.pdf
      page: 228
      heading: Manage List Views with New Lightning Web Component (LWC) Wire Adapters
    confidence: medium
    id: v62-lwc-002
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
      - VisualforcePage
      - LWC
      - AuraDefinitionBundle
      - Integration
    behaviorArea: other
    appliesWhen: org-wide regardless of component API version — enforced on rolling
      basis starting Spring '24, deferrable until Summer '25
    summary: JDK locale formats are being retired and replaced by ICU locale formats
      for all date, time, currency, address, name, and number formatting across
      the platform. This affects any code that parses or formats
      locale-sensitive strings.
    detail: Orgs created Winter '20 or later already have ICU enabled by default.
      For older orgs, Salesforce is enforcing the switch on a rolling basis. The
      format differences between JDK and ICU can break string parsing,
      comparisons, and integrations that expect specific locale output patterns.
    upgradeAction: Audit Apex code, Visualforce pages, LWC, and integrations that
      parse or compare formatted dates, numbers, or currency strings. Test with
      ICU formats enabled before enforcement hits your org. Pay special
      attention to en_CA which requires separate activation.
    source:
      document: v62-winter25.pdf
      page: 236
      heading: Enable ICU Locale Formats (Release Update)
    confidence: high
    id: v62-other-001
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: The Apex Connector Framework for Salesforce Connect custom adapters now
      accepts Picklist, Multi-Select Picklist, and Time field types in
      DataSource.Connection classes, expanding what external object schemas can
      represent.
    source:
      document: v62-winter25.pdf
      page: 237
      heading: Enhance Your Custom Adapter for Salesforce Connect with More External
        Data Types
    confidence: high
    id: v62-apex-001
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: The underlying HTTP library for Salesforce Connect's OData 2.0 adapter
      is upgraded to OData4J Jersey 2.4.2, which may alter HTTP response
      handling for external data sources and external objects.
    detail: Orgs with existing OData 2.0 integrations receive this library update
      automatically. Any custom OData services or third-party OData tools
      relying on implementation-specific HTTP behaviors from the previous
      library version may behave differently.
    upgradeAction: Retest OData 2.0 external data sources in sandbox, including list
      views, reports, Apex callouts to external objects, and Flow interactions.
      If using a third-party OData tool, confirm vendor compatibility with
      Jersey 2.4.2.
    source:
      document: v62-winter25.pdf
      page: 238
      heading: Salesforce Connect OData 2.0 Adapter HTTP Library Is Updated
    confidence: high
    id: v62-rest-001
  - apiVersion: "62.0"
    release: Winter '25
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: soql-sosl
    appliesWhen: org-wide when Data Access Level setting is enabled
    summary: A new Data Access Level setting restricts SOQL queries against Data
      Cloud data so that results are filtered based on the user's access to
      parent objects. When enabled, Data Cloud queries honor parent object
      permissions.
    upgradeAction: If your org enables this setting, review Apex code that queries
      Data Cloud objects to ensure users have appropriate parent object
      permissions, or queries may return fewer rows than expected.
    source:
      document: v62-winter25.pdf
      page: 251
      heading: Secure and Expand Access to Enriched Related Lists
    confidence: medium
    id: v62-soql-002
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: LWC components compiled at API >= 62.0
    summary: LWC class attribute binding now interprets arrays and objects
      semantically rather than stringifying them; booleans, numbers, and
      functions are stripped instead of coerced to strings.
    detail: Previously, passing an array like ["highlight", "yellow"] to the class
      attribute produced "highlight,yellow" (comma-separated), and objects
      rendered as "[object Object]". At v62+, arrays produce space-separated
      class names and objects apply keys whose values are truthy. Additionally,
      false, true, numbers, and functions no longer appear as literal strings in
      the class list.
    upgradeAction: Review components that pass non-string values to class
      attributes. Code relying on stringified booleans/numbers (e.g.,
      class="true") or comma-separated array output will behave differently
      after upgrading to v62.
    source:
      document: v62-winter25.pdf
      page: 271
      heading: Manage Styles with Class Object Binding
    confidence: high
    id: v62-lwc-003
  - apiVersion: "62.0"
    release: Winter '25
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: LWC components compiled at API >= 62.0
    summary: The this.hostElement property now returns the component's host
      HTMLElement instead of undefined, enabling direct access to host
      properties in renderedCallback and other lifecycle hooks.
    detail: In light DOM components, this.template.host remains undefined but
      this.hostElement now works. For shadow DOM, either property returns the
      host. Code that previously checked this.hostElement for truthiness
      (expecting undefined initially) will break because it now returns the
      actual element immediately.
    upgradeAction: Search LWC code for references to this.hostElement that rely on
      it being initially undefined. Rename any custom hostElement properties to
      avoid collision, or explicitly initialize them to undefined before
      assignment.
    source:
      document: v62-winter25.pdf
      page: 272
      heading: Access the Parent Element on a Component
    confidence: high
    id: v62-lwc-004
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: LWC components compiled at API >= 62.0
    summary: The this.style property on LWC components now returns the host
      element's CSSStyleDeclaration instead of undefined, enabling direct
      runtime style manipulation but breaking code that relied on this.style
      being initially falsy.
    detail: Previously in light DOM, this.style was undefined and developers used
      workarounds like this.children[0].parentElement.style. Now this.style is a
      truthy CSSStyleDeclaration object from the start. Code that checked
      if(this.style) or used this.style for custom data will break.
    upgradeAction: Search for usages of this.style in light DOM components. If any
      code depended on this.style being undefined or used it as a custom
      property, rename to this.customStyle or explicitly initialize to undefined
      before assignment.
    source:
      document: v62-winter25.pdf
      page: 273
      heading: Access the Component's Style Information
    confidence: high
    id: v62-lwc-005
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: LWC components at API version >= 62.0
    summary: LWC enforces stricter validation of imports and exports from the lwc
      package at deploy time. Bare imports, any exports from lwc, and imports of
      private/internal APIs now block deployment.
    upgradeAction: Before upgrading components to v62.0, search for bare imports
      like `import 'lwc'` and any export statements referencing lwc. Replace
      bare imports with named imports such as `import { LightningElement } from
      'lwc'` and remove all exports from lwc.
    source:
      document: v62-winter25.pdf
      page: 273
      heading: Stricter ESLint Rules for Imports and Exports
    confidence: high
    id: v62-lwc-006
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version, when LWS is enabled
    summary: "Lightning Web Security now distorts three additional browser APIs:
      DataTransfer.moz* properties (Firefox),
      Document.prototype.parseHTMLUnsafe, and Element.prototype.setHTMLUnsafe.
      Code relying on these APIs will encounter altered behavior under LWS."
    upgradeAction: Review LWC code for usage of parseHTMLUnsafe, setHTMLUnsafe, or
      Firefox-specific DataTransfer.moz* properties; test affected components
      with LWS enabled and consult the LWS Distortion Viewer for expected
      behavior changes.
    source:
      document: v62-winter25.pdf
      page: 275
      heading: API Distortion Changes in Lightning Web Security
    confidence: high
    id: v62-lwc-007
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Eight additional base Lightning components (checkbox-group, map,
      progress-indicator, progress-step, relative-date-time, slider, tile, tree)
      have modified their internal DOM structure in preparation for native
      shadow DOM adoption, potentially breaking tests that query internal
      elements.
    detail: This is part of an ongoing effort since Spring '23 to align base
      Lightning components with native shadow DOM standards. Tests using
      Selenium or other UI automation that traverse the internal DOM of these
      components may fail after the update.
    upgradeAction: Audit integration and Selenium tests for references to internal
      DOM structure of the listed components; rewrite any tests that query
      protected internal elements to use supported testing APIs like UI Test
      Automation.
    source:
      document: v62-winter25.pdf
      page: 277
      heading: Be Aware of Base Lightning Component Internal DOM Structure Changes for
        Future Native Shadow Support
    confidence: high
    id: v62-lwc-008
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: The SLDS modal blueprint now renders the close button with a white
      background instead of transparent, requiring removal of the
      slds-button_icon-inverse class from modal close button markup to display
      correctly.
    detail: Modal implementations using the inverse variant for close buttons will
      display incorrectly after this change. The bare variant should be used
      instead of inverse for modal close button icons.
    upgradeAction: Audit custom LWC and Aura components that implement SLDS modals
      and remove the slds-button_icon-inverse class from close button markup,
      switching to the bare variant.
    source:
      document: v62-winter25.pdf
      page: 278
      heading: Lightning Design System Component Blueprints Updates
    confidence: medium
    id: v62-lwc-009
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
      - Integration
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: Unmanaged Visualforce pages previously served from salesforce.com are
      now served exclusively from force.com or site domains. Hard-coded URLs,
      bookmarks, and external integrations pointing to the old domain will
      break.
    upgradeAction: Audit and update all hard-coded references, links, bookmarks, and
      external integration endpoints that point to Visualforce pages on
      salesforce.com to use the force.com or site domain equivalents.
    source:
      document: v62-winter25.pdf
      page: 278
      heading: Update References to Visualforce Pages Served on Salesforce.com
    confidence: high
    id: v62-vf-001
    introducedIn: "61.0"
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: soql-sosl
    appliesWhen: org-wide regardless of component API version
    summary: Dynamic SOQL error messages have been rewritten to provide clearer
      context about what token caused the parse failure, and negative currency
      literals are now supported in multi-currency orgs.
    detail: "If your Apex code catches exceptions from dynamic SOQL and inspects or
      parses the error message text, the new wording will break string-matching
      logic. For example, 'unexpected token: '<EOF>'' now reads 'unexpected
      token: 'everything'', and datetime validation errors now say 'Invalid
      datetime:' instead of cryptic lexer output."
    upgradeAction: Search for code that parses DmlException or QueryException
      messages from dynamic SOQL (e.g., regex or contains checks on 'unexpected
      token'). Update match patterns to handle the new phrasing or switch to
      structured exception properties.
    source:
      document: v62-winter25.pdf
      page: 280
      heading: Understand SOQL Error and Functionality Changes to Update Your Code
    confidence: high
    id: v62-soql-003
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-runtime
    appliesWhen: Apex classes and triggers compiled at API >= 62.0
    summary: Modifying a Set during iteration in a for or foreach loop now throws a
      System.FinalException, whereas earlier versions silently allowed it with
      unpredictable outcomes.
    upgradeAction: Audit code for patterns that add or remove Set elements
      mid-iteration; refactor to collect changes in a separate collection and
      apply them after the loop completes.
    source:
      document: v62-winter25.pdf
      page: 281
      heading: See Improved Consistency When Iterating Sets
    confidence: high
    id: v62-apex-002
  - apiVersion: "62.0"
    release: Winter '25
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-testing
    appliesWhen: org-wide regardless of component API version
    summary: Apex test framework gains SOQL stubbing for external objects via
      System.SoqlStubProvider, enabling mock query responses without callouts.
      Test classes can now simulate external object records using new stub
      methods.
    detail: Developers extend SoqlStubProvider and override handleSoqlQuery() to
      intercept external-object SOQL. Test.createStubQueryRow/Rows creates mock
      records, and Test.createSoqlStub registers the provider. Governor limits
      still apply to stubbed records. Stub implementations cannot invoke SOQL,
      SOSL, callouts, async operations, DML, or platform events.
    source:
      document: v62-winter25.pdf
      page: 282
      heading: Write Mock SOQL Tests for External Objects
    confidence: high
    id: v62-apex-003
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; enforcement date June
      14, 2025
    summary: API calls using instanced URLs (e.g., na1.salesforce.com,
      ap2.salesforce.com) will stop routing correctly after org migrations or
      instance refreshes. Starting June 14, 2025, traffic using stale instanced
      URLs fails entirely.
    detail: Salesforce instances can change due to org migrations or infrastructure
      refreshes. Hard-coded instanced URLs break when this happens because they
      point to the old instance. My Domain login URLs abstract away the
      underlying instance and always resolve correctly.
    upgradeAction: Search metadata and application code for hard-coded instanced
      URLs (patterns like na1.salesforce.com, eu5.salesforce.com,
      ap2.salesforce.com). Replace all occurrences with your org's My Domain
      login URL found in Setup > My Domain > Current My Domain URL.
    source:
      document: v62-winter25.pdf
      page: 283
      heading: Update API Calls to Use Your My Domain Login URL
    confidence: high
    id: v62-rest-002
  - apiVersion: "62.0"
    release: Winter '25
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: A new service protection limit now caps how many Metadata API
      deployments can be queued simultaneously when initiated from Apex code.
      Previously unlimited, this throttle may cause deployment failures if your
      automation enqueues many concurrent deploy requests.
    upgradeAction: Review Apex code that triggers Metadata API deployments (e.g.,
      via Metadata.Operations.enqueueDeployment) and add queuing logic or retry
      handling to stay within the new concurrency limit.
    source:
      document: v62-winter25.pdf
      page: 284
      heading: Service Protection Limit on Enqueued Apex Metadata API Deployments
    confidence: high
    id: v62-rest-003
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: CORS allowlist rules configured for your My Domain now extend to APIs
      served from api.salesforce.com, meaning browser-based integrations calling
      that domain will be blocked unless their origin is explicitly allowlisted.
    upgradeAction: Review any client-side JavaScript or browser-based integrations
      that call api.salesforce.com endpoints and verify their origins are
      present in your org's CORS allowlist before this enforcement takes effect.
    source:
      document: v62-winter25.pdf
      page: 284
      heading: Enforce the CORS Allowlist on More Salesforce APIs
    confidence: high
    id: v62-rest-004
  - apiVersion: "62.0"
    release: Winter '25
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version, enforced Summer '25
    summary: API versions 21.0 through 30.0 across REST, SOAP, Bulk, Tooling,
      Metadata, Connect, and other platform APIs will stop functioning in Summer
      '25. Requests to these versions will fail with a deactivation error.
    detail: Enforcement slid from Summer '23 to Summer '25. Covers every API family
      served under versioned REST paths (Bulk, Connect, Platform REST, Metadata,
      Reports & Dashboards, Tableau CRM, Tooling). Editions with API access are
      all in scope, sandboxes included. The ApiTotalUsage event shows which
      callers still send v21–v30 requests; orgs can opt into early enforcement
      from Release Updates in Setup.
    upgradeAction: Audit all integrations and connected apps for API version usage.
      Update any calls targeting versions 21.0-30.0 to a supported version
      (31.0+). Use API Total Usage event to identify legacy requests. Test
      upgraded integrations in sandbox before Summer '25.
    source:
      document: v62-winter25.pdf
      page: 284
      heading: Salesforce Platform API Versions 21.0 Through 30.0 Retirement (Release
        Update)
    confidence: high
    id: v62-rest-005
    introducedIn: "56.0"
  - apiVersion: "62.0"
    release: Winter '25
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: Tooling API calls creating or refreshing Developer/Developer Pro
      sandboxes starting Spring '25
    summary: The ActivationUserGroupId field on the SandboxInfo Tooling API object
      becomes mandatory for Developer and Developer Pro sandbox creation and
      refresh operations. Requests omitting this field will fail.
    detail: From Spring '25, sandbox create/refresh calls through the Tooling API
      for Developer and Developer Pro tiers (API 60.0+) have to name a public
      group in ActivationUserGroupId; automation omitting the field, or stuck on
      older versions, starts failing.
    upgradeAction: Update sandbox automation scripts to include
      ActivationUserGroupId when calling SandboxInfo via Tooling API. Ensure you
      are using API version 60.0 or later and have pre-created the public group
      for sandbox access.
    source:
      document: v62-winter25.pdf
      page: 289
      heading: Changes to Selective Sandbox Access for Developer and Developer Pro
        Sandboxes
    confidence: high
    id: v62-rest-006
  - apiVersion: "62.0"
    release: Winter '25
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: other
    appliesWhen: org-wide regardless of component API version; full retirement on
      January 31, 2025
    summary: Salesforce Functions, the service allowing Apex to invoke serverless
      compute on Heroku infrastructure, will cease operation on January 31,
      2025. Any org-to-function invocations will fail after that date.
    detail: Orgs using Salesforce Functions must migrate workloads to an alternative
      compute solution (e.g., Heroku apps, external services, or refactored
      Apex) before the retirement date or lose that functionality entirely.
    upgradeAction: Inventory all Function invocations in your codebase, plan
      migration to Heroku, AWS Lambda, or native Apex, and complete deployment
      before January 31, 2025.
    source:
      document: v62-winter25.pdf
      page: 295
      heading: Salesforce Functions Is Being Retired
    confidence: high
    id: v62-other-002
  - apiVersion: "62.0"
    release: Winter '25
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Change Data Capture now supports many additional standard objects
      across Salesforce Overall, Commerce, Industries clouds, and other areas,
      allowing integrations to subscribe to real-time change events for these
      previously unsupported objects.
    source:
      document: v62-winter25.pdf
      page: 297
      heading: Receive Change Event Notifications for More Objects
    confidence: high
    id: v62-rest-007
  - apiVersion: "62.0"
    release: Winter '25
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Any
    behaviorArea: packaging-metadata
