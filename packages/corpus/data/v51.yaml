      reauthentication process.
    upgradeAction: Review CI/CD pipelines that deploy named credential or external
      data source metadata changes; after deploying updates to URL,
      Authentication Provider, or Outbound Network Connection fields, manually
      reauthenticate through Setup to restore connectivity.
