    behaviorArea: authentication
    appliesWhen: connected apps created on or after Spring '21 (new apps
      auto-enabled); pre-existing apps unaffected unless manually enabled
    summary: New connected apps automatically require the client_secret parameter
      during OAuth refresh token flows. Apps created before Spring '21 retain
      the old optional behavior unless the setting is explicitly enabled.
