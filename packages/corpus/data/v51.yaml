    summary: Salesforce is removing Original Territory Management entirely in Summer
      '21, making its API objects and data inaccessible. Any integrations or
      Apex code referencing territory management objects from the original
      feature will fail after retirement.
    detail: This is a full retirement, not deprecation. The underlying data and
      objects become unavailable, so queries against original territory
      management objects will error. Customizable Forecasting was already
      retired in Summer '20 but forecast managers retained opportunity and
      territory access grants.
    upgradeAction: Identify any SOQL queries, Apex code, or API integrations
      referencing original territory management objects and migrate them to
      Enterprise Territory Management before Summer '21.
