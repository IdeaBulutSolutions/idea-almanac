  - apiVersion: "51.0"
    release: Spring '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
      - LWC
      - AuraDefinitionBundle
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: iOS 14 privacy restrictions block cookies, sessionStorage, and
      localStorage for third-party content in WKWebView, breaking Visualforce
      pages, Canvas apps, and custom Lightning components using iframes that
      rely on client-side storage in the Salesforce mobile app.
    detail: Apple's Intelligent Tracking Prevention in WKWebView disables storage
      APIs for external content by default. Visualforce pages and Lightning
      components embedding third-party content or relying on cookies for session
      state will fail unless users manually enable third-party content in device
      settings or developers migrate to cookie-free authentication methods.
    upgradeAction: Test all Visualforce pages, Canvas apps, and Lightning components
      with iframes in the Spring '21 Salesforce mobile app beta. Migrate
      third-party integrations away from cookies and browser storage toward
      server-side session handling or Enhanced Domains.
    source:
      document: v51-spring21.pdf
      page: 421
      heading: Get Ready for Changes to Apple's Privacy Policy
    confidence: high
    id: v51-vf-001
  - apiVersion: "51.0"
    release: Spring '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: Flow actions configured at API >= 51.0 (Spring '21); actions from
      Winter '21 or earlier retain legacy behavior unless manually updated
    summary: Screen flow actions now default to letting the runtime automatically
      spawn a new transaction when uncommitted DML would block a callout,
      eliminating the need for manual screen or local-action workarounds.
    detail: Actions configured in Spring '21 onward use 'Let the flow decide'
      transaction control by default. Pre-existing actions from Winter '21 or
      earlier keep 'Always continue the current transaction' unless explicitly
      changed, so they still require manual transaction breaks before callouts.
    upgradeAction: "Review screen flows containing callouts: new actions auto-handle
      transactions, but legacy actions need their Advanced transaction-control
      setting updated to 'Let the flow decide' to benefit."
    source:
      document: v51-spring21.pdf
      page: 438
      heading: Avoid Callout Errors in Screen Flows Automatically
    confidence: high
    id: v51-flow-001
  - apiVersion: "51.0"
    release: Spring '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: flows configured to run at API >= 51.0
    summary: Debug log entries for FLOW_INTERVIEW_LIMIT_USAGE now report accurate
      CPU time consumption for flows running on API version 51.0 or higher;
      earlier versions may show inaccurate values.
    detail: The FLOW_INTERVIEW_FINISHED_LIMIT_USAGE lines also now include total CPU
      time for each flow interview. Developers relying on debug logs for
      performance analysis will see corrected metrics only when flows are
      versioned to 51.0+.
    upgradeAction: After upgrading flows to 51.0+, re-baseline any performance
      monitoring that relied on previously inaccurate CPU time figures in debug
      logs.
    source:
      document: v51-spring21.pdf
      page: 444
      heading: See Accurate Flow Information in Debug Logs
    confidence: high
    id: v51-flow-002
  - apiVersion: "51.0"
    introducedIn: "47.0"
    release: Spring '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
      - Integration
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (enforced Spring '21)
    summary: "Bulk REST API calls to invocable actions now use partial-save
      semantics: a single failed action no longer rolls back the entire
      transaction. Instead, Salesforce retries successful actions up to three
      times and only rolls back the specific actions that fail."
    detail: This release update, originally introduced in Winter '20 (API 47.0) and
      postponed twice, is now enforced. Most invocable action types support
      partial save, but certain actions (including Invocable Apex, External
      Services, and several Order Management actions) do not. External callouts
      may execute multiple times since retries occur and callouts cannot be
      rolled back. Transactions may also run longer due to retry attempts,
      potentially causing earlier limit exhaustion.
    upgradeAction: Review REST API integrations invoking actions in bulk to ensure
      they handle partial success responses correctly. Verify that any external
      callouts made by flows are idempotent since they may execute multiple
      times. Test in sandbox before the enforcement date.
    source:
      document: v51-spring21.pdf
      page: 449
      heading: Enable Partial Save for Invocable Actions (Update, Enforced)
    confidence: high
    id: v51-flow-003
  - apiVersion: "51.0"
    introducedIn: "48.0"
    release: Spring '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Flow
      - ApexClass
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced in Spring '21)
    summary: Flows now enforce access modifiers on legacy Apex actions
      (Process.Plugin implementations). Any flow invoking a public (not global)
      legacy Apex action from a managed package will fail at runtime.
    detail: This Release Update, originally introduced in Spring '20 (API 48.0) and
      postponed from Summer '20, is now enforced. Global legacy Apex actions
      whose describe or invoke methods are declared public rather than global
      also become inaccessible to flows in other namespaces.
      InvocableMethod-based Apex actions are unaffected.
    upgradeAction: Audit flows for legacy Apex action elements referencing
      managed-package classes. If a referenced class uses Process.Plugin with
      public access, contact the package vendor to request a global access
      modifier or an InvocableMethod replacement. Test all affected flow paths
      before the enforcement date.
    source:
      document: v51-spring21.pdf
      page: 450
      heading: Make Flows Respect Access Modifiers for Legacy Apex Actions (Update,
        Enforced)
    confidence: high
    id: v51-flow-004
  - apiVersion: "51.0"
    release: Spring '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (enforced Winter '22)
    summary: Paused autolaunched flows now resume with the same context and user
      permissions they had before pausing, rather than switching to system
      context without sharing. Flows that previously succeeded by gaining
      elevated permissions after a time-based resume may now fail.
    detail: Before this update, autolaunched flows that paused and resumed via a
      time-based event would switch to system context without sharing,
      potentially allowing record modifications the running user was not
      authorized to make. After enforcement, flows maintain their original
      execution context through the pause/resume cycle.
    upgradeAction: Review autolaunched flows containing Pause elements with
      time-based resume events. Verify that running users have necessary
      permissions for all elements after each Pause, or reconfigure flows to
      explicitly run in system context if elevated access is required.
    source:
      document: v51-spring21.pdf
      page: 452
      heading: Make Paused Flow Interviews Resume in the Same Context with the Same
        User Access (Previously Released Update)
    confidence: high
    id: v51-flow-005
  - apiVersion: "51.0"
    release: Spring '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced Summer '22)
    summary: Flow and Process Builder CPU time consumption is now measured and
      enforced accurately. Previously, CPU usage was sometimes miscounted or
      attributed to subsequent automation like Apex triggers. After enablement,
      flows fail immediately when the element causing the CPU limit breach
      executes.
    detail: This Release Update corrects CPU time accounting so that performance
      bottlenecks are properly attributed to the flow or process that caused
      them. Because measurement is now precise, complex automations that
      previously appeared under the limit may now fail.
    upgradeAction: Before the Summer '22 enforcement date, test complex flows and
      processes under realistic load. Review debug logs for CPU consumption per
      element and reduce element count, formulas, or cross-object references in
      flows approaching the limit.
    source:
      document: v51-spring21.pdf
      page: 453
      heading: Accurately Measure the CPU Time Consumption of Flows and Processes
        (Update)
    confidence: high
    id: v51-flow-006
  - apiVersion: "51.0"
    release: Spring '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: flows and processes configured to run at API >= 51.0
    summary: Invalid variable references in conditions or malformed condition logic
      now throw runtime errors instead of silently evaluating to false, which
      may cause flows that previously completed to fail.
    detail: In earlier API versions, referencing a nonexistent variable in a
      Decision, Start, Pause, or record element condition would quietly treat
      the condition as false. At v51.0+, the same reference causes an immediate
      fault, exposing previously hidden bugs but also breaking flows that relied
      on the lenient behavior.
    upgradeAction: Audit all flow conditions for references to variables that may
      not exist at runtime; fix or guard them before upgrading to API 51.0.
    source:
      document: v51-spring21.pdf
      page: 455
      heading: Flow and Process Run-Time Improvements in API Version 51.0
    confidence: high
    id: v51-flow-007
