    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; old endpoint
      deactivates March 15, 2021
    summary: The Create Transcript REST API for Service Cloud Voice moved the
      participant ID from the URI path into the request body. The legacy
      endpoint stops functioning on March 15, 2021, returning 404 errors.
    detail: This change was introduced in Winter '21 (API 50.0) with an enforcement
      date in the Spring '21 timeframe. Any custom code or Lambda functions
      calling the old URI pattern
      /telephony/v1/voiceCalls/{voiceCallId}/participants/{participantId}/messages
      must migrate to the new pattern
      /telephony/v1/voiceCalls/{voiceCallId}/messages with participantId in the
      JSON payload.
    upgradeAction: "Update any integrations calling the Create Transcript endpoint:
      remove participantId from the URI and add it to the request payload. Test
      transcript creation before March 15, 2021."
    source:
      document: v51-spring21.pdf
      page: 149
      heading: Update to the Latest Telephony Integration API
    confidence: high
    id: v51-rest-002
