    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; phased enforcement
      starting March 15, 2026 (200 days), March 15, 2027 (100 days), March 15,
      2029 (47 days)
    summary: Industry-wide TLS certificate maximum lifespans are shrinking
      dramatically over the next three years, requiring integrations that pin or
      manually manage certificates to adopt automated rotation. Salesforce will
      also discontinue proactive certificate rotation announcements for
      production orgs.
    detail: Public CA-signed certificates will be limited to 200-day lifespans
      starting March 2026, dropping to 100 days in 2027 and 47 days by 2029. Any
      integration using certificate pinning or manual certificate management
      must move to automated rotation. The Certificate Metadata API type can
      automate self-signed and CA-signed certificate lifecycle within
      Salesforce.
    upgradeAction: Audit all integrations using TLS certificates—especially those
      with pinned certs or manual rotation processes. Implement automated
      certificate rotation using the Certificate Metadata API or external
      tooling before March 2026. Remove any certificate pinning logic.
    source:
      document: v66-spring26.pdf
      page: 173
      heading: Prepare for Shorter Certificate Lifespans
    confidence: high
    id: v66-auth-002
  - apiVersion: "66.0"
    release: Spring '26
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; Google Chrome
      enforcement date is March 15, 2027, but issues may occur earlier upon
      certificate renewal
    summary: mTLS certificates from public CAs in Chrome's trusted root list can no
      longer serve dual purposes; organizations must migrate to separate PKI
      hierarchies for server vs. client authentication before Chrome enforces
      the policy.
    detail: Chrome Root Program Policy v1.7 prohibits dual-use certificates issued
      by public root CAs. Certificates used for mTLS client authentication must
      now come from a dedicated hierarchy, separate from TLS server
      certificates. This affects certificate-based authentication and API client
      certificates enforcing mutual TLS.
    upgradeAction: Audit current mTLS certificates; if issued by a public CA in
      Chrome's trusted root list, procure replacement certificates from a
      dedicated client-authentication hierarchy before March 2027 (or sooner if
      renewing). Review the Salesforce knowledge article on PKI changes for
      detailed migration steps.
    source:
      document: v66-spring26.pdf
      page: 175
      heading: Update Your mTLS Certificates
    confidence: high
    id: v66-auth-003
