    summary: Apex classes used as invocable action parameters will be required to
      have an accessible no-argument constructor; classes lacking one will fail
      at runtime once the release update is enforced.
    detail: This release update enforces that any Apex class referenced as an
      invocable action parameter must define a public or global no-arg
      constructor. Previously, classes without such constructors could be used
      but caused unpredictable behavior.
    upgradeAction: Audit all Apex classes used as Flow invocable action parameters
      and ensure each has an explicit no-argument constructor before enabling
      this release update.
