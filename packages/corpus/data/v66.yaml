  - apiVersion: "66.0"
    release: Spring '26
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Refresh tokens for external client apps and connected apps now expire
      after 30 days of inactivity, even if the configured policy was 'valid
      until revoked' or set to a longer period. Each token use resets the 30-day
      window.
    detail: The 'Refresh token is valid until revoked' policy is effectively
      eliminated—those apps silently shift to 30-day idle expiry. Apps
      configured with longer validity periods (e.g., 1 year) will still honor
      that maximum lifespan, but idle tokens die at 30 days regardless. Metadata
      is not auto-updated, creating a mismatch between stored settings and
      actual behavior.
    upgradeAction: Audit all connected apps and external client apps relying on
      long-lived or never-expiring refresh tokens. Update OAuth flows to handle
      token refresh more frequently, ensure background integrations perform
      token refresh within 30-day windows, and reconcile app metadata to reflect
      the new idle TTL behavior.
    source:
      document: v66-spring26.pdf
      page: 1214
      heading: Limit the Idle Refresh Token TTL (Time-to-Live) to 30 Days
    confidence: high
    id: v66-auth-026
