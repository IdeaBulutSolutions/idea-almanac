    summary: Tableau Semantics numeric functions (ASIN, ACOS, LOG, LN, COT, POWER)
      now throw query errors on invalid input instead of returning null, and
      regex functions migrate from ICU to RE2 engine—breaking backreferences,
      lookahead/lookbehind, and possessive quantifiers while also changing
      empty-string match behavior.
    detail: The RE2 regex engine drops support for backreferences,
      lookahead/lookbehind assertions, and possessive quantifiers. Empty
      patterns now match at every position rather than returning no match.
      DATEPARSE also switches from null to query error on invalid date strings.
    upgradeAction: Audit all Tableau Semantics calculated fields using the affected
      numeric functions for edge-case inputs that could be invalid, and review
      regex patterns for unsupported ICU-specific syntax (backreferences,
      lookahead/lookbehind, possessive quantifiers) before March 2026
      enforcement.
    source:
      document: v66-spring26.pdf
      page: 283
      heading: Use New Behaviors in More Tableau Semantics Functions (Release Update)
