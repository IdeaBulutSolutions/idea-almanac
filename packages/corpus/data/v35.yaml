    behaviorArea: other
    appliesWhen: org-wide regardless of component API version
    summary: Canvas apps now render inside two nested iframe elements instead of
      one, which breaks any JavaScript using parent.postMessage() or other
      frame-hierarchy-dependent messaging to communicate with Salesforce.
    upgradeAction: Audit Canvas app JavaScript for direct iframe boundary messaging
      (parent.postMessage or similar) and migrate to the official Canvas SDK
      event APIs before upgrading.
    source:
      document: v35-winter16.pdf
      page: 391
      heading: Canvas Apps Wrapped in Two <iframe> Tags
    confidence: high
    id: v35-other-001
  - apiVersion: "35.0"
    release: Winter '16
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - Any
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: Custom metadata records can now be marked as protected within managed
      packages, restricting read access so that only Apex code within the same
      package (or the package defining the type) can query them.
    detail: Protected records cannot be read by subscriber org code, unmanaged
      packages, or other managed packages that lack the type or record. Updates
      to protected records require a package upgrade. For records protected in
      your own org (not via managed package), access is limited to your code,
      unmanaged packages, and the managed package defining the type.
    upgradeAction: If your code queries custom metadata records from other managed
      packages, verify those records are not protected; protected records will
      return no results to external callers.
    source:
      document: v35-winter16.pdf
      page: 397
      heading: Protect Custom Metadata Records
    confidence: high
    id: v35-packaging-001
  - apiVersion: "35.0"
    release: Winter '16
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Any
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: "Custom metadata fields gain a manageability attribute controlling
      post-deployment editability: locked (immutable everywhere),
      subscriber-editable (subscribers can modify without developer overwrites),
      or upgradable (only developer packages can update)."
    detail: Package developers can now control field-level mutability in subscriber
      orgs, affecting how managed package upgrades interact with subscriber
      customizations.
    source:
      document: v35-winter16.pdf
      page: 397
      heading: Choose Who Can Update Custom Metadata Field Values
    confidence: high
    id: v35-packaging-002
