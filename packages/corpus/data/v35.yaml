    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Named credentials and external data sources now support OAuth tokens up
      to 4,000 characters (previously 1,020) and password fields up to 1,020
      characters, enabling integration with external systems that generate
      larger credentials.
    source:
      document: v35-winter16.pdf
      page: 377
      heading: Store Larger OAuth Tokens and Longer Passwords
    confidence: high
    id: v35-auth-007
  - apiVersion: "35.0"
    release: Winter '16
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Apex callouts using named credentials can now include merge fields in
      HTTP headers and bodies, allowing developers to construct custom
      authorization headers and embed credentials or OAuth tokens directly in
      requests.
    detail: New merge fields like {!$Credential.Username}, {!$Credential.Password},
      {!$Credential.OAuthToken}, and {!$Credential.AuthorizationHeaderValue} let
      Apex code populate request headers and bodies dynamically. Administrators
      must enable 'Allow Merge Fields in HTTP Header/Body' on the named
      credential, and can optionally disable the auto-generated authorization
      header when custom construction is needed.
    source:
      document: v35-winter16.pdf
      page: 384
      heading: Customize the Headers and Bodies of Apex Callouts That Use Named
        Credentials
    confidence: high
    id: v35-apex-005
  - apiVersion: "35.0"
    release: Winter '16
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Web service callouts (WSDL-generated stubs via
      WebServiceCallout.invoke) can now use named credentials as endpoints,
      letting Salesforce handle authentication automatically instead of
      requiring manual credential management in code.
    detail: "Previously only HTTP callouts supported named credentials; now
      SOAP/WSDL callouts can also reference them with the callout: prefix. Named
      credentials in web service callouts work with Queueable async execution
      but not with the Continuation class."
    source:
      document: v35-winter16.pdf
      page: 386
      heading: Simplify Development of Web Service Callouts by Using Named Credentials
    confidence: high
    id: v35-apex-006
  - apiVersion: "35.0"
