    changeType: changed
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: The 20-concurrent-callout-per-host limit no longer applies to callouts
      targeting URLs within the same Salesforce org domain, enabling patterns
      like cross-org sync or invoking Metadata API from Apex without risking
      that specific cap.
    detail: The 100-callout-per-transaction ceiling remains, and
      PageReference.getContent() calls to Visualforce pages do not count toward
      it. External host callouts still observe the original 20-simultaneous
      limit.
    source:
      document: v35-winter16.pdf
      page: 405
      heading: Make Unlimited Concurrent Callouts to Internal Salesforce URLs
    confidence: high
    id: v35-apex-010
  - apiVersion: "35.0"
    release: Winter '16
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: "PageReference.getContent() and getContentAsPdf() can now be invoked
      from asynchronous Apex contexts (Batch, Queueable, @future, and
      Schedulable for VF page references only), with callout-limit treatment
      varying by URL type: VF pages bypass callout limits entirely, Salesforce
      URLs count against per-transaction limits but not concurrent limits, and
      external URLs count against both."
