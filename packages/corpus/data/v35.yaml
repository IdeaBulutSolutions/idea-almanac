  - apiVersion: "35.0"
    release: Winter '16
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: OAuth authorization flows cannot be completed while an admin is logged
      in as another user. Any integration code that relied on approving OAuth
      grants during a Login-As session will now be blocked.
    upgradeAction: Ensure OAuth consent flows are performed by the actual end user
      rather than an admin using Login As. Update any test automation or
      provisioning scripts that depend on granting OAuth access while
      impersonating users.
    source:
      document: v35-winter16.pdf
      page: 374
      heading: Improved Security When Logged In as Another User
    confidence: high
    id: v35-auth-004
  - apiVersion: "35.0"
    release: Winter '16
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce now uses Twitter's oauth/authenticate endpoint instead of
      oauth/authorize, eliminating repeated authorization prompts but
      restricting the returned access token from accessing Twitter direct
      messages.
    detail: The switch from oauth/authorize to oauth/authenticate changes the OAuth
      flow behavior. Users no longer see repeated authorization screens after
      their first login, but the access token issued through this flow has
      reduced permissions compared to the previous endpoint.
    upgradeAction: Review any integrations that use the Twitter auth provider's
      access token to call Twitter APIs. If your code accesses Twitter direct
      messages using tokens obtained through Salesforce's Twitter auth provider,
      this will no longer work.
    source:
      document: v35-winter16.pdf
      page: 376
      heading: Twitter Auth. Provider No Longer Prompts User for Access on Repeated
        Logins
    confidence: medium
    id: v35-auth-005
  - apiVersion: "35.0"
    release: Winter '16
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Auth provider SSO errors now render error codes and descriptions
      directly on the page, not just in the URL. Developers can throw custom
      exceptions from createUser/updateUser methods in Auth.RegistrationHandler
      to display tailored error messages to users.
    detail: The change surfaces errors more visibly to end users. If your
      registration handler already throws exceptions with messages, those
      messages will now appear in the UI, so review them for appropriateness and
      localization.
    upgradeAction: Review exception messages thrown from Auth.RegistrationHandler
      implementations to ensure they are user-friendly and do not expose
      sensitive details, since they now display on-screen.
    source:
      document: v35-winter16.pdf
      page: 376
      heading: Display and Customize Error Messages for Single Sign-On Using an Auth.
        Provider
    confidence: high
    id: v35-auth-006
  - apiVersion: "35.0"
    release: Winter '16
    changeType: changed
