  - apiVersion: "35.0"
    release: Winter '16
    changeType: deprecated
    impact: deprecation
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-bulk
    appliesWhen: org-wide regardless of component API version
    summary: Individual import wizards for accounts, contacts, person/business
      accounts, leads, solutions, and custom objects are being retired. They
      remain accessible only via a legacy link in Setup until official
      retirement, after which integrations or scripts relying on these wizards
      must migrate to the unified Data Import Wizard.
    detail: "The legacy wizards used synchronous database processing while the new
      unified wizard uses asynchronous Bulk API processing. Some behavioral
      differences exist: the new wizard cannot map Reports To field by name
      (only by ID/email), and the account update toggle behaves differently for
      blank fields."
    upgradeAction: Audit any documentation, training, or automation that references
      the individual import wizard URLs or workflows. Plan migration to the
      unified Data Import Wizard before official retirement.
    source:
      document: v35-winter16.pdf
      page: 352
      heading: Legacy Data Import Tools
    confidence: medium
    id: v35-bulk-001
