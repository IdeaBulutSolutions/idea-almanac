  - apiVersion: "35.0"
    release: Winter '16
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
      - VisualforceComponent
    behaviorArea: visualforce
    appliesWhen: org-wide when Lightning Experience is enabled
    summary: Visualforce pages in Lightning Experience no longer own the entire
      browser page, requiring JavaScript code to follow new isolation rules to
      avoid conflicts with the outer Lightning container.
    detail: When displayed in Lightning Experience, Visualforce pages run within an
      iframe-like context rather than controlling the full page. JavaScript that
      manipulates window, document, or assumes full-page ownership may break or
      behave unexpectedly.
    upgradeAction: Review Visualforce pages containing JavaScript for assumptions
      about page ownership, window manipulation, or direct DOM access outside
      the page's own scope before enabling Lightning Experience for users.
    source:
      document: v35-winter16.pdf
      page: 66
      heading: What's the Fate of Existing Salesforce Customizations?
    confidence: medium
    id: v35-vf-002
  - apiVersion: "35.0"
    release: Winter '16
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: Visualforce components embedded in dashboards do not render in
      Lightning Experience; they are simply unavailable in the new UI.
    upgradeAction: Audit dashboards containing Visualforce components before
      enabling Lightning Experience; plan to rebuild affected dashboard
      components using native Lightning alternatives or keep users in Classic
      for those dashboards.
    source:
      document: v35-winter16.pdf
      page: 101
      heading: "Reports and Dashboards: Lightning Experience Limitations"
    confidence: high
    id: v35-vf-003
  - apiVersion: "35.0"
    release: Winter '16
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
      - VisualforcePage
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version — affects Lightning
      Experience sessions only
    summary: Session IDs obtained via $Api.Session_ID or GETSESSIONID() in Lightning
      Experience carry restricted privileges similar to the Lightning session
      itself, preventing their use for API calls.
    detail: Unlike Salesforce Classic sessions, Lightning Experience sessions and
      their derived session IDs cannot be used to make API calls. Code relying
      on extracting a session ID in Apex or Visualforce to perform callouts or
      API operations will fail when executed in Lightning Experience context.
    upgradeAction: Audit any code that captures session IDs via $Api.Session_ID or
      GETSESSIONID() and attempts API calls. For Lightning Experience users,
      switch to Named Credentials or OAuth flows for external integrations
      instead of session-based authentication.
    source:
      document: v35-winter16.pdf
      page: 110
      heading: "Security: Lightning Experience Limitations"
    confidence: high
    id: v35-auth-002
  - apiVersion: "35.0"
    release: Winter '16
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide when Lightning Experience is enabled
    summary: Visualforce pages in Lightning Experience run inside an iframe,
      breaking code that manipulates window.location for navigation or makes
      assumptions about sforce.one availability. The showHeader, showSidebar,
      and title page attributes are also ignored.
    detail: The sforce.one utility object now loads in Lightning Experience contexts
      (not just Salesforce1), so code checking for its presence to detect mobile
      may misfire. Navigation must use sforce.one methods instead of
      window.location. Session IDs obtained via $Api.Session_ID or
      GETSESSIONID() in Lightning contexts cannot be used for API calls due to
      privilege restrictions.
    upgradeAction: Audit Visualforce pages for window.location navigation (replace
      with sforce.one methods), conditional logic checking sforce.one presence,
      reliance on showHeader/showSidebar suppression, and any code using
      Lightning-context session IDs for API calls.
    source:
      document: v35-winter16.pdf
      page: 112
      heading: "Programmatic Customization: Lightning Experience Limitations"
    confidence: high
    id: v35-vf-004
