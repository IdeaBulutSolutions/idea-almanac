    summary: A bug fix now preserves the SOQL WHERE clause when calling save() on a
      StandardSetController that was initialized with a queryLocator. Previously
      the WHERE condition was silently dropped.
    detail: Code that worked around this bug by manually re-applying filters after
      save() may now apply those filters twice, potentially causing unexpected
      behavior or performance issues.
    upgradeAction: Review any StandardSetController code using queryLocator with
      save() calls. Remove workarounds that manually re-applied WHERE
      conditions, as the framework now preserves them correctly.
    source:
      document: v29-winter14.pdf
      page: 277
      heading: SOQL WHERE Clause No Longer Reset In a StandardSetController
        Initialized with a queryLocator
    confidence: high
    id: v29-vf-014
