    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce now supports OpenID Connect as an authentication provider
      type, enabling SSO integration with third-party identity providers like
      Amazon, Google, and PayPal that implement the OpenID Connect server
      protocol.
    source:
      document: v29-winter14.pdf
      page: 236
      heading: Using OpenID Connect Authentication Providers
    confidence: high
    id: v29-auth-005
  - apiVersion: "29.0"
    release: Winter '14
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce now supports mutual TLS authentication on inbound API
      connections, allowing clients to present certificates for two-way
      verification. API clients can connect on port 8443 with client certificate
      authentication, and a user permission enforces this secure channel.
    detail: This enables server-to-server integrations where both parties verify
      identity via certificates. Administrators upload client certificates
      signed by Salesforce-trusted CAs, and the 'Enforce SSL/TLS Mutual
      Authentication' permission forces API users onto port 8443.
    source:
      document: v29-winter14.pdf
      page: 236
      heading: Mutual Authentication
    confidence: high
    id: v29-auth-006
