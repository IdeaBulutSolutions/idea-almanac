    summary: Scheduled Apex jobs created before Summer '13 are migrated to a new
      scheduling infrastructure, causing the CronTrigger.PreviousFireTime field
      to reset to null until the job runs again.
    detail: This is a one-time migration side effect. Any code or monitoring that
      reads PreviousFireTime immediately after the upgrade will see null instead
      of the historical value. The field repopulates correctly after the next
      scheduled execution.
    upgradeAction: Review any integrations or monitoring scripts that depend on
      CronTrigger.PreviousFireTime for scheduled jobs; add null-handling logic
      or expect transient null values until jobs execute post-migration.
