    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: "The per-transaction code statement limit is removed and replaced with
      CPU time limits: 10 seconds for synchronous Apex and 60 seconds for
      asynchronous Apex. Exceeding CPU time throws an unhandleable
      LimitException."
    detail: CPU time measurement includes all code executed within a transaction
      including package code and workflow invocations. This change allows
      transactions to execute more statements than before but introduces a new
      failure mode for CPU-intensive operations.
    upgradeAction: Review Apex code that previously ran near statement limits; it
      may now succeed but could hit CPU limits instead. Monitor for
      LimitException failures related to CPU time and optimize compute-heavy
      logic.
    source:
      document: v29-winter14.pdf
      page: 282
      heading: Statement Limit Elimination
    confidence: high
    id: v29-apex-004
