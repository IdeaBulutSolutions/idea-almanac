    summary: Salesforce as a SAML Identity Provider now signs each assertion
      individually using the same certificate that signs the overall SAML
      response, whereas previously assertions relied solely on the parent
      response signature.
    upgradeAction: Verify that your Service Provider's SAML validation logic can
      handle individually signed assertions in addition to the response-level
      signature; some SP implementations may need configuration updates to
      accept or ignore the new assertion signature.
    source:
      document: v29-winter14.pdf
      page: 230
      heading: Entire SAML Assertion Now Signed
    confidence: high
    id: v29-auth-001
  - apiVersion: "29.0"
    release: Winter '14
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce apps are now delivered as connected apps bundled into
      managed packages that install automatically when any user triggers OAuth
      approval or a refresh token flow for any app in the package.
    detail: Two managed packages (Chatter-related and non-Chatter-related) replace
      the previous Salesforce app mechanism. Installation is triggered
      asynchronously on first OAuth consent or token refresh by any org user for
      any app in the package. This changes how administrators discover and
      manage these apps since they appear as installed packages rather than
      standalone apps.
    upgradeAction: Review connected app policies and package installation settings;
      confirm that automatic package installation aligns with your org's change
      management process.
    source:
      document: v29-winter14.pdf
      page: 230
      heading: Automatic Installation of Salesforce Apps
    confidence: medium
    id: v29-auth-002
  - apiVersion: "29.0"
    release: Winter '14
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: SAML service providers can no longer be created from the Identity
      Provider page; they must now be configured as connected apps with SAML
      enabled via Setup > Create > Apps.
    upgradeAction: Update any documentation or automation that references the old
      Identity Provider workflow for creating SAML service providers; switch to
      the connected apps approach.
    source:
      document: v29-winter14.pdf
      page: 230
      heading: Creating Service Providers as SAML-Enabled Connected Apps
    confidence: medium
    id: v29-auth-003
  - apiVersion: "29.0"
    release: Winter '14
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Admins can now assign security levels (Standard or High Assurance) to
      authentication methods and enforce High Assurance requirements on
      connected apps, blocking access or forcing step-up authentication for
      sessions that don't meet the threshold.
    detail: SAML assertions can pass a SessionLevel attribute (STANDARD or
      HIGH_ASSURANCE) to set session security programmatically. Connected app
      OAuth flows may now be blocked or require two-factor step-up if the org
      policy demands High Assurance and the current session is Standard.
    upgradeAction: "Review connected app integrations: if org admins enable High
      Assurance policies, OAuth flows from Standard sessions will either fail or
      redirect users to 2FA. Test automated integrations that rely on
      username/password or delegated auth to ensure they can handle the block or
      step-up redirect."
    source:
      document: v29-winter14.pdf
      page: 232
      heading: Session-Level Security
    confidence: medium
    id: v29-auth-004
  - apiVersion: "29.0"
    release: Winter '14
    changeType: new
    impact: additive
    affectedMetadataTypes:
