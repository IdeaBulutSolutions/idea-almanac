    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced in Spring '25)
    summary: "Aura quick actions that previously stayed on the originating record
      page after save will now redirect to the newly created record. LWC modals
      stack by default, requiring `replace: true` in lightning/navigation to
      close previous modals and redirect."
    detail: "This Release Update (first available Summer '24, enforced Spring '25)
      changes post-save navigation for Aura quick actions: they now redirect to
      the new record instead of returning to the source page. Developers using
      force:createRecord in Aura should migrate to LWC quick actions with
      lightning/navigation for original return-to-source behavior. Stacked LWC
      modals overlay by default; set replace:true to auto-close the prior
      modal."
    upgradeAction: Audit Aura quick actions using force:createRecord or
      lightning:recordEditForm—users will be redirected to the new record
      instead of returning to the original page. Migrate to LWC quick actions
      with lightning/navigation if return-to-source behavior is required.
    source:
      document: v63-spring25.pdf
      page: 170
      heading: Enable LWC Stacked Modals (Release Update)
    confidence: high
    id: v63-lwc-002
