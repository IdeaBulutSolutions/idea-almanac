  - apiVersion: "63.0"
    release: Spring '25
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: The release update that would have guaranteed Apex batch action results
      are returned in request order has been indefinitely postponed and disabled
      in all orgs due to performance issues. The toggle to enable this behavior
      currently has no effect.
    detail: Salesforce discovered performance regressions with the ordered-results
      implementation and has rolled back the change across all orgs. There is no
      new enforcement date announced. Developers who were relying on this
      upcoming guarantee should not assume batch results arrive in submission
      order.
    upgradeAction: Do not depend on batch action results being sorted by request
      order. If your code assumed this behavior was coming, add explicit sorting
      or sequencing logic.
    source:
      document: v63-spring25.pdf
      page: 198
      heading: Canceled Updates
    confidence: high
    id: v63-apex-002
