    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (enforcement scheduled
      Summer '26)
    summary: Flows invoking Apex actions that accept built-in Apex classes with
      permission requirements will now enforce those permissions and execute
      within the current component context rather than inheriting the previous
      context.
    detail: This release update fixes a gap where permission requirements on
      built-in Apex input classes were not checked. After enforcement, flows may
      fail if the running user lacks the required permissions. Originally slated
      for Winter '26, enforcement was postponed to Summer '26.
    upgradeAction: Enable the release update in a sandbox and test all flows that
      invoke Apex actions with built-in Apex class inputs. Verify users have
      necessary permissions and that actions behave correctly under the current
      component context.
    source:
      document: v63-spring25.pdf
      page: 197
      heading: Scheduled to Be Enforced in Summer '26
