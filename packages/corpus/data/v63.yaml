    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Base Lightning components are migrating to native shadow DOM, altering
      their internal DOM structure. Tests that query internal DOM nodes of these
      components will break.
    detail: "Affected in Spring '25: datatable, carousel, tree, file-upload,
      click-to-dial, the record form family (record-form, record-edit-form,
      record-view-form), input/output-field — plus Aura equivalents and the
      logger, pageReferenceUtils, and platformShowToastEvent modules. The
      native-shadow-DOM migration started back in Spring '23."
    upgradeAction: Audit Selenium and integration tests for queries against internal
      DOM of these components. Migrate to UTAM page objects or other supported
      selectors that do not depend on internal structure.
    source:
      document: v63-spring25.pdf
      page: 362
      heading: Internal DOM Structure Is Changing for Base Lightning Components
    confidence: high
    id: v63-lwc-004
  - apiVersion: "63.0"
    release: Spring '25
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: LWC's TypeScript tooling now enforces stricter type checking on @wire
      decorator configuration and properties, and the experimentalDecorators
      compiler option must be disabled or removed.
    detail: "The wire adapter typing validates that config objects and property
      types align with what the adapter expects. Reactive property strings
      (e.g., $reactiveProp) are now resolved to their underlying component
      types. Projects using experimentalDecorators: true in tsconfig.json will
      fail to compile."
    upgradeAction: Remove or set experimentalDecorators to false in tsconfig.json.
      Review @wire usages for type mismatches that the stricter checks will now
      surface.
    source:
      document: v63-spring25.pdf
      page: 363
      heading: Wire Adapters Have Improved Type Checking
    confidence: high
    id: v63-lwc-005
  - apiVersion: "63.0"
    release: Spring '25
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: LWC now strips leading/trailing whitespace from class and style
      attribute values and removes empty class/style attributes entirely from
      the rendered DOM, breaking JavaScript selectors that matched on exact
      strings containing whitespace.
    detail: Selectors using exact attribute matching like [class="highlight yellow"]
      will fail because the rendered DOM no longer contains the spaces. Empty
      class="" or style=" " attributes are removed from output entirely.
    upgradeAction: Audit JavaScript code for querySelector calls using exact
      attribute matches with whitespace. Replace [class="..."] selectors with
      chained class selectors like .classA.classB, and remove any logic that
      depends on empty class or style attributes being present in the DOM.
    source:
      document: v63-spring25.pdf
      page: 364
      heading: Update JavaScript Selectors to Remove Extra Whitespace
    confidence: high
    id: v63-lwc-006
  - apiVersion: "63.0"
    release: Spring '25
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (when LWS is enabled)
    summary: Lightning Web Security adds new distortions for several DOM and window
      APIs including requestStorageAccess, setHTMLUnsafe, iframe sandbox
      properties, iframe src setter, window.open, and security policy violation
      events. Components relying on these APIs may behave differently under LWS.
    detail: New distortions affect Document.prototype.requestStorageAccess,
      Element.prototype.setHTMLUnsafe, and HTMLIFrameElement sandbox
      getter/setter. Changed distortions apply to
      HTMLIFrameElement.prototype.src setter, Window.open, and the
      securitypolicyviolation event. ESLint rules are available to detect usage
      of these APIs.
    upgradeAction: Review LWC code for usage of the listed APIs (especially iframe
      manipulation, window.open calls, and storage access requests). Test
      affected components with LWS enabled and consult the LWS Distortion Viewer
      for specific behavioral changes.
    source:
      document: v63-spring25.pdf
      page: 365
      heading: API Distortion Changes in Lightning Web Security
    confidence: high
    id: v63-lwc-007
