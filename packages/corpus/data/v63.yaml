    summary: ICU locale formats replace JDK locale formats across the platform,
      altering how dates, times, currencies, addresses, names, and numbers
      render in Apex formatting methods, SOQL, Visualforce, and integrations.
    detail: This release update was first available in Winter '20 and enforces in
      Spring '25. Code that parses or compares formatted locale strings may
      break if it assumed the old JDK patterns.
    upgradeAction: Review any code that parses formatted date/time/currency strings
      or performs string comparisons on locale-formatted output; update expected
      patterns to ICU formats.
