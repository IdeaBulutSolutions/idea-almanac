    appliesWhen: org-wide when SLDS 2 / Cosmos theme is enabled (default in
      Starter/Pro Suite and new Sales orgs; opt-in elsewhere)
    summary: SLDS 2 replaces component-level --slds-c-* styling hooks with a new
      theming approach. Components using these hooks for custom styling may
      render incorrectly when the Cosmos theme is active.
    detail: The new design system achieves visual changes through CSS updates and
      styling hooks without altering component markup. However, existing
      --slds-c-* component-level hooks are not yet supported, so customizations
      relying on them will break under the Cosmos theme. This is a beta feature
      but is enabled by default in certain org types.
    upgradeAction: Run SLDS Validator or SLDS Linter against custom LWC/Aura
      components to identify --slds-c-* hook usage. Replace or remove these
      customizations before enabling SLDS 2 or the Cosmos theme.
    source:
      document: v63-spring25.pdf
      page: 367
      heading: Introducing Salesforce Lightning Design System (SLDS) 2 (Beta)
