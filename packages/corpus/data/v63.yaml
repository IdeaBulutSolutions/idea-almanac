  - apiVersion: "63.0"
    release: Spring '25
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Multiple release updates affect Flow runtime behavior in Spring '25,
      including enforcing permission requirements on built-in Apex classes used
      as flow inputs, rolling back Apex action exceptions in REST API contexts,
      and sorting Apex batch action results by request order.
    detail: "The release updates listed require administrator enablement: (1)
      permission enforcement on built-in Apex input classes, (2) rollback
      enforcement when Apex actions throw exceptions via REST API, (3) Apex
      batch results sorted by original request sequence. Each may alter existing
      flow behavior once enabled."
    upgradeAction: Review each release update in Setup before enabling. Test flows
      that invoke Apex actions via REST API for rollback behavior, flows using
      built-in Apex classes as inputs for permission errors, and flows with
      batch Apex actions for result ordering assumptions.
    source:
      document: v63-spring25.pdf
      page: 143
      heading: Salesforce Flow
    confidence: medium
    id: v63-flow-001
