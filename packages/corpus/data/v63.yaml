    summary: The /id/keys endpoint no longer returns public keys for OAuth 2.0 asset
      token signing certificates. Integrations that fetch public keys via this
      endpoint must switch to Auth.JWTUtil Apex methods or migrate to a
      different authorization flow.
    detail: Integrations validating asset tokens by calling /id/keys on My Domain or
      Experience Cloud sites will fail after this removal. As a short-term fix,
      use Auth.JWTUtil.validateJWTWithCert() to reference the certificate by
      developer name, or Auth.JWTUtil.validateJWTWithKey() to supply the public
      key directly. Long-term guidance is to migrate away from asset tokens
      entirely to flows like headless guest user flow.
    upgradeAction: Audit integrations that call /id/keys for asset token validation.
      Replace those callouts with Auth.JWTUtil.validateJWTWithCert or
      validateJWTWithKey methods. Plan migration to an alternative OAuth flow
      such as headless guest user flow.
