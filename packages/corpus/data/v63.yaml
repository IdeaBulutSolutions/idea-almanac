    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Lightning web components now require an explicit apiVersion key in
      their .js-meta.xml configuration file. Components previously saved without
      this key will have one auto-added upon retrieval from Salesforce.
    detail: This enforcement affects all custom LWC components org-wide, not just
      those at API 63.0+. When you retrieve a component that lacked an
      apiVersion, Salesforce injects the key automatically. This is a
      source-level change that persists when you redeploy, so version control
      systems will show a diff.
    upgradeAction: Retrieve all custom LWC components and commit the auto-added
      apiVersion keys to source control. Verify that the assigned version
      matches your intended LWC framework behavior before redeploying.
    source:
      document: v63-spring25.pdf
      page: 361
      heading: Custom Components Must Specify an API Version
    confidence: high
    id: v63-lwc-003
  - apiVersion: "63.0"
