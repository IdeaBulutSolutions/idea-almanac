    summary: Salesforce replaces JDK8-based date/time locale formats with
      ICU-standard formats across the platform. API version 45.0 and later
      surfaces these new formats, and org-wide enforcement occurred January
      2022.
    detail: This release update changes how dates and times are formatted for all
      locales. Code that parses or compares formatted date/time strings may
      break if it assumed the old JDK8 patterns. The en_CA locale requires
      separate opt-in via User Interface settings.
    upgradeAction: Query active user locales with the provided SOQL, then test any
      code that parses or pattern-matches formatted date/time strings.
      Coordinate with package vendors to confirm ICU compatibility before
      enforcement.
    source:
      document: v49-summer20.pdf
      page: 462
      heading: Enable ICU Locale Formats (Previously Released Update)
    confidence: high
    id: v49-other-003
