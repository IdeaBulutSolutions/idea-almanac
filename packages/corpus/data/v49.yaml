  - apiVersion: "49.0"
    release: Summer '20
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
      - Any
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version
    summary: Guest users now have enforced private org-wide defaults and restricted
      sharing mechanisms. Apex managed sharing, manual sharing, public groups,
      and queues can no longer grant record access to guest users—only guest
      user sharing rules work.
    detail: This enforcement affects any code that previously relied on Apex managed
      sharing or other sharing mechanisms to provide guest user access to
      records. Orgs created before Winter '20 must migrate to guest user sharing
      rules.
    upgradeAction: Audit all Apex managed sharing code that grants access to guest
      users and replace with guest user sharing rules. Test community/site
      functionality to verify guest users retain appropriate record access after
      the enforcement.
    source:
      document: v49-summer20.pdf
      page: 379
      heading: Secure Guest Users' Org-Wide Defaults and Sharing Model (Previously
        Released Security Alert, Enforced)
    confidence: high
    id: v49-sharing-001
  - apiVersion: "49.0"
    introducedIn: "48.0"
    release: Summer '20
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforceComponent
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: Visualforce email templates sent to guest users no longer render data
      by default due to restricted guest user data access. Templates must
      explicitly opt into system context to function.
    detail: This security policy was enforced starting Spring '20. Because guest
      users have limited Salesforce data access, Visualforce email templates
      targeting them fail to render data unless the template explicitly uses
      system context. The fix requires adding
      renderUsingSystemContextWithoutSharing="True" to the emailTemplate tag,
      and the user editing the template must have the Author Apex permission.
    upgradeAction: Audit all Visualforce email templates sent to guest users in
      communities, sites, and portals. Add
      renderUsingSystemContextWithoutSharing="True" to the emailTemplate tag and
      ensure editors have the Author Apex permission.
    source:
      document: v49-summer20.pdf
      page: 382
      heading: Ensure Guest User Access to Emails Created with Visualforce Email
        Templates
    confidence: high
    id: v49-vf-002
  - apiVersion: "49.0"
    release: Summer '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Connect REST API changes its default file rendition from Adobe Flash to
      a non-Flash format starting Summer '20, and will completely stop
      generating Flash renditions in Winter '21.
    upgradeAction: Update any integrations consuming file renditions via Connect
      REST API to request SVG renditions explicitly instead of relying on the
      default or expecting Flash output.
    source:
