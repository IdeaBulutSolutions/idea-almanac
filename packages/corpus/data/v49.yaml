    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Flows can now expose Apex-defined variables for input/output when
      invoked from Subflow elements, Visualforce pages, or as actions, enabling
      complex data structures to be passed across flow boundaries.
    source:
      document: v49-summer20.pdf
      page: 446
      heading: Access Apex-Defined Variables from Outside Flows
    confidence: high
