  - apiVersion: "49.0"
    release: Summer '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: Installing or upgrading unlocked packages now deletes Flows that were
      removed from earlier package versions, whereas previously these orphaned
      Flows persisted in the target org.
    detail: This applies only to unlocked 2GP packages in Summer '20. Deleting Flow
      versions from 1GP packages or 2GP managed packages is explicitly not
      supported in this release.
    upgradeAction: Before upgrading unlocked packages, verify that any Flows removed
      from the package source are safe to delete in subscriber orgs; check for
      external references or dependencies on those Flows.
    source:
      document: v49-summer20.pdf
      page: 440
      heading: "Second-Generation Packaging Improvements: Delete Earlier Flows from
        Packages"
    confidence: high
    id: v49-packaging-003
