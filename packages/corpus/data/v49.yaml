  - apiVersion: "49.0"
    release: Summer '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (enforcement postponed
      to Winter '22)
    summary: Process Builder processes that check for field changes or use
      ISCHANGED() will evaluate against the original record values when a field
      started as null, potentially altering which criteria nodes fire.
    detail: This release update changes how multi-criteria processes handle fields
      that initially had null values. When a record update triggers a process
      and the field was originally null, the process now correctly evaluates
      against that null original value rather than potentially using an
      intermediate value. Originally scheduled for Summer '20 enforcement, then
      Winter '21, now postponed to Winter '22.
    upgradeAction: Review Process Builder processes using the 'execute only when
      specified changes are made' option or ISCHANGED() in criteria. Test
      behavior with records where monitored fields start as null to confirm
      expected outcomes before enforcement.
    source:
      document: v49-summer20.pdf
      page: 448
      heading: Evaluate Criteria Based on Original Record Values in Process Builder
        (Update, Postponed)
    confidence: high
    id: v49-flow-003
  - apiVersion: "49.0"
    release: Summer '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced Spring '21)
    summary: "Bulk REST API calls to invocable actions switch to partial-save
      semantics: a single failed action no longer rolls back the entire
      transaction. Instead, Salesforce retries successful actions up to three
      times and only rolls back the specific failures."
    detail: This Release Update was postponed from Spring '20 to Winter '21 and
      again to Spring '21. External callouts cannot be rolled back and may
      execute multiple times under partial save. Certain action types (Invocable
      Apex, External Services, and several Order Management actions) remain
      excluded from partial save. The retry behavior can also increase
      transaction duration and accelerate limit consumption.
    upgradeAction: Audit REST API integrations invoking actions in bulk to handle
      partial success responses. Ensure idempotency for any external callouts
      triggered by invocable actions, since they may fire more than once.
    source:
      document: v49-summer20.pdf
      page: 449
      heading: Enable Partial Save for Invocable Actions (Update, Postponed)
    confidence: high
    id: v49-rest-007
  - apiVersion: "49.0"
    release: Summer '20
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Flow
      - ApexClass
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced Spring '21)
    summary: Flows will fail at runtime when invoking legacy Apex actions
      (Process.Plugin implementations) marked as public rather than global, and
      global actions with public describe/invoke methods become inaccessible
      across namespaces.
    detail: This Release Update enforces access-modifier semantics for legacy Apex
      plug-ins. Public legacy Apex actions from managed packages will no longer
      execute in flows and will disappear from Flow Builder. Originally
      scheduled for Summer '20, enforcement was postponed to Spring '21.
    upgradeAction: Identify flows using legacy Apex actions from managed packages.
      Verify each referenced Apex class is declared global with global describe
      and invoke methods. Contact package developers to update access modifiers
      or migrate to @InvocableMethod-based implementations before Spring '21
      enforcement.
    source:
      document: v49-summer20.pdf
      page: 451
      heading: Make Flows Respect Access Modifiers for Legacy Apex Actions (Update,
        Postponed)
    confidence: high
    id: v49-flow-004
  - apiVersion: "49.0"
    introducedIn: "45.0"
    release: Summer '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Any
    behaviorArea: other
    appliesWhen: org-wide regardless of component API version; auto-enforced January
      30, 2022 for existing orgs, enabled by default for orgs created Winter '20
