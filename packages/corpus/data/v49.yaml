    summary: "Lightning Message Service moves from beta to GA with a breaking change
      to the subscribe() method: the default scope shifts from APPLICATION to
      active-area-only, meaning cross-page message delivery now requires an
      explicit scope parameter."
    detail: "Beta implementations that relied on the implicit APPLICATION scope will
      stop receiving messages from inactive tabs or pages unless updated to pass
      scope: APPLICATION explicitly. The active scope restricts delivery to the
      currently selected navigation tab, workspace tab, subtab, or utility
      item."
    upgradeAction: "Audit existing LMS subscribe() calls that relied on beta
      behavior. Add scope: APPLICATION to any subscription that must receive
      messages from components outside the active navigation context."
    source:
      document: v49-summer20.pdf
      page: 505
      heading: Communicate Across Salesforce UI Technologies with Lightning Message
        Service (Generally Available)
    confidence: high
