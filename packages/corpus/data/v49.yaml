    appliesWhen: org-wide regardless of component API version, effective Summer '21
    summary: Salesforce is retiring the legacy Original Territory Management feature
      entirely. After retirement, all API access and underlying data for this
      feature becomes unavailable.
    detail: Any integrations querying or manipulating territory data via the
      original territory management objects will cease to function. The
      replacement is Enterprise Territory Management, which uses a different
      data model.
    upgradeAction: Audit integrations for references to original territory
      management objects and migrate to Enterprise Territory Management APIs
      before Summer '21. Export and archive all territory data while access
      remains.
    source:
      document: v49-summer20.pdf
      page: 148
      heading: Original Territory Management Is Being Retired
    confidence: medium
    id: v49-rest-003
  - apiVersion: "49.0"
    release: Summer '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; enabled by default
      for orgs created Summer '20+, opt-in for existing orgs
    summary: Email Address Internationalization (EAI) enables Unicode characters in
      the local part of email addresses throughout Salesforce, requiring
      integrations to handle UTF-8 encoded email addresses and use the latest
      API version.
    detail: Integrations that parse, validate, or store email addresses must be
      updated to support non-ASCII characters in the portion before the @
      symbol. Fields storing email addresses should use the email data type, and
      the entire email path must support UTF-8 encoding.
    upgradeAction: Audit integrations that handle email addresses to ensure UTF-8
      support, update email validation logic to accept Unicode characters,
      verify email-type fields are used for storage, and upgrade to the latest
      API version before enabling EAI.
    source:
      document: v49-summer20.pdf
      page: 150
      heading: Connect Globally with Email Address Internationalization
    confidence: high
    id: v49-rest-004
  - apiVersion: "49.0"
    introducedIn: "48.0"
    release: Summer '20
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version — enforced immediately
      since Spring '20
    summary: Visualforce Classic email templates sent to guest users in communities,
      sites, or portals no longer render correctly unless explicitly configured
      to bypass the new guest security restrictions.
    detail: This security policy shipped in Spring '20 (API 48.0) with immediate
      enforcement. The Summer '20 notes republish the guidance. Templates must
      include the renderUsingSystemContextWithoutSharing="True" attribute to
      restore access for guest recipients.
    upgradeAction: Audit all Visualforce email templates targeting guest users and
      add renderUsingSystemContextWithoutSharing="True" to each template's root
      component; test email delivery to portal/community guest accounts.
    source:
      document: v49-summer20.pdf
      page: 151
      heading: Email Templates
    confidence: high
    id: v49-vf-001
