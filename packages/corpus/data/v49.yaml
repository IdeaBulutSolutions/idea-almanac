    summary: The legacy Transaction Security framework using the
      TxnSecurity.PolicyCondition Apex interface is being retired in Winter '21.
      Existing legacy policies will be permanently disabled and unmaintainable
      after that release.
    detail: Apex classes implementing TxnSecurity.PolicyCondition must be migrated
      to the enhanced framework using TxnSecurity.EventCondition before Winter
      '21. Legacy policies remain functional until retirement but can no longer
      be created or modified as of Summer '20.
    upgradeAction: Identify Apex classes implementing TxnSecurity.PolicyCondition
      and rewrite them using the TxnSecurity.EventCondition interface before
      Winter '21 to avoid policy enforcement gaps.
