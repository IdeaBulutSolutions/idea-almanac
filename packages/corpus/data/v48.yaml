  - apiVersion: "48.0"
    release: Spring '20
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; enforced by Chrome
      80+ browser behavior
    summary: Chrome 80 changes cookie defaults to SameSite=Lax, breaking
      cross-domain integrations that rely on cookies without explicit SameSite
      attributes. Custom integrations using iframes or cross-domain
      communication fail unless cookies are updated to SameSite=None; Secure.
    detail: Salesforce updated its own cookies for Spring '20, but customer-owned
      cookies in custom integrations must be explicitly configured. HTTP-only
      access breaks entirely; HTTPS is mandatory. The Apex Cookie() constructor
      gained a new SameSite parameter to support setting this attribute
      programmatically.
    upgradeAction: Audit custom integrations using cookies across domains
      (especially iframe-based). Update cookie-setting code to explicitly
      specify SameSite=None; Secure for cross-site cookies, or
      SameSite=Lax/Strict for first-party-only cookies. Verify all endpoints use
      HTTPS. Test in Chrome with SameSite flags enabled.
    source:
      document: v48-spring20.pdf
      page: 80
      heading: Prepare for Google Chrome's Changes in SameSite Cookie Behavior That
        Can Break Salesforce Integrations
    confidence: high
    id: v48-auth-001
