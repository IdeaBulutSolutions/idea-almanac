  - apiVersion: "48.0"
    release: Spring '20
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Record-triggered autolaunched flows can now execute before the record
      is committed to the database, running in the same transaction without a
      separate DML operation. These before-save flows execute immediately before
      Apex before triggers in the order of execution.
    detail: Before-save record-triggered flows modify field values on the triggering
      record without issuing an additional DML statement, avoiding re-execution
      of assignment rules, workflow rules, and other automation. This positions
      them as a faster alternative to Process Builder record-change processes
      and complements Apex before triggers. They cannot access post-save values
      like Id or LastModifiedDate, nor can they create or update related
      records.
    source:
      document: v48-spring20.pdf
      page: 410
      heading: Update New and Changed Records 10 Times Faster by Using Before-Save
        Updates in Flows
    confidence: high
    id: v48-flow-001
