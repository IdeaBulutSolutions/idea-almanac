    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (critical update
      auto-activates August 15, 2020)
    summary: When enabled, flows that invoke legacy Apex actions (Process.Plugin
      implementations) with public access modifiers will fail at runtime. Global
      legacy Apex actions whose describe or invoke methods are public also
      become inaccessible to flows in other namespaces.
    detail: This critical update enforces proper access modifier semantics for
      legacy Apex plug-ins referenced by flows. Previously, flows could call
      public legacy Apex actions even though this was unsupported. After
      activation, only global legacy Apex actions with global describe/invoke
      methods remain callable across namespaces.
    upgradeAction: Before the August 2020 auto-activation date, audit all flows that
      use legacy Apex action elements. Test each path in a sandbox. If any flow
      calls a public legacy Apex action from a managed package, coordinate with
      the package developer to either make the action global or migrate to
      InvocableMethod.
    source:
      document: v48-spring20.pdf
      page: 425
      heading: Make Flows Respect Access Modifiers for Legacy Apex Actions (Critical
        Update)
    confidence: high
    id: v48-flow-002
