  - apiVersion: "48.0"
    release: Spring '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version (enforced April 9, 2020)
    summary: "Bulk REST API calls to invocable actions now use partial-save
      semantics: a single failure no longer rolls back the entire transaction.
      Instead, Salesforce retries successful actions up to three times and only
      rolls back the specific actions that fail."
    detail: This enforcement changes error-handling behavior for any external system
      calling invocable actions via REST API in bulk. External callouts within
      flows may execute multiple times due to retries, and transactions may run
      longer, potentially hitting governor limits sooner. Certain action types
      (Invocable Apex, External Services, and several Order Management actions)
      do not support partial save and retain all-or-nothing behavior.
    upgradeAction: Audit REST API integrations invoking actions in bulk to handle
      partial success responses. Ensure external callouts are idempotent since
      retries can cause repeated execution. Monitor transaction duration and
      limit consumption after enforcement.
    source:
      document: v48-spring20.pdf
      page: 426
      heading: Enable Partial Save for Invocable Actions (Critical Update, Enforced)
    confidence: high
    id: v48-rest-013
