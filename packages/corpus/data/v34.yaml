    summary: Map and Set iteration now yields a consistent, repeatable element order
      across executions, whereas previously the order was arbitrary and could
      vary between runs.
    detail: Code that inadvertently depended on iteration order may have failed
      intermittently before this change. After Summer '15, the same insertion
      sequence produces the same iteration sequence every time, making such code
      behave consistently.
    upgradeAction: Review tests that relied on arbitrary iteration order for
      negative testing; they may now pass unexpectedly. No breaking changes
      expected, but verify any logic that assumed randomness.
    source:
      document: v34-summer15.pdf
      page: 261
      heading: Iteration Order for Maps and Sets Is Now Predictable
    confidence: high
    id: v34-apex-014
