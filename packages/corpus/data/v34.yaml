    behaviorArea: apex-testing
    appliesWhen: deployments using Metadata API client at version 34.0 or later
    summary: Production deployments no longer execute tests by default unless the
      package contains Apex classes or triggers. Previously (API 33.0 and
      earlier), tests ran whenever components requiring tests were present, such
      as custom objects.
    detail: "The runAllTests deployment option is replaced by testLevel, which
      offers granular control: RunAllTestsInOrg, RunLocalTests,
      RunSpecifiedTests, or NoTestRun. When using RunSpecifiedTests, each
      deployed Apex component must individually achieve 75% coverage from the
      specified tests, regardless of org-wide coverage."
    upgradeAction: Review CI/CD pipelines using Metadata API or Migration Tool at
      v34+. If you relied on implicit test execution for non-Apex deployments,
      explicitly set testLevel to ensure tests run. When using
      RunSpecifiedTests, verify each class/trigger in the package meets 75%
      coverage individually.
    source:
      document: v34-summer15.pdf
      page: 215
      heading: Choose Which Tests to Run in a Deployment
    confidence: high
    id: v34-apex-009
