    summary: 'A new org-wide session setting allows clickjack protection
      (X-Frame-Options: SAMEORIGIN header) to be added to Visualforce pages even
      when showHeader="false" is set. Enabling this breaks any page that embeds
      Visualforce in an iframe from a non-Visualforce domain.'
    detail: Previously, setting showHeader="false" on a Visualforce page suppressed
      the X-Frame-Options header, disabling clickjack protection. The new
      setting re-enables that header independently. Once enabled, Visualforce
      pages can only be framed by pages served from the Visualforce domain,
      breaking custom console components, embedded dashboards, and other
      iframe-based integrations.
    upgradeAction: Before enabling this setting in production, audit all uses of
      Visualforce pages in iframes (console components, dashboards, external
      sites) and test in sandbox. Either refactor away from iframes or accept
      the security trade-off of leaving the setting disabled.
    source:
      document: v34-summer15.pdf
      page: 257
      heading: Enable Clickjack Protection for Visualforce Pages Even When Headers Are
        Disabled
    confidence: high
    id: v34-vf-011
