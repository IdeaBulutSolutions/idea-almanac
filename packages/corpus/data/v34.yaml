    appliesWhen: org-wide regardless of component API version
    summary: Apex code coverage now counts each line of a multiline statement
      separately rather than treating the entire statement as one line, which
      can raise or lower reported coverage percentages depending on which lines
      execute.
    detail: When a single Apex statement spans multiple lines, each line containing
      an expression is now an independent coverage unit. Covered multiline
      statements may show higher percentages; partially-executed conditional
      expressions spread across lines may show lower percentages. Compiler
      optimizations (e.g., concatenated string literals) can also affect which
      lines are counted.
    upgradeAction: Re-run test suites after the Summer '15 release and verify that
      org-wide or package coverage thresholds are still met; refactor tests or
      adjust deployment gates if coverage dropped below required minimums.
    source:
      document: v34-summer15.pdf
      page: 259
      heading: New Code Coverage Calculation for Multiline Statements
    confidence: high
    id: v34-apex-013
