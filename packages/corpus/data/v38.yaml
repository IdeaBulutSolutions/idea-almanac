    summary: SOQL queries against custom metadata type relationship fields now
      enforce object-level permissions, returning only records referencing
      accessible objects, whereas Metadata API and Setup queries return all
      records regardless of permissions.
    detail: This creates a discrepancy between SOQL and Metadata API results for the
      same custom metadata relationship query. Additionally, ORDER BY cannot be
      used on relationship fields of custom metadata types.
    upgradeAction: Review code that queries custom metadata relationship fields via
      SOQL and verify the permission-filtered results meet expectations;
      consider Metadata API if full record sets are required.
    source:
