    summary: A bug preventing clickjack protection from working on Visualforce pages
      with showHeader="false" has been fixed, but the fix only applies to pages
      at API version 38.0 or higher. Pages below v38 remain vulnerable.
    detail: Pages that add their own static <head> block without using applyHtmlTag
      and applyBodyTag attributes are most affected. Salesforce recommends
      taking full control of HTML structure by adding static <html> and <body>
      elements and setting applyHtmlTag="false" and applyBodyTag="false".
    upgradeAction: Review Visualforce pages with showHeader="false" that rely on
      embedding in iframes. After upgrading to v38+, clickjack protection will
      be enforced and may break legitimate embedding scenarios.
    source:
      document: v38-winter17.pdf
      page: 462
      heading: Clickjack Protection Improvements for Visualforce Pages Without Page
        Header
    confidence: high
