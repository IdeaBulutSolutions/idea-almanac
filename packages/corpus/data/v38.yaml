    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: Lightning component access checks are now strictly enforced org-wide.
      Code referencing resources lacking appropriate access system attributes
      will fail to execute or return undefined instead of succeeding silently.
    detail: This was a critical update from Summer '16 that became mandatory for all
      orgs between October 15-19, 2016. Components, attributes, events,
      interfaces, and methods default to public access (same namespace only).
      Cross-namespace references without global access now fail at runtime.
    upgradeAction: Enable debug mode and test all Lightning components for access
      check violations. Add access="global" to resources that must be accessible
      cross-namespace, or remove references to inaccessible resources.
    source:
      document: v38-winter17.pdf
      page: 451
      heading: Access Check Violations Are Now Enforced
    confidence: high
    id: v38-aura-003
