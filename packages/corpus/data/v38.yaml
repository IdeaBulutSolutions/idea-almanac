    behaviorArea: api-rest
    appliesWhen: components compiled at API >= 38.0
    summary: The Product2Id field on WorkOrderLineItem becomes read-only at API
      38.0; setting PricebookEntryId now auto-populates Product2Id, and direct
      writes to Product2Id via API or code fail.
    detail: Code that previously wrote to Product2Id on work order line items must
      be refactored to write to PricebookEntryId instead. Existing line items
      with mismatched Product2Id and PricebookEntryId values will have their
      Product2Id overwritten to match the price book entry upon update.
    upgradeAction: Before upgrading past 37.0, search Apex and integrations for
      writes to WorkOrderLineItem.Product2Id and refactor them to use
      PricebookEntryId. Verify page layouts show the Product field
      (PricebookEntryId). If editable Product2Id is required, maintain a
      Visualforce page at API 37.0.
    source:
      document: v38-winter17.pdf
      page: 208
      heading: Streamlined Work Order Pricing
    confidence: high
    id: v38-rest-003
