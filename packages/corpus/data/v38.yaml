    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Organizations can now allow U2F security keys as an identity
      verification method for two-factor authentication and device activations,
      providing a phishing-resistant alternative to Salesforce Authenticator or
      SMS/email codes.
    detail: U2F keys use public-key cryptography via the FIDO Alliance standard.
      Users self-register keys without admin provisioning. Chrome 41+ is
      required. My Domain must be enabled, and enabling My Domain after U2F
      registration invalidates existing registrations. Connected apps and custom
      integrations relying on identity verification flows may want to account
      for this new verification option.
    source:
      document: v38-winter17.pdf
      page: 410
      heading: Let Users Verify Their Identity with U2F Security Keys
    confidence: medium
    id: v38-auth-001
