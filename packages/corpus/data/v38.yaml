    summary: New orgs no longer include the built-in Default Certificate. Code using
      PageReference.getContent() or getContentAsPDF(), delegated auth, AJAX
      proxy, or SAML SSO with the default cert must instead reference a
      self-managed (self-signed or CA-signed) certificate.
    upgradeAction: In newly provisioned orgs or sandboxes, create and configure a
      self-managed certificate before deploying code that calls
      PageReference.getContent()/getContentAsPDF() or that relies on delegated
      authentication, AJAX proxy, or default-cert SAML flows.
    source:
