      into StandardValueSet and ValueSet, GlobalPicklist becomes GlobalValueSet,
      GlobalPicklistValue and PicklistValue become CustomValue, and
      GlobalPicklistTranslation splits into StandardValueSetTranslation and
      GlobalValueSetTranslation."
