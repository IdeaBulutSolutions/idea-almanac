  - apiVersion: "38.0"
    release: Winter '17
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Transaction Security policies now enforce resource metering that can
      block access if policy evaluation consumes too many resources. Static
      local variables in policy Apex code are no longer supported.
    detail: When policy evaluations cannot complete within resource limits, the
      system fails closed and blocks the user's access rather than allowing it
      through. This fail-closed behavior applies to all policy types including
      login policies. Additionally, Apex code implementing Transaction Security
      policies cannot rely on static local variables.
    upgradeAction: Review Transaction Security policy Apex implementations to remove
      any reliance on static local variables. Test policies under concurrent
      load to ensure they complete within resource limits, as excessive resource
      usage will now block user access.
    source:
      document: v38-winter17.pdf
      page: 420
      heading: Resource Usage Improved for All Policies
    confidence: high
    id: v38-apex-002
