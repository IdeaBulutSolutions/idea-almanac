    summary: LockerService enforcement for Lightning components can now be toggled
      by all orgs via the Critical Update settings, and a new checkbox controls
      whether managed package components are subject to LockerService
      restrictions separately from org-created components.
    detail: New orgs have LockerService enabled by default for both org-created and
      managed package components in Developer Edition, but only for org-created
      components in other editions. The critical update deadline was extended to
      Summer '17. Orgs that previously could not deactivate without contacting
      Salesforce can now self-service toggle enforcement.
    upgradeAction: Review your LockerService settings before the Summer '17
