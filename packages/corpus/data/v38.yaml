    summary: Tooling API access to SecurityHealthCheck and SecurityHealthCheckRisks
      objects now requires 'View Setup and Configuration' permission, tightening
      previous access rules.
    upgradeAction: Verify that integration users querying SecurityHealthCheck or
      SecurityHealthCheckRisks via Tooling API have the 'View Setup and
      Configuration' permission; update permission sets if needed.
