    behaviorArea: visualforce
    appliesWhen: Visualforce pages set to API version >= 32.0
    summary: Visualforce expressions referencing encrypted sObject fields now return
      masked/encrypted values instead of decrypted plaintext, closing a data
      exposure gap that existed in earlier versions.
    detail: Components like apex:outputText, apex:column, and raw merge expressions
      now behave consistently with apex:inputField and apex:outputField by
      preserving encryption. Apex controller properties returning Apex variables
      (not sObject fields) still expose decrypted values since Apex lacks an
      encrypted type.
    upgradeAction: Review pages that display encrypted custom fields via expressions
      or output components; if business logic depends on seeing plaintext
      values, refactor to use controller methods or keep the page at API 31.0 or
      earlier.
    source:
      document: v32-winter15.pdf
      page: 258
      heading: Preserve sObject Field Encryption in Visualforce Expressions
    confidence: high
    id: v32-vf-003
