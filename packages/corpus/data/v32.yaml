    appliesWhen: custom Force.com Community site pages compiled at API >= 32.0
    summary: Guest user session IDs are no longer generated or exposed on custom
      Community pages at API 32.0+, eliminating a vulnerability that allowed
      anonymous API access via guest user permissions.
    detail: The Apex UserInfo.getSessionId() method behavior changes at this version
      for guest contexts. Code that previously captured or relied on guest
      session IDs will no longer receive them.
    upgradeAction: Review any custom Community pages that call
      UserInfo.getSessionId() in guest context or pass session tokens to
      external systems; these integrations will stop working after upgrading to
      32.0.
    source:
