    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Administrators can now attach Flow-based login flows to user profiles,
      enabling custom post-authentication logic such as two-factor
      authentication, terms acceptance, or registration steps using the new
      Auth.SessionManagement Apex class.
    detail: Login flows are built in Flow Designer and can leverage a new Apex
      plugin interface (Process.Plugin) combined with Auth.SessionManagement for
      TOTP validation. Pre-defined flow variables (LoginFlow_UserId,
      LoginFlow_IpAddress, etc.) are injected at runtime. Flows apply to
      UI-based authentication only—API logins and frontdoor.jsp session handoffs
      are excluded.
    source:
      document: v32-winter15.pdf
      page: 226
      heading: Customize and Manage User Authentication with Login Flows
    confidence: high
    id: v32-auth-003
