    detail: Developers can now query EventLogFile to pull audit logs covering Apex
      callouts, triggers, SOAP/REST/Bulk API usage, login events, and more. Logs
      are generated daily with a 30-day retention window for licensed orgs.
      Schema for each EventType may change between releases, so integrations
      should validate LogFileFieldNames and LogFileFieldTypes at the start of
      each release cycle.
    source:
      document: v32-winter15.pdf
      page: 224
      heading: Use Event Monitoring to Understand Organization Trends (Generally
        Available)
    confidence: high
