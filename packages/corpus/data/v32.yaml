    behaviorArea: soql-sosl
    appliesWhen: org-wide regardless of component API version
    summary: Lightning Connect introduces external objects that can be queried via
      SOQL and SOSL, enabling real-time access to data stored outside Salesforce
      through OData 2.0 callouts without data replication.
    detail: "External objects behave differently from standard/custom objects in
      queries—they execute web service callouts at runtime. This affects query
      performance characteristics and governor limits. External objects support
      lookup relationships, Metadata API deployment, change sets, and packages.
      Note: This feature was announced as pilot/beta in Winter '15 with GA
      anticipated November 2014–January 2015."
    source:
      document: v32-winter15.pdf
      page: 212
      heading: Access External Data with Lightning Connect
    confidence: low
    id: v32-soql-001
  - apiVersion: "32.0"
    release: Winter '15
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide once critical update is activated
    summary: "A critical update fixes how screen fields in loops obtain their
      initial value: after activation, each loop iteration uses the configured
      default rather than the value entered in a prior iteration."
    detail: Before this fix, a screen field inside a loop retained the last-entered
      value across iterations, which could cause incorrect data to carry
      forward. Once activated, the field resets to its defined default at the
      start of each new loop iteration, while backward navigation still
      preserves the user's entry.
    upgradeAction: Review flows that use screens inside loops and rely on
      cross-iteration value persistence; after activating the critical update,
      add explicit variable assignments if prior-iteration values are
      intentionally needed.
    source:
      document: v32-winter15.pdf
      page: 219
      heading: Behavior Changed for Default Values in Flow Screen Fields
    confidence: high
    id: v32-flow-001
