    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: The triggerUserEmail API field now respects per-user notification
      preferences when the org setting is enabled, meaning API-created task
      assignments may no longer send emails to users who have opted out, even
      when triggerUserEmail=true.
    detail: Previously, setting triggerUserEmail=true on API task creation always
      sent notifications. With the new user-level setting exposed, individual
      users can suppress these emails. Integrations relying on guaranteed email
      delivery for task assignments must account for this user preference
      override.
    upgradeAction: Review integrations that create tasks via API with
      triggerUserEmail=true and expect email delivery. If guaranteed
      notification is required, consider alternative notification mechanisms or
      document that users can opt out.
    source:
      document: v32-winter15.pdf
      page: 144
      heading: Let Your Users Control Task Notifications Globally
    confidence: medium
    id: v32-rest-001
