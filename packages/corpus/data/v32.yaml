    behaviorArea: api-rest
    appliesWhen: integrations using Chatter REST API at version 32.0 and later
    summary: The Chatter REST API restructures feed items around a capabilities
      model, removing properties like attachment, comments,
      isBookmarkedByCurrentUser, isLikedByCurrentUser, likes, likesMessage,
      myLike, and topics from the Feed Item response body and relocating them
      under a new capabilities property. Feed Item Attachment response bodies
      are replaced by corresponding Capability response bodies.
    detail: Code consuming Feed Item responses must migrate from top-level
      properties (attachment, comments, likes, topics, etc.) to the nested
      capabilities structure. For example, feedItem.isLikedByCurrentUser becomes
      feedItem.capabilities.chatterLikes.isLikedByCurrentUser, and attachment
      types like Content or Poll become Content Capability or Poll Capability
      accessed via capabilities.content or capabilities.poll. The Comment
      response body's feedItem property is replaced by feedElement, and Comment
      Page's comments property is replaced by items.
    upgradeAction: Before upgrading integrations past API version 31.0, refactor
      code that reads Feed Item properties (attachment, comments, likes, topics,
      isBookmarkedByCurrentUser, isLikedByCurrentUser, likesMessage, myLike) to
      use the new capabilities-based structure. Update references to Feed Item
      Attachment types to their Capability equivalents, and change
      Comment.feedItem to Comment.feedElement.
    source:
      document: v32-winter15.pdf
      page: 320
      heading: New and Changed Response Bodies
    confidence: high
    id: v32-rest-011
