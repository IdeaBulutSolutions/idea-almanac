  - apiVersion: "32.0"
    release: Winter '15
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - VisualforcePage
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version
    summary: When unlisted groups are enabled, Apex and Visualforce code running in
      system mode bypasses unlisted group visibility controls, potentially
      exposing these groups to non-members through custom pages or AppExchange
      apps.
    detail: Because Apex executes in system mode without checking user permissions,
      any Visualforce page or AppExchange app querying CollaborationGroup can
      surface unlisted groups to users who should not see them. Additionally,
      users accessing such pages can inadvertently act with owner-level
      privileges on unlisted groups.
    upgradeAction: Audit existing Apex and Visualforce code that queries
      CollaborationGroup. Add explicit SOQL filters to exclude unlisted groups
      (NetworkType = 'Unlisted'), implement permission checks, and review
      sharing settings before enabling unlisted groups.
    source:
      document: v32-winter15.pdf
      page: 196
      heading: Unlisted Group Limitations
    confidence: high
    id: v32-sharing-002
  - apiVersion: "32.0"
    release: Winter '15
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - VisualforcePage
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Custom permissions become generally available, enabling developers to
      define granular access checks in Apex code that control feature visibility
      based on permission set or profile assignments.
    detail: Developers can now create custom permissions and query them in Apex to
      conditionally expose functionality (e.g., hiding or showing Visualforce
      buttons). This release adds support for required custom permissions
      (dependencies between permissions), unmanaged package inclusion, and
      profile settings in packages.
    source:
      document: v32-winter15.pdf
      page: 207
      heading: Manage Access to Custom Processes and Apps (Generally Available)
    confidence: high
    id: v32-apex-007
  - apiVersion: "32.0"
