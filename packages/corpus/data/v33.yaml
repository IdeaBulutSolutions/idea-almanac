    summary: Named Credentials are now available, allowing Apex callouts to
      reference a credential by name instead of hardcoding endpoints and
      authentication logic. This lets Salesforce handle OAuth or basic auth
      automatically and bypasses the need for explicit Remote Site Settings.
    detail: Developers can point callouts to a named credential rather than a raw
      URL, delegating authentication (OAuth 2.0 or basic password) to the
      platform. This simplifies code, improves security by keeping secrets out
      of Apex, and eases multi-environment deployments since each org can define
      the same credential name with different endpoints.
