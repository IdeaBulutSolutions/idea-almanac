    summary: OAuth 2.0 Web Server Flow now supports PKCE (Proof Key for Code
      Exchange) via optional code_challenge and code_verifier parameters,
      enabling clients to guard against authorization code interception attacks.
    detail: Clients can generate a random code_verifier, hash it to produce
      code_challenge, pass the challenge to the authorization endpoint and the
      verifier to the token endpoint. Salesforce validates the pair and rejects
      mismatches. This is the standard RFC 7636 PKCE extension.
    source:
      document: v33-spring15.pdf
      page: 252
      heading: Provide Code Challenge and Verifier Values for OAuth 2.0 Web Server Flow
    confidence: high
