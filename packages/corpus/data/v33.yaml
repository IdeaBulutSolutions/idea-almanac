    appliesWhen: org-wide regardless of component API version
    summary: SOSL search infrastructure switches from bigram to morphological
      tokenization, significantly altering how East Asian (CJKT) text is
      matched. Queries that previously matched substrings within compound words
      now require exact morphological boundaries.
    detail: The tokenization change affects all SOSL search API calls. For example,
      searching for 京都 (Kyoto) previously matched 東京都 (Tokyo Prefecture) via
      bigram overlap; now it does not. Additionally, alphanumeric strings are
      tokenized differently—web2lead becomes separate tokens (web, 2, lead,
      etc.), changing which records match partial searches. Records with 300+
      Kanji-only characters are tokenized as Chinese, making them unsearchable
      for Japanese-language users.
    upgradeAction: Run SOSL-dependent integrations in sandbox before Summer '15
      rollout to verify expected search results, especially for CJKT content and
      alphanumeric identifier searches.
    source:
      document: v33-spring15.pdf
      page: 48
      heading: Get Faster and More Relevant Search Results (Generally Available)
    confidence: high
    id: v33-soql-002
