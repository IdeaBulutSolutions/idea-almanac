    summary: URLFOR now returns direct download URLs for attachments instead of
      redirect URLs, eliminating an extra network round-trip per attachment
      link.
    detail: Previously URLFOR with $Action.Attachment.Download returned a URL that
      issued a server-side redirect to the actual file. Now it returns the final
      URL directly. This improves page load times for pages with many attachment
      links but may affect code that expected or parsed the intermediate
