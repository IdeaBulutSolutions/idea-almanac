    summary: Aura's new dynamic boxcar optimization alters the sequence in which
      server-side action callbacks execute, potentially breaking code that
      relies on implicit timing assumptions between actions.
    detail: The framework now groups Aura actions into network requests differently
      than before. While this improves performance, callback execution order is
      no longer guaranteed to match previous behavior. A kill-switch exists to
      disable the optimization if issues arise.
    upgradeAction: Audit Aura components for code that assumes a specific callback
      execution order between server-side actions. Test thoroughly after Winter
      '26 rollout; if timing-dependent bugs surface, temporarily disable dynamic
      boxcar optimization while refactoring.
    source:
      document: v65-winter26.pdf
      page: 371
      heading: Improved Aura App Performance with Dynamic Boxcar Optimization
    confidence: high
    id: v65-aura-001
