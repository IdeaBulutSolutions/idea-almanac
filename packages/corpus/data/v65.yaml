    summary: SLDS 2 replaces the previous CSS framework with a new architecture that
      separates structure from theme via CSS custom properties (styling hooks),
      deprecating Aura tokens and Sass in favor of direct CSS authoring.
    detail: Components relying on legacy design tokens or Sass-based theming need
      migration. The new Salesforce Cosmos theme ships as default. While stated
      as backward-compatible with SLDS 1, CSS specificity or custom styling
      overrides may behave differently under the new hook-based system.
    upgradeAction: Run SLDS Linter against custom LWC and Aura components to
      identify deprecated token usage or Sass dependencies before your org
      transitions to SLDS 2.
    source:
      document: v65-winter26.pdf
      page: 377
      heading: Bring Your Org to Life with Salesforce Lightning Design System 2
        (Generally Available)
    confidence: medium
    id: v65-lwc-007
  - apiVersion: "65.0"
    release: Winter '26
    changeType: deprecated
    impact: deprecation
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version; affects SLDS 2
      styling hooks usage in LWC/Aura components
    summary: SLDS 2 deprecates multiple global styling hooks including color-accent,
      color-brand-base-100, color-error/info/success/warning-base-100,
      font-family, and font-lineheight variants. Components using these hooks
      must migrate to replacement hooks to avoid future breakage.
    detail: The deprecated hooks span color categories (accent-dark/light variants
      mapped to brand-base equivalents, semantic-base-100 variants mapped to
      neutral-base-100) and typography (font-family to font-family-base,
      font-lineheight to font-line-height with hyphen). Additionally, the
      slds-button_icon-inverse class removal on modal close buttons is scheduled
      for Spring '26.
