    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Platform REST API and Bulk API responses now include a Warning HTTP
      header when deprecated API versions or other warning conditions are
      detected, enabling programmatic deprecation awareness.
    upgradeAction: Update API client code to inspect the Warning response header and
      log or alert on deprecation notices to proactively identify calls needing
