    changeType: changed
    impact: additive
    affectedMetadataTypes:
      - Flow
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: The FlowScreenField metadata subtype now accepts defaultValue for
      choice-based field types (RadioButtons, DropdownBox,
      MultiSelectCheckboxes, MultiSelectPicklist), enabling default selections
      beyond the previous defaultSelectedChoiceReference approach.
    detail: When deploying or retrieving Flow metadata, choice screen components can
      now specify defaults via defaultValue in addition to
      defaultSelectedChoiceReference. The two fields are mutually exclusive on a
      given FlowScreenField element.
    source:
