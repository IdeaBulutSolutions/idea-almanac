entries:
  - apiVersion: "52.0"
    release: Summer '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; enforcement effective
      February 1, 2022
    summary: Salesforce will mandate MFA for all UI-based logins starting February
      2022. Integrations using direct user credentials without MFA, or SSO flows
      lacking a second factor, must be updated to comply with the new terms of
      service.
    detail: The requirement applies to all internal users logging into Salesforce
      UIs (Lightning, Classic, mobile). Organizations can satisfy it either by
      enabling native Salesforce MFA or by ensuring their SSO identity provider
      enforces MFA. API-only integrations using OAuth flows without user
      interaction are unaffected, but any flow that presents a login screen
      requires MFA.
    upgradeAction: Audit all login paths (direct and SSO) to confirm MFA is
      enforced. For connected apps or custom portals that redirect users to
      Salesforce login, verify MFA is enabled or the IdP supplies a second
      factor.
    source:
      document: v52-summer21.pdf
      page: 68
      heading: Future Requirement to Enable Multi-Factor Authentication (MFA)
    confidence: high
    id: v52-auth-001
  - apiVersion: "52.0"
    release: Summer '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: Visualforce pages used as button or tab overrides in Lightning Console
      now render inside a modal window rather than spanning full width, matching
      the modal presentation used by standard New, Edit, and Clone actions.
    upgradeAction: Review Visualforce override pages for layout or sizing issues
      when displayed in a modal context; pages designed for full-width rendering
      may need CSS or layout adjustments.
    source:
      document: v52-summer21.pdf
      page: 73
      heading: Visualforce Page Overrides Open in a Modal in Lightning Console
    confidence: high
    id: v52-vf-001
  - apiVersion: "52.0"
    release: Summer '21
    changeType: deprecated
    impact: deprecation
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: The Order Summary History component in B2B Commerce is deprecated and
      replaced by the Order List component, which offers filtering, sorting by
      date, and finer display control.
    upgradeAction: Replace usage of the Order Summary History component with the
      Order List component and update any dependent CSS classes for the quantity
      selector.
    source:
      document: v52-summer21.pdf
      page: 198
      heading: Set Up Product Increment, Minimum, and Maximum Quantity Rules
    confidence: medium
    id: v52-lwc-001
  - apiVersion: "52.0"
    introducedIn: "45.0"
    release: Summer '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Any
    behaviorArea: other
    appliesWhen: org-wide regardless of component API version — enforced Spring '22;
      available via release update earlier
    summary: Salesforce transitions from JDK8 to ICU locale formatting for dates,
      times, and numbers. Once the release update is enabled (enforced in Spring
      '22), all locale-dependent formatting across the platform shifts to ICU
      standards, potentially altering display values and breaking integrations
      that parse formatted strings.
    detail: The ICU formats apply to API version 45.0 and later when the update is
      active. Orgs created Winter '20+ have ICU enabled by default. The change
      affects every surface where locale-sensitive formatting occurs—Apex,
      Visualforce, formulas, reports, and API responses returning formatted
      values. Code or integrations parsing locale-formatted strings may break if
      they assumed JDK8 output patterns.
    upgradeAction: Before the Spring '22 enforcement (or before enabling manually),
      inventory code and integrations that parse formatted dates/times/numbers.
      Run the provided SOQL to identify affected locales, then test critical
      flows with ICU enabled in a sandbox. Check installed package compatibility
      with providers.
    source:
      document: v52-summer21.pdf
      page: 206
      heading: Enable ICU Locale Formats (Previously Released Update)
    confidence: high
    id: v52-other-001
  - apiVersion: "52.0"
    release: Summer '21
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: The legacy External Services feature is retired and replaced by a newer
      version with expanded schema support and improved error handling. Existing
      legacy registrations remain visible until Winter '22 but cannot be
      modified—only deleted.
    upgradeAction: Migrate any legacy External Services registrations to the new
      External Services version before Winter '22 when legacy registrations will
      no longer be accessible.
    source:
      document: v52-summer21.pdf
      page: 209
      heading: Legacy External Services is Being Retired in Summer '21
    confidence: high
    id: v52-rest-001
  - apiVersion: "52.0"
    release: Summer '21
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - Integration
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: External Services now supports the OpenAPI 2.0 additionalProperties
      construct, generating Apex classes with Map<String, Type> properties for
      dictionary-style schema definitions.
    detail: When registering an OpenAPI 2.0 spec containing additionalProperties,
      the platform generates an Apex wrapper with a 'properties' field typed as
      Map<String, T>. Named properties and additionalProperties cannot coexist
      under the same object property type—move such definitions to the
      definitions section and reference by name. Flow cannot directly manipulate
      these Map properties but preserves them; use Apex invocable actions to
      work with the map data.
    source:
      document: v52-summer21.pdf
      page: 210
      heading: Use the additionalProperties OpenAPI 2.0 Schema Construct
    confidence: medium
    id: v52-apex-001
  - apiVersion: "52.0"
    release: Summer '21
    changeType: changed
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: External Services now generates Apex wrapper classes with names up to
      255 characters (previously capped at 40), enabling registration of OpenAPI
      specs containing deeply nested or verbose operation/property identifiers.
    detail: Individual operation or object developer names derived from the schema
      remain limited to 80 characters, but nested paths can now total 255
      characters. This is relevant when invoking External Services-generated
      Apex or when schema changes previously failed registration due to
      name-length constraints.
    source:
      document: v52-summer21.pdf
      page: 211
      heading: Apex Object Names Can Now Be Up To 255 Characters Long
    confidence: medium
    id: v52-apex-002
  - apiVersion: "52.0"
    release: Summer '21
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - Flow
    behaviorArea: apex-testing
    appliesWhen: org-wide regardless of component API version
    summary: Apex unit tests can now invoke flows containing External Services
      actions by reusing HTTP callout mocks, enabling test coverage for
      previously untestable flow integrations.
    source:
      document: v52-summer21.pdf
      page: 212
      heading: Apex Unit Testing With Flow And External Services
    confidence: high
    id: v52-apex-003
  - apiVersion: "52.0"
    release: Summer '21
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-soap
    appliesWhen: org-wide regardless of component API version, effective October 1,
      2021 (Winter '22)
    summary: The Secure Agent standard object is removed from the SOAP API when
      Files Connect for SharePoint On-Premises retires. Integrations querying or
      manipulating this object will break.
    upgradeAction: Remove any SOAP API calls that reference the Secure Agent object
      and migrate to Files Connect for SharePoint Online or an alternative file
      integration before the retirement date.
    source:
      document: v52-summer21.pdf
      page: 228
      heading: Secure Agent Is Being Retired in Winter '22
    confidence: high
    id: v52-soap-001
  - apiVersion: "52.0"
    release: Summer '21
    changeType: deprecated
    impact: deprecation
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: All Aura components in the ui namespace lose official support after May
      1, 2021. They continue to function but Salesforce will not accept support
      cases for issues with them.
    detail: This deprecation was originally announced in Winter '20. Affected
      components include ui:button, ui:input* variants, ui:output* variants,
      ui:menu* variants, and ui:spinner among others. Each has a recommended
      replacement in the lightning namespace (Aura or LWC). The
      ui:scrollerWrapper has no direct replacement but native scrolling is now
      standard in the Salesforce mobile app.
    upgradeAction: Audit Aura bundles for any ui:* component references and migrate
      to lightning namespace equivalents or Lightning Web Components before
      relying on support for production issues.
    source:
      document: v52-summer21.pdf
      page: 230
      heading: Aura Components in the ui Namespace Are Deprecated
    confidence: high
    id: v52-aura-001
  - apiVersion: "52.0"
    release: Summer '21
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Lightning web components can now be configured as quick actions on
      record pages, supporting both screen-based actions (modal windows) and
      headless actions (invoke method called on click).
    detail: Requires defining lightning__RecordAction target in the component's
      js-meta.xml with actionType set to ScreenAction or Action. Headless
      actions must implement an @api invoke() method.
    source:
      document: v52-summer21.pdf
      page: 234
      heading: Create Quick Actions with Lightning Web Components (Generally Available)
    confidence: high
    id: v52-lwc-002
  - apiVersion: "52.0"
    release: Summer '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
      - VisualforcePage
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Event listeners on Lightning Out or Visualforce pages now receive
      retargeted events at all times, meaning event.target resolves to the host
      element (e.g., c-child) rather than internal shadow DOM elements like
      buttons, even for handlers registered before the framework initialized.
    upgradeAction: Audit event handlers in Lightning Out and Visualforce
      integrations that inspect event.target for specific internal element tag
      names; update logic to expect the component host element instead of
      shadow-internal elements.
    source:
      document: v52-summer21.pdf
      page: 236
      heading: Event Targets Are Always Retargeted
    confidence: high
    id: v52-lwc-003
  - apiVersion: "52.0"
    introducedIn: "40.0"
    release: Summer '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version (enforced upon org
      upgrade to Summer '21)
    summary: Aura components outside a managed package namespace can no longer
      invoke Apex controller methods unless those methods are declared global.
      Public methods in managed packages are now restricted to components within
      the same namespace.
    detail: This release update was introduced in Summer '17 (API 40.0) and becomes
      mandatory in Summer '21. Server-side actions calling non-global methods
      from outside the package will fail at runtime. Non-namespaced unlocked
      packages are exempt and behave like unmanaged packages.
    upgradeAction: Audit Aura components that call Apex methods in managed packages.
      If any rely on public (non-global) methods, contact the package vendor for
      supported global alternatives or refactor to avoid those calls before your
      org upgrades.
    source:
      document: v52-summer21.pdf
      page: 238
      heading: Disable Access to Non-global Apex Controller Methods in Managed
        Packages (Update, Enforced)
    confidence: high
    id: v52-aura-002
  - apiVersion: "52.0"
    release: Summer '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Lightning components can no longer read Apex properties whose getter is
      marked private or protected; the runtime now enforces the same
      access-modifier rules that apply in other Apex contexts.
    detail: Previously, Aura and LWC markup expressions could bypass
      private/protected getter restrictions on @AuraEnabled properties. After
      enforcement, any component referencing such a property will fail to
      retrieve the value. Only getters affects; setters remain unchanged.
    upgradeAction: Audit @AuraEnabled properties with private or protected getters
      and change them to public before the org upgrades to Summer '21, then
      verify components still render expected values.
    source:
      document: v52-summer21.pdf
      page: 239
      heading: Enforce Access Modifiers on Apex Properties in Lightning Component
        Markup (Update, Enforced)
    confidence: high
    id: v52-lwc-004
  - apiVersion: "52.0"
    release: Summer '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version (enforced Winter '22)
    summary: Aura components marked access="public" become restricted to their own
      namespace and internal Salesforce components, fixing prior inconsistent
      enforcement. Callbacks not wrapped in $A.getCallback() that previously
      succeeded despite losing context will now fail access checks.
    upgradeAction: Enable the release update in sandbox, test pages with custom Aura
      components for 'Access Check Failed!' console errors, ensure all callbacks
      use $A.getCallback(), and fix any cross-namespace access violations before
      Winter '22 enforcement.
    source:
      document: v52-summer21.pdf
      page: 240
      heading: Securely Access Aura Components (Update)
    confidence: high
    id: v52-aura-003
  - apiVersion: "52.0"
    release: Summer '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version (enforcement scheduled
      Winter '22)
    summary: Lightning apps now respect the OAuth token scope defined in connected
      apps. Previously scope restrictions were ignored, so tokens could access
      Lightning resources beyond their granted permissions.
    detail: After enforcement, Lightning apps (including Lightning Out) reject OAuth
      tokens lacking appropriate scopes. Required scopes include 'lightning',
      'visualforce', 'web', or 'full' depending on app needs.
    upgradeAction: Audit connected apps authenticating Lightning or Lightning Out
      apps. Verify each connected app's OAuth scope includes 'lightning',
      'visualforce', 'web', or 'full'. Test in sandbox before Winter '22
      enforcement.
    source:
      document: v52-summer21.pdf
      page: 241
      heading: Enforce OAuth Scope for Lightning Apps (Update)
    confidence: high
    id: v52-auth-002
  - apiVersion: "52.0"
    release: Summer '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: The Einstein NER endpoint now derives the time zone for DATETIME
      normalization from the language parameter when timezone is omitted,
      instead of using a fixed default.
    detail: Previously, omitting the timezone parameter resulted in an unspecified
      normalization behavior. Now en_US maps to America/Los_Angeles, en_GB to
      Europe/London, etc. This affects any integration parsing DATETIME values
      from NER responses without explicitly setting timezone.
    upgradeAction: Review integrations calling the Einstein NER endpoint without an
      explicit timezone parameter; if you relied on a specific time zone, add
      the timezone parameter explicitly to avoid unexpected offset changes.
    source:
      document: v52-summer21.pdf
      page: 244
      heading: Get DATETIME Values in the Right Time Zone for Einstein NER (Beta)
    confidence: medium
    id: v52-rest-002
  - apiVersion: "52.0"
    introducedIn: "51.0"
    release: Summer '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
      - ApexClass
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced Winter '22)
    summary: Visualforce JavaScript Remoting now enforces stricter CSRF token
      validation and validates the apexType parameter against actual Apex method
      signatures, rejecting calls with inaccessible or mismatched types.
    detail: "This Release Update tightens security for $RemoteAction calls: the CSRF
      token generation changes for better guest-user protection, and any
      apexType value in remoting payloads must exactly match the Apex method
      parameter type and be accessible to the caller. Invalid or inaccessible
      apexType values now throw errors instead of silently proceeding.
      Originally available in Spring '21, enforcement became mandatory in Winter
      '22."
    upgradeAction: Search codebase for @RemoteAction methods and their corresponding
      Visualforce.remoting.Manager.invokeAction calls. Test each
      remoting-enabled page with the release update enabled in sandbox, fix any
      apexType mismatches or accessibility errors surfaced in console logs, and
      redesign calls that pass inaccessible Apex types.
    source:
      document: v52-summer21.pdf
      page: 246
      heading: Securely Call the Visualforce Remoting API (Previously Released Update)
    confidence: high
    id: v52-vf-002
  - apiVersion: "52.0"
    introducedIn: "48.0"
    release: Summer '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (enforced Spring '22)
    summary: Visualforce pages that fire multiple API navigation calls in quick
      succession will have only the first call honored; subsequent calls are
      silently blocked to prevent race conditions.
    detail: This release update originated in Summer '20 (API 48.0) and becomes
      mandatory in Spring '22. Pages relying on chained or competing navigation
      API calls will break. Salesforce recommends migrating affected pages to
      Lightning components.
    upgradeAction: Audit Visualforce pages for consecutive sforce.one.navigateTo* or
      similar API navigation calls. Refactor to issue a single navigation call
      or migrate to LWC/Aura navigation.
    source:
      document: v52-summer21.pdf
      page: 247
      heading: Prevent Consecutive API Navigation Calls in Visualforce Pages
        (Previously Released Update)
    confidence: high
    id: v52-vf-003
  - apiVersion: "52.0"
    release: Summer '21
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Transaction Finalizers reach GA, allowing developers to attach callback
      logic to Queueable jobs that executes regardless of whether the parent job
      succeeds or fails. Finalizers can inspect the parent job result, retrieve
      any unhandled exception, and enqueue one follow-up async job.
    source:
      document: v52-summer21.pdf
      page: 248
      heading: Attach Actions to Asynchronous Apex Jobs Using Transaction Finalizers
        (Generally Available)
    confidence: high
    id: v52-apex-004
  - apiVersion: "52.0"
    release: Summer '21
    changeType: deprecated
    impact: deprecation
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; retirement enforced
      in Summer '22
    summary: Platform API versions 20.0 and earlier are now deprecated across SOAP
      API (7.0–20.0), REST API (20.0), and Bulk API (16.0–20.0). These endpoints
      will be retired and stop functioning entirely when Summer '22 releases.
    detail: After Summer '22 deployment, any request to the deprecated API versions
      will fail with an error indicating the endpoint is deactivated. This
      affects all API-enabled org editions.
    upgradeAction: Audit all integrations, middleware, and connected apps for calls
      to API versions 20.0 or earlier. Update endpoint URLs and client libraries
      to use a supported API version (21.0+) before Summer '22 rollout.
    source:
      document: v52-summer21.pdf
      page: 250
      heading: Deprecation and End Of Support for Platform API Legacy Versions
    confidence: high
