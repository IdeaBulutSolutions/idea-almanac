apiVersion: "56.0"
release: Winter '23
reviewed: true
entries:
  - apiVersion: "56.0"
    release: Winter '23
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; auto-enablement in
      Spring '23, enforcement in September 2023
    summary: Salesforce will automatically enable MFA for direct logins in Spring
      '23 and enforce it permanently by September 2023, affecting all
      integrations and API clients that authenticate via direct user credentials
      rather than OAuth flows.
    detail: The MFA requirement became contractually effective February 1, 2022. For
      direct Salesforce logins (not SSO), MFA auto-enablement begins rolling out
      with Spring '23, and full enforcement follows in September 2023.
      Integrations using username-password authentication flows will break
      unless they support MFA or migrate to OAuth-based authentication.
    upgradeAction: Audit all integrations authenticating via username/password.
      Migrate to OAuth 2.0 flows (JWT bearer, client credentials, or web server
      flow) before enforcement. For any remaining direct-login scenarios,
      implement MFA verification support.
    source:
      document: v56-winter23.pdf
      page: 83
      heading: Be Ready for Multi-Factor Authentication Auto-Enablement
    confidence: high
    id: v56-auth-001
  - apiVersion: "56.0"
    release: Winter '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide in newly created Salesforce orgs regardless of component
      API version
    summary: Fresh Salesforce orgs now ship with Lightning Web Security enabled by
      default for LWC instead of Lightning Locker, changing the sandbox
      isolation model that custom components run under.
    detail: This affects LWC used in Aura-based Experience Cloud sites but does not
      apply to LWR-based sites. Existing orgs retain their current setting. The
      broader LWS rollout replacing Locker spans multiple releases.
    upgradeAction: When provisioning new orgs or sandboxes, verify that existing LWC
      code functions correctly under LWS isolation rules, particularly any
      components relying on Locker-specific DOM or global access behaviors.
    source:
      document: v56-winter23.pdf
      page: 84
      heading: Secure Components by Default with Lightning Web Security in New Orgs
    confidence: high
    id: v56-lwc-001
  - apiVersion: "56.0"
    release: Winter '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide after enabling high-volume prediction writeback
      (irreversible); automatic for orgs created after Winter '23
    summary: "Enabling high-volume prediction writeback permanently changes how
      Einstein Discovery prediction history is accessed: retention drops from
      unlimited to 30 days, SOQL queries no longer work for retrieving
      predictions, and data must be fetched via the Einstein Discovery REST API
      instead."
    detail: Once enabled, this setting cannot be reverted. Integrations that query
      prediction history via SOQL or that rely on the Einstein Accuracy
      Analytics app will break. The only retrieval path becomes the Einstein
      Discovery REST API with a 30-day lookback window.
    upgradeAction: Before enabling, audit any SOQL queries or Analytics app usage
      that reads prediction history. Migrate retrieval logic to the Einstein
      Discovery REST API and implement archival if history beyond 30 days is
      required.
    source:
      document: v56-winter23.pdf
      page: 130
      heading: Save Higher Volumes of Predictions More Quickly (Generally Available)
    confidence: high
    id: v56-rest-001
  - apiVersion: "56.0"
    release: Winter '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Any
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version (enforcement scheduled
      Spring '23)
    summary: Enhanced Personal Information Management replaces the older Hide
      Personal Information setting and blocks external users (portal, community,
      guest) from viewing other users' PII fields. Scoping rules now filter
      records only in SOQL, reports, and list views—no longer in searches,
      lookups, activity timeline, or SOSL.
    detail: This release update was originally slated for Winter '23 but enforcement
      was delayed to Spring '23. Once enforced, guest users also lose access to
      their own PII fields such as email. Admins can customize which standard
      and custom User fields count as PII via field sets.
    upgradeAction: Audit any Apex, integrations, or reports that query User fields
      for external-facing contexts. Verify that portal/community functionality
      does not depend on access to other users' personal data, and confirm guest
      user flows still work without self-PII access.
    source:
      document: v56-winter23.pdf
      page: 173
      heading: Enable Stronger Protection for Your Users' Personal Information
        (Release Update)
    confidence: high
    id: v56-sharing-001
  - apiVersion: "56.0"
    release: Winter '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
      - Integration
    behaviorArea: soql-sosl
    appliesWhen: org-wide regardless of component API version
    summary: Scoping rules no longer apply automatically to SOSL queries, search
      results, lookups, or the activity timeline. They now only affect SOQL
      (when explicitly invoked via USING SCOPE), reports, and list views.
    detail: Previously scoping rules filtered results across multiple surfaces
      including searches and SOSL. After this release, code relying on scoping
      rules to implicitly narrow SOSL results will return unscoped data instead.
    upgradeAction: Review any SOSL queries or search integrations that assumed
      scoping rules would filter results. If scoped behavior is needed, switch
      to SOQL with the USING SCOPE scopingRule clause or implement filtering in
      application logic.
    source:
      document: v56-winter23.pdf
      page: 176
      heading: Scoping Rules Apply Only to SOQL, Reports, and List Views
    confidence: high
    id: v56-soql-001
  - apiVersion: "56.0"
    release: Winter '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (GA for Experience
      Cloud; Beta elsewhere)
    summary: LWC components can now opt into light DOM rendering via the static
      renderMode property and lwc:render-mode directive, attaching markup to the
      host element rather than a shadow tree for easier third-party tool
      integration and global styling.
    detail: Light DOM is GA for Experience Cloud but Beta for Lightning Experience
      and mobile. Components using light DOM lose shadow encapsulation—styles
      can bleed in/out unless scoped CSS is used, and DOM scraping becomes
      possible. Base Lightning components remain shadow-only.
    source:
      document: v56-winter23.pdf
      page: 188
      heading: Enable Third-Party Integrations with Light DOM (Beta)
    confidence: high
    id: v56-lwc-002
  - apiVersion: "56.0"
    release: Winter '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: LWC gains a native modal overlay API via the LightningModal base class
      and associated helper components (lightning-modal-header,
      lightning-modal-body, lightning-modal-footer), providing a standardized
      way to create modal dialogs without third-party libraries or custom
      implementations.
    source:
      document: v56-winter23.pdf
      page: 189
      heading: Create Overlays with the New Modal Component
    confidence: high
    id: v56-lwc-003
  - apiVersion: "56.0"
    release: Winter '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: The LWC framework now emits console warnings for additional categories
      of invalid HTML syntax that were previously ignored. These warnings are
      expected to become hard errors in a future release, which would prevent
      affected components from loading.
    detail: Spring '22 introduced these warnings; Winter '23 documents them. Invalid
      patterns include abandoned head children, unclosed child elements, end
      tags without matching open tags, misplaced doctypes, and nested noscript
      tags among others. Components with these issues can still deploy today but
      will break when Salesforce converts warnings to errors.
    upgradeAction: Audit LWC templates for the eleven listed HTML validity warnings
      in browser console or VS Code with Salesforce Extension Pack. Fix all
      flagged markup before the future release that enforces errors.
    source:
      document: v56-winter23.pdf
      page: 189
      heading: Fix Invalid HTML Syntax to Avoid Component Loading Errors
    confidence: medium
    id: v56-lwc-004
  - apiVersion: "56.0"
    release: Winter '23
    changeType: removed
    impact: breaking
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: LWC components saved at API >= 57.0
    summary: Non-global SLDS design tokens (those marked internal rather than Global
      Access) are no longer valid in LWC CSS and trigger a validation error at
      component save time.
    detail: "Starting with API version 57.0, referencing design tokens that lack
      Global Access designation (e.g., --lwc-heightInput) causes a compile-time
      error: 'No TOKEN named tokenName found'. This enforcement applies when
      saving components, not at runtime."
    upgradeAction: Audit LWC stylesheets for non-GA token references before
      upgrading component API versions past 56.0. Replace internal tokens with
      their global equivalents or define custom Aura design tokens.
    source:
      document: v56-winter23.pdf
      page: 192
      heading: Remove Non-Global Design Tokens in CSS
    confidence: high
    id: v56-lwc-005
  - apiVersion: "56.0"
    release: Winter '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: new Salesforce orgs created at Winter '23 or later; existing orgs
      unaffected unless setting is manually enabled
    summary: New orgs now run Lightning web components under Lightning Web Security
      (LWS) instead of Lightning Locker by default, which may cause runtime
      differences for LWCs that rely on Locker-specific behaviors or
      workarounds.
    detail: LWS replaces Lightning Locker as the security sandbox for LWCs in fresh
      orgs and scratch orgs. Components that depended on Locker quirks or
      unsupported DOM access patterns may break. The setting can be toggled off
      via Session Settings or the lockerServiceNext scratch-org flag, but
      Salesforce intends LWS to become the permanent architecture.
    upgradeAction: Before deploying LWCs to a new org, test them in a sandbox with
      LWS enabled. Look for DOM access violations, third-party library
      incompatibilities, and cross-namespace communication issues.
    source:
      document: v56-winter23.pdf
      page: 193
      heading: Use Lightning Web Security by Default in New Salesforce Orgs
    confidence: low
    id: v56-lwc-006
  - apiVersion: "56.0"
    release: Winter '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: LWC components running under Lightning Web Security in Lightning
      Experience or LWR-based Experience Cloud sites
    summary: Lightning Web Security adds new API distortions blocking Function
      constructor, eval, and HTMLObjectElement.data setter, while removing
      distortions that previously blocked iframe/object
      contentDocument/contentWindow access and certain window property getters.
    detail: New distortions restrict dynamic code execution patterns. Conversely,
      iframe and object element cross-frame access via
      contentDocument/contentWindow getters is now permitted, along with
      MessageEvent.source and Window opener/parent getters. Components relying
      on eval or Function constructor will break; components that worked around
      iframe access restrictions may need review.
    upgradeAction: Audit LWC code for eval() or new Function() usage which will now
      fail. Review any workarounds for iframe content access since those APIs
      are now available. Run ESLint with the updated LWS rules to detect
      affected patterns.
    source:
      document: v56-winter23.pdf
      page: 194
      heading: API Distortion Changes in Lightning Web Security
    confidence: low
    id: v56-lwc-007
  - apiVersion: "56.0"
    release: Winter '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: BarcodeScanner LWC plugin gains front-facing camera support and new
      BarcodeScannerOptions parameters for UI customization, enabling
      kiosk-style scanning applications.
    source:
      document: v56-winter23.pdf
      page: 196
      heading: Create Self-Service Kiosk Applications–A New Use Case for BarcodeScanner
    confidence: medium
    id: v56-lwc-008
  - apiVersion: "56.0"
    release: Winter '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: LWC gains a CalendarService API for reading, creating, updating, and
      deleting calendar events on mobile devices within Mobile Publisher for
      Experience Cloud apps.
    source:
      document: v56-winter23.pdf
      page: 196
      heading: Managing a Device's Calendar Events Using Lightning Web Components
    confidence: high
    id: v56-lwc-009
  - apiVersion: "56.0"
    introducedIn: "55.0"
    release: Winter '23
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
      - ApexClass
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: Visualforce JavaScript Remoting now validates CSRF tokens more strictly
      and checks that the apexType parameter in $RemoteAction calls matches the
      actual Apex method signature, rejecting invalid or inaccessible Apex
      types.
    detail: "This release update enforces two validations: (1) CSRF tokens for the
      $RemoteAction global are generated differently for better security against
      guest-user attacks, and (2) any apexType parameter must correspond to a
      valid Apex object the caller can access and that satisfies the method
      signature. Code referencing internal-only or mismatched Apex types will
      throw errors at runtime. First available Summer '22, enforced Winter '23."
    upgradeAction: Search for all Visualforce.remoting.Manager.invokeAction and
      $RemoteAction usages. In a sandbox, enable the release update test run and
      manually exercise each remoting path. Fix any CSRF or apexType validation
      errors before the Winter '23 enforcement date.
    source:
      document: v56-winter23.pdf
      page: 198
      heading: Enable Visualforce JavaScript Remoting Enforcement (Release Update)
    confidence: high
    id: v56-vf-001
  - apiVersion: "56.0"
    release: Winter '23
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
      - ApexClass
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (enforced Winter '24)
    summary: Visualforce JavaScript Remoting now validates the @JsonAccess
      annotation on Apex classes, blocking serialization and deserialization
      across packaging namespaces when the annotation is missing or restrictive.
    detail: This release update ensures that Apex classes used with Visualforce
      Remoting respect JsonAccess annotation boundaries. Code that previously
      succeeded in cross-namespace serialization will fail if the target class
      lacks appropriate JsonAccess settings.
    upgradeAction: Before Winter '24 enforcement, audit Apex classes invoked via
      Visualforce Remoting across namespace boundaries and add or adjust
      @JsonAccess annotations to permit the required
      serialization/deserialization operations.
    source:
      document: v56-winter23.pdf
      page: 199
      heading: Enable JsonAccess Annotation Validation for the Visualforce JavaScript
        Remoting API (Release Update)
    confidence: high
    id: v56-vf-002
  - apiVersion: "56.0"
    release: Winter '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (enforced Spring '23)
    summary: The label attribute on <apex:inputField> components is now HTML-escaped
      automatically to block XSS attacks, which may double-escape labels you
      already escaped manually.
    detail: This release update auto-escapes the label attribute for all existing
      and new <apex:inputField> tags. Pages that previously performed their own
      escaping will render incorrectly due to double-encoding.
    upgradeAction: Before Spring '23 enforcement, search Visualforce pages for
      manually escaped label values on <apex:inputField> and remove redundant
      escaping to prevent garbled display.
    source:
      document: v56-winter23.pdf
      page: 200
      heading: Escape the Label Attribute of <apex:inputField> Elements to Prevent
        Cross-Site Scripting in Visualforce Pages (Release Update)
    confidence: high
    id: v56-vf-003
  - apiVersion: "56.0"
    release: Winter '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: New Database methods now accept an accessLevel parameter, letting
      developers explicitly run getQueryLocator and async DML operations in user
      mode rather than system mode. This expands the user-mode surface
      introduced in Summer '22.
    detail: Beta feature extending the Summer '22 user-mode capability to additional
      Database class methods including getQueryLocator and the async/immediate
      DML variants (deleteAsync, deleteImmediate, insertAsync, insertImmediate,
      updateAsync, updateImmediate). Opting in enforces FLS, object permissions,
      and sharing rules of the running user.
    source:
      document: v56-winter23.pdf
      page: 202
      heading: Secure Even More Apex Code with User Mode Database Operations (Beta)
    confidence: medium
    id: v56-apex-001
  - apiVersion: "56.0"
    release: Winter '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-testing
    appliesWhen: org-wide regardless of component API version
    summary: A new System.Assert class provides purpose-built assertion methods
      (areEqual, isNull, isInstanceOfType, fail, etc.) that produce clearer
      exception messages than the legacy
      System.assert/assertEquals/assertNotEquals methods.
    source:
      document: v56-winter23.pdf
      page: 203
      heading: Write Clear and Intentional Apex Assertions
    confidence: high
    id: v56-apex-002
  - apiVersion: "56.0"
    release: Winter '23
    changeType: removed
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce lifted the governor limits on how many query cursors a user
      can hold open simultaneously, including cursors from Batch Apex start,
      execute, and finish methods. Code that previously hit cursor-limit
      exceptions or worked around them no longer needs those safeguards.
    source:
      document: v56-winter23.pdf
      page: 204
      heading: Limits on Concurrently Open Query Cursors are Removed
    confidence: high
    id: v56-apex-003
  - apiVersion: "56.0"
    release: Winter '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - Integration
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: A new org limit named DailyAsyncApexTests is now exposed via
      OrgLimits.getAll(), OrgLimits.getMap(), and the REST /limits/ endpoint,
      letting developers programmatically check how many async test classes can
      still be queued within the rolling 24-hour window.
    source:
      document: v56-winter23.pdf
      page: 204
      heading: Get Org Limit for Daily Maximum Apex Test Classes
    confidence: high
    id: v56-apex-004
  - apiVersion: "56.0"
    release: Winter '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: The Invocable.Action Apex class is now GA, enabling developers to
      programmatically invoke both standard and custom invocable actions
      directly from Apex code rather than only from Flow or Process Builder.
    detail: This bridges Apex and declarative automation by letting Apex call any
      invocable action (standard like chatterPost, or custom @InvocableMethod
      classes) using createStandardAction or createCustomAction, pass parameters
      via setInvocationParameter, and inspect results through the Result
      wrapper.
    source:
      document: v56-winter23.pdf
      page: 205
      heading: Call Invocable Actions from Apex (Generally Available)
    confidence: high
    id: v56-apex-005
  - apiVersion: "56.0"
    release: Winter '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version (requires Salesforce
      enablement; Beta)
    summary: UI API's /ui-api/records endpoint now supports an optional
      Idempotency-Key header for POST, PATCH, and DELETE requests, letting
      clients safely retry operations without creating duplicate records or
      repeating side effects.
    detail: By including a UUID v4 Idempotency-Key header, subsequent identical
      requests within 30 days return cached responses instead of re-executing.
      This is a Beta feature requiring Salesforce enablement.
    source:
      document: v56-winter23.pdf
      page: 206
      heading: Prevent Record Duplication with Idempotent Record Writes for UI API
        (Beta)
    confidence: medium
    id: v56-rest-002
  - apiVersion: "56.0"
    release: Winter '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: "Query cursor limits are lifted: orgs can now hold more than 10
      concurrent result sets per user, and cursors remain valid for 2 days
      instead of expiring after 15 minutes of inactivity. Query locator string
      prefixes changed from 01g to 0r8."
    detail: Although shipped in API version 56.0, this enhancement applies
      universally across all API versions. Code that parses or stores query
      locator strings may need adjustment for the new 0r8 prefix format. Five
      new extended error codes help diagnose cursor-related failures.
    upgradeAction: Audit any code that validates, parses, or persists query locator
      strings for assumptions about the 01g prefix. Update regex patterns or
      prefix checks to accept 0r8 locators.
    source:
      document: v56-winter23.pdf
      page: 207
      heading: Enjoy Longer Access to More Query Results
    confidence: high
    id: v56-rest-003
  - apiVersion: "56.0"
    release: Winter '23
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; enforced in Summer '23
    summary: Salesforce is retiring API versions 21.0 through 30.0 across all
      REST-based APIs (including Bulk, Connect, Metadata, Tooling, and Platform
      REST) as well as SOAP API. After Summer '23, requests to these versions
      will fail with an endpoint-deactivated error.
    detail: This retirement was announced in October 2020 and the Release Update
      card appeared in Summer '21. All integrations still using versions
      21.0–30.0 must migrate to a supported version before Summer '23
      enforcement. Use API Total Usage events to audit which requests target
      deprecated versions.
    upgradeAction: Audit all integrations using API Total Usage events. Update any
      code, middleware, or third-party tools calling versions 21.0–30.0 to use
      version 31.0 or higher before Summer '23.
    source:
      document: v56-winter23.pdf
      page: 208
      heading: Legacy API Versions 21.0 Through 30.0 Are Being Retired (Release Update)
    confidence: high
    id: v56-rest-004
  - apiVersion: "56.0"
    release: Winter '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Any
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: Enhanced domains and partitioned domains increase hostname variability
      across Salesforce orgs, so packages with hard-coded Salesforce URLs (for
      content, Visualforce, etc.) may break when installed in orgs with
      different domain configurations.
    detail: Affects unlocked and second-generation managed packages. Hard-coded
      references to Salesforce-hosted domains must be replaced with relative
      paths or dynamically generated hostnames to ensure portability across org
      types and My Domain settings.
    upgradeAction: Audit package code for hard-coded Salesforce URLs (content files,
      Visualforce pages, etc.) and replace them with relative paths or dynamic
      hostname generation before distributing to orgs that may have enhanced
      domains enabled.
    source:
      document: v56-winter23.pdf
      page: 210
      heading: Update Your Packages for Enhanced Domains and Partitioned Domains
    confidence: high
    id: v56-packaging-001
  - apiVersion: "56.0"
    release: Winter '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Change Data Capture now supports filter expressions in
      PlatformEventChannelMember, allowing subscribers to receive only matching
      change events rather than all record changes. Filters can reference record
      fields and most ChangeEventHeader fields, and selected filter fields
      become enriched fields automatically.
    detail: Configure via Tooling API or Metadata API using PlatformEventChannel and
      PlatformEventChannelMember.FilterExpression. Supports CometD and Pub/Sub
      API subscribers but not Apex triggers. Field-level security is bypassed
      during filter evaluation, though delivered events still respect subscriber
      field access. Filter expressions can now be packaged and handle namespace
      prefixes automatically.
    source:
      document: v56-winter23.pdf
      page: 217
      heading: Filter Your Stream of Change Events (Generally Available)
    confidence: high
    id: v56-rest-005
  - apiVersion: "56.0"
    release: Winter '23
    changeType: changed
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Change Data Capture channels now allow each channel member its own
      allocation of 10 enriched fields, even when the same entity appears in
      multiple channel members across different channels. Previously, enriched
      fields were counted per entity globally across all channels.
    source:
      document: v56-winter23.pdf
      page: 218
      heading: Add More Enriched Fields in a Channel for the Same Selected Entity
    confidence: high
    id: v56-rest-006
  - apiVersion: "56.0"
    release: Winter '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Custom channels with filter expressions for platform events are now GA,
      letting CometD subscribers receive only matching event messages via
      PlatformEventChannel and PlatformEventChannelMember metadata types.
    detail: Filters apply only to high-volume custom platform events and CometD
      clients; Apex triggers, flows, and standard platform events remain
      unsupported. GA enhancements include namespace handling, field rename
      tolerance, packagability of filter expressions, and case-insensitive
      matching.
    source:
      document: v56-winter23.pdf
      page: 219
      heading: Filter Your Stream of Platform Events with Custom Channels (Generally
        Available)
    confidence: medium
    id: v56-rest-007
  - apiVersion: "56.0"
    release: Winter '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: "EventRelayConfig moves from beta to GA with breaking changes: Tooling
      API request body structure is altered, EventRelayFeedback drops
      NumEventsDropped/NumEventsRelayed/Replay fields and adds
      ErrorCode/LastRelayedEventTime fields."
    detail: If you built integrations against the beta EventRelayConfig Tooling API,
