  - apiVersion: "57.0"
    release: Spring '23
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Any
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: Enhanced domains deployment in Spring '23 breaks packages containing
      hard-coded Salesforce-hosted URLs (content files, Visualforce pages, etc.)
      unless those URLs are converted to relative paths or dynamically generated
      hostnames.
    upgradeAction: Audit managed and unlocked packages for hard-coded Salesforce
      domain URLs; replace them with relative paths or dynamic hostname
      generation before enhanced domains rollout.
    source:
      document: v57-spring23.pdf
      page: 216
      heading: Get Your Packages Ready for Enhanced Domains
    confidence: high
