entries:
  - apiVersion: "57.0"
    release: Spring '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Any
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; phased rollout
      starting Spring '23 via Release Update
    summary: Salesforce begins automatically enabling MFA for direct
      username/password logins across all orgs in phases throughout 2023, with
      eventual permanent enforcement planned.
    detail: This is delivered via the MFA Auto-Enablement Release Update. SSO logins
      are not auto-enabled by Salesforce but MFA is still contractually required
      for SSO access. Orgs should proactively enable MFA to control their
      rollout timing.
    upgradeAction: Enable MFA before auto-enablement reaches your org to avoid login
      disruptions. Verify all users have registered MFA methods and test login
      flows with MFA active.
    source:
      document: v57-spring23.pdf
      page: 79
      heading: "Be Ready for MFA: Auto-Enablement Starts with Spring '23"
    confidence: high
    id: v57-auth-001
  - apiVersion: "57.0"
    release: Spring '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version; controlled by Session
      Settings toggle
    summary: Lightning Web Security replaces Lightning Locker as the security
      architecture for LWC (GA) and Aura (beta). New orgs and scratch orgs have
      LWS enabled by default, affecting how component JavaScript executes and
      interacts across namespace boundaries.
    detail: LWS changes the sandboxing model for component JavaScript. Production
      orgs that already had LWS enabled for LWC in Winter '23 and contain custom
      Aura components are temporarily excluded from LWS for Aura in Spring '23.
      However, enabling the setting fresh in Spring '23 activates LWS for both
      LWC and Aura simultaneously.
    upgradeAction: Before enabling LWS or deploying to a new org, test all custom
      LWC and Aura components in a sandbox with LWS enabled. Compare behavior
      against an identical sandbox with Lightning Locker to identify any
      JavaScript that relies on Locker-specific behavior.
    source:
      document: v57-spring23.pdf
      page: 186
      heading: Use Lightning Web Security for Lightning Web Components (GA) and Aura
        Components (Beta)
    confidence: high
    id: v57-lwc-001
  - apiVersion: "57.0"
    release: Spring '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version — orgs without custom
      Lightning components now have LWS enabled by default; orgs that later add
      components will have those protected by LWS
    summary: Orgs lacking custom LWC or Aura components now default to Lightning Web
      Security instead of Lightning Locker. When you subsequently deploy or
      install Lightning components, they run under LWS rules rather than Locker.
    detail: This is part of the phased LWS rollout begun in Spring '22. Existing
      orgs with components remain on Locker for now, but empty orgs and scratch
      orgs are now LWS-first. A session setting lets you revert to Locker if
      needed.
    upgradeAction: Before deploying new LWC or Aura components (or installing
      packages containing them) into an org that had none, test in a sandbox
      with LWS enabled to catch Locker-to-LWS incompatibilities such as
      cross-namespace DOM access or restricted API usage.
    source:
      document: v57-spring23.pdf
      page: 188
      heading: Lightning Web Security Enablement for Orgs with No Custom Components
    confidence: high
    id: v57-lwc-002
  - apiVersion: "57.0"
    release: Spring '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: LWC introduces the lwc:ref directive and this.refs API as an
      alternative to querySelector() for accessing DOM elements within a
      component's template scope.
    source:
      document: v57-spring23.pdf
      page: 191
      heading: Query DOM Elements with Refs
    confidence: high
    id: v57-lwc-003
  - apiVersion: "57.0"
    release: Spring '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Framework optimizations for static element handling can inject extra
      whitespace into class and style attribute values in the rendered DOM,
      potentially breaking exact-match attribute selectors.
    upgradeAction: Audit and update any DOM queries using exact class attribute
      matching (e.g., `[class="..."]`) to use whitespace-tolerant selectors like
      `.className` or `classList.contains()`.
    source:
      document: v57-spring23.pdf
      page: 191
      heading: Improved Render Time for Lightning Web Components
    confidence: high
    id: v57-lwc-004
  - apiVersion: "57.0"
    release: Spring '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (Beta in Lightning
      Experience/Mobile; GA for Experience Cloud)
    summary: Lightning web components can now opt into light DOM rendering via a
      static renderMode property, attaching markup to the host element instead
      of a shadow tree. This enables standard DOM traversal APIs and global
      styling but removes shadow encapsulation protections.
    detail: Set static renderMode = 'light' in the component class and add
      lwc:render-mode='light' on the template tag. Light and shadow DOM
      components can be nested, but base Lightning components remain
      shadow-only. Use *.scoped.css files to prevent style bleed. Not
      recommended for sensitive data due to DOM scraping exposure.
    source:
      document: v57-spring23.pdf
      page: 192
      heading: Enable Third-Party Integrations with Light DOM (Beta)
    confidence: medium
    id: v57-lwc-005
  - apiVersion: "57.0"
    release: Spring '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Light DOM LWC components embedded in Aura containers (outside
      Experience Cloud, CMS content editor, and Sales Enablement) now require
      scoped styles; unscoped styles no longer work in these contexts.
    upgradeAction: Audit light DOM LWCs used within Aura apps and convert any
      unscoped CSS to scoped styles before this enforcement takes effect.
    source:
      document: v57-spring23.pdf
      page: 194
      heading: Use Scoped Styles Only on Light DOM Components in Aura-Based Containers
    confidence: medium
    id: v57-lwc-006
  - apiVersion: "57.0"
    release: Spring '23
    changeType: deprecated
    impact: deprecation
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: The if:true and if:false template directives are deprecated in favor of
      lwc:if, lwc:elseif, and lwc:else. Salesforce intends to remove the legacy
      directives in a future release.
    detail: The new conditional directives improve performance by invoking property
      getters only once per directive instance, whereas the legacy approach
      caused multiple getter invocations when chaining conditions. Complex
      expressions are not supported inline; use JavaScript getters instead.
    upgradeAction: Replace all if:true and if:false usages with lwc:if and lwc:else
      to avoid breakage when the legacy directives are eventually removed.
    source:
      document: v57-spring23.pdf
      page: 194
      heading: Use the Improved Conditional Directives
    confidence: high
    id: v57-lwc-007
  - apiVersion: "57.0"
    release: Spring '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: CSS pseudo-element selectors with leading whitespace (like `,
      ::before`) now scope correctly in synthetic shadow DOM, preventing styles
      from leaking to descendant elements the component doesn't own.
    detail: Previously, a space before ::before or ::after in universal selectors
      caused the compiled CSS to incorrectly apply styles to all descendants in
      synthetic shadow environments. The fix removes the unintended descendant
      combinator, so styles now apply only to the component's own
      pseudo-elements.
    upgradeAction: Review LWC stylesheets using universal selectors with
      pseudo-elements; components that relied on the old leaky behavior may lose
      styling on nested child components after this fix.
    source:
      document: v57-spring23.pdf
      page: 197
      heading: Scoping in CSS Pseudo-Elements Is Fixed
    confidence: high
    id: v57-lwc-008
  - apiVersion: "57.0"
    release: Spring '23
    changeType: removed
    impact: breaking
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: The lwcRuntimeFlags global object can no longer be used to toggle LWC
      feature flags at runtime. Any code that relied on setting properties like
      ENABLE_MIXED_SHADOW_MODE on this object will silently have no effect.
    upgradeAction: Search your codebase for references to lwcRuntimeFlags or
      window.lwcRuntimeFlags and remove them, as they no longer influence
      component behavior. If you were using mixed shadow mode or other developer
      previews via this mechanism, find the official supported alternative or
      remove the dependency.
    source:
      document: v57-spring23.pdf
      page: 197
      heading: Disable lwcRuntimeFlags to Improve Lightning Page Security
    confidence: high
    id: v57-lwc-009
  - apiVersion: "57.0"
    release: Spring '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (enforced Summer '23)
    summary: Lightning apps now receive unique CSRF tokens scoped to each app rather
      than sharing tokens across apps, and invalid or expired token handling is
      stricter.
    detail: This Release Update changes how CSRF tokens are generated and validated
      for Lightning Experience, Lightning Out, and Salesforce mobile apps. Each
      Lightning app gets its own token, preventing token reuse across app
      boundaries. Apps that relied on tokens being interchangeable or that have
      lenient error handling for token failures may see authentication errors
      after enforcement.
    upgradeAction: Test Lightning Out integrations and any custom Lightning apps in
      sandbox with the update enabled. Verify that session handling and token
      refresh logic works correctly when tokens expire or become invalid.
    source:
      document: v57-spring23.pdf
      page: 199
      heading: Security Enhancements for CSRF Tokens for Lightning Apps (Release Update)
    confidence: high
    id: v57-lwc-010
  - apiVersion: "57.0"
    introducedIn: "56.0"
    release: Spring '23
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce now auto-escapes the label attribute on <apex:inputField>
      tags to block XSS attacks. Pages that manually escaped these labels will
      render incorrectly due to double-escaping.
    detail: This Release Update was introduced in Winter '23 (v56.0) and enforced in
      Spring '23. After enforcement, any <apex:inputField> elements whose label
      attributes were already escaped in code will display garbled output
      because the platform applies a second round of escaping.
    upgradeAction: Before enforcement, search Visualforce pages for
      <apex:inputField> tags with manually escaped label values and remove the
      redundant escaping to prevent rendering issues.
    source:
      document: v57-spring23.pdf
      page: 201
      heading: Escape the Label Attribute of <apex:inputField> Elements to Prevent
        Cross-Site Scripting in Visualforce Pages (Release Update)
    confidence: high
    id: v57-vf-001
  - apiVersion: "57.0"
    introducedIn: "56.0"
    release: Spring '23
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (enforced Winter '24)
    summary: Visualforce JavaScript Remoting now validates the @JsonAccess
      annotation on Apex classes, blocking cross-namespace
      serialization/deserialization that lacks explicit permission.
    detail: This release update, introduced in Winter '23, enforces that Apex
      classes used with Visualforce Remoting must have appropriate @JsonAccess
      annotations to permit serialization across package namespaces. Without the
      annotation, remote calls that previously succeeded will fail.
    upgradeAction: Audit Apex classes invoked via Visualforce Remoting for
      @JsonAccess annotations; add @JsonAccess(serializable='always'
      deserializable='always') where cross-namespace access is required. Test
      remoting calls before enforcement.
    source:
      document: v57-spring23.pdf
      page: 201
      heading: Enable JsonAccess Annotation Validation for the Visualforce JavaScript
        Remoting API (Release Update)
    confidence: high
    id: v57-vf-002
  - apiVersion: "57.0"
    release: Spring '23
    changeType: removed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
      - VisualforceComponent
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version; automatic escaping
      via shouldAlwaysEscapeExpressionLanguage stops in Summer '23
    summary: Salesforce canceled the release update that automatically escaped
      expression language in script and style contexts. Pages using
      shouldAlwaysEscapeExpressionLanguage=True will lose that automatic
      escaping after Summer '23, requiring manual escaping to maintain XSS
      protection.
    detail: "If you enabled this attribute or modified code anticipating this
      update, you must revert those changes: restore any manual escaping you
      removed, delete the shouldAlwaysEscapeExpressionLanguage attribute, and
      revert code changes made in anticipation of automatic escaping."
    upgradeAction: Audit Visualforce pages and components for
      shouldAlwaysEscapeExpressionLanguage usage. Remove the attribute and
      restore manual JSENCODE/HTMLENCODE calls in script and style blocks to
      maintain XSS protection.
    source:
      document: v57-spring23.pdf
      page: 202
      heading: Escape Expression Language Evaluations in <script> and <style> Contexts
        in Visualforce Pages and Components (Release Update)
    confidence: high
    id: v57-vf-003
  - apiVersion: "57.0"
    release: Spring '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version
    summary: User-mode database operations reach GA, providing an explicit way to
      enforce FLS, object permissions, and sharing rules on SOQL/SOSL queries
      and DML. Three new bind-variable methods join the existing set.
    detail: The accessLevel parameter on Database and Search methods lets you opt
      individual operations into user mode via WITH USER_MODE in SOQL or 'as
      user' DML syntax. GA adds queryWithBinds, getQueryLocatorWithBinds, and
      countQueryWithBinds. Existing code is unaffected unless you explicitly
      call these APIs.
    source:
      document: v57-spring23.pdf
      page: 205
      heading: Secure Apex Code with User Mode Database Operations (Generally Available)
    confidence: high
    id: v57-sharing-001
  - apiVersion: "57.0"
    release: Spring '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: The ApexTypeImplementor standard object exits beta and becomes
      generally available, allowing developers to discover Apex classes that
      implement a given interface via SOQL queries.
    detail: "ApexTypeImplementor respects access modifiers based on query context:
      managed packages see all global implementors org-wide plus public
      implementors within their own package. The object also honors @Deprecated
      annotations and package version dependencies. Note that results may
      include invalid classes (ApexClass.IsValid = false), so consumers should
      verify validity before instantiation."
    source:
      document: v57-spring23.pdf
      page: 205
      heading: Find Which Apex Classes Implement an Interface (Generally Available)
    confidence: high
    id: v57-apex-001
  - apiVersion: "57.0"
    release: Spring '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Apex gains an optional DataWeave integration (beta) that lets
      developers create .dwl scripts as metadata and invoke them from Apex code
      for data format transformations, subject to standard heap and CPU limits.
    detail: A new DataWeaveScriptResource inner class is auto-generated for each
      .dwl script, extending DataWeave.Script. Scripts run server-side under
      existing governor limits. Beta feature with namespace-scoped packaging
      support only.
    source:
      document: v57-spring23.pdf
      page: 207
      heading: Use DataWeave in Apex to Enable Data Transformation to Different
        Formats (Beta)
    confidence: medium
    id: v57-apex-002
  - apiVersion: "57.0"
    release: Spring '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: A new System.enqueueJob overload accepts a delay parameter (0–10
      minutes) letting developers schedule queueable jobs with a minimum wait
      time before execution, bypassing org-wide enqueue delay settings.
    detail: The delay parameter is ignored during Apex testing. Setting delay to 0
      executes the job as quickly as possible, which can rapidly consume daily
      async Apex limits if used with chained jobs without a throttling
      mechanism.
    source:
      document: v57-spring23.pdf
      page: 208
      heading: Use the System.enqueueJob Method to Specify a Delay in Scheduling
        Queueable Jobs
    confidence: high
    id: v57-apex-003
  - apiVersion: "57.0"
    release: Spring '23
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Admins can now configure an org-wide default delay (1–600 seconds) for
      queueable jobs enqueued without an explicit delay parameter, which may
      cause existing jobs to run slower than before if this setting is enabled.
    detail: When the new Apex Settings option is configured, any call to
      System.enqueueJob(queueable) that omits the delay parameter will inherit
      the org-wide default delay instead of executing with standard timing. Code
      that explicitly passes a delay parameter is unaffected.
    upgradeAction: If your org enables this setting, review queueable job chains and
      time-sensitive integrations that assume immediate execution. Test that
      downstream processes tolerate the added latency.
    source:
      document: v57-spring23.pdf
      page: 208
      heading: Specify an Org-Wide Default Delay in Scheduling Queueable Jobs
    confidence: high
    id: v57-apex-004
  - apiVersion: "57.0"
    release: Spring '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: soql-sosl
    appliesWhen: org-wide regardless of component API version
    summary: Three new Database methods (queryWithBinds, getQueryLocatorWithBinds,
      countQueryWithBinds) allow passing bind variables via a Map parameter
      instead of requiring in-scope Apex variables, enabling fully dynamic SOQL
      construction without string concatenation security risks.
    source:
      document: v57-spring23.pdf
      page: 208
      heading: Dynamically Pass Bind Variables to a SOQL Query
    confidence: high
    id: v57-soql-001
  - apiVersion: "57.0"
    release: Spring '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Schema.DescribeFieldResult now exposes getSObjectType(), letting
      developers retrieve the parent SObject type directly from a field describe
      without tracking it separately.
    source:
      document: v57-spring23.pdf
      page: 209
      heading: Discover the Source SObject of a DescribeFieldResult Instance
    confidence: high
