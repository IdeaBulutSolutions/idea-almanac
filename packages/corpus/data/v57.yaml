  - apiVersion: "57.0"
    release: Spring '23
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Apex REST response header names set via RestResponse.addHeader() are
      validated against RFC 7230 rules once this release update is enforced,
      throwing InvalidHeaderException at runtime if header names contain
      disallowed characters like forward slashes.
    detail: This is a release update available in Spring '23 and enforced org-wide
      in Spring '24. The validation applies regardless of the Apex class's API
      version. Orgs migrating to Hyperforce must enable this update beforehand.
    upgradeAction: Run Apex tests and check for InvalidHeaderException failures.
      Audit any custom REST services using addHeader() for non-compliant header
      names containing characters forbidden by RFC 7230. Coordinate with package
      providers to confirm compatibility before activation.
    source:
      document: v57-spring23.pdf
      page: 210
      heading: Enforce RFC 7230 Validation for Apex RestResponse Headers (Release
        Update)
    confidence: high
    id: v57-apex-006
  - apiVersion: "57.0"
    release: Spring '23
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version, when
      RestrictCommunityExecAnon preference is enabled
    summary: A new org preference prevents Experience Cloud, portal, and community
      users from running anonymous Apex, even if they hold Author Apex or other
      elevated permissions. Enabled by default in new orgs; existing orgs must
      opt in.
    detail: The RestrictCommunityExecAnon setting in Apex Settings (or via
      ApexSettings in Metadata API) blocks execute-anonymous calls for any
      non-core (external) user identity. This closes a potential
      privilege-escalation vector where external users with broad permissions
      could run arbitrary code.
    upgradeAction: If your integration tests or automation run anonymous Apex as a
      community/portal user, they will fail once this preference is enabled.
      Verify whether any legitimate use cases depend on external-user anonymous
      execution before flipping the setting.
    source:
      document: v57-spring23.pdf
      page: 210
      heading: Restrict Anonymous Apex Access to Core Users
    confidence: high
    id: v57-sharing-002
  - apiVersion: "57.0"
    release: Spring '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - Flow
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Apex static variables set by platform event–triggered flows now reset
      between groups of flow interviews executing for different users within the
      same transaction, preventing values from persisting across the full
      transaction scope.
    detail: Previously static variable values could carry over across the entire
      transaction even when multiple users' flow interviews ran. After January
      5, 2023, Salesforce clears these values between user-context switches
      within the transaction.
    upgradeAction: Audit Apex invoked by platform event–triggered flows for static
      variables used as cross-interview accumulators or flags; refactor to use
      platform cache or custom objects if transaction-wide persistence is
      required.
    source:
      document: v57-spring23.pdf
      page: 211
      heading: Static Variables Are Reset Within a Transaction Between Groups of
        Platform Event–Triggered Flow Interviews
    confidence: high
    id: v57-apex-007
  - apiVersion: "57.0"
    release: Spring '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: managed package classes calling toString() on objects with
      non-global member variables
    summary: When invoking toString() on Apex objects, member variables not visible
      in the caller's namespace (non-global properties in managed packages) are
      now excluded from the output string.
    detail: This affects debugging and logging scenarios where subscribers call
      toString() on managed package types. The output will no longer reveal
      internal implementation details that the package author marked as
      non-global.
    upgradeAction: If your code parses or relies on toString() output from managed
      package objects, verify that the expected fields are still present after
      this change.
    source:
      document: v57-spring23.pdf
      page: 211
      heading: Suppress Non-Global Properties with toString()
    confidence: low
    id: v57-apex-008
