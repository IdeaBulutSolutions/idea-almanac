    summary: Paused autolaunched flows now resume in their original execution
      context instead of escalating to system-context-without-sharing.
      Additionally, flows at v57+ verify the user still has flow access before
      resuming a paused interview.
    detail: Before this update, any autolaunched flow with a time-based Pause
      element would resume in system context without sharing, regardless of how
      it started. This allowed unintended privilege escalation. The update
      preserves the original context. Flows launched by Process Builder that
      relied on this escalation must be upgraded to v57+ and configured
      explicitly for system context if needed. The update also adds a runtime
      permission check for v57+ flows—if the user lost access while paused, the
      interview fails.
    upgradeAction: "Audit autolaunched flows containing Pause elements: ensure
      running users retain necessary object/field permissions and flow access
      after resume. Flows needing system-level access should be explicitly set
      to run in system context and upgraded to API 57.0+."
