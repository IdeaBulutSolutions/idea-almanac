    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: GlobalValueSet metadata created at API >= 57.0
    summary: Global value sets created via API 57.0+ automatically receive a __gvs
      suffix on their developer name, requiring all Metadata API and Tooling API
      CRUD calls to include this suffix in the fullName/FullName field.
    upgradeAction: Update any scripts or integrations that create, read, update, or
      delete GlobalValueSet records to append __gvs to the developer name when
      targeting API 57.0 or later.
    source:
      document: v57-spring23.pdf
      page: 212
      heading: Choose Any Name for a Global Value Set
    confidence: high
    id: v57-rest-001
  - apiVersion: "57.0"
    release: Spring '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: The InstalledPackage metadata type now supports a securityType field
      that controls whether all user profiles or only admins can access a
      managed package when installing via Metadata API.
    upgradeAction: Review CI/CD pipelines deploying managed packages via Metadata
      API; if you want to restrict package access to admins only, add the
      securityType field to your InstalledPackage definitions.
    source:
      document: v57-spring23.pdf
      page: 215
      heading: Limit User Profile Access for Packages Installed via Metadata API
    confidence: high
