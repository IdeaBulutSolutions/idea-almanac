    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: The num_reads metric in AppExchange App Analytics package usage
      summaries no longer counts SOQL and SOSL queries — it now reflects only
      actual record reads, resulting in lower reported values.
    upgradeAction: If your analytics dashboards or alerting thresholds rely on
      num_reads values, recalibrate expectations since the metric now excludes
      query counts and will report lower numbers.
    source:
      document: v57-spring23.pdf
      page: 227
      heading: Retrieve Clean Read Counts with AppExchange App Analytics Package Usage
