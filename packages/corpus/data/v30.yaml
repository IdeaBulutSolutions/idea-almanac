    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce now issues OpenID Connect-compliant ID tokens (JWTs) when
      OAuth requests include the openid scope, and publishes public keys at a
      well-known endpoint for signature verification.
    detail: The user-agent flow requires response_type=token id_token plus a nonce
      parameter; the web-server flow requires response_type=code with openid
      scope. Integrations can retrieve signing keys from
      https://login.salesforce.com/id/keys to validate the JWT signature using
      the kid claim.
    source:
      document: v30-spring14.pdf
      page: 238
      heading: OpenID Connect ID Token and Public Keys
    confidence: high
    id: v30-auth-007
