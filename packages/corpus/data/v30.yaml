    changeType: removed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: The Limits class methods getInteractionQueries() and
      getLimitInteractionQueries() have been removed from the platform after
      being part of a Visual Workflow pilot.
    upgradeAction: Search for any usage of Limits.getInteractionQueries() or
