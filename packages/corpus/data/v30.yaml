    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: OAuth 2.0 web server and refresh token flows now accept JWT-based
      client assertions as an alternative to consumer secrets, enabling
      automated integrations where the secret is unavailable.
    detail: When client_secret is omitted from the token request, Salesforce
      automatically checks for client_assertion (a JWT signed with the private
      key matching the connected app's certificate) and client_assertion_type
      parameters. This supports RS256-signed bearer tokens.
    source:
      document: v30-spring14.pdf
      page: 248
      heading: Provide Client Assertion Values for OpenID Connect OAuth Flows
    confidence: high
