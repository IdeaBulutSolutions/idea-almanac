  - apiVersion: "30.0"
    release: Spring '14
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
      - ApexClass
    behaviorArea: soql-sosl
    appliesWhen: org-wide regardless of component API version
    summary: Geolocation compound fields with partial null values (one of
      latitude/longitude null but not both) now return null in SOQL SELECT and
      are excluded from DISTANCE() and ORDER BY calculations, whereas querying
      individual component fields still returns the actual stored values.
    detail: When using the compound geolocation field syntax in SELECT, records with
      invalid data (one component null) return null for the entire field.
      However, querying the individual __latitude__s and __longitude__s
      components returns whatever is actually stored. This affects how you
      detect and handle incomplete geolocation data.
    upgradeAction: Review SOQL queries using compound geolocation fields in SELECT
      clauses; if you need to distinguish genuinely null geolocations from
      invalid partial-null ones, query the individual latitude/longitude
      components instead.
    source:
      document: v30-spring14.pdf
      page: 262
      heading: Other Changes to Geolocation Fields
    confidence: medium
    id: v30-soql-001
  - apiVersion: "30.0"
    release: Spring '14
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: SOAP and REST API calls at API >= 30.0
    summary: Standard addresses on objects like Account, Contact, and Quote are now
      queryable as compound fields (e.g., BillingAddress, MailingAddress)
      returning a structured data type, simplifying SOQL queries and enabling
      DISTANCE() calculations when geocoded.
    source:
      document: v30-spring14.pdf
      page: 263
      heading: Standard Address Compound Fields
    confidence: high
    id: v30-rest-003
  - apiVersion: "30.0"
    release: Spring '14
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
      - VisualforcePage
      - VisualforceComponent
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Address and geolocation compound fields are available in SOAP and REST
      APIs but cannot be used in Apex or Visualforce; only individual field
      components work in those contexts. DISTANCE() for address fields works
      only in SOQL WHERE clauses, not in formula fields or Apex.
    detail: Compound fields are read-only via API and require updating through
      individual components. Apex has no data type for compound fields, so
      developers must access latitude, longitude, street, city, etc. separately.
      Custom compound address fields are not supported—only standard object
      addresses. Geolocation components of address fields must be populated via
      an external geocoding service.
    upgradeAction: When integrating with address or geolocation data, use individual
      field components in Apex and Visualforce code. For proximity filtering,
      use SOQL DISTANCE() in WHERE clauses only.
    source:
      document: v30-spring14.pdf
      page: 266
      heading: Compound Field Considerations and Limitations
    confidence: medium
    id: v30-rest-004
  - apiVersion: "30.0"
    release: Spring '14
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: other
    appliesWhen: org-wide regardless of component API version; triggered by any
      sandbox refresh after Spring '14
    summary: Sandbox refreshes now rewrite all user email addresses to an
      @example.com domain, which the Salesforce MTA silently discards. Code or
      integrations that rely on sandbox-originated emails reaching real inboxes
      will stop working.
    detail: Prior format was email@domain.com.sandboxName; new format is
      email=domain.com@example.com. Users must manually restore a deliverable
      address after each refresh if they need to receive emails.
    upgradeAction: Audit any CI pipelines, test harnesses, or integrations that
      expect to receive emails sent from sandboxes; configure alternate
      notification channels or have users reset addresses post-refresh.
    source:
      document: v30-spring14.pdf
      page: 267
      heading: Sandbox User Email Addresses Modified on Refresh
    confidence: high
    id: v30-other-004
