  - apiVersion: "30.0"
    release: Spring '14
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-runtime
    appliesWhen: Apex classes and triggers compiled at API >= 30.0
    summary: Sites class methods (changePassword, createPersonAccountPortalUser,
      createPortalUser, forgotPassword, login) now consume DML limits instead of
      committing the transaction. Pre-30.0 code commits on call, preventing
      rollback; v30+ code adds to DML counters but preserves savepoint rollback
      capability.
    detail: "This is a double-edged change: code at v30+ gains the ability to roll
      back past these calls using savepoints, but must now account for DML
      statement and record limits. Code below v30 implicitly commits, breaking
      any savepoint set earlier in the transaction."
    upgradeAction: When upgrading past 30.0, verify that any transaction calling
      these methods has sufficient DML headroom. Also confirm that any
      pre-upgrade code relying on the implicit commit behavior is refactored if
      rollback semantics are now expected.
    source:
      document: v30-spring14.pdf
      page: 291
      heading: Changes to Methods in the Sites Class
    confidence: high
    id: v30-apex-004
  - apiVersion: "30.0"
