  - apiVersion: "30.0"
    release: Spring '14
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: "Several session security settings are now enabled by default for
      all organizations and can no longer be disabled from the Session Settings
      page: HTTPS required, SMS identity confirmation, clickjack protection,
      and CSRF protection on non-setup pages."
    detail: These defaults include requiring secure HTTPS connections, enabling
      SMS-based identity confirmation, and enabling clickjack and CSRF
      protections. Integrations or embedded pages relying on HTTP or lacking
      CSRF tokens may break.
    upgradeAction: Verify all integrations use HTTPS, ensure embedded content
      handles clickjack headers, and confirm API calls include proper CSRF
      tokens where required.
    source:
      document: v30-spring14.pdf
      page: 243
      heading: Default Session Settings Protect Your Organization
    confidence: high
    id: v30-auth-002
