    summary: "PageReference constructor now correctly parses anchor fragments (the #
      symbol and text after it) in URIs instead of URL-encoding the hash as
      %23."
    detail: Prior to v30, passing a URI with an anchor like
      '/home/home.jsp#logTicket' to the PageReference constructor resulted in
      the hash being escaped to %23. Developers had to work around this by using
      setAnchor() separately. Code using the workaround continues to function.
    upgradeAction: Review any PageReference code that used setAnchor() workarounds
      or that expected %23 encoding; verify anchor handling behaves as intended
      after upgrading.
    source:
      document: v30-spring14.pdf
      page: 283
      heading: PageReference URIs Support Anchors
    confidence: high
