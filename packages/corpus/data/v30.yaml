  - apiVersion: "30.0"
    release: Spring '14
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - VisualforcePage
    behaviorArea: sharing-security
    appliesWhen: Apex classes compiled at API >= 30.0
    summary: JavaScript remoting calls to @RemoteAction methods now honor the
      class's sharing declaration consistently with standard Visualforce
      requests. Classes without an explicit sharing keyword default to system
      mode (without sharing), fixing a bug where remoting previously defaulted
      to with sharing.
    detail: Prior to v30, @RemoteAction methods in classes lacking a sharing
      declaration ran as if declared with sharing when invoked via JavaScript
      remoting, but ran in system mode for standard Visualforce requests. This
      inconsistency is corrected at v30+, meaning remoting calls now run in
      system mode by default, matching the documented Apex behavior.
    upgradeAction: Before upgrading controllers to API 30.0+, audit @RemoteAction
      methods in classes without explicit sharing keywords. If your remoting
      logic relied on the implicit with sharing behavior, add explicit 'with
      sharing' to the class definition to preserve row-level security
      enforcement.
    source:
      document: v30-spring14.pdf
      page: 283
      heading: JavaScript Remoting Requests Default to System Mode (without sharing)
    confidence: high
    id: v30-sharing-001
