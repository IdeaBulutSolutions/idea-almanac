    summary: REST API now rejects DateTime values that don't match the ISO 8601
      formats (yyyy-MM-ddTHH:mm:ss.SSSZ or with timezone offset). Previously
      some non-standard formats like epoch milliseconds might have worked
      inconsistently.
    upgradeAction: Audit integrations sending DateTime values to ensure they use
      yyyy-MM-ddTHH:mm:ss.SSSZ or yyyy-MM-ddTHH:mm:ss.SSS+/-HH:mm format before
      upgrading API version to 53.0+.
    source:
