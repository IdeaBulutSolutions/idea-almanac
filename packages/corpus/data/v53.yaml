  - apiVersion: "53.0"
    release: Winter '22
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Non-composed custom events in LWC now correctly stop at shadow root
      boundaries, matching standard shadow DOM semantics. Events that previously
      leaked outside their originating shadow root are no longer visible to
      ancestor listeners.
    detail: "This fix enforces proper event encapsulation: events dispatched without
      composed: true no longer propagate past the shadow root of the component
      that dispatched them. Parent components listening for events from nested
      children will no longer receive non-composed events that bubble up from
      within those children's shadow trees."
    upgradeAction: "Review LWC event listeners that rely on catching bubbling events
      from deeply nested child components. If those events were dispatched
      without composed: true, add the composed property to the CustomEvent
      configuration or restructure event handling to use explicit event
      forwarding between component layers."
    source:
      document: v53-winter22.pdf
      page: 215
      heading: Non-Composed Events Follow Shadow DOM Semantics
    confidence: high
    id: v53-lwc-006
  - apiVersion: "53.0"
    introducedIn: "52.0"
    release: Winter '22
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: Aura now strictly enforces that components marked access="public" can
      only be accessed by other components in the same namespace or by internal
      Salesforce components. This enforcement fixes prior inconsistent access
      checking and may surface previously hidden errors such as callbacks not
      wrapped in $A.getCallback() losing context and failing access checks.
    detail: Before this release update, Aura inconsistently evaluated the
      access="public" attribute, allowing some cross-namespace references that
      should have been blocked. After enforcement, callbacks that lose context
      due to missing $A.getCallback() wrappers will now fail with 'Access Check
      Failed!' errors rather than silently running. First available in Summer
      '21 (API 52.0), enforced in Winter '22.
    upgradeAction: Test all pages containing custom Aura components in a sandbox
      with the release update enabled. Watch browser console logs for 'Access
      Check Failed!' errors and fix any components that relied on inconsistent
      cross-namespace access or unwrapped callbacks before Winter '22
      enforcement.
    source:
      document: v53-winter22.pdf
      page: 217
      heading: Securely Access Aura Components (Release Update)
    confidence: high
    id: v53-aura-001
  - apiVersion: "53.0"
    introducedIn: "52.0"
    release: Winter '22
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Lightning apps now enforce OAuth token scopes defined in connected
      apps; tokens lacking appropriate scope (lightning, visualforce, web, or
      full) will fail authentication where they previously succeeded.
    detail: This release update was introduced in Summer '21 (API 52.0) and becomes
      mandatory in Winter '22. Lightning apps, including Lightning Out and any
      .app resources, reject OAuth tokens whose connected app scope does not
      include lightning, visualforce, web, or full. Previously Lightning apps
      ignored scope restrictions entirely.
    upgradeAction: Audit connected apps used for Lightning app authentication and
      verify each has an appropriate OAuth scope. Use ConnectedApp via Metadata
      API to review scopes at scale, and cross-reference Login History with
      Session Management to identify affected sessions before enforcement.
    source:
      document: v53-winter22.pdf
      page: 217
      heading: Enforce OAuth Scope for Lightning Apps (Release Update)
    confidence: high
    id: v53-auth-002
  - apiVersion: "53.0"
    release: Winter '22
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (enforced Spring '22)
    summary: Server-side CORS enforcement begins for Lightning Out and Lightning
      apps, blocking cross-origin requests not on the CORS allowlist before they
      reach Salesforce servers. Previously only browser-side enforcement
      applied.
    detail: This release update shifts CORS validation from browser-only to
      server-side, meaning disallowed origins are rejected at the server rather
      than relying on browser cooperation. Any external JavaScript calling
      Lightning Out from an unlisted origin will fail once enforcement
      activates.
    upgradeAction: Audit CORS allowlist in Setup to ensure all legitimate external
      origins hosting Lightning Out JavaScript are included. Query EventLogFile
      for EventType='CORS Violation Record' to identify any violations before
      enforcement.
    source:
      document: v53-winter22.pdf
      page: 218
      heading: Enforce CORS Allowlist for Lightning Apps (Release Update)
    confidence: high
    id: v53-lwc-007
  - apiVersion: "53.0"
    introducedIn: "49.0"
    release: Winter '22
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
      - VisualforcePage
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (enforced Winter '23)
    summary: Consecutive programmatic navigation calls via the NavigationMixin API
      are blocked. Originally announced for Visualforce only, the restriction
      now extends to Lightning components as well.
    detail: This release update was introduced in Summer '20 (API 49.0) for
      Visualforce and has been expanded to include Aura and LWC. Enforcement was
      postponed from Spring '22 to Winter '23. Components issuing back-to-back
      navigation calls will fail once enforced.
    upgradeAction: Audit Visualforce pages and Lightning components for patterns
      that fire multiple NavigationMixin navigate calls in rapid succession.
      Refactor to consolidate navigation logic or add guards preventing
      duplicate calls.
    source:
      document: v53-winter22.pdf
      page: 219
      heading: Prevent Consecutive API Navigation Calls (Release Update)
    confidence: high
    id: v53-lwc-008
