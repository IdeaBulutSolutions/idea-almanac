entries:
  - apiVersion: "53.0"
    release: Winter '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; contractually
      required from February 1, 2022
    summary: Salesforce now contractually mandates MFA for all UI-based logins.
      Organizations must enable MFA either natively in Salesforce or via their
      SSO provider before the enforcement date.
    detail: This affects any integration or automation that relies on interactive
      user sessions. API-only integrations using OAuth client credentials or JWT
      bearer flows remain unaffected, but any flow involving a user login prompt
      must now pass through MFA. Connected apps using web-server or user-agent
      OAuth flows where a human logs in will require the user to complete MFA.
    upgradeAction: Audit all interactive login flows (including Salesforce CLI with
      browser auth, OAuth web flows, and embedded login screens). Ensure MFA is
      enabled via Salesforce's native MFA or your SSO IdP before February 1,
      2022. Test that CI/CD pipelines and automated tooling use non-interactive
      auth methods like JWT bearer or client credentials where possible.
    source:
      document: v53-winter22.pdf
      page: 73
      heading: Get Ready for the Future Requirement to Enable Multi-Factor
        Authentication (MFA)
    confidence: high
    id: v53-auth-001
