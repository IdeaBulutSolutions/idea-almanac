  - apiVersion: "53.0"
    release: Winter '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: REST API requests made at API version >= 53.0
    summary: DateTime values with more than 3 decimal digits are now parsed
      correctly. Earlier versions silently corrupted these timestamps, causing
      incorrect date storage.
    detail: In v52.0 and earlier, sending a timestamp like
      2020-07-29T19:10:18.182314Z would result in the wrong time being stored
      (off by minutes). Version 53.0 fixes this parsing so the correct value is
      persisted.
    upgradeAction: Review integrations sending high-precision timestamps; upgrading
      to 53.0 fixes silent data corruption but may surface previously masked
      issues if downstream logic depended on the corrupted values.
    source:
      document: v53-winter22.pdf
      page: 262
      heading: Changed Calls
    confidence: high
    id: v53-rest-008
