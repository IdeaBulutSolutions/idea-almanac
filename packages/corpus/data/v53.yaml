    summary: The Hide Personal Information setting is deprecated and will be retired
      in Winter '23, replaced by the more configurable Enhanced Personal
      Information Management permission that controls external user access to 20
      personal fields on User records.
    upgradeAction: Before Winter '23, migrate from Hide Personal Information to
      Enhanced Personal Information Management and verify field-level
      configurations for external user access patterns in your integrations.
