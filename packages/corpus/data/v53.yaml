    summary: Lightning Experience HTML structure, CSS, and DOM internals may change
      between releases without notice, potentially breaking Selenium or similar
      automated UI tests that depend on specific element selectors or DOM paths.
    upgradeAction: Audit UI tests using Selenium WebDriver or similar tools for
