    summary: The Field Service Shifts from Pattern endpoint removes the
      serviceResourceId property starting in v53.0; integrations must switch to
      serviceResourceIdList instead.
    upgradeAction: Update any code calling the Shifts from Pattern Connect REST
      endpoint to replace serviceResourceId with serviceResourceIdList before
