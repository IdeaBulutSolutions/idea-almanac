    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce Functions reaches GA, letting developers invoke JavaScript,
      TypeScript, or Java code running in a serverless environment directly from
      Apex, with authentication and scaling handled by the platform.
    detail: Functions execute outside the Apex runtime but are called synchronously
      from Apex and use Salesforce Functions SDKs to interact with the org.
      Requires a separate Functions license enabled on the DevHub and deployment
      via Salesforce CLI.
    source:
      document: v53-winter22.pdf
      page: 238
      heading: Unleash the Power of Elastic Compute with Salesforce Functions
        (Generally Available)
    confidence: high
