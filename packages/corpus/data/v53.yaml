  - apiVersion: "53.0"
    introducedIn: "51.0"
    release: Winter '22
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
      - ApexClass
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced in Winter '22)
    summary: Visualforce JavaScript Remoting now strictly validates CSRF tokens and
      the apexType parameter against the actual Apex method signature, rejecting
      calls with inaccessible or mismatched types.
    detail: "This Release Update tightens security for $RemoteAction calls: the CSRF
      token generation is modified, and any apexType value in the JSON payload
      must exactly match the Apex method's parameter type and be accessible to
      the calling user. Invalid or inaccessible apexType values now throw
      errors. First available in Spring '21 (API 51.0), enforcement began in
      Winter '22."
    upgradeAction: Search for @RemoteAction methods and their JavaScript
      invokeAction calls. Enable the release update in sandbox and manually test
      all remoting pages, watching for console errors about apexType mismatches
      or accessibility. Fix type declarations or redesign calls using interface
      parameters before enforcement.
    source:
      document: v53-winter22.pdf
      page: 224
      heading: Securely Call the Visualforce Remoting API (Release Update)
    confidence: high
    id: v53-vf-001
  - apiVersion: "53.0"
    introducedIn: "49.0"
    release: Winter '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced in Winter '23)
    summary: When multiple API navigation calls fire in quick succession within a
      Visualforce page, Salesforce now executes only the first call and ignores
      the rest, preventing race conditions from competing navigations.
    detail: This Release Update was introduced in Summer '20 (API 49.0) with
      enforcement originally planned for Spring '22, then postponed to Winter
      '23. Affects Visualforce pages running in Lightning Experience across all
      editions.
    upgradeAction: Audit Visualforce pages that programmatically trigger navigation
      (e.g., via sforce.one.navigateToURL or similar APIs) for patterns that
      fire multiple calls in sequence. Refactor to ensure only a single
      navigation call executes, or migrate affected pages to LWC.
    source:
      document: v53-winter22.pdf
      page: 225
      heading: Prevent Consecutive API Navigation Calls in Visualforce Pages (Release
        Update)
    confidence: high
    id: v53-vf-002
  - apiVersion: "53.0"
    release: Winter '22
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
      - ApexClass
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (enforced Spring '22)
    summary: Visualforce expression language now validates Apex method access
      modifiers when invoking custom controller methods. Methods that were
      previously callable despite restrictive access modifiers will throw errors
      after enforcement.
    detail: Prior to this update, VF expressions could invoke Apex methods on custom
      controllers, managed packages, and system classes without respecting
      access modifiers, potentially exposing unauthorized data. The fix
      validates that the method is actually accessible before invocation.
    upgradeAction: Review Visualforce pages that call custom controller methods and
      confirm all referenced methods have public or global access modifiers.
      Test pages in a sandbox with the release update enabled before
      enforcement.
    source:
      document: v53-winter22.pdf
      page: 226
      heading: Visualforce Expression Language Apex Method Access Modifier Enforcement
        (Release Update)
    confidence: high
    id: v53-vf-003
  - apiVersion: "53.0"
    release: Winter '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: The valueOf() method on enums now throws an exception when the input
      string does not match any enum constant, replacing the previous runtime
      error behavior.
    detail: Both system-provided and user-defined enums are affected. Code that
      previously encountered a runtime error will now receive a catchable
      exception instead.
    upgradeAction: Review code that calls valueOf() on enums and add try-catch
      handling or pre-validation to gracefully handle unmatched string inputs.
    source:
      document: v53-winter22.pdf
      page: 226
      heading: Use the valueOf() Enum Method to Convert a Specified String to an Enum
        Constant Value
    confidence: medium
    id: v53-apex-001
  - apiVersion: "53.0"
    release: Winter '22
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; enforcement in Summer '22
    summary: Salesforce retires API versions 7.0–20.0 across SOAP, REST, and Bulk
      APIs. Integrations still calling these legacy endpoints will fail with an
      error after Summer '22 goes live.
    detail: Bulk API versions 16.0–20.0, SOAP API versions 7.0–20.0, and REST API
      version 20.0 are deprecated as of Winter '22 and will stop functioning
      entirely in Summer '22. Any request to these retired versions returns an
      endpoint-deactivated error.
    upgradeAction: Audit all external integrations, middleware, and managed packages
      for API version references below 21.0. Update callouts to a supported
      version before Summer '22 deployment.
    source:
      document: v53-winter22.pdf
      page: 230
      heading: Legacy API Versions 7.0 Through 20.0 Have Been Retired
    confidence: high
    id: v53-rest-005
