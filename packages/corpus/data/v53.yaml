    summary: The Lightning framework now enforces a 2,500-action ceiling per boxcar
      request and returns HTTP 413 when exceeded. Components that batch large
      numbers of server calls in a single XHR will start failing.
    upgradeAction: Audit custom Aura and LWC components for patterns that queue many
      Apex actions simultaneously; refactor to chunk or stagger calls below the
      2,500 limit.
