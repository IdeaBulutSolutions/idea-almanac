    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version (Critical Update activation)
    summary: When processes, workflow rules, or Apex triggers update a record that
      also triggered an email notification (task assignment, case owner change,
      user welcome, etc.), Salesforce previously suppressed those emails.
      Activating this Critical Update restores the emails, which may cause
      duplicates if you added workaround notifications.
    upgradeAction: Audit workflows, processes, and triggers for supplemental email
      alerts added to compensate for suppressed notifications. Remove those
      workarounds before or after activating the update to prevent duplicate
      emails reaching users.
    source:
      document: v40-summer17.pdf
      page: 491
      heading: Stop Automated Field Updates from Suppressing Email Notifications
        (Critical Update)
    confidence: high
