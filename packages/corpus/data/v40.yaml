    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: The UI Tracking event type in Event Monitoring stops returning data in
      Summer '17 and will be fully removed in Winter '18. Integrations pulling
      this event type via the Event Monitoring REST API must migrate to the new
      Lightning Experience event types.
    upgradeAction: Audit any code or integrations querying EventLogFile for the
      UITracking event type and migrate to the replacement Lightning Experience
      event types before Winter '18.
    source:
      document: v40-summer17.pdf
