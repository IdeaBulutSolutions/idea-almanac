      page: 387
      heading: Add App Launcher and Notifications Components to Lightning Components
        in Communities
    confidence: high
    id: v40-aura-002
  - apiVersion: "40.0"
    release: Summer '17
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Any
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version (enforced on
      auto-activation date)
    summary: The HYPERLINK formula function no longer permits JavaScript in the URL
      argument, blocking execution to prevent XSS vulnerabilities.
    detail: "Formula fields that previously used javascript: URLs in HYPERLINK will
      stop working once this critical update activates. Alternative patterns
      include custom buttons with onClick handlers (Classic only), Lightning
      Quick Actions invoking LWC/Aura components, or Visualforce pages with Apex
      controllers that perform server-side redirects."
    upgradeAction: Search for formula fields using HYPERLINK with JavaScript URLs
      (use Workbench query per Salesforce guidance) and migrate to supported
      alternatives before the auto-activation date.
    source:
      document: v40-summer17.pdf
      page: 471
      heading: Block Execution of JavaScript in the HYPERLINK Function (Critical Update)
    confidence: high
    id: v40-sharing-001
  - apiVersion: "40.0"
    release: Summer '17
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
      - Integration
    behaviorArea: api-rest
    appliesWhen: Tooling API requests at API version >= 40.0
    summary: Flow-related errors returned by the Tooling API now use the
      FLOW_EXCEPTION error code instead of UNKNOWN_EXCEPTION, and include
      extendedErrorDetails with a specific extendedErrorCode and
      formulaExpression fields for diagnostic context.
    upgradeAction: Update error-handling code that parses Tooling API responses to
      recognize FLOW_EXCEPTION and consume the new extendedErrorDetails
      structure.
    source:
      document: v40-summer17.pdf
      page: 478
      heading: Get Extended Error Details for Flows in the Tooling API
    confidence: high
    id: v40-rest-005
  - apiVersion: "40.0"
    release: Summer '17
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: packaging-metadata
    appliesWhen: Metadata API deployments made at API >= 40.0
    summary: Permission set deployments now fully replace target org metadata
      instead of merging with existing values. Deploying a permission set file
      that omits a previously-enabled user permission will disable that
      permission in the target org.
    detail: Prior to v40, deploying retrieved permission set metadata merged the
      deployment contents with the target org's existing permission set
      configuration, leaving unmentioned permissions intact. From v40 onward,
      the deployment payload is treated as the authoritative source, and any
      permission absent from the file is removed.
    upgradeAction: Audit CI/CD pipelines and deployment scripts to ensure permission
      set metadata files are complete before deploying at API 40.0+. Retrieve
      full permission sets rather than partial extracts, or explicitly include
      all intended permissions to avoid unintended revocation.
    source:
      document: v40-summer17.pdf
      page: 487
      heading: Permission Set Metadata Behavior Change
    confidence: high
    id: v40-packaging-002
  - apiVersion: "40.0"
    release: Summer '17
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: soql-sosl
    appliesWhen: org-wide regardless of component API version
    summary: External object rows returned via SOSL or Salesforce searches now count
