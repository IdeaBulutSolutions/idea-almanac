  - apiVersion: "40.0"
    release: Summer '17
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: Lightning components with API version >= 40.0
    summary: LockerService security enforcement activates for any Lightning
      component at API version 40.0 or higher, imposing JavaScript strict mode,
      DOM access containment to same-namespace components, restricted global
      references via secure wrappers, and access limited to supported framework
      APIs only.
    detail: Components below v40.0 remain exempt from LockerService. The enforcement
      is purely version-based per component—a v39.0 component nested inside a
      v40.0 parent still runs without LockerService. Managed package components
      follow the same rules; the separate managed-package toggle was removed.
    upgradeAction: Before bumping a component past v39.0, verify all JavaScript uses
      strict-mode-compatible patterns, third-party libraries work under strict
      mode, DOM traversal stays within your namespace, and code relies only on
      published framework APIs. Test in sandbox with the API Viewer to confirm
      SecureWindow/SecureDocument/SecureElement cover your needs.
    source:
      document: v40-summer17.pdf
      page: 519
      heading: LockerService Critical Update Activation
    confidence: high
    id: v40-aura-003
  - apiVersion: "40.0"
    release: Summer '17
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide when critical updates are activated (sandbox/DE in Summer
      '17, all orgs by Winter '19)
    summary: Stricter Content Security Policy enforcement removes unsafe-inline and
      unsafe-eval from script-src, breaking Lightning components that rely on
      inline scripts or eval-based patterns.
    detail: "Two critical updates decouple stricter CSP from LockerService. When
      activated, inline scripts in Lightning components and community page head
      markup become prohibited. Timeline: sandbox/DE orgs Summer '17, production
      orgs Spring '18, mandatory enforcement Winter '19 (Oct 2018)."
    upgradeAction: Audit Lightning components for inline script usage and eval
      patterns. Test in sandbox with critical updates activated before Winter
      '19 enforcement deadline. Remove inline scripts from community page head
      markup.
    source:
      document: v40-summer17.pdf
      page: 521
      heading: Critical Updates for Stricter CSP Restrictions
    confidence: high
    id: v40-lwc-002
  - apiVersion: "40.0"
    release: Summer '17
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version (Critical Update enforcement)
    summary: Lightning components can no longer invoke non-global Apex controller
      methods from managed packages. Cross-namespace calls now require the Apex
      method to be marked global, not just public.
    upgradeAction: Audit Lightning component code that calls Apex methods in managed
      packages; any method not marked global will fail once the critical update
      is enforced. Contact package vendors if you depend on their public-only
      methods.
    source:
      document: v40-summer17.pdf
      page: 523
      heading: Disable Access to Non-global Apex Controller Methods in Managed
        Packages (Critical Update)
    confidence: high
    id: v40-apex-005
  - apiVersion: "40.0"
    release: Summer '17
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: Lightning components can now override View, New, Edit, and Tab standard
      actions on objects in Lightning Experience and Salesforce1, using the
