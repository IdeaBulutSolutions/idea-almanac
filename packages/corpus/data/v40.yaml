    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: The Network metadata component type is now deployable via change sets,
      enabling migration of Lightning Communities and Salesforce Tabs +
      Visualforce communities between connected orgs.
    detail: Communities can only be updated (not created) via inbound change
      sets—the target org must already contain a community with a matching name.
      Deployments fully overwrite the destination community. Limited
      Administration settings transfer; page variations, audience targeting, and
      topics are excluded.
    source:
      document: v40-summer17.pdf
      page: 357
      heading: Move Communities Between Orgs with Change Sets
    confidence: medium
    id: v40-packaging-001
