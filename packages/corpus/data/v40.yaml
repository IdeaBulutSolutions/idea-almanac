  - apiVersion: "40.0"
    release: Summer '17
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Any
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce now reserves the path prefixes /id/, /idp/, and /saml/ for
      authentication endpoints. Attempts to save site or community paths using
      these prefixes will fail with an error.
    detail: Existing sites using these prefixes continue to work but may conflict
      with authentication endpoints. Salesforce recommends migrating away from
      these prefixes to avoid issues with current or future identity provider
      endpoints.
    upgradeAction: Audit Experience Cloud sites and communities for paths starting
      with /id/, /idp/, or /saml/. Rename any matching paths before they
      conflict with Salesforce authentication routing.
    source:
      document: v40-summer17.pdf
      page: 500
      heading: Avoid Using Path Prefixes Reserved by Salesforce
    confidence: high
    id: v40-auth-005
  - apiVersion: "40.0"
    release: Summer '17
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Connected apps using SAML with OAuth single sign-on now support IP
      relaxation, matching the existing OAuth-only behavior. Additionally,
      refresh token exchanges can bypass IP restrictions, allowing users to
      continue sessions from outside restricted networks after initial
      authentication.
    detail: This extends IP bypass capabilities to SAML+OAuth connected apps
      (including Salesforce1) and introduces the option to relax IP restrictions
      during refresh token flows. Developers building integrations that rely on
      strict IP enforcement during token refresh should verify their security
      assumptions still hold.
    upgradeAction: Review connected app configurations to ensure IP relaxation
      settings align with your security requirements, particularly for apps
      using SAML+OAuth or long-lived refresh tokens.
    source:
      document: v40-summer17.pdf
      page: 502
      heading: Streamline Connected App Access with Improved IP Relaxation
    confidence: medium
    id: v40-auth-006
  - apiVersion: "40.0"
    release: Summer '17
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
      - Integration
    behaviorArea: soql-sosl
    appliesWhen: queries against LoginEvent using API >= 40.0
    summary: The Id field on LoginEvent is no longer populated starting in API
      version 40.0; code must use the new UniqueKey field as the primary key
      instead.
    detail: Existing queries or integrations that reference LoginEvent.Id will
      receive null values when running at API 40.0 or higher. Additionally,
      historical LoginEvent data from prior releases may be temporarily
      unavailable for up to 7 days after the Summer '17 release.
    upgradeAction: Update all SOQL queries, Apex code, and external integrations
      that reference LoginEvent.Id to use UniqueKey instead before upgrading to
      API 40.0.
    source:
      document: v40-summer17.pdf
      page: 511
      heading: Use Async SOQL and UniqueKey for More Flexibility in Login Forensics
    confidence: high
    id: v40-soql-006
