  - apiVersion: "40.0"
    release: Summer '17
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: soql-sosl
    appliesWhen: org-wide regardless of component API version (announced for a
      near-future release)
    summary: External object records returned by SOSL or global searches will
      receive temporary Salesforce IDs instead of permanent ones, breaking any
      code that stores or relies on these IDs persisting across queries.
    detail: This change was announced in Summer '17 for a future release. Code or
      integrations that cache external object record IDs from search results, or
      that expect the same external data row to have the same Salesforce ID on
      subsequent retrievals, will fail once enforcement begins.
    upgradeAction: Audit Apex, integrations, and third-party packages for any logic
      that stores or compares Salesforce record IDs of external objects obtained
      via SOSL or search. Refactor to use the external ID field instead.
    source:
      document: v40-summer17.pdf
      page: 98
      heading: Salesforce Connect
    confidence: medium
    id: v40-soql-001
