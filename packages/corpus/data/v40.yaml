    behaviorArea: lwc
    appliesWhen: Lightning components compiled at API >= 40.0
    summary: LockerService security architecture becomes mandatory for Lightning
      components at API version 40.0 and above, while components at 39.0 or
      earlier remain exempt from enforcement.
    detail: This enforcement applies within Communities. Components created before
      Summer '17 (API 39.0 and lower) continue without LockerService
      restrictions, but any new or upgraded component at 40.0+ must comply with
      LockerService's isolation and security rules.
    upgradeAction: Before upgrading custom Lightning components past API 39.0,
      verify they function correctly under LockerService
      restrictions—particularly DOM access patterns, third-party library
      compatibility, and cross-namespace communication.
    source:
      document: v40-summer17.pdf
      page: 350
      heading: "Critical Update Activation: LockerService in Communities"
    confidence: high
    id: v40-lwc-001
  - apiVersion: "40.0"
    release: Summer '17
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
      - VisualforcePage
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; enforced March 2018
      for Communities, July 2017 for portals and sites
    summary: Salesforce will reject TLS 1.0 connections to Communities starting
      March 2018, requiring all browser access, inbound API calls, and outbound
      integrations to use TLS 1.1 or higher.
    detail: The July 2017 TLS 1.0 disablement deadline was extended to March 2018
      specifically for Lightning and Visualforce Communities. Partner portals,
      customer portals, and Force.com/Site.com sites remain on the original July
      2017 deadline. A Critical Update toggle allows early opt-in.
    upgradeAction: Verify all API integrations connecting to Communities use TLS
      1.1+. Test browser compatibility and update any legacy clients or
      middleware that default to TLS 1.0.
    source:
      document: v40-summer17.pdf
      page: 350
      heading: Extended Deadline for TLS 1.0 Disablement in Communities
    confidence: high
    id: v40-auth-002
  - apiVersion: "40.0"
