    behaviorArea: soql-sosl
    appliesWhen: org-wide regardless of component API version (Lightning Experience only)
    summary: SOQL queries against Knowledge Article Version (KAV) objects no longer
      require explicit language and publishStatus filters; omitted filters now
      default to the current user's language and 'online' status.
    detail: Previously, KAV queries failed or behaved unexpectedly without these
      filters. Existing queries that rely on retrieving all languages or all
      publish statuses by omitting filters will now receive a narrower default
      result set.
    upgradeAction: Review KAV SOQL queries that intentionally omit language or
      publishStatus filters; if they expect to return articles across all
      languages or statuses, add explicit filter criteria to preserve that
      behavior.
