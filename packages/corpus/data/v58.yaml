  - apiVersion: "58.0"
    release: Summer '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide when admin enables 'Use Lightning Web Security for
      Lightning web components and Aura components' in Session Settings; new
      orgs, scratch orgs, and sandboxes have it enabled by default since Spring
      '23
    summary: Lightning Web Security now governs Aura components in addition to LWC.
      When enabled, both component types run under LWS instead of Lightning
      Locker, which can change runtime sandbox isolation behavior and API access
      patterns.
    detail: Orgs that previously enabled LWS when it covered only LWC are
      temporarily excluded from automatic Aura coverage to avoid unexpected
      behavior changes. However, sandboxes created in Summer '23 have LWS for
      Aura enabled regardless, so component behavior may differ between
      production and sandbox until the setting is aligned.
    upgradeAction: Before enabling LWS org-wide or refreshing sandboxes, manually
      validate all custom Aura components in a sandbox with LWS enabled. Pay
      attention to DOM manipulation, eval-like patterns, and cross-namespace
      component communication that Lightning Locker handled differently.
    source:
      document: v58-summer23.pdf
      page: 189
      heading: Use Lightning Web Security for Lightning Web Components and Aura
        Components (Generally Available)
    confidence: high
    id: v58-lwc-003
  - apiVersion: "58.0"
    release: Summer '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (when LWS is enabled)
    summary: Lightning Web Security adds new distortions for several web APIs
      including CustomElementRegistry methods, Document event handlers, and
      various HTMLElement prototypes. Components relying on undistorted behavior
      of these APIs may behave differently.
    detail: New distortions affect
      CustomElementRegistry.prototype.define/get/whenDefined,
      onsecuritypolicyviolation events, Document.prototype.write/writeln,
      various iframe-related properties like srcdoc and featurePolicy, and
      HTMLScriptElement.prototype.nonce. Previously undocumented distortions for
      Document.prototype methods like createProcessingInstruction and
      releaseEvents are now formalized in the LWS Distortion Viewer.
    upgradeAction: Review LWC code that directly uses CustomElementRegistry,
      Document.write/writeln, iframe manipulation, or script nonce attributes.
      Test components with LWS enabled to verify behavior matches expectations.
    source:
      document: v58-summer23.pdf
      page: 190
      heading: API Distortion Changes in Lightning Web Security
    confidence: medium
    id: v58-lwc-004
  - apiVersion: "58.0"
    release: Summer '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Light DOM rendering for LWC is now GA, allowing components to attach
      markup directly to the host element rather than the shadow tree, enabling
      third-party tools to traverse the DOM and apply global styling.
    detail: Components opt in by setting static renderMode = 'light' and using
      lwc:render-mode='light' on the template. Light and shadow DOM components
      can nest within each other, but base Lightning components remain
      shadow-only. Developers must manually scope CSS to prevent style leakage
      and should avoid light DOM for sensitive data due to DOM scraping
      exposure.
    source:
      document: v58-summer23.pdf
      page: 191
      heading: Enable Third-Party Integrations with Light DOM (Generally Available)
    confidence: high
    id: v58-lwc-005
  - apiVersion: "58.0"
    release: Summer '23
    changeType: changed
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: LWC attribute names now permit leading underscores, dollar signs, and
      additional special character patterns that were previously rejected,
      enabling declarative binding to public properties using those naming
      conventions.
    source:
      document: v58-summer23.pdf
      page: 192
      heading: Attribute Names Support More Patterns
    confidence: high
    id: v58-lwc-006
  - apiVersion: "58.0"
    release: Summer '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
