    summary: Apex REST responses now validate header names against RFC 7230 rules
      when using RestResponse.addHeader(). Headers containing invalid characters
      like slashes will throw InvalidHeaderException at runtime.
    detail: This Release Update applies to all Apex REST services regardless of API
      version once enforced. Code that previously passed non-compliant header
      names silently will now fail with a runtime exception.
    upgradeAction: Audit all RestResponse.addHeader() calls for RFC 7230-compliant
      header names. Run Apex tests and invoke REST endpoints to surface
      InvalidHeaderException errors before enforcement. Verify installed
