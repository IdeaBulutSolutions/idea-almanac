    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version; requires Lightning
      Web Security enabled
    summary: The lightning/refresh module and RefreshView API are now GA, providing
      LWC and Aura components a standard mechanism to synchronize data within a
      component hierarchy without full page reloads. This replaces the legacy
      force:refreshView pattern.
    detail: RefreshView API lets developers define refresh scopes and subscribe to
      refresh events, enabling granular data synchronization. Components must
      opt in by subscribing to refresh events. Lightning Locker is not
      supported—only orgs with LWS enabled can use this API. Base Lightning Aura
      components do not yet support it.
    source:
      document: v58-summer23.pdf
      page: 192
      heading: Synchronize Component Data Without a Page Refresh Using RefreshView API
        (Generally Available)
    confidence: high
    id: v58-lwc-007
