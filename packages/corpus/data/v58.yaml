    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Apex now supports fetching custom labels by name at runtime via
      System.Label.get(namespace, label, language), removing the prior
      requirement that label API names be known at compile time. A companion
      method Label.translationExists() lets you verify translation availability
      before retrieval.
