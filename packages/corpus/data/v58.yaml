    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (enforced Winter '24
      for production, Summer '23 for sandboxes)
    summary: Lightning apps now receive unique per-app CSRF tokens instead of a
      shared token, and token validation becomes stricter for invalid or expired
      tokens. Custom code that stores, passes, or validates CSRF tokens across
      app boundaries may break.
    detail: This Release Update was introduced in Spring '23 with original Summer
      '23 enforcement, but production enforcement was postponed to Winter '24.
      Sandboxes are enforced in Summer '23. Lightning Out apps are excluded from
      this change.
    upgradeAction: Test in sandbox (where enforcement is active) to verify any
      custom Lightning code that handles CSRF tokens still works. Check for code
      that shares tokens across different Lightning apps or relies on cross-app
      token reuse.
    source:
      document: v58-summer23.pdf
      page: 197
      heading: Security Enhancements for CSRF Tokens for Lightning Apps (Release Update)
    confidence: high
