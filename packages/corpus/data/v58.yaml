  - apiVersion: "58.0"
    release: Summer '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; phased rollout via
      Release Update concluding Spring '24, with permanent enforcement planned
      thereafter
    summary: Salesforce is progressively auto-enabling MFA for direct
      username/password logins across orgs. This phase continues the rollout
      started in Spring '23, moving toward mandatory enforcement where MFA
      becomes a permanent login requirement.
    detail: The contractual MFA requirement has been in effect since February 2022.
      Salesforce is now forcing compliance by auto-enabling MFA in waves. Orgs
      relying on direct logins without MFA configured will have it switched on
      automatically per the phased schedule. SSO logins are not auto-enabled by
      Salesforce but still require MFA implementation on the identity provider
      side.
    upgradeAction: Check your org's auto-enablement schedule via the MFA
      Auto-Enablement Release Update. Deploy MFA to all direct-login users
      before your scheduled phase to control the rollout timing. For SSO users,
      verify your identity provider has MFA configured. Test login flows and
      update any automation or integration accounts that use direct
      authentication.
    source:
      document: v58-summer23.pdf
      page: 87
      heading: Multi-Factor Authentication (MFA) Auto-Enablement Continues with Summer
        '23
    confidence: high
    id: v58-auth-001
  - apiVersion: "58.0"
    release: Summer '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce Connect OData adapter now supports OData 4.01 protocol with
      named credential authentication, removes callout count restrictions, and
      enables JSON batch format for multiple DML operations in a single request.
    detail: "Organizations using external objects via the OData adapter gain three
      behavioral changes: authentication shifts to named credentials for OData
      4.01 sources, the previous callout limits for OData data sources no longer
      apply, and batch DML can now be sent as a single JSON batch request rather
      than individual calls."
    source:
      document: v58-summer23.pdf
      page: 155
      heading: Get OData Version 4.01 Support for Salesforce Connect OData Adapter
    confidence: medium
    id: v58-rest-001
  - apiVersion: "58.0"
    release: Summer '23
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version, after May 22, 2023,
      once enabled via Support case
    summary: Implicit child share records linking accounts to their opportunity
      children are no longer persisted; the system now evaluates access
      dynamically at query time. SOQL queries and Apex tests that previously
      retrieved these implicit share records will return empty results.
    detail: This opt-in feature eliminates stored implicit share rows for
      opportunities, improving account sharing rule recalculation performance.
      Because the share records no longer exist in the database, any code that
      queries OpportunityShare with RowCause = 'ImplicitChild' or similar
      implicit share patterns will stop returning data. A parallel release
      update extends this behavior to cases and contacts.
    upgradeAction: Before enabling via Support, audit Apex code and SOQL queries
      that read implicit child share records on Opportunity. Update tests that
      assert on these records or refactor logic that depends on querying them
      directly.
    source:
      document: v58-summer23.pdf
      page: 171
      heading: Recalculate Account Sharing Rules Faster with Updated Opportunity
        Sharing Behavior
    confidence: high
    id: v58-sharing-001
