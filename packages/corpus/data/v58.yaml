    summary: Tests marked with @IsTest(OnInstall=true) no longer accumulate code
      coverage metrics when executed during package installation or upgrade.
      Coverage is only calculated during the package build process itself.
    detail: This optimization affects how Salesforce measures test coverage at
      install time. Since managed package code is excluded from org-wide
      coverage requirements, most orgs are unaffected. However, teams that
      monitor managed package test coverage separately must execute these tests
      outside the install/upgrade context to obtain accurate metrics.
    upgradeAction: If you rely on coverage data from OnInstall tests, rerun those
