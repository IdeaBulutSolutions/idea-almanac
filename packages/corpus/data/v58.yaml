    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: DataWeave in Apex now requires explicit encoding when coercing binary
      data (Blobs) to strings, and performs feature-support validation at script
      creation rather than execution time.
    detail: "The createScript method gains a namespace overload for cross-namespace
      script sharing. Binary-to-string coercion now mandates an encoding
      parameter (e.g., {encoding: 'utf8'}). Feature checks moved from runtime to
      script creation may surface errors earlier than before."
    upgradeAction: Review existing DataWeave scripts that convert Blob inputs to
      strings and add explicit encoding declarations. Test script creation paths
      to catch any feature-check failures that now occur at creation time.
    source:
      document: v58-summer23.pdf
      page: 202
      heading: Use DataWeave in Apex to Enable Data Transformation to Different
        Formats (Beta)
    confidence: medium
    id: v58-apex-003
