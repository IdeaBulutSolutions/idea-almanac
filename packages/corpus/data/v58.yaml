  - apiVersion: "58.0"
    release: Summer '23
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Developers can now control the maximum chaining depth of Queueable jobs
      via a new System.enqueueJob() overload that accepts AsyncOptions, along
      with new System.AsyncInfo methods to inspect current and maximum stack
      depths at runtime.
    detail: This beta feature introduces AsyncOptions.MaximumQueueableStackDepth to
      override the default 5-job chain limit in Developer/Trial orgs, plus
      getCurrentQueueableStackDepth(), getMaximumQueueableStackDepth(),
      getMinimumQueueableDelayInMinutes(), and hasMaxStackDepth() for
      introspection. Useful for preventing runaway recursive jobs from
      exhausting daily async limits.
    source:
      document: v58-summer23.pdf
      page: 201
      heading: Configure Stack Depth of Chained Queueable Jobs (Beta)
    confidence: medium
