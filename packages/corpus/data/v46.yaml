    appliesWhen: org-wide regardless of component API version
    summary: Aura components now undergo stricter validation when saved or when
      managed packages are upgraded, surfacing errors that previously only
      appeared at runtime.
    detail: "Two specific validations are now enforced at save time: components
      implementing force:appHostable must provide default values for required
      attributes, and managed packages cannot remove design attributes that were
      exposed in earlier versions."
    upgradeAction: Review existing Aura components for required attributes lacking
      defaults (especially those implementing force:appHostable) and test
      managed package upgrades in a sandbox to catch newly surfaced validation
      errors before production deployment.
