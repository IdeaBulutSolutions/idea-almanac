  - apiVersion: "46.0"
    release: Summer '19
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-soap
    appliesWhen: org-wide regardless of component API version, once Schema Settings
      options are enabled
    summary: New Schema Settings options allow admins to hide custom settings and
      custom metadata fields from the Enterprise WSDL and block SOAP API access
      entirely, requiring Customize Application permission instead.
    detail: When enabled, these settings prevent SOAP API consumers from reading
      custom metadata or custom settings values that were previously accessible.
      Integrations relying on WSDL-based access to these objects will fail
      unless the calling user has Customize Application permission.
    upgradeAction: Audit any SOAP API integrations that read custom settings or
      custom metadata. If your org enables these Schema Settings, update
      integrations to use Apex REST endpoints or ensure service accounts have
      Customize Application permission.
    source:
      document: v46-summer19.pdf
      page: 419
      heading: Protect Your Custom Settings and Custom Metadata Values
    confidence: medium
    id: v46-soap-002
  - apiVersion: "46.0"
    release: Summer '19
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
      - VisualforceComponent
      - LWC
      - AuraDefinitionBundle
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version (enforced January 3,
      2020 / Spring '20)
    summary: Users lacking Customize Application permission lose the ability to read
      custom settings directly from Visualforce pages and Lightning components.
      Only Apex and system-mode contexts remain unaffected.
    detail: This critical update enforces a secure-by-default posture by blocking
      API-level reads of custom settings for users without Customize
      Application. After enforcement, grant ViewAllCustomSettings via profile or
      permission set to restore access outside Apex.
    upgradeAction: Audit Visualforce and Lightning components that surface custom
      setting data to users without Customize Application. Either grant
      ViewAllCustomSettings permission or refactor to fetch custom settings via
      Apex and pass values to the UI.
    source:
      document: v46-summer19.pdf
      page: 419
      heading: Require Customize Application Permission for Direct Read Access to
        Custom Settings (Critical Update)
    confidence: high
