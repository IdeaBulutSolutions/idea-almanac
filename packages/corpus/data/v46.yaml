    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Admins can now enforce high-assurance session requirements or block
      access entirely for API interactions with Certificate, EventLogFile,
      VerificationHistory, TwoFactorInfo, and TwoFactorTempCode objects via new
      session-security-level policies.
    detail: "Five new policies control programmatic access: Manage Certificates
      affects the Certificate object, View Event Log Files gates EventLogFile
      queries, and the two-factor policies restrict
      VerificationHistory/TwoFactorInfo/TwoFactorTempCode. Integrations querying
      these objects may start receiving access errors if an org enables stricter
      session-level requirements."
    upgradeAction: If your integration reads EventLogFile, Certificate, or
