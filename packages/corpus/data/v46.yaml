    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Flows that invoke Apex now require the running user to have the Apex
      class explicitly assigned via profile or permission set; implicit access
      no longer works.
    upgradeAction: Audit flows that call invocable Apex methods and ensure all
      running users have the necessary Apex class assignments in their profiles
      or permission sets.
    source:
