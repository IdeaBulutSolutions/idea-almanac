    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Next Best Action strategies can now invoke Apex invocable methods via
      Generate elements to produce recommendations dynamically at runtime, and
      Enhance elements to augment recommendations with external data or Einstein
      predictions.
    detail: The Generate element connects to an Apex action returning a list of
      recommendations, enabling programmatic creation of recommendations from
      large datasets (e.g., product catalogs) without manual record creation.
      The Enhance element integrates external data sources or Einstein
      predictions to add information like propensity scores to recommendations.
    source:
      document: v46-summer19.pdf
      page: 370
      heading: Dynamically Deliver and Enhance Next Best Action Recommendations from
        Salesforce Objects or External Data Sources
    confidence: medium
    id: v46-flow-001
  - apiVersion: "46.0"
    release: Summer '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexTrigger
      - Flow
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: AIPredictionEvent platform event is now available for subscribing to
      Einstein prediction results via Apex triggers, flows, or Streaming API,
      since standard automation (workflow rules, assignment rules) does not fire
      when AI prediction fields are updated.
    detail: When Einstein features write to AI prediction fields, they bypass
      workflow rules and assignment rules for performance. Developers who need
      custom logic on prediction updates must subscribe to AIPredictionEvent
      instead. Subscribers should avoid updating fields that feed back into the
      same prediction to prevent infinite loops.
    source:
      document: v46-summer19.pdf
      page: 375
      heading: Integrate Einstein Predictions Using Prediction Events
    confidence: medium
    id: v46-apex-001
