    summary: Customizable Forecasting will be fully retired in Summer '20, removing
      access to both the feature and its underlying data. Integrations reading
      or writing Customizable Forecasting objects will break after retirement.
    detail: This retirement affects any SOAP or REST API integrations that query or
      manipulate Customizable Forecasting data. The replacement is Collaborative
      Forecasts, which has a different data model.
    upgradeAction: Identify any integrations or Apex code that references
      Customizable Forecasting objects and migrate them to use Collaborative
      Forecasts APIs before Summer '20.
