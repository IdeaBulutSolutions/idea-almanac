  - apiVersion: "46.0"
    release: Summer '19
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce removes the API Enabled permission from all standard and
      cloned external profiles by default, blocking external tools like Data
      Loader, Workbench, and Connected Apps from authenticating via the API for
      users on those profiles.
    detail: Affects a wide range of external license types including Customer
      Community, Partner Community, Customer Portal, and External Identity
      licenses. Organizations must explicitly clone affected profiles and
      re-enable the API Enabled permission to restore API access for their
      external users.
    upgradeAction: Audit which external profiles require API access for
      integrations, clone those profiles with API Enabled checked, reassign
      affected users, and update community memberships before the critical
      update activates.
    source:
      document: v46-summer19.pdf
      page: 333
      heading: Disable the API Enabled User Permission Defaults for External Profiles
        (Critical Update)
    confidence: high
    id: v46-auth-001
