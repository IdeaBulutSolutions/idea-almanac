  - apiVersion: "46.0"
    introducedIn: "45.0"
    release: Summer '19
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: sharing-security
    appliesWhen: org-wide when Critical Update is enabled
    summary: Aura components outside a managed package namespace can no longer
      invoke Apex controller methods unless those methods are marked global.
      Previously, public methods were also accessible cross-namespace, but
      enabling this update enforces the intended access controls.
    detail: This critical update was first announced in Spring '19 (API 45.0). Once
      activated, server actions calling non-global Apex methods from outside the
      package namespace will fail at runtime. Consumers of managed packages must
      switch to the package's supported global API.
    upgradeAction: Audit Aura components that call managed-package Apex controllers.
      Replace any references to non-global methods with the package's documented
      global methods before enabling the update.
    source:
      document: v46-summer19.pdf
      page: 450
      heading: Disable Access to Non-global Apex Controller Methods in Managed
        Packages (Previously Released Critical Update)
    confidence: high
    id: v46-sharing-003
