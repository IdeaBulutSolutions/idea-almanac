  - apiVersion: "46.0"
    introducedIn: "42.0"
    release: Summer '19
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Any
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: "Global value sets in managed packages now behave like standard value
      sets: upgrades no longer modify labels, API names, active/inactive states,
      or add new values in subscriber orgs."
    detail: Originally announced for Spring '18 (v42.0) but delayed until Summer '19
      due to implementation issues. Package publishers can no longer push
      picklist value changes to subscribers through upgrades—subscribers retain
      their existing configurations.
    upgradeAction: Review managed package upgrade procedures if you relied on
      pushing global value set changes to subscriber orgs. Communicate value
      additions through documentation or post-install scripts instead.
    source:
      document: v46-summer19.pdf
      page: 405
      heading: Global Value Set Behavior Is Standardized in Managed Packages
    confidence: high
