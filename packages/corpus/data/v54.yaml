apiVersion: "54.0"
release: Spring '22
reviewed: true
entries:
  - apiVersion: "54.0"
    release: Spring '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; contractual
      enforcement begins February 1, 2022
    summary: Salesforce now contractually mandates MFA for all user logins, whether
      direct or via SSO. Integrations using interactive user sessions must
      accommodate MFA verification methods.
    detail: This requirement affects any integration or automation that relies on
      interactive user authentication flows. API-only integrations using OAuth
      client credentials, JWT bearer, or other non-interactive grants are not
      directly impacted, but any tooling that authenticates as a user through a
      browser-based flow must support MFA. Organizations can satisfy the
      requirement either through native Salesforce MFA or their SSO provider's
      MFA service.
    upgradeAction: Audit authentication flows in CI/CD pipelines, developer tooling,
      and any automation that performs interactive logins. Ensure MFA-compatible
      authenticators are provisioned for service accounts that require
      interactive access, or migrate to non-interactive OAuth flows where
      possible.
    source:
      document: v54-spring22.pdf
      page: 74
      heading: Get Ready for the Multi-Factor Authentication Requirement
    confidence: medium
    id: v54-auth-001
  - apiVersion: "54.0"
