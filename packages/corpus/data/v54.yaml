  - apiVersion: "54.0"
    release: Spring '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: flows and processes configured to run on API >= 54.0
    summary: After-save record-triggered flows now execute before entitlement
      processing in the order of execution, allowing entitlements to incorporate
      flow-made record updates.
    detail: Previously entitlements ran before after-save flows. This reordering
      also places after-save flows immediately after Process Builder processes
      without entitlements in between.
    upgradeAction: Review entitlement logic that assumed it ran before after-save
      flows; test that entitlement calculations still behave correctly when they
      now see flow-updated field values.
    source:
      document: v54-spring22.pdf
      page: 316
      heading: Flow and Process Run-Time Improvements in API Version 54.0
    confidence: high
    id: v54-flow-003
  - apiVersion: "54.0"
    release: Spring '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Custom Aura components embedded in screen flows now display an error
      window with stack trace details for init handler failures and fire
      onstatuschange events even when errors occur, whereas previously the
      screen silently went blank and blocked status events.
    detail: This affects custom Aura components used via lightning:flow. The error
      display behavior applies in most runtime contexts except custom web tabs,
      custom buttons/links, Flow Builder, flow URLs, and Experience Builder
      sites. Developers relying on the old silent-failure behavior or expecting
      onstatuschange not to fire during errors should update their error
      handling logic.
    upgradeAction: Review custom Aura components used in screen flows to ensure they
      handle the new error surfacing gracefully and verify that any
      onstatuschange listeners account for error states.
    source:
      document: v54-spring22.pdf
      page: 317
      heading: Other Changes to Flow Screen Components
    confidence: high
    id: v54-flow-004
  - apiVersion: "54.0"
    introducedIn: "51.0"
    release: Spring '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (enforcement in Summer '22)
    summary: Salesforce now correctly tracks CPU time for flows and processes,
      applying enforcement to all flows regardless of their configured API
      version once the release update is active. Flows that previously appeared
      within limits may now fail if they truly exceed CPU thresholds.
    detail: Before this update, CPU consumption by flows was sometimes miscounted or
      attributed to other automation like Apex triggers later in the
      transaction. The accurate measurement was originally introduced for flows
      at API 51.0+, but this release update extends enforcement org-wide.
      Complex flows with many elements, formulas, or cross-object references are
      most at risk of newly hitting the limit.
    upgradeAction: Test complex flows in a sandbox with the release update enabled.
      Review debug logs to identify CPU-intensive elements and optimize by
      reducing element counts, simplifying formulas, or removing unnecessary
      cross-object references.
    source:
      document: v54-spring22.pdf
      page: 323
      heading: Accurately Measure the CPU Time Consumption of Flows and Processes
        (Release Update)
    confidence: high
    id: v54-flow-005
  - apiVersion: "54.0"
    introducedIn: "50.0"
    release: Spring '22
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
