  - apiVersion: "54.0"
    release: Spring '22
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Eighteen sObjects related to Goals, Metrics, Work Coaching, and Work
      Rewards (including their history and sharing-rule objects) have been
      permanently removed from the API and can no longer be queried or
      referenced.
    detail: The retired objects include GoalHistory, GoalOwnerSharingRule, Metric,
      MetricDataLinkHistory, MetricHistory, MetricOwnerSharingRule,
      WorkGoalCollaboratorHistory, WorkGoalHistory, WorkGoalOwnerSharingRule,
      WorkAccessOwnerSharingRule, WorkCoachingHistory,
      WorkCoachingOwnerSharingRule, WorkRewardFundHistory,
      WorkRewardFundOwnerSharingRule, WorkRewardFundTypeHistory,
      WorkRewardFundTypeOwnerSharingRule, WorkRewardHistory, and
      WorkRewardOwnerSharingRule.
    upgradeAction: Remove any SOQL queries, API calls, or integrations that
      reference these retired objects before upgrading. Check Apex code,
      reports, and external system integrations for dependencies on Goal,
      Metric, WorkCoaching, or WorkReward-related objects.
    source:
      document: v54-spring22.pdf
      page: 262
      heading: Retired Objects
    confidence: high
    id: v54-rest-002
  - apiVersion: "54.0"
    release: Spring '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: soql-sosl
    appliesWhen: org-wide regardless of component API version
    summary: The FIELDS() function in SOQL queries executed from Apex now works
      reliably in all scenarios where it previously threw errors under certain
      conditions.
    detail: Previously, calling FIELDS(ALL), FIELDS(STANDARD), or FIELDS(CUSTOM)
      from Apex code could fail unexpectedly in some situations. This fix
      ensures consistent behavior matching what the org returns.
    upgradeAction: If you had workarounds for FIELDS() failures in Apex, verify they
      still behave as expected and consider removing defensive code that caught
      those errors.
    source:
      document: v54-spring22.pdf
      page: 263
      heading: SOQL
    confidence: medium
    id: v54-soql-001
  - apiVersion: "54.0"
    release: Spring '22
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Flows invoked through REST API can now run in the context of the
      invoking user rather than system context when the FlowSettings field
      enableFlowViaRestUsesUserCtxt is enabled.
    detail: This is tied to a Release Update that changes how REST-invoked flows
      respect user permissions and sharing rules. When enabled, flows called via
      REST API will enforce the running user's access rather than running with
      full system privileges.
    upgradeAction: Review flows invoked via REST API to ensure they will still
      function correctly when running in user context with restricted
      permissions. Test with limited-privilege users before enabling this
      release update.
    source:
      document: v54-spring22.pdf
      page: 280
      heading: Metadata API
    confidence: high
