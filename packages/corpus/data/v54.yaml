  - apiVersion: "54.0"
    release: Spring '22
    changeType: deprecated
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version; two-column layouts
