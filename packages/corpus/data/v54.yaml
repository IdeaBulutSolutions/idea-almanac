      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: "The lightning-datatable component gains new APIs: openInlineEdit()
      method for programmatic edit-mode focus, displayReadOnlyIcon property for
      lock icons on non-editable cells, hideLabel for icon-only headers, and
      columnKey for disambiguating columns sharing a fieldName."
    source:
      document: v54-spring22.pdf
      page: 220
      heading: Customize Your Datatable with New Features
    confidence: high
    id: v54-lwc-005
