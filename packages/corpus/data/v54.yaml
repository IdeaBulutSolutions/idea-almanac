  - apiVersion: "54.0"
    release: Spring '22
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-testing
    appliesWhen: org-wide regardless of component API version
    summary: A new System.Test.calculatePermissionSetGroup() method lets Apex tests
      force immediate recalculation of aggregate permissions on
      PermissionSetGroup objects during deployment, bypassing the normal
      deferred calculation.
    detail: Previously, permission set group aggregate permissions were only
      calculated after transaction commit, making it impossible to test them
      synchronously in Apex tests. Each invocation counts against Apex CPU
      limits, so Salesforce recommends calling it once in a @testSetup method.
    source:
      document: v54-spring22.pdf
      page: 202
      heading: Test Permission Set Groups with the calculatePermissionSetGroup() Method
    confidence: high
    id: v54-apex-001
  - apiVersion: "54.0"
    release: Spring '22
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: LWC gains an opt-in light DOM rendering mode via the static renderMode
      property and lwc:render-mode directive, allowing components to render
      outside the shadow tree for easier third-party tool integration and global
      styling.
    detail: Components opting in lose shadow DOM encapsulation benefits including
      style isolation and protection from DOM scraping. Scoped CSS
      (*.scoped.css) is available for manual style encapsulation. Light and
      shadow DOM components can nest within each other, but base Lightning
      components remain shadow-only.
    source:
      document: v54-spring22.pdf
      page: 214
      heading: Enable Third-Party Integrations with Light DOM (Beta)
    confidence: medium
    id: v54-lwc-001
  - apiVersion: "54.0"
    release: Spring '22
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide when admin enables 'Use Lightning Web Security for
      Lightning web components' in Session Settings
    summary: Lightning Web Security (LWS) reaches GA as an opt-in replacement for
      Lightning Locker, applying a different sandboxing model that blocks or
      modifies some APIs while relaxing other restrictions. Enabling it changes
      the runtime security enforcement for all LWC in the org.
    detail: LWS uses namespace isolation and a new sandboxing approach distinct from
      Lightning Locker. Some APIs behave differently or are blocked under LWS
      compared to Locker. Aura components remain on Lightning Locker regardless
      of the setting. Experience Cloud sites using Lightning Message Service in
      Aura-based contexts should not enable LWS.
    upgradeAction: Before enabling LWS in production, test all Lightning web
      components in a sandbox to verify they function correctly under the new
      security model. Check for any API calls that may be blocked or altered
      differently than under Lightning Locker.
    source:
      document: v54-spring22.pdf
      page: 217
      heading: Secure Your Components Better, Stronger, Faster with Lightning Web
        Security (Generally Available)
    confidence: high
    id: v54-lwc-002
  - apiVersion: "54.0"
    release: Spring '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version — production orgs
      containing only LWC (no Aura) will have LWS enabled automatically starting
      February 2022
    summary: Salesforce begins rolling enablement of Lightning Web Security to
      replace Lightning Locker in production orgs that contain exclusively LWC.
      Components previously sandboxed by Locker will run under the new LWS
      runtime instead.
    detail: Orgs with any Aura components or using Lightning Message Service in
      Aura-based Experience Cloud sites are excluded from automatic enablement.
      While Salesforce expects most LWC to work without modification, subtle
      differences between Locker and LWS isolation models may surface edge-case
      issues.
    upgradeAction: Enable LWS in sandbox environments and regression-test all
      Lightning web components before the production rollout reaches your org.
      Pay attention to cross-namespace communication and DOM manipulation
      patterns that relied on Locker-specific behavior.
    source:
      document: v54-spring22.pdf
      page: 218
      heading: Enablement of Lightning Web Security Begins
    confidence: high
    id: v54-lwc-003
  - apiVersion: "54.0"
    release: Spring '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: LWC now emits console warnings for malformed HTML such as missing or
      extra closing tags. These warnings become blocking errors in Winter '23,
      preventing affected components from loading.
    detail: The LWC compiler validates HTML syntax and logs warnings to the browser
      console when invalid markup is detected. Starting Winter '23 (API 56.0),
      these warnings escalate to compilation errors that stop component
      rendering.
    upgradeAction: Audit browser console output for HTML validation warnings in all
      LWC components. Fix any flagged markup issues (unclosed tags, duplicate
      closing tags) before Winter '23 to prevent component failures.
    source:
      document: v54-spring22.pdf
      page: 219
      heading: Invalid HTML Syntax Results in Warnings
    confidence: high
    id: v54-lwc-004
  - apiVersion: "54.0"
    release: Spring '22
    changeType: new
    impact: additive
    affectedMetadataTypes:
