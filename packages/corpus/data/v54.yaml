    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Assigning a malformed 15- or 18-character string to an Id variable now
      throws a System.StringException instead of silently accepting it.
    upgradeAction: Search for code that assigns Id values from external sources
      without validation; add try-catch blocks or pre-validate strings before
      assignment to avoid runtime exceptions.
    source:
