    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-runtime
    appliesWhen: Apex classes and triggers compiled at API >= 54.0
    summary: The isAccessible() method on DescribeSObjectResult now correctly
      returns false when users lack permissions for custom settings and custom
      metadata types, whereas earlier versions incorrectly returned true.
    upgradeAction: Review code that calls isAccessible() on custom settings or
      custom metadata types; logic relying on the prior permissive behavior may
      now fail permission checks after upgrading past 54.0.
    source:
      document: v54-spring22.pdf
      page: 249
      heading: Schema Namespace
    confidence: high
