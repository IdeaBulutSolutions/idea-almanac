  - apiVersion: "54.0"
    introducedIn: "53.0"
    release: Spring '22
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
      - VisualforceComponent
      - ApexClass
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced in Spring '22)
    summary: Visualforce expression language now correctly enforces Apex method
      access modifiers. Methods that were previously callable despite
      restrictive access levels will throw errors if the calling namespace lacks
      visibility.
    detail: This Release Update was introduced in Winter '22 and enforced in Spring
      '22. Before enforcement, VF expressions could invoke Apex methods on
      managed or system classes even when access modifiers should have blocked
      them. Now the platform validates each method's visibility and throws an
      error identifying the class and namespace if access is denied. For
      cross-namespace visibility, both the class and method must be declared
      global.
    upgradeAction: Audit Visualforce pages that reference Apex controller methods
      across namespaces. Ensure methods intended for external access are
      declared global on global classes. Test pages referencing managed package
      controllers to confirm method visibility is correct.
    source:
      document: v54-spring22.pdf
      page: 226
      heading: Enable Visualforce Expression Language Apex Method Access Modifier
        Enforcement (Release Update)
    confidence: high
    id: v54-vf-001
  - apiVersion: "54.0"
    release: Spring '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
      - LWC
      - AuraDefinitionBundle
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (Release Update
      enforcement scheduled for Winter '23)
    summary: When multiple navigation API calls fire in rapid succession from
      Visualforce or Lightning components, only the first call executes.
      Previously all calls attempted to run, causing race conditions.
    detail: Originally introduced in Summer '20 for Visualforce only, this release
      update now also covers Lightning components. Enforcement was delayed from
      Spring '22 to Winter '23. Salesforce plans to provide an alternative
      pattern for legitimate consecutive navigation use cases.
    upgradeAction: Audit Visualforce pages and Lightning components that
      programmatically trigger navigation. If your code fires multiple navigate
      calls in sequence expecting all to run, refactor to consolidate into a
      single call or use conditional logic.
    source:
      document: v54-spring22.pdf
      page: 226
      heading: Prevent Consecutive API Navigation Calls (Release Update)
    confidence: high
    id: v54-vf-002
  - apiVersion: "54.0"
    release: Spring '22
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Three new Apex classes (System.DomainCreator, System.Domain,
      System.DomainParser) let you programmatically retrieve org-specific
      hostnames for My Domain, Lightning, and Experience Cloud sites, avoiding
      hard-coded URLs that break when domains change.
    source:
      document: v54-spring22.pdf
      page: 228
      heading: Get Org-Specific Domain Hostnames and Information
    confidence: high
    id: v54-apex-002
  - apiVersion: "54.0"
    release: Spring '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: The platform now allows queueable jobs to run with shorter intervals
      between executions than before. Code that assumed a minimum delay between
      chained queueables may now experience faster-than-expected sequential
      execution.
    upgradeAction: Review any Apex queueable chains that depend on timing
      assumptions or implicit delays between jobs; add explicit synchronization
      or state checks if ordering or pacing matters.
    source:
      document: v54-spring22.pdf
      page: 230
      heading: Experience Reduced Minimum Time Between Apex Queueable Jobs
    confidence: high
    id: v54-apex-003
  - apiVersion: "54.0"
    release: Spring '22
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; enforced at Summer
      '22 release
    summary: Salesforce will deactivate API versions 7.0 through 20.0 for SOAP,
      REST, and Bulk APIs in Summer '22. Any integration still calling these
      endpoints will receive errors indicating the endpoint is deactivated.
    detail: "Affected versions: SOAP API 7.0–20.0, Bulk API 16.0–20.0, REST API
      20.0. The CONNECTED_APP_ID field on API Total Usage events can help
      identify connected apps still using deprecated versions."
    upgradeAction: Audit all integrations and connected apps for calls to API
      versions 20.0 and below using API Total Usage events. Update endpoint URIs
      and any version-specific request/response handling to target a supported
      API version (21.0 or later) before Summer '22.
    source:
      document: v54-spring22.pdf
      page: 230
      heading: Legacy API Versions 7.0 Through 20.0 will be retired in Summer '22
    confidence: high
    id: v54-rest-001
  - apiVersion: "54.0"
    release: Spring '22
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Any
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: Second-generation managed packages now support removing metadata
      components that were previously included, enabling package publishers to
      deprecate and clean up unwanted components from their packages.
    detail: This capability requires enablement via a Partner Community case. Once
      enabled, removing a component's source from the SFDX project and creating
      a new package version will remove that component from the managed package.
    source:
      document: v54-spring22.pdf
      page: 231
      heading: Remove Metadata Components from Second-Generation Managed Packages
        (Generally Available)
    confidence: high
    id: v54-packaging-002
  - apiVersion: "54.0"
    release: Spring '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Any
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: Creating a 2GP package version now requires explicitly setting an
      ancestor. New keywords HIGHEST and NONE plus the --skipancestorcheck CLI
      flag provide control over ancestor selection.
    detail: The ancestorVersion or ancestorId field in sfdx-project.json must now be
      set when creating package versions. HIGHEST automatically uses the highest
      promoted version, NONE allows no ancestor, and --skipancestorcheck
      bypasses the requirement entirely.
    upgradeAction: Update sfdx-project.json to include ancestorVersion or ancestorId
      with an explicit value, HIGHEST, or NONE before creating new package
      versions. Existing CI/CD scripts that omit ancestor settings will fail
      without modification.
    source:
      document: v54-spring22.pdf
      page: 232
      heading: Specify Package Ancestors Using New Keywords
    confidence: high
    id: v54-packaging-003
  - apiVersion: "54.0"
    release: Spring '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; enforced Spring '22
    summary: ISV partners accessing subscriber orgs via the Subscriber Support
      Console must now authenticate to their License Management Org using MFA.
      Additionally, subscribers can opt to require a second MFA challenge before
      granting LMO user access.
    upgradeAction: Ensure all LMO users who access the Subscriber Support Console
      have MFA configured before Spring '22 enforcement. Update any automated
      login scripts or workflows that assume single-factor LMO authentication.
    source:
      document: v54-spring22.pdf
      page: 232
      heading: Require Multi-Factor Authentication for Logins to Subscriber Orgs
        (Release Update)
    confidence: high
    id: v54-auth-002
