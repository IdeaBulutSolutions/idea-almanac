    summary: The flowLayout=twoColumn URL parameter and the Two Columns layout
      property for screen flows will be ignored starting Winter '23. Flows using
      this layout will render as single-column unless migrated to Section
      components.
    detail: "This Spring '22 note announces advance deprecation: any flow screen
      relying on two-column layout via URL parameter or Lightning page property
      must be updated to use Section components before Winter '23 enforcement.
      Data is preserved, but visual layout reverts to single-column if not
      migrated."
    upgradeAction: Audit flows distributed with flowLayout=twoColumn in URLs, custom
      tabs, buttons, or Lightning page settings. Replace two-column layouts with
      Section components before Winter '23 to preserve multi-column rendering.
    source:
