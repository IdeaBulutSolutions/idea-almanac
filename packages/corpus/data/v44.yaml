entries:
  - apiVersion: "44.0"
    release: Winter '19
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version, enforced Summer '20
    summary: The legacy Territory Management feature will be fully removed in Summer
      '20, eliminating access to its APIs and underlying data structures for any
      integrations that depend on them.
    detail: Announced in Winter '19 with retirement scheduled for Summer '20. Any
      code querying Territory Management objects or calling related APIs will
      fail after enforcement. Migration path is Enterprise Territory Management.
    upgradeAction: Audit integrations and Apex code for references to original
      Territory Management objects (Territory, AccountTerritoryAssignmentRule,
      etc.) and migrate to Enterprise Territory Management APIs before Summer
      '20.
    source:
      document: v44-winter19.pdf
      page: 125
      heading: Territory Management Is Being Retired
    confidence: high
    id: v44-rest-001
  - apiVersion: "44.0"
    release: Winter '19
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: other
    appliesWhen: org-wide regardless of component API version
    summary: The Connect for Office add-ons for Excel and Word, along with standard
      Mail Merge functionality, will be removed in February 2019. Any
      integrations or workflows relying on these features will stop working.
    upgradeAction: Identify any automated processes or user workflows depending on
      the Excel/Word add-ons or standard Mail Merge and migrate to alternative
      solutions before February 2019.
    source:
      document: v44-winter19.pdf
      page: 170
      heading: Connect for Office
    confidence: high
    id: v44-other-001
