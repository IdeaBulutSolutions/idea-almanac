    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: The System.Callable interface enables loosely coupled integrations
      between Apex classes, triggers, and packages by defining a common call
