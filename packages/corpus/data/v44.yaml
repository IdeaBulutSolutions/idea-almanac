    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: UserInfo.getSessionId() now returns a valid session ID when called from
      asynchronous Apex contexts (Batch, Future, Queueable, Scheduled) instead
      of returning null.
    detail: Previously this method always returned null in async contexts, forcing
      workarounds. Code that checked for null or avoided calling getSessionId()
      in async Apex may now need adjustment if it relied on the null behavior.
    upgradeAction: Review async Apex that calls getSessionId() or checks its return
      value; remove any null-handling workarounds if they cause
      double-processing now that valid IDs are returned.
    source:
      document: v44-winter19.pdf
      page: 481
      heading: Changed Apex Classes
    confidence: high
