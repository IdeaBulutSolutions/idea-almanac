  - apiVersion: "44.0"
    release: Winter '19
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Any
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version (critical update
      applied October 5, 2018)
    summary: Guest users in Sites and Communities lost all default record CRUD
      permissions. Code or integrations that assumed guest users could read,
      create, update, or delete records without explicit profile configuration
      will fail.
    upgradeAction: Review guest user profiles for all Sites and Communities.
      Explicitly grant required object permissions where guest access is
      intentional; verify integrations and anonymous Apex/Visualforce pages that
      relied on implicit record access.
    source:
      document: v44-winter19.pdf
      page: 363
      heading: Improve Security for Sites and Communities by Restricting Record Access
        for Guest Users
    confidence: high
    id: v44-sharing-001
  - apiVersion: "44.0"
    release: Winter '19
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Internal users can now authenticate to Communities via external OpenID
      Connect providers (e.g., Facebook), requiring the Apex RegistrationHandler
      to distinguish internal from external user creation.
    upgradeAction: Update your Auth.RegistrationHandler implementation's createUser
      method to detect internal vs external users via userData attributes and
      handle account/contact association logic accordingly.
    source:
      document: v44-winter19.pdf
      page: 368
      heading: Give Internal Users Login Access to Communities Through an External
        Authentication Provider
    confidence: high
    id: v44-auth-001
  - apiVersion: "44.0"
    release: Winter '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: OAuth authentication for internal community users is now supported on
      community domains, enabling connected apps and integrations to
      authenticate internal users through community endpoints rather than
      requiring the main Salesforce domain.
    source:
      document: v44-winter19.pdf
      page: 369
      heading: Set Different Login Policies for Internal Community Users (Generally
        Available)
    confidence: medium
    id: v44-auth-002
  - apiVersion: "44.0"
    release: Winter '19
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Flow
    behaviorArea: packaging-metadata
    appliesWhen: org-wide when deploying flow metadata using API version 44.0
    summary: Flow metadata retrieval and deployment no longer appends version
      numbers to flow names. Existing flow files containing version number
      suffixes must be updated before deploying with API 44.0.
    upgradeAction: Before deploying with API 44.0, use Metadata API or Salesforce
      CLI to remove version number suffixes from flow file names in your source
      control.
    source:
      document: v44-winter19.pdf
      page: 419
      heading: Use Strategies to Recommend Flows to Users and Community Members (Pilot)
    confidence: high
    id: v44-packaging-001
  - apiVersion: "44.0"
    release: Winter '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Flow
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version (requires opt-in via
      Process Automation Settings)
    summary: Production orgs can now deploy flows and processes in an already-active
      state via Change Sets or Metadata API, bypassing manual activation.
      Deployments that activate flows trigger Apex test runs and require 75%
      coverage of active processes and autolaunched flows.
    detail: A new org setting 'Deploy processes and flows as active' enables CI/CD
      workflows to ship active automation without post-deployment clicks. The
      deployment validates that your Apex tests exercise at least 75% of active
      processes and autolaunched flows; failure rolls back the deploy.
      Non-production orgs always allowed active deployment, so the setting only
      surfaces in production.
    source:
      document: v44-winter19.pdf
      page: 421
      heading: Deploy Active Processes and Flows Using Change Sets or Metadata API
    confidence: high
    id: v44-packaging-002
  - apiVersion: "44.0"
    release: Winter '19
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Flow
    behaviorArea: packaging-metadata
    appliesWhen: deployments and retrievals using Metadata API version 44.0 or later
    summary: Flow metadata file names no longer include version numbers when using
      API 44.0+, requiring migration of existing flow files and deprecating the
      flowDefinitions directory for deploy/retrieve operations.
    detail: The Flow metadata type's fullName field behavior changed and a new
      status field was added. Flow definitions become unnecessary but if
      included, the activeVersionNumber in the definition overrides the flow's
      status field, potentially activating an older version than intended.
    upgradeAction: Before deploying with API 44.0+, rename flow files to remove
      version suffixes (e.g., myflow-3.flow becomes myflow.flow), clear the
      flowDefinitions directory, ensure each active flow has status set to
      Active, and remove unused flow versions from the flows directory.
    source:
      document: v44-winter19.pdf
      page: 423
      heading: Upgrade Flow Files to Version 44.0 with Metadata API
    confidence: low
    id: v44-packaging-003
  - apiVersion: "44.0"
    release: Winter '19
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: packaging-metadata
    appliesWhen: org-wide when deploying or retrieving via Metadata API version 44.0+
    summary: Flow metadata file names no longer include version numbers when using
      API 44.0. The fullName field behavior changed and a new status field was
      added, making flowDefinitions unnecessary for deployment.
    detail: When pushing or pulling flow metadata at API 44.0+, files must be
      renamed to remove version suffixes (e.g., myflow-1.flow-meta.xml becomes
      myflow.flow-meta.xml). If flowDefinitions are still deployed alongside
      flows, the activeVersionNumber in the definition overrides the flow's
      status field, which can cause unexpected activation of older versions.
    upgradeAction: "Before upgrading to API 44.0: rename flow files to remove
      version numbers, ensure sfdx-project.json uses sourceApiVersion 44.0,
      empty the flowDefinitions directory, and set the status field to Active
      for each active flow. Avoid reusing scratch orgs when pushing updated
      source."
    source:
      document: v44-winter19.pdf
      page: 423
      heading: Upgrade Flow Files to API Version 44.0 with the Salesforce CLI
    confidence: high
    id: v44-packaging-004
