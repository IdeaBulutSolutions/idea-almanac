    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Two new Tooling API objects (FlowTestCoverage and
      FlowElementTestCoverage) allow developers to query test coverage metrics
      for processes and autolaunched flows executed by Apex tests.
    source:
      document: v44-winter19.pdf
      page: 424
      heading: Track Process and Flow Test Coverage
    confidence: high
    id: v44-flow-001
  - apiVersion: "44.0"
    release: Winter '19
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (critical update
      auto-enabled May 17, 2019)
    summary: Lightning pageReference.state properties and URL query parameters now
      require namespace prefixes; unprefixed parameters are stripped from URLs
      to prevent cross-package naming collisions.
    detail: Components in managed packages must use their registered namespace,
      while components without a namespace must use the default 'c__' prefix.
      This affects Lightning Experience and the Salesforce mobile app but not
      Visualforce or Classic URLs.
    upgradeAction: Audit all Lightning components that read or write
      pageReference.state or URL query parameters. Add the appropriate namespace
      prefix (registered namespace or 'c__') to each parameter name before the
      enforcement date.
    source:
      document: v44-winter19.pdf
      page: 433
      heading: Add a Namespace Prefix to pageReference.state Properties and Query
        Parameters
    confidence: high
    id: v44-lwc-001
  - apiVersion: "44.0"
    release: Winter '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce now auto-generates an Apex handler class (named
      AutocreatedDiscLoginHandler*) when admins configure Login Discovery for
      communities, providing a customizable entry point for passwordless login
      logic and multi-IdP routing.
    detail: The generated handler can be extended to support custom identifiers
      (Federation ID, vendor ID) and to programmatically route users to the
      correct SSO provider. Developers working on community authentication flows
      should be aware this handler exists and can be customized.
    source:
      document: v44-winter19.pdf
      page: 435
      heading: Login Discovery
    confidence: medium
    id: v44-auth-003
  - apiVersion: "44.0"
    release: Winter '19
    changeType: changed
