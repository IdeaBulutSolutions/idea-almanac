    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: The AuraLocalizationService date formatting methods no longer support
      the uppercase W token for week-of-year. Use lowercase w instead.
    detail: "Additionally, several date tokens are deprecated: y/Y/YY/YYYY should
      migrate to yyyy or yy, uppercase A for AM/PM should become lowercase a,
      and DD for day-of-month should become dd."
    upgradeAction: Search JavaScript files for formatDate() and related
      AuraLocalizationService calls using W, Y, YY, YYYY, A, or DD tokens and
      replace them with the preferred equivalents before upgrading.
    source:
      document: v44-winter19.pdf
      page: 468
      heading: Token Changes for Formatting Dates in JavaScript API Methods
    confidence: high
