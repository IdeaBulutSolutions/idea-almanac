    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: System.UserInfo.getSessionId() now returns a valid session ID when
      invoked from asynchronous Apex (Batch, Future, Queueable, Scheduled)
      executed by an active user, whereas it previously returned null in all
      async contexts.
    detail: The method still returns null when the async code runs under internal
      users such as the automated process user or proxy users. This enables
      callouts to Salesforce APIs from async Apex without workarounds.
    upgradeAction: Review async Apex that previously worked around null session IDs;
      existing workarounds may now be redundant or could conflict with the newly
      returned value.
    source:
      document: v44-winter19.pdf
      page: 479
      heading: Streamline API Calls to Your Org from Apex Code
    confidence: high
