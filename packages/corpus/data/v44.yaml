    appliesWhen: org-wide regardless of component API version
    summary: Internal users can now authenticate to Communities via external OpenID
      Connect providers (e.g., Google), requiring the Apex registration
      handler's createUser method to distinguish between internal and external
      user creation.
    upgradeAction: Update any OpenID Connect registration handler Apex classes to
      detect whether the authenticating user should be provisioned as internal
      or external, using attributes in the userData object.
    source:
      document: v44-winter19.pdf
      page: 443
      heading: Direct Internal User Authentication to Communities
    confidence: high
    id: v44-auth-004
  - apiVersion: "44.0"
    release: Winter '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce introduces SCIM 2.0 REST endpoints for identity management,
      adding /v2/ paths alongside the existing v1 endpoints with new resources
      for Roles, ResourceTypes, and Me.
    source:
      document: v44-winter19.pdf
      page: 445
      heading: SCIM 2.0
    confidence: medium
    id: v44-rest-002
  - apiVersion: "44.0"
    release: Winter '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce now includes a session index parameter in SAML single
      sign-on and single logout flows, enabling identity and service providers
      to correlate logout requests with specific user sessions.
    detail: When Salesforce acts as the identity provider, it generates and
      transmits the session index during SSO, then includes the same value in
      SLO requests. When acting as service provider, Salesforce stores the
      incoming session index and returns it in logout responses. Integrations
      relying on SAML SLO that require session correlation can now use this
      parameter.
    source:
      document: v44-winter19.pdf
      page: 446
      heading: SAML Session Index Support
    confidence: medium
    id: v44-auth-005
  - apiVersion: "44.0"
    release: Winter '19
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: The updated_at claim in UserInfo, identity URL responses, and ID tokens
      changes from an ISO 8601 string with offset (e.g.,
      2017-07-28T19:17:41.000+0000) to a JSON number per OpenID Connect Core
      1.0. The address claim in ID tokens also switches from a stringified map
      to a proper nested JSON object.
    upgradeAction: Audit integrations parsing updated_at or address from Salesforce
      identity endpoints or ID tokens. Update parsers to handle the new numeric
      timestamp format and nested JSON object for address instead of the
      previous string representations.
    source:
      document: v44-winter19.pdf
      page: 446
      heading: JSON-Compliant Values in Endpoints and Tokens
    confidence: high
    id: v44-auth-006
  - apiVersion: "44.0"
    release: Winter '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Internal users can now authenticate via OAuth on community domains when
      the new profile setting is enabled, allowing connected apps and API
      integrations to function for internal users accessing communities.
    source:
      document: v44-winter19.pdf
      page: 447
      heading: Login Policies (Generally Available)
    confidence: medium
    id: v44-auth-007
  - apiVersion: "44.0"
    release: Winter '19
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-soap
    appliesWhen: API calls using Enterprise SOAP API version >= 44.0
    summary: Tenant secret destruction now uses the Status field rather than
      SecretValue in the Enterprise API. Cache-Only Key Service users can
      activate and archive secrets via Status updates. The encrypted boolean on
      CustomField metadata is deprecated.
    detail: Starting with API v44.0, destroying tenant secrets requires updating the
      Status field instead of SecretValue. Additionally, the Metadata API gains
      an encryptionScheme enum on CustomField allowing programmatic changes
      between probabilistic and deterministic encryption modes. The legacy
      encrypted boolean field is deprecated in v44.0+.
    upgradeAction: Update any integrations that destroy tenant secrets by modifying
      SecretValue to use the Status field instead. Review code referencing the
      deprecated encrypted boolean on CustomField metadata and migrate to
      encryptionScheme.
    source:
      document: v44-winter19.pdf
      page: 453
      heading: Tenant Secret Statuses and Schemes
    confidence: high
    id: v44-soap-001
  - apiVersion: "44.0"
    release: Winter '19
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
      - VisualforceComponent
      - Integration
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version; auto-enforced March 16, 2019
    summary: My Domain URLs now omit instance names by default, changing the
      hostname used by Visualforce pages, Community Builder, Site.com, and
      content file URLs. Integrations or code that parses or hardcodes
      instance-specific hostnames will break.
    detail: This critical update removes instance identifiers (e.g., na44) from My
      Domain hostnames to provide URL stability across org migrations. The
      change affects all URL references to Visualforce pages, communities, and
      file content. A deactivation option exists for compatibility issues with
      older AppExchange packages.
    upgradeAction: Audit any code, integrations, or external systems that parse or
      store Salesforce hostnames expecting instance names. Update regex patterns
      or hardcoded URLs to handle instanceless formats before enforcement.
    source:
      document: v44-winter19.pdf
      page: 461
      heading: Instanceless My Domain URLs
    confidence: high
    id: v44-vf-001
  - apiVersion: "44.0"
    release: Winter '19
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version; auto-enabled for orgs
      without custom Lightning components or packages containing them
    summary: Stricter CSP enforcement moved from a critical update to a toggleable
      org setting, blocking inline JavaScript in script tags and event handlers
      when enabled.
    detail: The setting prohibits unsafe-inline for script-src in Lightning
      Experience, Salesforce mobile app, and standalone Lightning apps.
      Third-party libraries relying on inline scripts will break. Orgs with
      existing custom Lightning components or installed packages containing them
      have this disabled by default; all other orgs have it auto-enabled.
    upgradeAction: Audit Lightning components for inline JavaScript patterns like
      onclick handlers or dynamically inserted script tags; refactor to use
      standard Lightning event handling before enabling stricter CSP.
    source:
      document: v44-winter19.pdf
      page: 466
      heading: Stricter Content Security Policy (CSP) Changed from a Critical Update
        to an Org Setting
    confidence: high
    id: v44-lwc-002
  - apiVersion: "44.0"
    release: Winter '19
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide when admin enables 'Freeze JavaScript Prototypes' in
      Session Settings; affects all Lightning components regardless of API
      version
    summary: A new org-level security setting prevents Lightning component code from
      modifying built-in JavaScript prototypes (Object, Array, DOM APIs, etc.),
      which breaks components that extend or polyfill native prototypes.
    detail: When enabled, the runtime freezes prototypes of global JavaScript
      objects shared across namespaces. Components that patch Array.prototype,
      Object.prototype, or similar will throw errors. The setting is off by
      default but can be toggled in Session Settings.
    upgradeAction: Before enabling this setting, audit all Aura and LWC code for
      prototype modifications (e.g., Array.prototype.customMethod) and refactor
      to use standalone utility functions instead.
    source:
      document: v44-winter19.pdf
      page: 467
      heading: Freeze JavaScript Prototypes for Improved Security and Stability
    confidence: high
    id: v44-lwc-003
  - apiVersion: "44.0"
    release: Winter '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - AuraDefinitionBundle
    behaviorArea: apex-runtime
    appliesWhen: Aura components compiled at API >= 44.0
    summary: Apex methods can now declare cacheability directly via
      @AuraEnabled(cacheable=true) annotation, eliminating the need for
      client-side setStorable() calls on each action invocation.
    detail: For components at v44.0+, the cacheable annotation on the server method
      controls caching behavior. Components at v43.0 or earlier must continue
      using the JavaScript setStorable() approach. This is a versioned change
      affecting how Aura components interact with Apex controllers.
    source:
      document: v44-winter19.pdf
      page: 468
      heading: Mark Apex Methods as Cacheable
    confidence: high
    id: v44-apex-002
  - apiVersion: "44.0"
    release: Winter '19
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
