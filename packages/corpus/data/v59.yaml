apiVersion: "59.0"
release: Winter '24
reviewed: true
entries:
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; enforcement begins Summer '24
    summary: Salesforce is enforcing MFA for all direct logins starting Summer '24,
      meaning integrations or scripts using username/password authentication
      without MFA will fail unless they switch to OAuth flows or other
      MFA-compatible methods.
    detail: Auto-enablement has been rolling out since Spring '23, but Summer '24
      marks the start of permanent enforcement where MFA cannot be bypassed for
      direct logins. SSO users must also have MFA configured via their identity
      provider. This affects any automated process relying on direct
      username/password authentication.
    upgradeAction: Audit all integrations using direct username/password logins.
      Migrate to OAuth 2.0 flows (JWT bearer, client credentials, or web server)
      that do not require interactive MFA, or implement MFA for service accounts
      before Summer '24.
    source:
      document: v59-winter24.pdf
      page: 92
      heading: MFA Auto-Enablement Continues and MFA Enforcement Begins with Summer '24
    confidence: high
    id: v59-auth-001
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version; enforced on rolling
      basis from Spring '24 for existing orgs, enabled by default for new
      orgs/sandboxes from Winter '24
    summary: Salesforce stops persisting implicit child share records between
      accounts and opportunities. Instead, opportunity access is evaluated at
      query time, which means SOQL queries and Apex tests that select from
      OpportunityShare expecting implicit child shares will return empty
      results.
    detail: This release update eliminates stored implicit child share rows for the
      Opportunity object to speed up account sharing recalculation. Code that
      queries for these share records—whether in production logic or test
      assertions—will no longer find them because they are computed on demand
      rather than stored.
    upgradeAction: Search for SOQL queries against OpportunityShare (or Share suffix
      objects for Opportunity) and review Apex tests that assert on implicit
      child share counts. Update test expectations and any logic that relied on
      querying these records directly.
    source:
      document: v59-winter24.pdf
      page: 176
      heading: Enable Faster Account Sharing Recalculation by Not Storing Opportunity
        Implicit Child Shares (Release Update)
    confidence: high
    id: v59-sharing-001
  - apiVersion: "59.0"
    release: Winter '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; requires API version
      58.0 or later
    summary: Data Cloud gains a new Connect REST endpoint for querying segment
      membership data, supporting filters, pagination limits, and sorting.
    source:
      document: v59-winter24.pdf
      page: 196
      heading: Query Segment Data via Connect Rest API
    confidence: high
    id: v59-rest-001
  - apiVersion: "59.0"
    release: Winter '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: LWC components with apiVersion >= 55.0 and Lightning Web Security enabled
    summary: LWC gains the ability to dynamically import and instantiate components
      at runtime, enabling lazy loading and constructor resolution at execution
      time. Requires LWS enablement.
    detail: This capability lets developers defer loading of heavy component modules
      until needed and resolve component constructors dynamically. LWR Sites for
      Experience Cloud only support statically analyzable imports (literal
      strings, not concatenated expressions).
    source:
      document: v59-winter24.pdf
      page: 202
      heading: Dynamically Import and Instantiate Lightning Web Components
    confidence: high
    id: v59-lwc-001
  - apiVersion: "59.0"
    release: Winter '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: components compiled at API >= 59.0
    summary: LWC now supports component-level API versioning via the apiVersion
      element in .js-meta.xml, allowing developers to pin components to specific
      framework behavior. Components at 58.0 or lower all receive Summer '23
      behavior; upgrading to 59.0 opts into new versioned behaviors like
      lowercase CSS scope tokens and stricter HTML parsing errors.
    detail: "This introduces the versioning mechanism itself. The framework clamps
      versions: anything below 58.0 becomes 58.0, anything above the latest
      known version becomes that latest. Two concrete behavioral changes gate on
      59.0: CSS scope tokens become lowercase, and parse5 HTML errors throw
      exceptions instead of warnings."
    source:
      document: v59-winter24.pdf
      page: 202
      heading: Get the Latest LWC Features with Component-Level API Versioning
    confidence: high
    id: v59-lwc-002
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce now applies HTTP caching with up to 10-minute TTL for LWC
      and Aura component resources, meaning code deployments may not appear in
      the browser immediately without a hard refresh or debug mode enabled.
    detail: The Cache-Control header caches component files for 5 minutes baseline,
      with an additional 5 minutes via stale-while-revalidate on non-Safari
      browsers. This affects developer workflows and deployment verification
      timelines.
    upgradeAction: Enable debug mode during development/testing, or perform hard
      browser refreshes after deployments to verify changes. Update deployment
      verification procedures to account for potential 10-minute cache lag.
    source:
      document: v59-winter24.pdf
      page: 203
      heading: HTTP Caching Results in a Time to Live (TTL) of Up To 10 Minutes
    confidence: high
    id: v59-lwc-003
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Base Lightning components now render with updated color values for
      improved WCAG non-text contrast compliance. Custom components using
      hardcoded colors may look inconsistent unless migrated to global color
      styling hooks (--slds-g-*).
    detail: The platform changed the underlying color palette for buttons,
      checkboxes, links, and other UI elements. Base components pick this up
      automatically, but custom Aura or LWC that reference older SLDS color
      tokens or raw hex values can appear mismatched. Components rendered inside
      iframes may still show the legacy colors due to a known issue.
    upgradeAction: Review custom components against the SLDS migration guide;
      replace deprecated color tokens or hardcoded values with --slds-g-* global
      styling hooks to maintain visual consistency.
    source:
      document: v59-winter24.pdf
      page: 203
      heading: Use Global Color Styling Hooks to Match Color-Contrast Changes
    confidence: high
    id: v59-lwc-004
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: The RefreshView API (lightning/refresh module) now functions in orgs
      using Lightning Locker, not just those with LWS enabled. However, the
      registration method signature differs between the two security
      architectures.
    detail: When Lightning Locker is active, registerRefreshHandler() and
      registerRefreshContainer() must receive this.template.host as the first
      argument instead of the format used under LWS. Code that must run under
      both architectures needs conditional logic or will break if the org's
      security setting changes.
    upgradeAction: If your LWC uses RefreshView API and might run in orgs with
      either security architecture, verify you handle both registration formats
      or detect the active architecture at runtime.
    source:
      document: v59-winter24.pdf
      page: 205
      heading: Use RefreshView API with Lightning Locker
    confidence: high
    id: v59-lwc-005
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: The lightning-input base component's internal DOM structure has been
      reorganized as part of Salesforce's transition toward native shadow DOM.
      Any tests or CSS selectors that depend on the previous internal element
      hierarchy will break.
    detail: This continues the native shadow DOM preparation that began in Spring
      '23 and Summer '23 with 12 other components. The internal structure of
      base components is not part of the public API and can change at any time.
    upgradeAction: Audit Selenium tests, Jest tests, and custom CSS that query or
      style internal elements of lightning-input. Migrate integration tests to
      UTAM page objects or use the documented shadow DOM techniques for
      Selenium. Replace internal structure selectors with supported public APIs.
    source:
      document: v59-winter24.pdf
      page: 207
      heading: Be Aware of Base Component lightning-input Internal DOM Structure Changes
    confidence: high
    id: v59-lwc-006
  - apiVersion: "59.0"
    release: Winter '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide when LWS is enabled in the org
    summary: Lightning Web Security now virtualizes CustomElementRegistry, allowing
      LWC developers to define custom elements via the standard
      customElements.define() API without cross-namespace conflicts.
    detail: Previously LWS blocked access to CustomElementRegistry to prevent
      cross-sandbox access. The new virtual registry isolates custom element
      definitions per namespace, enabling use of third-party web components on
      the platform.
    source:
      document: v59-winter24.pdf
      page: 207
      heading: Create Custom Elements with Lightning Web Security Enabled (Beta)
    confidence: low
    id: v59-lwc-007
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (when LWS is enabled)
    summary: Lightning Web Security adds new distortions that block or alter
      behavior for several DOM and event APIs including getInnerHTML, setHTML,
      window.find, and various event handlers like storage and rejectionhandled
      events.
    detail: Affected APIs include Element.prototype.getInnerHTML/setHTML,
      Event.prototype.explicitOriginalTarget/originalTarget,
      HTMLScriptElement.prototype.text setter, window.find, and
      storage/rejectionhandled/unhandledrejection events on Window,
      HTMLBodyElement, and HTMLFrameSetElement. ESLint rules are available to
      detect usage before runtime.
    upgradeAction: Run the LWS ESLint package against your LWC codebase to identify
      components using distorted APIs, then refactor or find alternatives before
      enabling LWS.
    source:
      document: v59-winter24.pdf
      page: 210
      heading: API Distortion Changes in Lightning Web Security
    confidence: high
    id: v59-lwc-008
  - apiVersion: "59.0"
    release: Winter '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: "LWR Experience Cloud sites gain two new modules for toast
      notifications: lightning/toast for displaying toasts and
      lightning/toastContainer for managing position, quantity limits, and
      placement. The existing lightning/platformShowToastEvent remains
      unsupported on LWR."
    source:
      document: v59-winter24.pdf
      page: 210
      heading: Create and Manage Toast Notifications (Generally Available)
    confidence: high
    id: v59-lwc-009
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: LWC components compiled at API >= 59.0; Salesforce-authored
      components change immediately org-wide
    summary: LWC CSS scope tokens switch from readable component-name format
      (c-cmp_cmp) to obfuscated hash strings (lwc-hashstring). Any code querying
      or relying on these internal token values will break.
    detail: Custom components only see the change when upgraded to v59.0, but
      Salesforce-authored components (record pages, list views, base Lightning
      components) change immediately for all orgs. Code that queries DOM
      elements using scope tokens or relies on the internal structure of
      components you do not own is at risk.
    upgradeAction: Audit code for any template.querySelector() calls or CSS
      selectors that target scope token attributes. Replace with stable public
      APIs or data attributes you control. Test thoroughly before bumping
      component API versions past 59.0.
    source:
      document: v59-winter24.pdf
      page: 211
      heading: CSS Scope Tokens Are Generated with Obfuscated Strings
    confidence: high
    id: v59-lwc-010
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: LWC components at API version >= 59.0
    summary: HTML template validation now treats syntax errors as blocking failures
      rather than warnings. Components with malformed HTML (such as extra
      closing template tags) cannot be deployed until fixed.
    upgradeAction: Before upgrading components to v59+, run a local build or VS Code
      validation pass to surface any HTML errors that were previously tolerated
      as warnings, and correct them.
    source:
      document: v59-winter24.pdf
      page: 212
      heading: Fix Invalid HTML Usage to Avoid Component Errors
    confidence: high
    id: v59-lwc-011
  - apiVersion: "59.0"
    release: Winter '24
    changeType: removed
    impact: breaking
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Internet Explorer 11 and other legacy browsers can no longer render
      Lightning Experience or custom Lightning components after Winter '24. Any
      polyfills or browser-detection code supporting IE11 is now dead code.
    upgradeAction: Remove IE11-specific polyfills, shims, and browser-detection
      logic from LWC and Aura components. Verify that all users access Lightning
      Experience via a supported modern browser.
    source:
      document: v59-winter24.pdf
      page: 212
      heading: Access Lightning Experience Only with Supported Browsers
    confidence: high
    id: v59-lwc-012
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - Any
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: JavaScript loaded from static resources in LWR Experience Cloud sites
      now executes under Lightning Web Security restrictions, which may break
      code relying on DOM access patterns or APIs that LWS blocks.
    upgradeAction: Test all static resource JavaScript used in LWR sites for LWS
      compatibility; refactor any code using eval, document.cookie access, or
      other LWS-restricted patterns.
    source:
      document: v59-winter24.pdf
      page: 213
      heading: LWS Protects Static Resources in LWR Sites in Experience Cloud
    confidence: high
    id: v59-lwc-013
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: LWC components registered via CustomElementConstructor with native
      shadow DOM now preserve slotted content in top-level elements during
      rendering, whereas previously that content was removed.
    upgradeAction: Review any custom native shadow components using
      CustomElementConstructor for unintended visual or behavioral side effects
      from retained slot content that was previously cleared.
    source:
      document: v59-winter24.pdf
      page: 214
      heading: Render Top-Level Slotted Content in Custom Native Shadow Components
    confidence: high
    id: v59-lwc-014
  - apiVersion: "59.0"
    release: Winter '24
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (opt-in org setting)
    summary: A new org setting lets Lightning apps embedded in third-party contexts
      (Lightning Out, Outlook integration) authenticate via session token
      instead of cookies, bypassing browser third-party cookie restrictions.
    detail: When enabled, hard-coded URLs to authenticated org resources will fail.
      Components must use $Resource/$ContentAsset (Aura) or
      @salesforce/resourceUrl and @salesforce/contentAssetUrl imports (LWC) to
      reference static resources and content assets.
    upgradeAction: Before enabling the setting, audit Lightning Out and embedded
      Lightning apps for hard-coded authenticated resource URLs and refactor
      them to use platform resource imports.
    source:
      document: v59-winter24.pdf
      page: 214
      heading: Use a Session Token Instead of a Cookie for Lightning Apps on
        Third-Party Sites
    confidence: high
    id: v59-lwc-015
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Each Lightning app now receives its own unique CSRF token, and the
      platform rejects tokens used outside their originating app context.
      Invalid or expired tokens are also handled more strictly.
    upgradeAction: Test any custom code that stores or passes CSRF tokens between
      contexts. Verify that integrations relying on token reuse across apps
      still function after the enforcement date.
    source:
      document: v59-winter24.pdf
      page: 215
      heading: Security Enhancements for CSRF Tokens for Lightning Apps (Release Update)
    confidence: high
    id: v59-lwc-016
  - apiVersion: "59.0"
    release: Winter '24
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; full retirement
      scheduled May 2024
    summary: Einstein Vision and Language APIs, including OCR capabilities, are
      being retired. Integrations calling these endpoints will stop working
      after May 2024.
    upgradeAction: Identify any code calling Einstein Vision/Language or OCR APIs
      and migrate to alternative solutions before the May 2024 retirement date.
    source:
      document: v59-winter24.pdf
      page: 216
      heading: Access Einstein Optical Character Recognition (OCR) on Developer Docs
    confidence: medium
    id: v59-rest-002
  - apiVersion: "59.0"
    introducedIn: "56.0"
    release: Winter '24
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced Spring '24)
    summary: Visualforce JavaScript Remoting now validates the @JsonAccess
      annotation on Apex classes, blocking serialization and deserialization of
      objects that lack proper cross-namespace access declarations.
    detail: This Release Update first appeared in Winter '23 and was originally
      scheduled for Winter '24 enforcement, but Salesforce postponed it to
      Spring '24. Once enforced, any Visualforce Remoting call that attempts to
      serialize or deserialize an Apex class without appropriate @JsonAccess
      annotation settings for the caller's namespace will fail.
    upgradeAction: Audit Apex classes used with Visualforce Remoting across package
      namespaces and add @JsonAccess(serializable='always'
      deserializable='always') or appropriate scope values before the Spring '24
      enforcement date. Test remoting calls from managed packages to ensure
      serialization still works.
    source:
      document: v59-winter24.pdf
      page: 218
      heading: Enable JsonAccess Annotation Validation for the Visualforce JavaScript
        Remoting API (Release Update)
    confidence: high
    id: v59-vf-001
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
      - AuraDefinitionBundle
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: The sforce.one navigateToURL function no longer auto-closes modals by
      default; instead modals stack when isredirect is false, leaving the
      original modal open but inactive beneath new navigation targets.
    upgradeAction: Review quick-action components and Visualforce pages that call
      navigateToURL from modals; pass isredirect=true if you need the modal to
      close automatically upon navigation.
    source:
      document: v59-winter24.pdf
      page: 218
      heading: Navigation Change for Modal Windows
    confidence: high
    id: v59-vf-002
  - apiVersion: "59.0"
    release: Winter '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Developers can now configure a custom maximum stack depth for chained
      Queueable jobs using the new System.enqueueJob() overload with
      AsyncOptions, plus query current/max depths via System.AsyncInfo methods.
      This GA feature helps prevent runaway recursive jobs from exhausting daily
      async limits.
    source:
      document: v59-winter24.pdf
      page: 221
      heading: Set the Maximum Depth of Chained Queueable Jobs (Generally Available)
    confidence: high
    id: v59-apex-001
  - apiVersion: "59.0"
    release: Winter '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: New QueueableDuplicateSignature class and
      AsyncOptions.DuplicateSignature property let you prevent duplicate
      Queueable jobs from being enqueued by defining a signature; enqueueing a
      job with a matching signature throws DuplicateMessageException.
    source:
      document: v59-winter24.pdf
      page: 223
      heading: Ensure that Duplicate Queueable Jobs Aren't Enqueued
    confidence: high
    id: v59-apex-002
  - apiVersion: "59.0"
    release: Winter '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - Any
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: DataWeave scripting is now GA in Apex, letting developers invoke
      MuleSoft DataWeave scripts as metadata for format transformations. Scripts
      run under standard Apex heap/CPU limits and can be shared across
      namespaces.
    detail: The release introduces DataWeave.createScript(namespace, scriptName) for
      cross-namespace script invocation, auto-generated inner classes
      (DataWeaveScriptResource.ScriptName) for type-safe script references, and
      requires explicit encoding when coercing Blob inputs to strings. Scripts
      referenced via the generated class cannot be deleted while in use.
    source:
      document: v59-winter24.pdf
      page: 223
      heading: Use DataWeave in Apex to Enable Data Transformation to Different
        Formats (Generally Available)
    confidence: high
    id: v59-apex-003
  - apiVersion: "59.0"
    release: Winter '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Apex List.sort() now accepts a Comparator<T> interface parameter,
      enabling custom sort orders. A new Collator class supports
      locale-sensitive string comparisons via getInstance().
    detail: Developers can implement System.Comparator<T>.compare() to define
      arbitrary ordering logic for list sorting. The Collator class provides
      locale-aware sorting but produces user-dependent results, so avoid it in
      triggers or code requiring deterministic ordering.
    source:
      document: v59-winter24.pdf
      page: 224
      heading: Use the Comparator Interface and Collator Class for Sorting
    confidence: high
    id: v59-apex-004
  - apiVersion: "59.0"
    release: Winter '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Apex for-each loops now accept Iterable<T> variables directly, allowing
      iteration over any type implementing the Iterable interface rather than
      requiring a concrete List or Set.
    source:
      document: v59-winter24.pdf
      page: 227
      heading: Iterate Within For Loops More Easily with Iterable
    confidence: high
    id: v59-apex-005
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: When deserializing Apex objects, the runtime now honors the API version
      of the class that originally serialized the data, rather than the current
      class version. This ensures consistent behavior between serialization and
      deserialization across version boundaries.
    upgradeAction: Review any code that serializes objects in one context and
      deserializes in another where API versions may differ. Test cross-version
      serialization scenarios to confirm expected behavior.
    source:
      document: v59-winter24.pdf
      page: 227
      heading: Other Improvements in Apex Compiler Messages, Setup, and Processing
    confidence: medium
    id: v59-apex-006
  - apiVersion: "59.0"
    release: Winter '24
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Apex REST responses now validate header names against RFC 7230 rules,
      rejecting characters like slashes that were previously allowed. Code using
      RestResponse.addHeader with non-compliant header names throws
      InvalidHeaderException at runtime.
    detail: This release update was introduced in Spring '23 and enforced in Spring
      '24. Once active, all orgs receive this validation regardless of component
      API version.
    upgradeAction: Execute Apex tests and invoke REST API classes to detect
      InvalidHeaderException failures. Audit any addHeader calls for RFC 7230
      compliance, especially header names containing slashes or other special
      characters. Verify installed packages are compatible before activation.
    source:
      document: v59-winter24.pdf
      page: 228
      heading: Enforce RFC 7230 Validation for Apex RestResponse Headers (Release
        Update)
    confidence: high
    id: v59-apex-007
  - apiVersion: "59.0"
    release: Winter '24
    changeType: deprecated
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-runtime
    appliesWhen: Apex classes and triggers compiled at API >= 59.0
    summary: The URL.getSalesforceBaseUrl() method no longer compiles when a class
      targets API version 59.0 or higher. Developers must migrate to
      getOrgDomainUrl() or getCurrentRequestUrl() before upgrading.
    upgradeAction: Search your codebase for getSalesforceBaseUrl() calls and replace
      them with getOrgDomainUrl() (for org domain) or getCurrentRequestUrl()
      (for full request URL) before bumping any class past v58.0.
    source:
      document: v59-winter24.pdf
      page: 228
      heading: getSalesforceBaseUrl() Method Is Being Deprecated
    confidence: high
    id: v59-apex-008
  - apiVersion: "59.0"
    release: Winter '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Connected apps can now issue JWT-based access tokens for REST API
      authentication, providing an alternative to opaque OAuth tokens.
    detail: This GA feature allows connected apps to generate JSON Web Tokens for
