    summary: The Stub API for building mocking frameworks in Apex tests is now GA,
      allowing runtime generation of stub objects via System.StubProvider and
      System.Test.createStub(). The GA version removes the pilot's zero-arg
      constructor requirement and adds exception mocking support.
    source:
      document: v39-spring17.pdf
      page: 450
      heading: Apex Stub API Is Now Generally Available
