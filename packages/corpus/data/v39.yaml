  - apiVersion: "39.0"
    release: Spring '17
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Any
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: Picklist value labels and API names are now independent; changing a
      label no longer alters the API name used by Apex, integrations, and data
      operations.
    detail: Previously, modifying a picklist label would also change its API name,
      potentially breaking Apex code, validation rules, formulas, and
      integrations referencing the old API name. Now API names remain stable
      unless explicitly edited. Admins can lock API name editing via Picklist
      Settings.
    upgradeAction: Review any code or integrations that assumed label changes would
      propagate to API names. Confirm existing API name references remain valid
      after label edits.
    source:
      document: v39-spring17.pdf
      page: 402
      heading: Value Labels Are No Longer Tied to API Names
    confidence: high
    id: v39-packaging-001
  - apiVersion: "39.0"
    release: Spring '17
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Standard and global value sets can now be queried and managed via the
      Tooling API through the new StandardValueSet object, providing
      programmatic access to standard picklist field values.
    source:
      document: v39-spring17.pdf
      page: 402
      heading: Access Picklists with the Tooling API
    confidence: medium
    id: v39-rest-002
  - apiVersion: "39.0"
    release: Spring '17
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: The OAuth 2.0 Asset Token flow becomes GA, enabling JWT-based
      authentication for IoT devices. A new Asset Token Event object replaces
      the pilot's Asset Token object for event data storage.
    detail: This flow lets connected devices obtain signed JWTs that identify them
      to backend services and link device data to Salesforce CRM records.
      Implementations using the pilot Asset Token object must migrate to the new
      Asset Token Event object introduced in API version 39.0.
    source:
      document: v39-spring17.pdf
      page: 413
      heading: OAuth 2.0 Asset Token Flow for Securing Connected Devices (Generally
        Available)
    confidence: medium
    id: v39-auth-001
  - apiVersion: "39.0"
    release: Spring '17
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Custom authentication providers now require the AuthProviderPluginClass
      abstract class instead of the AuthProviderPlugin interface for new
      implementations or to access new capabilities like custom error handling
      and refresh token support via named credentials.
    detail: The original AuthProviderPlugin interface continues to work, but new
      features (custom exception handling with redirects, refresh tokens through
      named credentials) are only available through the replacement
      AuthProviderPluginClass abstract class.
    upgradeAction: If extending custom auth provider functionality, migrate from
      AuthProviderPlugin interface to AuthProviderPluginClass abstract class.
      Existing implementations remain functional but cannot leverage new
      error-handling or refresh-token features.
    source:
      document: v39-spring17.pdf
      page: 418
      heading: Customize Your Custom Authentication Provider
    confidence: high
    id: v39-auth-002
  - apiVersion: "39.0"
    release: Spring '17
    changeType: deprecated
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; UI Tracking stops
      receiving data in Summer '17 and is fully removed in Winter '18
    summary: "The UI Tracking event type in Event Monitoring is being phased out: it
      coexists with new Lightning Experience event types in Spring '17, stops
      populating in Summer '17, and disappears entirely in Winter '18."
    detail: Integrations pulling event log files via the REST API must migrate to
      the replacement Lightning Experience event types before Summer '17 to
      avoid data gaps.
    upgradeAction: Update any custom integrations or database pipelines that query
      the UI Tracking event type to use the new Lightning Experience event types
      before Summer '17.
    source:
      document: v39-spring17.pdf
      page: 425
      heading: Prepare Your Org for UI Tracking Event Type Retirement
    confidence: high
    id: v39-rest-003
  - apiVersion: "39.0"
    release: Spring '17
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: Lightning components now fail to load entirely when referencing events
      they lack permission to access, whereas previously only client-side checks
      ran and produced partially working components.
    detail: Server-side access validation has been added for event references.
      Components that previously functioned partially despite access violations
      will now fail completely at load time. Debug mode surfaces a popup error
      for server-side failures.
    upgradeAction: Review all component event references to ensure the access system
      attribute grants appropriate visibility. Test component loading in debug
      mode to catch any newly-surfaced access failures before deploying.
    source:
      document: v39-spring17.pdf
      page: 431
      heading: Server-Side Access Checks for Events
    confidence: high
    id: v39-aura-003
  - apiVersion: "39.0"
    release: Spring '17
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (auto-activated Summer '17)
    summary: LockerService enforces namespace isolation and restricts Lightning
      components to supported APIs only, blocking access to internal framework
      methods and DOM outside the component's namespace.
    detail: This critical update was optional in Spring '17 but becomes mandatory in
      Summer '17. It affects Lightning Experience, Salesforce1, template-based
      Communities, and standalone apps. Lightning Out enforces LockerService
      except for CSP restrictions. Components relying on undocumented framework
      internals or cross-namespace DOM access will break.
    upgradeAction: Before Summer '17, activate LockerService in sandbox and test all
      custom Lightning components for failures caused by blocked DOM access or
      calls to non-public framework APIs.
    source:
      document: v39-spring17.pdf
      page: 432
      heading: New Lightning LockerService Informational Setup Page
    confidence: high
    id: v39-lwc-002
  - apiVersion: "39.0"
    release: Spring '17
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - AuraDefinitionBundle
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide when LockerService critical update is activated (enforced
      for all orgs in Summer '17)
    summary: LockerService now blocks unsafe-inline and unsafe-eval in CSP for
      script-src, meaning any Lightning component code using eval() or inline
      JavaScript execution will fail.
    detail: Third-party libraries relying on these patterns must be updated to
      compliant versions. During Spring '17, this enforcement applies only in
      sandboxes and Developer Edition orgs, but becomes mandatory for all orgs
      in Summer '17.
    upgradeAction: Audit Lightning components and third-party libraries for eval()
      calls and inline script execution; replace with CSP-compliant alternatives
      before Summer '17 enforcement.
    source:
      document: v39-spring17.pdf
      page: 433
      heading: LockerService Has Stricter Content Security Policy
    confidence: high
    id: v39-lwc-003
  - apiVersion: "39.0"
    release: Spring '17
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Lightning components can now make XHR calls and load resources from
      external servers by registering them as CSP Trusted Sites, which adds the
      URL to multiple CSP header directives (connect-src, frame-src, img-src,
      etc.).
    detail: JavaScript files cannot be loaded directly from third-party sites even
      when trusted; they must be uploaded as static resources. This mechanism is
      separate from Remote Sites, which govern Visualforce and Apex callouts.
    source:
      document: v39-spring17.pdf
      page: 434
      heading: Create CSP Trusted Sites to Access Third-Party APIs
    confidence: high
    id: v39-lwc-004
  - apiVersion: "39.0"
    release: Spring '17
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - AuraDefinitionBundle
      - VisualforcePage
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version (requires Communities enabled)
    summary: The ltng:allowGuestAccess interface enables Lightning Out apps to be
      served to unauthenticated users, but bypasses object-level and field-level
      security checks configured on the guest user profile—developers must
      manually enforce CRUD and FLS in Apex controllers or risk exposing org
      data publicly.
    detail: When a Lightning app implements this interface, it becomes accessible
      through every community endpoint in the org with no way to restrict by
      community. The framework does not automatically enforce CRUD/FLS for guest
      access contexts, so any Apex controller returning records must explicitly
      check permissions.
    upgradeAction: Audit all Apex controllers used by guest-accessible Lightning
      apps for explicit CRUD and FLS enforcement before deploying; treat any
      component reachable via ltng:allowGuestAccess as public-facing.
    source:
      document: v39-spring17.pdf
      page: 437
      heading: Share Lightning Apps with Non-Authenticated Users
    confidence: high
    id: v39-sharing-001
  - apiVersion: "39.0"
