      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: The instanceof operator now works correctly in Lightning component
      JavaScript when LockerService is enabled, removing a previous framework
      limitation that made type checking unreliable.
    source:
      document: v39-spring17.pdf
      page: 442
      heading: Removed LockerService Restriction on instanceof in JavaScript
    confidence: high
    id: v39-lwc-005
