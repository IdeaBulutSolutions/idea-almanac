  - apiVersion: "39.0"
    release: Spring '17
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: The new ltng:allowGuestAccess interface lets Lightning apps run for
      unauthenticated community visitors, but critically bypasses
      object/field-level security configured for the guest user
      profile—developers must manually enforce CRUD and FLS in Apex controllers.
    detail: Adding this interface exposes the app across all communities in the org
      without granular control. Because the framework does not automatically
      respect CRUD/FLS, any data access in the app's Apex controllers is wide
      open unless explicitly secured.
    upgradeAction: Audit all Apex controllers used by guest-accessible apps and add
      explicit CRUD/FLS checks; review which communities expose the app URL.
    source:
      document: v39-spring17.pdf
      page: 316
      heading: Access Lightning Apps in Public Communities
    confidence: high
    id: v39-aura-002
