    summary: The Sfc namespace with ContentDownloadHandlerFactory,
      ContentDownloadHandler, and ContentDownloadContext is now GA, enabling
      Apex callbacks to intercept and control file downloads for IRM, antivirus
      scanning, or profile-based blocking.
    detail: This feature was piloted in Summer '16 and reaches GA in Spring '17 with
      expanded support for multi-file downloads, content packs, and content
      distributions via a new List<ID> signature.
    source:
      document: v39-spring17.pdf
      page: 341
      heading: Use Apex to Customize File Downloads
    confidence: high
    id: v39-apex-004
