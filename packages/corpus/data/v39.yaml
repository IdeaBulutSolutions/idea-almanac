  - apiVersion: "39.0"
    release: Spring '17
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (auto-activated June 11, 2017)
    summary: Enabling CSRF protection on GET requests for Visualforce pages breaks
      direct URL navigation and plain HTML anchor links; pages must be linked
      via URLFOR(), $Page global, apex:outputLink, or PageReference returns from
      Apex controllers.
    detail: Once the critical update activates and you opt a page into GET-request
      CSRF checks, any navigation that does not carry a CSRF token fails. Apex
      controller methods returning bare URL strings for redirects also break;
      they must return PageReference objects so the framework appends the token
      automatically.
    upgradeAction: Before the enforcement date, audit Visualforce pages with
      'Require CSRF Protection on GET requests' enabled. Replace plain <a
      href="/apex/…"> links with apex:outputLink or $Page references, and
      convert Apex redirect methods from String returns to PageReference
      returns.
    source:
      document: v39-spring17.pdf
      page: 447
      heading: Allow CSRF Protection on GET Requests to Visualforce Pages (Critical
        Update)
    confidence: high
    id: v39-vf-007
  - apiVersion: "39.0"
    release: Spring '17
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
      - ApexClass
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce reordered URL parameters in Visualforce page URLs, causing
      action overrides to fail if the retURL parameter value is not properly
      encoded.
    detail: When Visualforce pages override standard actions (create, save, edit,
      delete), the platform now places URL parameters like retURL and record ID
      in a different order. Code that constructs these URLs without encoding the
      retURL value will trigger validation errors.
    upgradeAction: Audit Visualforce pages and Apex controllers that build URLs with
      retURL parameters. Wrap retURL values with URLENCODE() in Visualforce
      markup or EncodingUtil.urlEncode() in Apex.
    source:
      document: v39-spring17.pdf
      page: 448
      heading: New Order of Visualforce URL Parameters Affects Overrides
    confidence: high
    id: v39-vf-008
