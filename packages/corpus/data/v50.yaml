  - apiVersion: "50.0"
    release: Winter '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; old endpoint retired
      February 15, 2021
    summary: The Create Transcript REST API endpoint relocates the participant ID
      from the URI path into the request body. The legacy URI containing
      participantId in the path stops working after February 15, 2021.
    detail: Integrations calling
      /telephony/v1/voiceCalls/{voiceCallId}/participants/{participantId}/messages
      must switch to /telephony/v1/voiceCalls/{voiceCallId}/messages and include
      participantId as a field in the JSON payload instead.
    upgradeAction: Update any Service Cloud Voice integrations to use the new URI
      structure and move the participantId into the request body before February
      15, 2021.
    source:
      document: v50-winter21.pdf
      page: 147
      heading: Stay Secure with the Revised Telephony Integration REST API
    confidence: high
    id: v50-rest-002
  - apiVersion: "50.0"
    release: Winter '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: The Telephony Integration REST API for creating transcripts changed its
      URI structure and payload format by relocating the participant ID from the
      URL path into the request body.
    detail: The old URI pattern
      /telephony/v1/voiceCalls/{voiceCallId}/participants/{participantId}/messages
      is replaced with /telephony/v1/voiceCalls/{voiceCallId}/messages, and the
      participantId must now be included in the JSON payload. Both versions
      function during Winter '21 but the legacy endpoint will be removed
      February 15, 2021.
    upgradeAction: Update any code calling the Create Transcript REST API to use the
      new URI format and include participantId in the request body before
      February 15, 2021.
    source:
      document: v50-winter21.pdf
      page: 134
      heading: Service Setup
    confidence: high
    id: v50-rest-003
  - apiVersion: "50.0"
    release: Winter '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
      - Flow
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version (enforced Summer '22)
    summary: When an order product insert or update modifies the parent Order
      record, Salesforce now fires validation rules, Apex triggers, workflow
      rules, and flows on both the Order and OrderProduct objects. Previously
      these customizations were skipped in this cascade scenario.
    detail: This release update can be enabled via test run in Winter '21 and
      becomes mandatory in Summer '22. Packages built before Winter '21 may not
      support the new behavior; ISVs must verify compatibility before customers
      enable it.
    upgradeAction: Review Apex triggers and flows on Order/OrderProduct for
      unintended re-execution or recursion when order products cause parent
      order changes. Test with the release update enabled before Summer '22
      enforcement.
    source:
      document: v50-winter21.pdf
      page: 212
      heading: Orders
    confidence: high
    id: v50-apex-001
  - apiVersion: "50.0"
    release: Winter '21
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; enforcement scheduled
      Summer '21
    summary: Original Territory Management will be fully retired in Summer '21,
      rendering its associated API objects and data inaccessible. Integrations
      querying or writing to territory management objects will fail after
      retirement.
    detail: This announcement in Winter '21 provides advance notice. After Summer
      '21 enforcement, any code referencing original territory management
      objects (Territory, UserTerritory, AccountTerritoryAssignmentRule, etc.)
      will lose access. Organizations must migrate to Enterprise Territory
      Management before retirement.
    upgradeAction: Audit integrations and Apex code for references to original
      Territory Management objects. Migrate to Enterprise Territory Management
      APIs and update any dependent ETL jobs or middleware before Summer '21.
    source:
      document: v50-winter21.pdf
      page: 213
      heading: Original Territory Management Is Being Retired
    confidence: high
    id: v50-rest-004
  - apiVersion: "50.0"
    release: Winter '21
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; enforcement in second
      half of 2021
    summary: Microsoft is retiring Basic Authentication for Office 365 and Exchange
      Online, which will break Lightning Sync for customers using service
      account connections that rely on this auth method.
    detail: Organizations using Lightning Sync with a service account connection to
      Office 365/Exchange Online must migrate to OAuth 2.0 or switch to Einstein
      Activity Capture before Microsoft's enforcement date. On-premise Exchange
      2013/2016 servers and existing OAuth 2.0 connections are unaffected.
    upgradeAction: Verify with your Microsoft admin whether your Lightning Sync
      setup uses Basic Authentication via service accounts. If so, reconfigure
      to use OAuth 2.0 connection method or migrate to Einstein Activity Capture
      before the retirement date.
    source:
      document: v50-winter21.pdf
      page: 237
      heading: Required Setting Changes for Some Microsoft Office 365 Customers
    confidence: medium
    id: v50-auth-003
  - apiVersion: "50.0"
    introducedIn: "48.0"
    release: Winter '21
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: other
    appliesWhen: org-wide regardless of component API version
    summary: "Salesforce for Outlook retirement proceeds in two phases: the side
      panel action menu (including the ability to create Salesforce records from
      Outlook) retires June 2021, with full product retirement following in June
      2023."
    detail: The side panel's new-records button will stop working after June 2021,
      eliminating the ability to create Salesforce records directly from Outlook
      via this integration. All remaining Salesforce for Outlook functionality
      ends June 2023. Organizations relying on this integration for syncing or
      record creation must migrate to Outlook Integration or Einstein Activity
      Capture.
    upgradeAction: Plan migration to Outlook Integration or Einstein Activity
      Capture before June 2021 if you depend on creating Salesforce records from
      Outlook, or before June 2023 for remaining features. Review the official
      migration guide for transition steps.
    source:
      document: v50-winter21.pdf
      page: 238
      heading: Salesforce for Outlook Retirement Rescheduled
    confidence: high
    id: v50-other-001
  - apiVersion: "50.0"
    release: Winter '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Any
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version (retirement targeted
      Spring '21)
    summary: Legacy folder sharing for reports and dashboards is being retired and
      replaced by enhanced folder sharing, which resets all users to view-only
      access on folders and requires reassigning new user permissions to restore
      editor access.
    detail: When enhanced folder sharing is enabled, users lose any existing editor
      access to report/dashboard folders and receive only view access. Hidden
      folders become invisible except to users with specific permissions. Admins
      must assign new user permissions (e.g., Create and Customize Dashboards,
      Manage Dashboards in Public Folders) and then explicitly grant
      folder-level edit or manage access to restore previous collaboration
      capabilities.
    upgradeAction: Before the Spring '21 retirement, audit current folder access
      levels and document which users need edit/manage access. After enabling
      enhanced folder sharing, assign the new user permissions and reconfigure
      folder-level sharing to restore collaboration workflows.
    source:
      document: v50-winter21.pdf
      page: 311
      heading: Enable Enhanced Folder Sharing (Update)
    confidence: high
    id: v50-sharing-001
  - apiVersion: "50.0"
    release: Winter '21
    changeType: changed
    impact: additive
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: Aura components in Communities can now implement
      lightning:hasPageReference for action overrides and pass default field
      values through lightning:navigation, enabling pre-populated record
      creation flows that previously failed silently.
    source:
      document: v50-winter21.pdf
      page: 406
      heading: Communities Now Support lightning:hasPageReference and Default Field
        Values in lightning:navigation
    confidence: high
    id: v50-aura-001
  - apiVersion: "50.0"
    release: Winter '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version
    summary: Guest users are now permanently restricted to private org-wide
      defaults. Apex managed sharing, manual sharing, and adding guest users to
      groups or queues no longer grants them record access.
    detail: Previously the 'Secure guest user record access' setting could be
      toggled off. From Winter '21 onward it is permanently enabled in all
      community/site orgs. Any code that relied on Apex managed sharing or group
      membership to share records with guest users will stop working.
    upgradeAction: Audit Apex code that uses UserRecordAccess, Share objects, or
      managed sharing for guest users. Replace with explicit guest user sharing
      rules configured declaratively.
    source:
      document: v50-winter21.pdf
      page: 407
      heading: Secure Guest User Record Access Can't Be Disabled
    confidence: high
    id: v50-sharing-002
  - apiVersion: "50.0"
    introducedIn: "49.0"
    release: Winter '21
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: A new ignoreEditPermissionForRendering attribute on <apex:inputField>
      lets Visualforce pages bypass entity edit permissions, primarily for guest
      user scenarios. It requires a custom controller running in without sharing
      mode.
    detail: This attribute was introduced in Winter '21 and back-ported to Summer
      '20 (API 49.0). When enabled, field-level security edit checks and entity
      permissions are bypassed for the input field, so developers must implement
      their own validation logic in the Apex controller to prevent unintended
      data exposure.
    source:
      document: v50-winter21.pdf
      page: 410
      heading: Override Entity Permissions When Using <apex:inputField>
    confidence: high
    id: v50-vf-002
  - apiVersion: "50.0"
    release: Winter '21
    changeType: removed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Connect REST API no longer generates Adobe Flash renditions for files;
      integrations consuming Flash-based previews must switch to SVG renditions.
    upgradeAction: Update any code that requests or depends on Flash file renditions
      to use SVG renditions instead before upgrading to Winter '21.
    source:
      document: v50-winter21.pdf
      page: 421
      heading: Switch Your File Rendition in Connect REST API
    confidence: high
    id: v50-rest-005
  - apiVersion: "50.0"
    release: Winter '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Flow
      - ApexClass
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; enforced Spring '21
      for existing orgs, Winter '21 for new orgs
    summary: The Send Custom Notification action now requires the Send Custom
      Notifications user permission when invoked from user-context flows, REST
      API calls, or Apex callouts. Without the permission, these calls error out
      instead of sending notifications.
    detail: This release update adds permission enforcement to the Send Custom
      Notification action. Flows running in user context, direct REST API calls,
      and Apex code invoking the notification API will fail if the running user
      lacks the new permission. System-context flows and processes remain
      unaffected since they bypass user permission checks.
    upgradeAction: Audit flows, REST integrations, and Apex code that trigger custom
      notifications. Ensure running users have the Send Custom Notifications
      permission, or convert user-context flows to system context if permission
      assignment is impractical.
    source:
      document: v50-winter21.pdf
      page: 431
      heading: Require User Permission for the Send Custom Notification Action (Update)
    confidence: high
    id: v50-rest-006
  - apiVersion: "50.0"
    release: Winter '21
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Flow
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: The Send Custom Notification action now accepts a Target Page Reference
      field alongside Target ID, enabling navigation to any
      PageReference-compatible destination (Lightning apps, external URLs) via
      Flow or REST API.
    source:
      document: v50-winter21.pdf
      page: 432
      heading: Send Your Custom Notification Recipients to New Places with Page
        Reference Navigation
    confidence: high
    id: v50-rest-007
  - apiVersion: "50.0"
    release: Winter '21
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Record-triggered flows can now execute before a record is deleted,
      eliminating the need for Apex before-delete triggers in many scenarios.
    detail: "The $Record global variable provides access to the record being
      deleted. Limitations: undelete operations do not trigger flows, and
      addError() is unsupported in invocable actions called from these flows."
    source:
      document: v50-winter21.pdf
      page: 441
      heading: Trigger a Flow to Run Before a Record Is Deleted
    confidence: high
    id: v50-flow-001
  - apiVersion: "50.0"
    release: Winter '21
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: components compiled at API >= 50.0
    summary: Flows and processes now support per-component API versioning for
      runtime behavior, letting developers adopt behavioral changes on their own
      schedule by setting each flow's API version rather than waiting for
      org-wide release updates.
    detail: Runtime improvements that previously required org-wide release update
      adoption can now be delivered as versioned updates. Each flow or process
      retains its API version at creation time until manually changed, giving
      control over when behavioral changes take effect. When a release update is
      enforced, it overrides component-level versioning.
    source:
      document: v50-winter21.pdf
      page: 455
      heading: Adopt Run-Time Behavior Changes for Individual Flows and Processes at
        Your Convenience
    confidence: high
    id: v50-flow-002
  - apiVersion: "50.0"
    release: Winter '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Flow
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version
    summary: External users (community, portal, guest) lose their previously
      implicit read access to Recommendation object records. Flows serving
      recommendations to these users must now be explicitly configured to run in
      system context without sharing.
    upgradeAction: Identify flows that retrieve Recommendation records for external
      users and reconfigure them to run in system context without sharing. Audit
      these flows to ensure they expose only appropriate records, since
      system-context execution bypasses all user permissions.
    source:
      document: v50-winter21.pdf
      page: 457
      heading: Run Flows in System Context Without Sharing to Access the
        Recommendation Object for External Users
    confidence: high
    id: v50-sharing-003
  - apiVersion: "50.0"
    release: Winter '21
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: LWC flow screen components can now use generic sObject and sObject[]
      types via propertyType declarations, enabling a single component to
      operate on any object type rather than requiring separate components per
      object.
    source:
      document: v50-winter21.pdf
      page: 458
      heading: Create Flow Screen Components That Work for Multiple Objects (Generally
        Available)
    confidence: high
    id: v50-lwc-001
  - apiVersion: "50.0"
    release: Winter '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced Winter '22)
    summary: Autolaunched flows with time-based Pause elements now retain their
      original execution context and user permissions upon resuming, instead of
      switching to system context without sharing.
    detail: Previously, when an autolaunched flow paused and resumed via a
      time-based event, it would run in system context without sharing
      regardless of its original context. After enabling this update, flows
      maintain their pre-pause context and permissions. This means flows running
      in user context will continue enforcing user permissions after resuming,
      potentially causing failures if the user lacks required access.
    upgradeAction: Audit autolaunched flows containing Pause elements with
      time-based resume. Verify running users have permissions for all
      post-Pause elements, or explicitly configure flows to run in system
      context if elevated access is intended.
    source:
      document: v50-winter21.pdf
      page: 463
      heading: Make Paused Flow Interviews Resume in the Same Context with the Same
        User Access (Update)
    confidence: high
    id: v50-flow-003
  - apiVersion: "50.0"
    release: Winter '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (enforced Winter '22)
    summary: Process Builder processes using multiple criteria with record updates
      will evaluate the original field value when that field initially contained
      null, potentially altering which criteria branches execute.
    detail: Originally released Summer '19, postponed from Summer '20 to Winter '21,
      then again to Winter '22. Affects processes that use the 'execute actions
      only when specified changes are made' option or the ISCHANGED() function
      in criteria evaluation.
    upgradeAction: Review Process Builder processes that check for field changes or
      use ISCHANGED() where the triggering field could start as null. Test these
      processes before enforcement to confirm criteria still evaluate as
      expected.
    source:
      document: v50-winter21.pdf
      page: 463
      heading: Evaluate Criteria Based on Original Record Values in Process Builder
        (Update, Postponed)
    confidence: high
    id: v50-flow-004
  - apiVersion: "50.0"
    introducedIn: "47.0"
    release: Winter '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced Spring '21)
    summary: "Bulk REST API calls to invocable actions switch to partial-save
      semantics: individual action failures no longer roll back the entire
      transaction. Only the failing actions roll back while successful ones
      commit after up to three retry attempts."
    detail: This Release Update was introduced in Winter '20 (API 47.0) and
      enforcement has been postponed multiple times, now scheduled for Spring
      '21. Partial save does not apply to certain action types including
      Invocable Apex and External Services. Because Salesforce retries actions
      up to three times, external callouts may execute multiple times and
      transactions may take longer, potentially hitting governor limits sooner.
    upgradeAction: Audit REST integrations invoking actions in bulk to handle
      partial success responses correctly. Ensure external callout logic is
      idempotent since retries may cause duplicate calls. Test that error
      handling accommodates mixed success/failure results rather than
      all-or-nothing rollback.
    source:
      document: v50-winter21.pdf
      page: 464
      heading: Enable Partial Save for Invocable Actions (Update, Postponed)
    confidence: high
    id: v50-rest-008
  - apiVersion: "50.0"
    introducedIn: "48.0"
    release: Winter '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced Spring '21)
    summary: Flows now enforce access modifiers on legacy Apex actions
      (Process.Plugin implementations). Public legacy Apex actions from managed
      packages will cause flows to fail at runtime, and global actions with
      public describe/invoke methods become inaccessible across namespaces.
    detail: This Release Update was introduced in Spring '20 (v48.0) and postponed
      multiple times before enforcement in Spring '21. It closes a loophole
      where flows could invoke public legacy Apex actions despite those access
      modifiers being intended to restrict visibility. Only affects legacy
      Process.Plugin implementations, not InvocableMethod-annotated classes.
    upgradeAction: Audit flows that invoke legacy Apex actions from managed
      packages. Test all flow paths containing legacy Apex action elements
      before enforcement. If a public legacy action is critical, contact the
      package developer to either make it global or rebuild using
      @InvocableMethod.
    source:
      document: v50-winter21.pdf
      page: 466
      heading: Make Flows Respect Access Modifiers for Legacy Apex Actions (Update,
        Postponed)
    confidence: high
    id: v50-flow-005
  - apiVersion: "50.0"
    introducedIn: "45.0"
    release: Winter '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced Spring '21)
    summary: Flow and Process Builder formulas that reference null record variables
      or null lookup relationship fields now consistently return null instead of
      sometimes throwing unhandled exceptions.
    detail: This Release Update, originally introduced in Spring '19, standardizes
      formula evaluation behavior. Previously, formulas like
      [Account].Parent.Name would intermittently throw exceptions when the
      lookup field was null; after enforcement, they reliably return null. This
      affects criteria evaluations in processes and formula resources in flows.
      The update was postponed multiple times and is enforced Spring '21.
    upgradeAction: Test all Process Builder criteria and Flow formulas that traverse
      lookup relationships. Logic depending on exception-throwing behavior for
      null lookups must be refactored to explicitly handle null return values.
    source:
      document: v50-winter21.pdf
      page: 467
      heading: Check for Null Record Variables or Null Values of Lookup Relationship
        Fields in Process and Flow Formulas (Update, Postponed)
    confidence: high
    id: v50-flow-006
  - apiVersion: "50.0"
    introducedIn: "40.0"
    release: Winter '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexTrigger
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version; requires Salesforce
      Customer Support to enable
    summary: When enabled, field updates made by processes, workflow rules, or Apex
      triggers no longer suppress automatic email notifications (such as task
      assignment or case owner change emails) that were triggered by the same
      transaction.
    detail: Originally released in Summer '17 (API 40.0) and previously scheduled
      for Spring '20 enforcement, this update is now opt-in only via Support.
      Organizations using workaround email alerts may receive duplicates after
      activation.
    upgradeAction: Before requesting activation, audit processes, workflows, and
      triggers that send supplemental notification emails as workarounds; remove
      these to prevent duplicate emails after the update takes effect.
    source:
      document: v50-winter21.pdf
      page: 468
      heading: Stop Automated Field Updates from Suppressing Email Notifications
        (Previously Released Update)
    confidence: medium
    id: v50-flow-007
  - apiVersion: "50.0"
    release: Winter '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: flows and processes configured to run at API >= 50.0
    summary: "Five runtime behavior corrections take effect for flows/processes on
      v50+: screen navigation settings are now strictly enforced, merge fields
      tolerate null record variables, ISBLANK treats empty strings as blank,
      merge fields respect running user's data access, and invalid
      global-variable references throw errors instead of rendering as literal
      text."
    detail: "Each sub-change can silently alter existing flow behavior: (1)
