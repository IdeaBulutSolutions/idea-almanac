    summary: Publishing platform events with Publish Immediately behavior no longer
      blocks subsequent Apex callouts in the same transaction. These events now
      count against a separate 150-call limit tracked via new Limits methods
      rather than the DML statement limit.
    detail: Previously, any EventBus.publish() call for Publish Immediately events
      consumed the DML limit and prevented callouts afterward. Now these
      publishes use their own governor limit (150 calls), freeing the callout
      restriction. Use Limits.getPublishImmediateDML() and
      Limits.getLimitPublishImmediateDML() to monitor usage. Publish After
      Commit events still count against DML limits.
    upgradeAction: Review Apex code that publishes Publish Immediately events; if
      you previously worked around callout restrictions (splitting transactions,
      using queueables), those workarounds may no longer be necessary. Also
      verify your code stays within the new 150-call limit if publishing many
      immediate events.
    source:
      document: v50-winter21.pdf
      page: 565
      heading: Make Apex Callouts After Publishing Platform Event Messages
    confidence: high
