    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: The Create Transcript REST API endpoint relocates the participant ID
      from the URI path into the request body for security reasons. The legacy
      URI format remains functional in Winter '21 but will be removed in a
      future release.
    upgradeAction: Update integrations calling the Create Transcript API to pass the
      participant ID in the payload instead of the URI before the old endpoint
      is retired.
    source:
      document: v50-winter21.pdf
      page: 137
      heading: Amp Up Sales Cloud with Voice
