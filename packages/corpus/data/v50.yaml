entries:
  - apiVersion: "50.0"
    release: Winter '21
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Microsoft Edge 86+ enforces SameSite=Lax as the default for cookies,
      breaking custom integrations that rely on cross-domain cookies without
      explicit SameSite attributes. HTTP connections no longer work for
      authenticated requests.
    detail: Custom integrations using cross-domain cookies (especially iframe-based)
      must explicitly set SameSite=None; Secure on their cookies. Apex
      developers can use the new SameSite attribute in the Cookie() constructor.
      All connections must use HTTPS; HTTP is blocked for authenticated
      requests.
    upgradeAction: Test all custom integrations relying on cross-domain cookies in
      Edge 86+ before rollout. Update cookie-setting code (including Apex
      Cookie() calls) to explicitly specify SameSite=None; Secure where
      cross-domain access is required. Verify all endpoints use HTTPS.
    source:
      document: v50-winter21.pdf
      page: 102
      heading: Prepare for the Microsoft Edge Changes in SameSite Cookie Behavior That
        Can Break Salesforce Integrations
    confidence: high
    id: v50-auth-001
  - apiVersion: "50.0"
    release: Winter '21
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version, triggered by Firefox
      browser update rollout
    summary: Firefox's new SameSite=Lax cookie default breaks cross-domain
      integrations that rely on cookies without explicit SameSite attributes.
      Custom integrations using iframes or cross-domain communication must
      update cookies to set SameSite=None; Secure explicitly.
    detail: Salesforce updated its own cookies for Winter '21, but customer-owned
      cookies in custom integrations need manual updates. Apex developers can
      use the new SameSite attribute in the Cookie() constructor to set
      cross-site cookies correctly. HTTP access is also blocked for
      authenticated requests.
    upgradeAction: Test custom integrations in Firefox with
      network.cookie.sameSite.laxByDefault enabled. Update any cookies used for
      cross-domain communication to explicitly set SameSite=None; Secure. Ensure
      all endpoints use HTTPS.
    source:
      document: v50-winter21.pdf
      page: 104
      heading: Prepare for Firefox Changes in SameSite Cookie Behavior That Can Break
        Salesforce Integrations
    confidence: high
    id: v50-auth-002
