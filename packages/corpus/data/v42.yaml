    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Any
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: Global value sets in managed package upgrades now preserve
      subscriber-org customizations (labels, API names, active/inactive status,
      defaults) the same way standard value sets do, except that global value
      set labels still update when the package includes new label values.
    detail: Previously global value sets could overwrite subscriber customizations
      during upgrades. Now individual value labels and API names remain
      unchanged in subscriber orgs, new values are not auto-added, and
      active/inactive plus default settings are preserved. Only the global value
      set's own label name updates if the package includes a changed label.
    upgradeAction: ISVs relying on package upgrades to push new picklist values or
      reset subscriber customizations for global value sets must implement
      alternative distribution mechanisms such as post-install scripts or manual
      subscriber action.
    source:
      document: v42-spring18.pdf
      page: 511
      heading: Get the Same Behavior for Global Value Sets and Standard Value Sets in
        Managed Package Upgrades
    confidence: high
    id: v42-packaging-005
