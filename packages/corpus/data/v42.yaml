      than runtime. Components using unsupported types (such as Apex inner
      classes) that previously worked at runtime will fail to save once
      upgraded.
    upgradeAction: Before bumping Aura components past v41.0, attempt to save each
      component and fix any attribute type errors—especially usages of Apex
      inner classes or other unsupported types that silently worked before.
    source:
      document: v42-spring18.pdf
      page: 440
