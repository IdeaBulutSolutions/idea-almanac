    appliesWhen: Aura components compiled at API >= 42.0
    summary: Inline <style> tags are now prohibited in Aura component markup and
      dynamic component creation. All CSS must be placed in the component
      bundle's dedicated style resource.
    upgradeAction: Before upgrading components past v42.0, search for inline <style>
      tags in .cmp/.app markup and move those styles to the bundle's .css file
      using the THIS namespace selector.
    source:
      document: v42-spring18.pdf
      page: 441
      heading: <style> Tag Not Allowed in Components
