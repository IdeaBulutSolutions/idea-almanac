    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Social Customer Service Apex methods now locate parent cases by
      matching on Persona instead of replyToId, and findParentCase internally
      delegates to findParentCaseFromPersona.
    upgradeAction: Review any custom Apex relying on Social Customer Service case
      threading; test that case association still resolves correctly under the
      persona-based lookup.
    source:
      document: v42-spring18.pdf
      page: 223
      heading: Use Social Persona Threading Updates in Apex
    confidence: medium
    id: v42-apex-002
  - apiVersion: "42.0"
    release: Spring '18
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version; requires My Domain
      enabled and Lightning flow runtime
    summary: Screen Flows can now embed custom Lightning components that implement
      the lightning:availableForFlowScreens interface, enabling fully customized
      screen layouts, navigation, and dynamic behavior within flow screens.
    detail: Components must implement lightning:availableForFlowScreens and include
      a design resource to appear as screen field options. This capability works
      only in Lightning flow runtime, not Classic flow runtime.
    source:
      document: v42-spring18.pdf
      page: 372
      heading: Build Richer Flow Screens with Lightning Components
    confidence: high
    id: v42-flow-001
  - apiVersion: "42.0"
    release: Spring '18
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (Critical Update)
    summary: Bulk-invoked autolaunched flow interviews now execute all interviews
      instead of only the first one. Previously, when multiple interviews were
      triggered in a single bulk operation, all but the initial interview were
      silently dropped.
    upgradeAction: Review any integration or trigger logic that bulk-invokes
      autolaunched flows; ensure each interview's execution is expected and that
      downstream effects (DML, callouts, emails) can handle the increased
      volume.
    source:
      document: v42-spring18.pdf
      page: 376
      heading: Launch Flows as Subtabs in Lightning Console Apps (Pilot)
    confidence: high
    id: v42-flow-002
  - apiVersion: "42.0"
    release: Spring '18
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: The new Flow.Interview.createInterview() method allows Apex to start
      any flow by passing its name as a string parameter, removing the need to
      hardcode flow names in individual methods.
    source:
      document: v42-spring18.pdf
      page: 379
      heading: Start Flows Dynamically from Apex
    confidence: high
    id: v42-apex-003
  - apiVersion: "42.0"
    release: Spring '18
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Flow
      - Integration
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (Critical Update
      activation required)
    summary: Bulk-invoked autolaunched flow interviews now all execute instead of
      only the first one running and the rest being silently dropped. This can
      cause transactions to hit governor limits (e.g., duplicate update limit of
      12) that were previously avoided.
    detail: When flows are triggered in bulk via Process Builder actions or the REST
      API Invocable Actions resource with multiple input maps, every interview
      now runs within a single transaction. Implementations that assumed only
      one interview executed per batch may now fail with limit exceptions and
      full transaction rollbacks.
    upgradeAction: Audit all processes with flow actions and REST integrations
      calling autolaunched flows. Ensure flows do not perform duplicate updates
      on the same record across interviews in a batch. Test in sandbox before
      activating the critical update in production.
    source:
      document: v42-spring18.pdf
      page: 379
      heading: Execute All Autolaunched Flow Interviews When Invoked in Bulk (Critical
        Update)
    confidence: high
    id: v42-flow-003
  - apiVersion: "42.0"
    release: Spring '18
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Flows gain access to $Flow.InterviewGuid, a system variable exposing
      the unique identifier of the running interview, enabling tracking of
      paused interviews for GDPR-style data deletion scenarios.
    source:
      document: v42-spring18.pdf
      page: 383
      heading: Track More Information About Paused Flow Interviews
    confidence: high
    id: v42-flow-004
