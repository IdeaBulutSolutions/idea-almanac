    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: "Several fields were removed from EventLogFile event types: FILE_NAME
      from Document Attachment Downloads, USERNAME from Knowledge Article View,
      and USER_NAME from Logout. Integrations querying these fields will no
      longer receive data."
