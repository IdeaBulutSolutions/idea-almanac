    appliesWhen: org-wide regardless of component API version
    summary: Visualforce pages can now distinguish Lightning console navigation from
      standard Lightning navigation by checking for the Theme4u value in
      $User.UITheme and $User.UIThemeDisplayed global variables.
    source:
      document: v42-spring18.pdf
      page: 69
      heading: Detect the Lightning Console UI Theme in Visualforce Pages
    confidence: high
    id: v42-vf-003
