    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Streaming API clients now receive explicit 401 error notifications on
      the /meta/connect or /meta/handshake channels when their OAuth token or
      session becomes invalid, enabling programmatic detection and
      reauthentication.
    detail: Previously, clients with invalidated authentication may not have
      received explicit notification. Now the platform sends a Bayeux message
      with error '401::Authentication invalid' and advice 'reconnect=none',
      allowing clients to handle reauthentication gracefully rather than
      silently missing events.
    upgradeAction: Update Streaming API client code to handle 401::Authentication
      invalid errors on /meta/connect and 403::Handshake denied with nested 401
      failures on /meta/handshake by implementing reauthentication logic.
    source:
      document: v42-spring18.pdf
      page: 518
      heading: Handle Invalid Connections in Streaming API
    confidence: high
