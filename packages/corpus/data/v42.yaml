  - apiVersion: "42.0"
    release: Spring '18
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Any
    behaviorArea: other
    appliesWhen: org-wide regardless of component API version
    summary: Internet Explorer 11 support for Lightning Experience, Lightning
      Console Apps, and Lightning Communities ends December 31, 2020 (with
      Extended Support opt-in) or December 16, 2017 (without). Developers
      embedding Lightning components in IE11-based WebViews or testing in IE11
      must migrate to a supported browser.
    upgradeAction: Ensure any automated testing, embedded WebViews, or internal
      tools accessing Lightning Experience no longer rely on IE11. Update
      browser requirements documentation and migrate to Edge, Chrome, Firefox,
      or Safari.
    source:
      document: v42-spring18.pdf
      page: 53
      heading: Supported Browsers for Lightning Experience
    confidence: high
    id: v42-other-001
  - apiVersion: "42.0"
    release: Spring '18
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: Visualforce pages and third-party web tabs using Console
      Integration Toolkit version 42.0 or later in Lightning Experience
    summary: Salesforce Classic Console Integration Toolkit methods now function in
      Lightning Experience when using toolkit version 42.0+, enabling existing
      Visualforce console customizations to work without rewrites.
    detail: Third-party content using these methods must be added to CSP Trusted
      Sites. This provides a migration path for orgs moving console apps from
      Classic to Lightning.
    source:
      document: v42-spring18.pdf
      page: 68
      heading: Use Classic Console Integration Toolkit Methods in Lightning Experience
    confidence: low
    id: v42-vf-001
  - apiVersion: "42.0"
    release: Spring '18
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (auto-activates
      October 5, 2018)
    summary: Visualforce pages in Lightning Console apps will return Theme4u instead
      of Theme4d for $User.UITheme and $User.UIThemeDisplayed, breaking code
      that checks for Theme4d to detect Lightning Experience.
    upgradeAction: Update any Visualforce code that checks UIThemeDisplayed ===
      'Theme4d' to also accept 'Theme4u', or Lightning Console pages will fail
      the Lightning Experience detection after activation.
    source:
      document: v42-spring18.pdf
      page: 68
      heading: Enable the Lightning Console UI Theme (Critical Update)
    confidence: high
    id: v42-vf-002
  - apiVersion: "42.0"
