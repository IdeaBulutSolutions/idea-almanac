  - apiVersion: "42.0"
    release: Spring '18
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version (auto-activation
      scheduled after Winter '19)
    summary: Lightning component controllers without explicit sharing keywords
      previously defaulted to with sharing; this critical update changes them to
      without sharing, matching standard Apex behavior but potentially exposing
      records the user shouldn't access.
    detail: Before this update, @AuraEnabled controllers that omitted with
      sharing/without sharing implicitly ran as with sharing, unlike Visualforce
      controllers. Enabling the update aligns Lightning controller behavior with
      documented Apex semantics, meaning implicit-sharing controllers now run
      without sharing and can return records outside the user's sharing rules.
    upgradeAction: Audit all @AuraEnabled classes lacking explicit sharing keywords
      and add with sharing or without sharing as appropriate before the
      auto-activation date; test record visibility under restricted user
      profiles.
    source:
      document: v42-spring18.pdf
      page: 437
      heading: Use without sharing for @AuraEnabled Apex Controllers with Implicit
        Sharing (Critical Update)
    confidence: high
    id: v42-sharing-001
  - apiVersion: "42.0"
    release: Spring '18
    changeType: removed
    impact: breaking
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version (enforced February 10, 2018)
    summary: Salesforce REST API calls from within lightning:container iframes are
      blocked for security reasons. Apps must switch to Apex remoting to
      retrieve org data.
    upgradeAction: Audit any lightning:container components that call REST APIs from
      within the iframe; refactor them to use Apex @RemoteAction or server-side
      controllers instead.
    source:
      document: v42-spring18.pdf
      page: 438
      heading: API Access for <lightning:container> Apps Is Revoked (Critical Update)
    confidence: high
    id: v42-aura-002
