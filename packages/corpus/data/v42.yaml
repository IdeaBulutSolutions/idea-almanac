    appliesWhen: org-wide regardless of component API version
    summary: The cmp.find() method now correctly locates components created at
      runtime via $A.createComponent(), fixing a bug that previously prevented
      this lookup from working.
    upgradeAction: Review code that implemented workarounds for the broken
      cmp.find() behavior with dynamic components; those workarounds may now be
      unnecessary or could conflict with the corrected behavior.
    source:
      document: v42-spring18.pdf
      page: 441
