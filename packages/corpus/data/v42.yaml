    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Auth. Provider URLs now accept an optional prompt parameter to force
      reauthentication (login), reapproval (consent), or both during SSO flows,
      giving integrations programmatic control over session handling.
    source:
      document: v42-spring18.pdf
      page: 400
      heading: Control When Users Are Prompted for Reauthentication and Reapproval
        Using Auth. Provider URLs
    confidence: high
    id: v42-auth-003
  - apiVersion: "42.0"
    release: Spring '18
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - VisualforcePage
      - ApexClass
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Developers can now build fully custom login flows using Visualforce
      pages and Apex controllers, calling new
      Auth.SessionManagement.finishLoginFlow() methods to complete
      authentication and lift session restrictions.
    source:
      document: v42-spring18.pdf
      page: 400
      heading: Take Full Control of Your Login Process with Visualforce Page Login Flows
    confidence: high
    id: v42-auth-004
  - apiVersion: "42.0"
    release: Spring '18
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: A new Auth.VerificationException class lets Apex code (including
      triggers) initiate the Salesforce identity-verification flow by throwing
      an exception, which was previously impossible from trigger context using
      the URL-based approach.
    detail: Throwing Auth.VerificationException prompts UI users to verify identity
      and returns an API error to headless clients. This enables triggers to
      enforce high-assurance sessions before sensitive DML without manual
      redirect logic.
    source:
      document: v42-spring18.pdf
      page: 402
      heading: Require Two-Factor Authentication Using Apex Triggers
    confidence: high
    id: v42-auth-005
  - apiVersion: "42.0"
    release: Spring '18
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version (requires My Domain
      deployment)
    summary: Social sign-on auth provider URLs now route through subdomain and
      community-specific domains instead of login.salesforce.com, and the orgID
      parameter has been removed. Existing integrations using the old callback
      URLs must update their third-party app configurations to avoid redirect
      URI mismatch errors.
    upgradeAction: For existing auth provider configurations, enable 'Use subdomain
      in callback URLs' and update the registered callback URLs in your
      third-party identity provider (Facebook, Google, etc.) to match the new
      subdomain-based format. Test social sign-on flows in sandbox before
      production.
    source:
      document: v42-spring18.pdf
      page: 403
      heading: Improve Social Sign–On Performance with Optimized Auth. Provider URLs
    confidence: medium
    id: v42-auth-006
  - apiVersion: "42.0"
    release: Spring '18
    changeType: changed
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version (requires enablement
      by Salesforce Support)
    summary: The ThirdPartyAccountLink standard object now supports insert and
      delete operations via API, allowing programmatic management of external
      authentication provider user links.
    upgradeAction: If building integrations that provision SSO users, you can now
      use the API to create or remove third-party account links instead of
      relying on user-initiated flows.
    source:
      document: v42-spring18.pdf
      page: 404
      heading: Set Third-Party Account Links Via the API
    confidence: high
    id: v42-rest-002
  - apiVersion: "42.0"
    release: Spring '18
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: sandboxes created from production orgs provisioned after Spring '18
    summary: Sandboxes spawned from newly created production orgs now receive
      lowercase My Domain hostnames, which can break SAML SSO if your identity
      provider is configured with mixed-case URLs.
    detail: Existing production orgs retain their original hostname casing when
      sandboxes are created or refreshed, so only integrations against sandboxes
      from post-Spring-'18 orgs are affected. Visualforce URLs always use
      lowercase regardless of org age.
    upgradeAction: For sandboxes from new orgs, verify that your IdP's assertion
      consumer service URLs and entity IDs match the lowercase hostnames shown
      in the Salesforce SAML settings.
    source:
      document: v42-spring18.pdf
      page: 407
      heading: Sandboxes Use Lowercase My Domain Hostnames
    confidence: low
    id: v42-auth-007
  - apiVersion: "42.0"
