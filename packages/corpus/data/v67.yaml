  - apiVersion: "67.0"
    release: Summer '26
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: "org-wide regardless of component API version; phased rollout:
      200-day max lifespan as of March 15 2026, 100 days March 15 2027, 47 days
      March 15 2029"
    summary: Industry-mandated TLS certificate lifespan reductions require
      integrations using certificate pinning or manually managed certificates to
      implement more frequent rotation cycles, and Salesforce will discontinue
      public certificate rotation announcements after July 6, 2026.
    detail: The CA/Browser Forum has mandated shorter maximum lifespans for publicly
      signed TLS certificates. Integrations that pin Salesforce certificates or
      rely on manual certificate updates must adapt to 200-day (now), 100-day
      (2027), and eventually 47-day (2029) rotation cycles. Salesforce will also
      stop announcing 1P production org certificate rotations via the
      Trailblazer Community after July 2026, so teams must monitor expirations
      independently.
    upgradeAction: Remove certificate pinning from callouts to Salesforce endpoints.
      For certificates stored in your org, assign the Expired Certificate
      Notification permission to relevant admins and consider using the
      Certificate Metadata API to automate rotation.
    source:
      document: v67-summer26.pdf
      page: 124
      heading: Rotate Your Certificates More Frequently
    confidence: high
    id: v67-auth-005
  - apiVersion: "67.0"
    release: Summer '26
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; Google Chrome
      enforces March 15, 2027, but issues may occur earlier upon certificate
      renewal
    summary: Publicly trusted certificates used for mTLS client authentication must
      be migrated to dedicated PKI hierarchies separate from TLS server
      certificates, due to Google Chrome Root Program Policy v1.7 prohibiting
      dual-use certificates from Chrome-trusted CAs.
    detail: If your API integrations or certificate-based authentication flows use
      certificates issued by a Public Root CA in the Chrome Trusted Root List
      for both server and client authentication purposes, those certificates
      will stop working for mTLS. You must obtain separate certificates from a
      PKI hierarchy dedicated to client authentication.
    upgradeAction: Audit all mTLS certificates used for API client authentication
      and certificate-based login. If any are issued by a Chrome-trusted Public
      Root CA, work with your CA to obtain replacement certificates from a
      dedicated client-authentication hierarchy before March 2027 or before your
      next renewal.
    source:
      document: v67-summer26.pdf
      page: 126
      heading: Update Your mTLS Certificates
    confidence: high
    id: v67-auth-006
