  - apiVersion: "41.0"
    release: Winter '18
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: Orgs without My Domain enabled can now save Lightning pages containing
      custom components via Tooling API and Metadata API, and can install or
      upgrade packages with such pages. Previously these operations were
      blocked.
    detail: While the custom components will be dropped from the page at runtime in
      orgs without My Domain, the metadata operations (API save, package
      install/upgrade) now succeed instead of failing. This removes a deployment
      blocker for packages targeting orgs that may not have My Domain
      configured.
    upgradeAction: If your deployment scripts or packages previously failed when
      targeting orgs without My Domain due to Lightning pages with custom
      components, verify whether those deployments now succeed and whether the
      runtime behavior (component being dropped) is acceptable.
    source:
      document: v41-winter18.pdf
      page: 466
      heading: Configure Lightning Pages with Custom Components More Easily with Fewer
        My Domain Restrictions
    confidence: medium
    id: v41-packaging-002
