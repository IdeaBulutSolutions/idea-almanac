    summary: The Salesforce Mobile Classic app is being retired and removed from app
      stores on December 1, 2017, with immediate disabling of all installed
      instances. Organizations relying on Mobile Classic integrations or custom
      configurations must migrate to Salesforce for iOS/Android or custom mobile
      solutions.
