    summary: Several Einstein Image Classification REST endpoints for managing
      labels and examples are deprecated in API version 2.0; labels must now be
      provided at dataset creation time instead of added afterward.
    detail: The deprecated endpoints include GET/POST for dataset labels, GET for
      individual labels, and GET for examples. Integrations that previously
      created labels after dataset creation must refactor to pass labels during
      the initial dataset creation call.
    upgradeAction: Audit integrations calling /vision/datasets/{id}/labels or
      /vision/datasets/{id}/examples endpoints and migrate to passing labels at
