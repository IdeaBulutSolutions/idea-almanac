    upgradeAction: "If you have a custom Facebook authentication provider for social
      sign-on, update the userinfo endpoint to use the new Graph API URL with
      explicit field parameters:
      https://graph.facebook.com/me?fields=email,id,name,first_name,last_name,l\
      ink,locale"
    source:
      document: v41-winter18.pdf
      page: 503
      heading: Update Your Facebook Authentication Provider to Get User Information
    confidence: high
