    summary: Single Logout (SLO) is now GA, supporting both SAML and OpenID Connect
      protocols. Salesforce can act as identity provider or service
      provider/relying party. When LogoutEventStream is enabled in Session
      Settings, developers can create Apex triggers that fire on logout events.
    source:
      document: v41-winter18.pdf
      page: 500
      heading: Let Users Log Out of All Apps at Once with Single Logout (Generally
        Available)
    confidence: medium
