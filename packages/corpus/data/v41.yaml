  - apiVersion: "41.0"
    release: Winter '18
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: All Visualforce pages now enforce HTTP Strict Transport Security,
      causing browsers to automatically redirect HTTP requests to HTTPS and
      cache this preference for up to one year.
    detail: HSTS is mandatory on Visualforce and cannot be disabled. For Communities
      and Force.com Sites, HSTS is opt-in but once enabled on a subdomain it
      affects all resources sharing that subdomain. Browser caching of the
      HTTPS-only policy escalates from one hour to one year over a phased
      rollout.
    upgradeAction: Verify that any integrations or scripts hitting Visualforce pages
      via HTTP can handle automatic HTTPS redirects. Ensure SSL certificates are
      valid on all affected domains since browsers will refuse non-HTTPS
      connections after HSTS caching begins.
    source:
      document: v41-winter18.pdf
      page: 518
      heading: HSTS (HTTP Strict Transport Security) Redirects Browsers to Use HTTPS
    confidence: high
    id: v41-vf-003
