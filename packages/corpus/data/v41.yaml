    summary: The email_verified claim returned by the UserInfo endpoint and identity
      URL now indicates whether the user actually clicked a verification link in
      a confirmation email, rather than just reflecting whether the org has
      email verification turned on.
    upgradeAction: Review any integrations or SSO flows that rely on the
      email_verified attribute for authorization decisions; they may now receive
      false for users who previously appeared verified.
    source:
      document: v41-winter18.pdf
      page: 497
      heading: Change Your Users' Login Experience with Dynamic Branding
