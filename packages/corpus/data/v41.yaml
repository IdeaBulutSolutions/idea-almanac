  - apiVersion: "41.0"
    introducedIn: "39.0"
    release: Winter '18
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Any
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version; auto-enforced October
      30, 2017
    summary: "JavaScript execution within HYPERLINK formula function URLs is blocked
      platform-wide to close a cross-site scripting vulnerability. Formula
      fields using javascript: URLs will stop functioning."
    detail: This critical update originated in Summer '17 (API 40.0) and reaches
      mandatory enforcement in Winter '18. Any HYPERLINK formula that embeds
      JavaScript in its URL argument will no longer execute that script.
      Workarounds include custom buttons/links (Classic only), Lightning quick
      actions backed by LWC, or Visualforce pages with Apex controllers that
      perform server-side redirects.
    upgradeAction: "Audit all formula fields containing HYPERLINK for javascript:
      URLs. Replace with custom buttons, Lightning quick actions, or Visualforce
      redirect pages before enforcement."
    source:
      document: v41-winter18.pdf
      page: 493
      heading: Block Execution of JavaScript in the HYPERLINK Function To Be Enforced
        (Critical Update)
    confidence: high
    id: v41-sharing-001
