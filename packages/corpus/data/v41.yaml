    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: The CLIENT_IP field in Event Monitoring log files changed from an IP
      data type to a String, and Salesforce internal IPs now appear as the
      literal value 'Salesforce.com IP' rather than actual addresses.
    detail: This affects all event types containing CLIENT_IP including Apex
      Callout, Apex Execution, REST API, Bulk API, Metadata API Operation,
      Login, and others. Code parsing these logs that expected a specific IP
      format or performed IP-based filtering may need adjustment.
    upgradeAction: Review any integrations or analytics consuming Event Monitoring
      logs that parse or filter on CLIENT_IP. Update parsing logic to handle
      string values and the special 'Salesforce.com IP' placeholder for internal
      Salesforce traffic.
    source:
      document: v41-winter18.pdf
      page: 513
      heading: Client IP Field Now Contains a String Value
    confidence: high
    id: v41-rest-003
