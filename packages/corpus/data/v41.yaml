  - apiVersion: "41.0"
    release: Winter '18
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: The email_verified claim returned by the UserInfo endpoint and identity
      URL now indicates actual user email verification status rather than just
      whether the org has email verification enabled.
    detail: Previously email_verified was true whenever the org setting was on. Now
      it reflects whether the specific user clicked a verification link after
      events like password changes, identity verification, or account creation.
    upgradeAction: Review integrations that rely on the email_verified claim; code
      assuming it indicates org-level settings will now receive per-user
      verification status instead.
    source:
      document: v41-winter18.pdf
      page: 504
      heading: Get Updated Email_Verified Value in UserInfo Endpoint and Identity URL
        Response
    confidence: high
    id: v41-auth-006
