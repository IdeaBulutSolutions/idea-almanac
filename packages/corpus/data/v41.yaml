  - apiVersion: "41.0"
    release: Winter '18
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: The proxy.salesforce.com default SAML signing certificate is retired as
      of Winter '18. Orgs using SP-initiated SAML SSO where the identity
      provider validates request signatures will experience login failures
      unless they migrate to a self-signed certificate.
    detail: Even orgs not currently validating SAML request signatures at their IdP
      should migrate to avoid future issues. Orgs with multiple SAML
      configurations must update each configuration's request signing
      certificate and upload the replacement to their IdP.
    upgradeAction: Before Winter '18 deployment, switch any SAML SSO configuration
      still using the Default Certificate to a self-managed certificate, then
      upload the new certificate to your identity provider for request signature
      validation.
    source:
      document: v41-winter18.pdf
      page: 502
      heading: SAML Signing Certificate Has Been Retired
    confidence: high
    id: v41-auth-003
