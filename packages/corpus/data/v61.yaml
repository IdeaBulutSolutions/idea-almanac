    behaviorArea: soql-sosl
    appliesWhen: Apex classes and triggers compiled at API >= 61.0
    summary: SOQL relationship queries in Apex can now traverse up to five levels of
      parent-to-child records (one parent root plus four nested child
      subqueries), where previously fewer levels were supported. Each subquery
      counts toward the 300 aggregate query limit.
    source:
      document: v61-summer24.pdf
      page: 253
      heading: Support for Five-Level Parent-to-Child Relationship SOQL Queries in Apex
    confidence: high
    id: v61-soql-002
  - apiVersion: "61.0"
