    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version — enforcement rolling
      out from Spring '24, deferrable until Spring '25
    summary: Salesforce is retiring JDK-based locale formats and enforcing ICU
      locale formats org-wide. Date, time, currency, number, and address
      formatting will change for affected locales, potentially breaking string
      comparisons, parsing logic, and UI expectations in Apex, Visualforce, and
      Lightning components.
    detail: This Release Update was introduced in Winter '20 (API 47.0) and is being
      enforced on a rolling schedule starting Spring '24. Orgs created Winter
      '20 or later already have ICU enabled. The en_CA locale requires separate
      opt-in. Admins receive email 30-60 days before automatic enablement and
      can defer until Spring '25 via Setup > User Interface.
    upgradeAction: Identify locales your org uses and compare JDK vs ICU format
      differences. Test Apex code that parses or compares formatted strings
      (dates, numbers, currencies), SOQL filters on formatted text, Visualforce
      outputText, and Lightning formatted values. Update any hardcoded format
      expectations before enforcement.
    source:
      document: v61-summer24.pdf
      page: 198
      heading: Enable ICU Locale Formats (Release Update)
    confidence: high
    id: v61-apex-001
