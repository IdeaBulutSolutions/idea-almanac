  - apiVersion: "61.0"
    release: Summer '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce is altering the internal DOM structure and SLDS styling of
      base Lightning components. Components that rely on unsupported
      techniques—such as targeting internal DOM elements via CSS selectors,
      manipulating Salesforce component internals with JavaScript, or asserting
      on SLDS classes in unit tests—may experience visual regressions or test
      failures.
    detail: The platform reserves the right to change component internals at any
      time. This rollout begins Summer '24 and affects Lightning Experience,
      Experience Cloud sites, and Salesforce mobile apps across all editions.
      Customers should migrate away from selectors that pierce Salesforce
      component boundaries.
    upgradeAction: Audit custom LWC/Aura components and Experience Cloud site CSS
      for selectors targeting Salesforce base-component internals or
      undocumented SLDS classes. Update unit tests that assert on rendered DOM
      structure of Salesforce-provided components. Replace unsupported overrides
      with documented styling hooks or design tokens.
    source:
      document: v61-summer24.pdf
      page: 242
      heading: Confirm Your Components Use Supported Design System Customizations
    confidence: high
    id: v61-lwc-006
  - apiVersion: "61.0"
    introducedIn: "56.0"
    release: Summer '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Static element rendering optimizations introduced in Spring '23 cause
      extra whitespace characters to appear in class and style attribute values
      in the DOM, which can break exact-match attribute selectors.
    detail: This continues a platform-wide rendering optimization first shipped in
      API 56.0 (Spring '23). The framework's internal handling of static nodes
      inserts leading or extra spaces into class/style strings. Code using exact
      attribute selectors like [class="foo bar"] will fail to match.
    upgradeAction: Replace exact attribute selectors such as
      document.querySelector('[class="highlight yellow"]') with class-based
      selectors like document.querySelector('.highlight.yellow') that tolerate
      whitespace variance.
    source:
      document: v61-summer24.pdf
      page: 243
      heading: Class and Style Attributes Render with Extra Whitespaces
    confidence: high
    id: v61-lwc-007
  - apiVersion: "61.0"
    release: Summer '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce has indefinitely paused the automatic rollout of Lightning
      Web Security that began in Spring '22. Orgs where LWS was not yet
      auto-enabled will remain on the legacy Locker Service until Salesforce
      resumes the rollout.
    detail: Organizations that have not yet received automatic LWS enablement should
      proactively test their Lightning components in a sandbox with LWS manually
      enabled to identify compatibility issues before eventual enforcement.
    upgradeAction: Enable LWS in a sandbox and run your Lightning components to
      catch any Locker-to-LWS migration issues before Salesforce resumes
      automatic enablement.
    source:
      document: v61-summer24.pdf
      page: 243
      heading: Lightning Web Security Enablement Rollout Postponed
    confidence: high
    id: v61-lwc-008
  - apiVersion: "61.0"
