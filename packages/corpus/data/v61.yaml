  - apiVersion: "61.0"
    release: Summer '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
      - VisualforceComponent
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: The <apex:sectionHeader> component now sanitizes HTML in its
      description attribute by default, stripping uncommon elements, insecure
      attributes, and JavaScript to prevent XSS. A new escape attribute controls
      this behavior.
    detail: Previously all markup in the description attribute was rendered as-is.
      Now only a safe subset of HTML elements renders; everything else is
      stripped or escaped. Developers can set escape="false" to restore the old
      behavior (not recommended) or escape="true" to escape all markup. An
      org-wide User Interface setting can also flip the default to false.
    upgradeAction: Audit Visualforce pages using <apex:sectionHeader> for markup in
      the description attribute. Verify expected output still renders correctly;
      remove unsupported HTML or explicitly set the escape attribute to preserve
      intended behavior.
    source:
      document: v61-summer24.pdf
      page: 245
      heading: Updated Default Behavior of Visualforce Section Header Components
    confidence: high
    id: v61-vf-002
  - apiVersion: "61.0"
    release: Summer '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version (Beta feature)
    summary: Apex cursors allow iterating through SOQL results in chunks across
      transaction boundaries, supporting up to 50 million rows per cursor and
      integration with queueable job chains as an alternative to batch Apex.
    detail: New Database.getCursor() and Database.getCursorWithBinds() methods
      return a Cursor object whose fetch(position, count) method retrieves rows
      by offset. New Limits methods track cursor-specific governor limits. Two
      new exceptions (FatalCursorException, TransientCursorException) handle
      cursor failures. This is a Beta feature subject to Beta Services Terms.
    source:
      document: v61-summer24.pdf
      page: 248
      heading: Use Cursors for Expanded SOQL Query Result Support (Beta)
    confidence: medium
    id: v61-apex-004
  - apiVersion: "61.0"
    release: Summer '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: soql-sosl
    appliesWhen: Apex classes compiled at API >= 61.0
    summary: SOQL queries against Data Cloud DMOs using Database.QueryLocator or FOR
      loops now return all matching records at API 61.0+, whereas earlier
      versions truncate results to the first 201 rows.
    detail: Static SOQL support for Data Cloud data model objects is introduced
      broadly, but the row-limit change is version-gated. Code at pre-61.0
      silently caps DMO query results at 201 records; upgrading past 61.0
      removes this cap. Batch Apex with QueryLocator against DMOs remains
      blocked; use Iterable instead.
    upgradeAction: Review any Apex at pre-61.0 that queries DMOs via QueryLocator or
      FOR loops expecting ≤201 rows. After upgrading, larger result sets may
      affect memory, Data Cloud credit consumption, and downstream logic.
    source:
      document: v61-summer24.pdf
      page: 250
      heading: Use SOQL in Apex with Data Cloud Objects
    confidence: high
    id: v61-soql-001
  - apiVersion: "61.0"
    release: Summer '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-runtime
    appliesWhen: Apex classes compiled at API >= 61.0
    summary: Apex code at v61+ can call SObjectType.getDescribe() on Data Cloud DMOs
      to retrieve object metadata, but field-level and record-level security
      checks remain unsupported—only object-level access is enforced.
    detail: User-mode keywords and security methods (WITH USER_MODE, WITH
      SECURITY_ENFORCED, Security.stripInaccessible()) perform object-level
      checks only for DMOs. Developers should not rely on these constructs to
      enforce FLS or sharing rules when querying Data Cloud objects.
    source:
      document: v61-summer24.pdf
      page: 250
      heading: Consider Field- and Record-Level Access When Using Apex With Data Cloud
        Objects
    confidence: high
    id: v61-apex-005
  - apiVersion: "61.0"
    release: Summer '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-testing
    appliesWhen: org-wide regardless of component API version
    summary: Apex tests can now mock SOQL queries against Data Cloud data model
      objects (DMOs) using the new System.SoqlStubProvider class and
      Test.createSoqlStub() method, enabling unit testing of code that queries
      DMOs without requiring actual Data Cloud data.
    detail: Developers extend SoqlStubProvider and override handleSoqlQuery() to
      return fabricated DMO records. Test.createStubQueryRow() and
      Test.createStubQueryRows() create mock DMO instances. Standard Apex
      governor limits still apply to stubbed records. The stub implementation
      cannot use SOQL, SOSL, callouts, async jobs, DML, or platform events.
    source:
      document: v61-summer24.pdf
      page: 250
      heading: Mock SOQL Tests for Data Cloud Objects
    confidence: high
    id: v61-apex-006
  - apiVersion: "61.0"
