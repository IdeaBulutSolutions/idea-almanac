    summary: Unmanaged Visualforce pages previously served on salesforce.com are
      moving to force.com or site domains to avoid third-party cookie blocking.
      Hard-coded URLs, bookmarks, and integrations pointing to the old domain
      will break.
    upgradeAction: Audit all hard-coded references, external links, bookmarks, and
      integration endpoints that point to Visualforce pages on salesforce.com
      and update them to use the new force.com or site domain URLs.
    source:
      document: v61-summer24.pdf
