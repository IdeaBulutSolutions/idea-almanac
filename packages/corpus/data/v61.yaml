    summary: API calls using instance-specific URLs (e.g., na1.salesforce.com,
      ap2.salesforce.com) will fail after October 12, 2024. All integrations
      must switch to My Domain login URLs, which automatically route to the
      correct instance even after org migrations or instance refreshes.
    detail: When an org undergoes instance migration or refresh, traffic to the old
      instanced URL no longer reaches the new instance. My Domain URLs abstract
      away the physical instance, ensuring continuity. This affects all API
      versions and all integration patterns (REST, SOAP, Bulk, etc.).
    upgradeAction: Search your codebase and metadata for hardcoded instanced URLs
      (patterns like na1, eu5, ap2 followed by .salesforce.com). Replace all
      occurrences with your org's My Domain login URL found in Setup > My Domain
      > Current My Domain URL.
    source:
      document: v61-summer24.pdf
      page: 256
      heading: Update API Calls to Use Your My Domain Login URL
    confidence: high
