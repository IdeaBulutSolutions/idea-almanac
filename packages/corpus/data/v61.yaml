    summary: Flows executed via REST API will run using the calling user's profile,
      permission sets, and sharing rules rather than system context, limiting
      data access to what the user is permitted to see.
    upgradeAction: Audit REST API integrations that invoke flows and verify the
      integration user has appropriate permissions for all records the flow
      needs to access.
    source:
