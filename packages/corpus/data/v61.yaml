    appliesWhen: Apex classes compiled at API >= 61.0
    summary: Private methods in abstract or virtual classes are no longer shadowed
      by subclass methods with identical signatures once the superclass is at
      API 61.0+. Previously, subclass methods would override private superclass
      methods despite the private visibility.
    upgradeAction: Review class hierarchies where subclasses define methods matching
      private method signatures in parent classes. After upgrading the
      superclass past 61.0, both methods will execute independently rather than
      the subclass method replacing the parent's private method.
    source:
