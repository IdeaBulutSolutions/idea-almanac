entries:
  - apiVersion: "61.0"
    release: Summer '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version; enforcement begins Spring '25
    summary: Lightning Experience modals migrate from Aura to LWC rendering,
      altering navigation and button behavior. The Save & New button disappears
      on lookup-initiated record creation, post-save navigation stops firing for
      custom quick action modals, and stacked modal saves return to the
      originating record page rather than navigating to the newly created
      record.
    detail: Developers using LWC quick actions with lightning/navigation will see
      new modals stack by default; set replace:true to auto-close the previous
      modal. Aura quick actions relying on force:createRecord or
      force:editRecord should migrate to lightning:navigation with replace:true
      to restore post-save navigation behavior.
    upgradeAction: Audit custom quick actions (both LWC and Aura) that depend on
      Save & New or post-save navigation. Update Aura actions from
      force:createRecord/force:editRecord to lightning:navigation. Test stacked
      modal flows to confirm acceptable UX before Spring '25 enforcement.
    source:
      document: v61-summer24.pdf
      page: 105
      heading: Enable LWC Stacked Modals (Release Update)
    confidence: high
    id: v61-lwc-001
  - apiVersion: "61.0"
    release: Summer '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
      - LWC
      - AuraDefinitionBundle
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Browser vendors are phasing out third-party cookies, which will break
      authenticated Visualforce pages loaded in iframes on external sites and
      Lightning Out deployments that rely on Salesforce session cookies rather
      than token-based auth.
    detail: Google Chrome plans to fully block third-party cookie access in December
      2024. A new My Domain setting lets admins proactively enforce
      first-party-only cookie use to test impact before browsers enforce it
      universally.
    upgradeAction: Enable the 'Require first-party use of Salesforce cookies' My
      Domain setting in a sandbox and test any Visualforce pages embedded in
      third-party iframes, Lightning Out components deployed outside Salesforce,
      and integrations that pass session cookies cross-origin. Migrate affected
      flows to token-based authentication or custom domains.
    source:
      document: v61-summer24.pdf
      page: 106
      heading: Prepare for Restrictions on Salesforce Cookie Use
    confidence: high
    id: v61-auth-001
  - apiVersion: "61.0"
    release: Summer '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
      - VisualforcePage
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Chrome storage partitioning activates for Salesforce domains, breaking
      cross-origin localStorage and sessionStorage access in third-party
      contexts such as embedded iframes or Canvas apps.
    detail: Custom components relying on unpartitioned localStorage or
      sessionStorage across origins will fail once partitioning is enforced. A
      temporary opt-out setting exists through September 2024 for Chrome
      111-126, but Chrome 127+ users are already subject to partitioning with no
      workaround.
    upgradeAction: Audit LWC, Aura, and Visualforce code that reads or writes
      localStorage/sessionStorage in cross-origin iframes or Canvas contexts.
      Refactor to same-origin storage patterns or use postMessage/cross-document
      messaging before the September 2024 deadline.
    source:
      document: v61-summer24.pdf
      page: 107
      heading: Temporarily Opt Out of Google Chrome Storage Partitioning
    confidence: high
    id: v61-lwc-002
  - apiVersion: "61.0"
    release: Summer '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; affects new
      production orgs going live after April 8, 2024
    summary: New production orgs now enforce MFA by default for direct UI logins.
      Users logging in with username/password must provide a second factor
      (authenticator app, security key, or built-in authenticator). A 30-day
      grace period allows users to skip MFA initially.
    detail: This applies to direct logins only—SSO users must have MFA configured at
      their identity provider level. Sandbox orgs and trial orgs (until
      subscription conversion) are excluded. Integrations using OAuth flows or
      API-only authentication are unaffected, but any integration test harnesses
      or CI pipelines that perform UI-based logins to new production orgs will
      need MFA handling.
    upgradeAction: For any automation or testing that performs direct UI logins to
      new production orgs, implement MFA handling or switch to headless OAuth
      flows. Review CI/CD pipelines and ensure test users have registered
      verification methods or are covered by MFA exemptions where applicable.
    source:
      document: v61-summer24.pdf
      page: 108
      heading: MFA Is On by Default for Direct Logins to Production Orgs
    confidence: high
    id: v61-auth-002
  - apiVersion: "61.0"
    release: Summer '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (enforced Winter '25)
    summary: Autolaunched flows triggered by Apex will inherit the sharing rules of
      the calling Apex class when that class uses 'with sharing', instead of
      running with full system access.
    upgradeAction: Review autolaunched flows invoked from Apex to ensure they still
      function correctly under user sharing rules; test flows with restricted
      users before enforcement.
    source:
      document: v61-summer24.pdf
      page: 124
      heading: Release Updates
    confidence: high
    id: v61-flow-001
