    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (when LWS is enabled)
    summary: Lightning Web Security adds new distortions for
      Window.requestFileSystem and Window.webkitRequestFileSystem, and modifies
      existing distortions for custom element registration, shadow DOM
      attachment, shadowRoot access, and iframe/object source setters.
    detail: Components relying on FileSystem API access or specific behaviors of
      attachShadow, shadowRoot, CustomElementRegistry.define, or dynamic
      iframe/object src assignment may encounter changed runtime behavior under
      LWS.
    upgradeAction: Test LWC components that use FileSystem APIs, custom elements,
      shadow DOM manipulation, or dynamically set iframe/object sources with LWS
      enabled. Review the LWS Distortion Viewer for exact behavioral changes and
      update ESLint rules.
    source:
      document: v61-summer24.pdf
      page: 244
      heading: API Distortion Changes in Lightning Web Security
    confidence: high
