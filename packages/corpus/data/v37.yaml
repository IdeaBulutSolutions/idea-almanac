  - apiVersion: "37.0"
    release: Summer '16
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (Critical Update
      activation required)
    summary: "Percent field handling in Flow sObject variables is corrected: values
      passed between sObject percent fields no longer get unexpectedly
      transformed, but formula references now divide by 100. Existing
      workarounds that multiplied values to compensate for the old bug must be
      removed."
    detail: After activating this Critical Update, passing numeric or sObject
      percent values into another sObject's percent field preserves the value
      unchanged. However, referencing an sObject percent field inside a formula
      now divides by 100 (so 100 becomes 1). Flows with manual multiply-by-100
      workarounds will over-calculate once the update is active.
    upgradeAction: Identify all Flows referencing percent fields in sObject
      variables, activate the Critical Update in sandbox, remove any
      multiply-by-100 workarounds added for the old bug, and verify
      formula-based percent calculations produce correct results.
    source:
      document: v37-summer16.pdf
      page: 329
      heading: Trust Percent Values in Flow sObject Variables Again (Critical Update)
    confidence: high
    id: v37-flow-001
  - apiVersion: "37.0"
    release: Summer '16
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: soql-sosl
    appliesWhen: org-wide regardless of component API version
    summary: External objects now have an Allow Search toggle controlling SOSL and
      global search inclusion. Existing external objects get search enabled by
      default upon Summer '16 rollout, but new external objects default to
      search disabled.
    detail: "The behavioral shift affects SOSL queries: code searching external
      objects may return different results depending on whether the admin has
      enabled the new Allow Search flag. Both the external object and its parent
      external data source must have search enabled for SOSL to include
      records."
    upgradeAction: Review SOSL queries and global searches that target external
      objects. Verify the Allow Search setting matches your application's
      expectations, especially for newly created external objects where search
      is now off by default.
    source:
      document: v37-summer16.pdf
      page: 334
      heading: Control Whether an External Object Is Searchable
    confidence: medium
    id: v37-soql-002
