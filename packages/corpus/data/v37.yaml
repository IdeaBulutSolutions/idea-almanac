    summary: A new Apex method submitDigestJob(period) allows scheduled sending of
      Chatter email digests via the Schedulable interface, replacing the
      built-in digest schedule when the org-level API-only digests setting is
      enabled.
    detail: When API-only Chatter digests are enabled, the platform's automatic
      digest scheduling is disabled entirely. Developers must implement
      Schedulable with the new submitDigestJob method to trigger digest delivery
      at custom intervals.
    source:
