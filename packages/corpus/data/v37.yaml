  - apiVersion: "37.0"
    release: Summer '16
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version
    summary: When converting a lead and assigning the resulting
      account/contact/opportunity to a different user, the new record is now
      owned by that target user immediately rather than temporarily belonging to
      the converting user first.
    detail: Previously the converting user briefly owned the new record before
      ownership transferred. Under private sharing models, Apex code running
      during conversion could access the new record because the converting user
      owned it. Now the record is never owned by the converter, so Apex
      accessing the record during conversion will fail if the converting user
      lacks sharing access to the target owner's records.
    upgradeAction: Review Apex triggers and classes invoked during lead conversion
      that access the newly created Account, Contact, or Opportunity. If your
      org uses private sharing and code assumes the converting user owns these
      records, add explicit sharing grants or run the logic as the target owner.
    source:
      document: v37-summer16.pdf
      page: 131
      heading: Change to Record Ownership Flow During Lead Conversion
    confidence: high
    id: v37-sharing-001
