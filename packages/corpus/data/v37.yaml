    summary: Wave Analytics assets (apps, dashboards, lenses, datasets, dataflows)
      can now be included in managed and unmanaged packages, enabling
      distribution via AppExchange and deployment through change sets.
    detail: Partners and ISVs can create managed Wave packages with support for
      upgrade, delete, and deprecate operations. Change sets also honor Wave
      metadata for org-to-org transfers. Note that dataflow-dataset dependencies
      must be added manually (no automatic spidering), and image widgets require
      manual document ID updates on the target org.
    source:
      document: v37-summer16.pdf
      page: 139
      heading: A Whole New Wave of Apps
    confidence: high
    id: v37-packaging-001
