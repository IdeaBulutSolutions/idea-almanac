    summary: The PageReference getContent() and getContentAsPDF() methods now behave
      as callouts, meaning they count against callout limits and cannot be used
      in contexts where callouts are prohibited. Auto-activation was postponed
      to Winter '17.
    upgradeAction: Audit Apex code using getContent() or getContentAsPDF() to ensure
      callout limits are not exceeded and that these methods are not invoked in
      non-callout contexts like triggers or synchronous transactions without
      proper handling.
