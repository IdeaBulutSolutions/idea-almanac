    behaviorArea: lwc
    appliesWhen: org-wide for Communities after Spring '17 auto-activation (February
      2017); can be activated earlier via Critical Update
    summary: LockerService security enforcement becomes mandatory for Lightning
      components in Communities, blocking inline scripts in page head markup and
      applying the same security restrictions as the general LockerService
      critical update.
    detail: This critical update is separate from the general LockerService rollout
      and targets Communities specifically. Inline JavaScript in Community
      Builder head markup will fail. The enforcement auto-activates in Spring
      '17 but can be tested earlier. Communities using Salesforce Tabs +
      Visualforce template are unaffected.
    upgradeAction: Before Spring '17, enable the critical update in a sandbox,
      verify all custom Lightning components in Communities work correctly, and
      move any inline scripts in head markup to static resources or component
      bundles.
    source:
      document: v37-summer16.pdf
      page: 243
      heading: Enhance Security with LockerService for Communities (Critical Update)
    confidence: high
