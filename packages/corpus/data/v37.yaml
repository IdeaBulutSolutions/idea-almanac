  - apiVersion: "37.0"
    release: Summer '16
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: OAuth 2.0 token responses now include an X_ReadOnlyMode parameter
      indicating whether the org was in read-only mode when the token was
      issued, affecting what operations that token can perform.
    detail: During maintenance windows (splits, migrations, instance switches), orgs
      enter read-only mode. Tokens acquired in this state only permit read
      operations. Existing access tokens expire when read-only mode begins, and
      any tokens obtained during the window expire when the org returns to
      read-write mode. Integrations should check this parameter to handle
      degraded-write scenarios gracefully.
    upgradeAction: Review OAuth integrations to handle X_ReadOnlyMode=true
      responses; ensure clients can degrade gracefully when write operations are
      unavailable.
    source:
      document: v37-summer16.pdf
      page: 353
      heading: New X_ReadOnlyMode Parameter in OAuth 2.0 Responses
    confidence: medium
    id: v37-auth-004
