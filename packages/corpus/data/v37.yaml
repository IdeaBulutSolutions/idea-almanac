    summary: Salesforce Connect OData adapters now preserve hyphens in SOSL and
      Salesforce search query strings sent to external systems, instead of
      stripping all ASCII punctuation beforehand.
    upgradeAction: If your external system logic assumes hyphens are stripped from
      incoming search queries, update it to handle hyphenated strings or
      searches may fail.
    source:
