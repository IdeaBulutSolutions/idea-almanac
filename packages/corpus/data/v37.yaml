  - apiVersion: "37.0"
    release: Summer '16
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - Flow
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version (Critical Update
      activation required)
    summary: Programmatic approval submissions now validate that the submitter is in
      the allowed submitters list, matching the behavior of manual submissions.
      Code, flows, or processes that submit records for approval may route to a
      different approval process or fail if the submitter lacks permission.
    detail: Previously, when Apex, Process Builder, or flows submitted records for
      approval, Salesforce only checked entry criteria and ignored whether the
      submitterId was an allowed submitter. After activating this Critical
      Update, the platform also verifies the submitter is permitted, which can
      change which approval process is selected or cause submissions to fail.
    upgradeAction: Audit all Apex classes, flows, and processes that call approval
      submission methods. For each approval process they can invoke, ensure the
      submitterId (or the running user if none is specified) is in the allowed
      submitters list. Test thoroughly after activating the Critical Update.
    source:
      document: v37-summer16.pdf
      page: 340
      heading: Make Sure Records That Are Submitted Behind the Scenes Are Routed to
        the Right Approval Process (Critical Update)
    confidence: high
    id: v37-apex-003
