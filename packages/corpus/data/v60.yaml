    behaviorArea: lwc
    appliesWhen: LWC components compiled at API >= 60.0
    summary: LWC now renders empty HTML comments instead of empty text nodes for
      virtual DOM placeholders in slots, scoped slots, and lwc:if directives,
      which can break tests or code that traverse DOM using childNodes or
      nextSibling.
    upgradeAction: Review and update test snapshots and any JavaScript that
      navigates the DOM via childNodes, nextSibling, or similar APIs, since the
      node types at placeholder positions have changed from text to comment
      nodes.
    source:
      document: v60-spring24.pdf
      page: 228
      heading: Empty Comment Nodes Replace Empty Text Nodes
    confidence: high
    id: v60-lwc-002
