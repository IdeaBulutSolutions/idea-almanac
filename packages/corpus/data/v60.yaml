    impact: breaking
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: LWC components compiled at API >= 60.0
    summary: LWC decorators (@api, @track, @wire) are now restricted to classes
      extending LightningElement; using them in plain classes throws a syntax
      error at version 60.0+.
    upgradeAction: Before upgrading components to API 60.0, search for @api, @track,
      or @wire in non-LightningElement classes and refactor by either removing
      the decorators or converting those classes to extend LightningElement.
    source:
      document: v60-spring24.pdf
