  - apiVersion: "60.0"
    release: Spring '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (when LWS is enabled)
    summary: Lightning Web Security introduces new distortions for Selection and
      Document.execCommand APIs, while removing distortions for
      Element.attributes and several HTMLIFrameElement properties. LWC code
      using these browser APIs may behave differently under LWS.
    detail: "New distortions apply to Selection methods (collapse, extend,
      selectAllChildren, setBaseAndExtent, setPosition) and
      Document.execCommand. Previously distorted APIs now run without
      distortion: Element.attributes getter, and HTMLIFrameElement properties
      allowPaymentRequest, csp, featurePolicy, and referrerPolicy."
    upgradeAction: Review LWC code that manipulates text selections or uses
      execCommand for potential behavioral changes. Code using
      Element.attributes or the removed iframe distortions may now work
      differently since those distortions were lifted.
    source:
      document: v60-spring24.pdf
      page: 234
      heading: API Distortion Changes in Lightning Web Security
    confidence: high
    id: v60-lwc-009
  - apiVersion: "60.0"
    release: Spring '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Lightning Web Security now silently converts any open shadow root to
      closed mode instead of throwing an error, preventing JavaScript access to
      shadow DOM internals.
    detail: Components that previously failed with an error when attempting to
      create open shadow roots will now succeed but operate with closed shadow
      semantics. Code that relied on accessing shadow root internals via
      JavaScript will silently lose that access.
    upgradeAction: Review any LWC code that creates shadow roots with mode:'open' or
      that attempts to traverse into another component's shadow DOM; these
      patterns will no longer work as expected under LWS.
    source:
      document: v60-spring24.pdf
      page: 235
      heading: LWS Automatically Uses Closed Shadow Root Mode
    confidence: high
    id: v60-lwc-010
