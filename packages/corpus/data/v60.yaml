  - apiVersion: "60.0"
    release: Spring '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version; rolling deployment
      through June 2024
    summary: Stacked modals from custom quick actions no longer trigger post-save
      navigation to the newly created record. Instead, users return to the
      originating record page after saving.
    detail: This behavioral shift affects custom Aura and LWC components that rely
      on force:createRecord within stacked modal contexts. Components that
      expected automatic navigation to the new record must now explicitly manage
      navigation using lightning:navigation (Aura) or lightning/navigation (LWC)
      with the replace property.
