    behaviorArea: lwc
    appliesWhen: LWC components compiled at API >= 60.0
    summary: Light DOM slots now include extra empty text nodes, causing childNodes,
      firstChild, and lastChild to return different results than before—code
      indexing into childNodes may now hit whitespace instead of the expected
      element.
    upgradeAction: Replace uses of childNodes, firstChild, and lastChild with
      children, firstElementChild, lastElementChild, lwc:ref, or querySelector
      before upgrading components to API 60.0.
    source:
      document: v60-spring24.pdf
      page: 228
      heading: Light DOM Renders Additional Whitespace Characters
