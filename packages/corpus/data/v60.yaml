    appliesWhen: org-wide regardless of component API version; scheduled for
      enforcement in Spring '25
    summary: When an Apex invocable action called via REST API throws an exception,
      the entire transaction will be rolled back to preserve data integrity,
      rather than leaving partial changes committed.
    upgradeAction: Review REST API integrations invoking Apex actions that may throw
      exceptions. Ensure calling code handles failures appropriately and that
      partial success scenarios are no longer expected.
