entries:
  - apiVersion: "60.0"
    release: Spring '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
      - VisualforcePage
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version; temporary opt-out
      available until September 3, 2024
    summary: Chrome's storage partitioning takes effect for Salesforce domains in
      Summer '24, breaking cross-origin localStorage and sessionStorage access
      in third-party contexts. Custom components using these APIs across
      different origins will stop sharing storage.
    detail: Salesforce's deprecation trial extension ends September 3, 2024, after
      which partitioning is mandatory regardless of org settings. A temporary
      opt-out setting is available until that date to allow migration time.
    upgradeAction: Audit LWC, Aura, and Visualforce code that reads or writes
      localStorage/sessionStorage in third-party iframe contexts. Replace
      cross-origin storage patterns with same-origin solutions or explicit
      cross-origin communication mechanisms before September 2024.
    source:
      document: v60-spring24.pdf
      page: 97
      heading: Temporarily Opt Out of Google Chrome Storage Partitioning
    confidence: medium
    id: v60-lwc-001
  - apiVersion: "60.0"
    release: Spring '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; applies to production
      orgs created on or after April 8, 2024, and existing orgs not already
      auto-enabled for MFA
    summary: MFA becomes the default login requirement for production orgs, meaning
      integrations or automated processes relying on direct UI login without MFA
      will be blocked after a 30-day grace period.
    detail: Salesforce enforces MFA by default on the direct login flow for affected
      production orgs. Users must provide a second verification factor
      (authenticator app, security key, or built-in authenticator) after
      username/password. Sandbox orgs and trial orgs are excluded until
      subscription conversion. Admins can temporarily disable MFA via the
      Identity Verification page, but re-enablement is contractually required.
    upgradeAction: Review any test automation, CI/CD pipelines, or tooling that
      authenticates via direct UI login and ensure they use headless OAuth flows
      or other non-UI authentication methods that are MFA-compatible. Confirm
      all interactive users have registered a verification method.
    source:
      document: v60-spring24.pdf
      page: 99
      heading: MFA Is Turned On by Default Starting April 2024
    confidence: high
    id: v60-auth-001
  - apiVersion: "60.0"
    release: Spring '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: The Operating Hours object's default sharing setting changes to
      Private, requiring orgs to verify or manually configure sharing settings.
      After configuration, specific IndustriesSettings Metadata API fields must
      be set to true for authenticated and guest users respectively.
    detail: Salesforce runs a release task to update Operating Hours sharing to
      Public Read/Write for authenticated users, but manual verification is
      needed. Guest users must create sharing rules manually. The
      enableDepriveSoqlAccessOrgPref and enableDepriveSoqlAccessGuestUserOrgPref
      fields in IndustriesSettings Metadata API will be deprecated in Summer
      '24.
    upgradeAction: Verify Operating Hours sharing settings are correctly configured
      after the release task runs. For guest user integrations, create
      appropriate sharing rules. Set the relevant IndustriesSettings Metadata
      API fields to true, and plan to remove references to these fields before
      Summer '24 when they are deprecated.
    source:
      document: v60-spring24.pdf
      page: 104
      heading: Other Changes to Salesforce Scheduler
    confidence: medium
    id: v60-rest-001
