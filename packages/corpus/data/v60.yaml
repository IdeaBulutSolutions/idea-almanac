    summary: "Bulk REST API calls to invocable actions now use partial-save
      semantics: a single failure no longer rolls back the entire transaction.
      Instead, Salesforce retries successful actions up to three times and only
      rolls back the specific actions that fail."
    detail: This release update was originally enforced in Spring '20 but was
      inadvertently reverted for some orgs. The re-enforcement changes how
      external REST API integrations invoking multiple actions in one request
      handle failures. Note that certain action types (including Invocable Apex,
      External Services, and several Order Management actions) do not support
      partial save. External callouts may execute multiple times due to retries
      and cannot be rolled back, potentially causing duplicate side effects and
      increased limit consumption.
    upgradeAction: Audit REST API integrations that invoke actions in bulk to ensure
      they handle partial success responses correctly. Verify external callout
      idempotency since retries may cause repeated executions. Monitor limit
      usage as retry behavior can increase transaction duration.
