    summary: 29 additional base Lightning components had their internal DOM
      structure modified in preparation for native shadow DOM support. Tests
      that query or assert against the internal element hierarchy of these
      components will break.
    upgradeAction: Audit integration and UI tests for direct DOM queries against the
