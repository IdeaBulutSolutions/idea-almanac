  - apiVersion: "60.0"
    release: Spring '24
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: LWC components compiled at API >= 60.0
    summary: LWC drops Babel transpilation for object rest/spread syntax in favor of
      native JavaScript behavior, which can change observable side-effect counts
      in getters due to a Babel bug that previously caused double invocation.
    detail: Code that relied on the Babel-specific behavior where getters were
      invoked twice during destructuring with rest/spread will now see the
      getter called only once with native syntax. This affects any logic
      depending on side-effect counts inside getters used in destructuring
      patterns.
    upgradeAction: Review any components using object destructuring with rest/spread
      that have getters with side effects; verify that logic does not depend on
      the getter being called multiple times during a single destructuring
      operation.
    source:
      document: v60-spring24.pdf
      page: 230
      heading: Object Rest and Spread Transpilation Is Removed
    confidence: high
    id: v60-lwc-005
  - apiVersion: "60.0"
    release: Spring '24
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version; requires Lightning
      Web Security enabled
    summary: LWC Workspace API reaches general availability, providing programmatic
      control over console app tabs and subtabs. Lightning Web Security must be
      enabled as Lightning Locker does not support this API.
    detail: The lightning/platformWorkspaceApi module exposes methods (closeTab,
      openTab, openSubtab, focusTab, refreshTab, etc.), wire adapters
      (EnclosingTabId, IsConsoleNavigation), and Lightning message channels for
      tab lifecycle events. This replaces or supplements Aura workspace APIs for
      console apps migrating to LWC.
    source:
      document: v60-spring24.pdf
      page: 230
      heading: Control Workspace Tabs and Subtabs (Generally Available)
    confidence: high
    id: v60-lwc-006
