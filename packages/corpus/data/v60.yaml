  - apiVersion: "60.0"
    introducedIn: "59.0"
    release: Spring '24
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce no longer persists implicit child share records linking
      accounts to their opportunity children. SOQL queries and Apex tests that
      previously retrieved these share records now return empty results.
    detail: This release update first appeared in Winter '24 (API 59.0) and enforces
      in Spring '24. The platform now evaluates opportunity access dynamically
      at runtime rather than storing share rows. Any code or tests that query
      OpportunityShare expecting implicit child records will break.
    upgradeAction: Search for SOQL queries against OpportunityShare or related share
      objects that filter on implicit child shares. Update Apex tests asserting
      on these records to reflect the new dynamic-evaluation model or remove
      those assertions entirely.
    source:
      document: v60-spring24.pdf
      page: 187
      heading: Enable Faster Account Sharing Recalculation by Not Storing Opportunity
        Implicit Child Shares (Release Update)
    confidence: high
    id: v60-sharing-002
  - apiVersion: "60.0"
    release: Spring '24
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Any
    behaviorArea: other
    appliesWhen: org-wide regardless of component API version; enforced on rolling
      basis starting Spring '24, deferrable until Spring '25
    summary: Salesforce replaces JDK locale formats with ICU locale formats
      org-wide, altering how dates, times, currencies, numbers, addresses, and
      names render across the platform. Code or integrations parsing or
      generating formatted locale strings may produce different results.
    detail: This Release Update was introduced in Winter '20 but enforcement begins
      rolling out in Spring '24. Orgs created Winter '20 or later already have
      ICU enabled. Admins can defer until Spring '25 via User Interface
      settings. The en_CA locale requires separate activation.
    upgradeAction: Audit Apex, Visualforce, LWC, and integrations that parse or
      compare formatted date/time/currency/number strings. Test locale-sensitive
      displays and any code relying on specific JDK format patterns before
      enforcement.
    source:
      document: v60-spring24.pdf
      page: 189
      heading: Enable ICU Locale Formats (Release Update)
    confidence: high
    id: v60-other-001
