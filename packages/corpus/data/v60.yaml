    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: Data Cloud metadata can now be packaged using second-generation managed
      packaging (2GP). Partners can retrieve data kit metadata via CLI, use
      scratch orgs, and manage versioned packages with dependencies.
    detail: This extends 2GP support to Data Cloud-specific metadata types.
      Developers must first add Data Cloud metadata to a data kit, then include
      the data kit in a package. Available to Salesforce Partners only starting
      April 2024.
    source:
      document: v60-spring24.pdf
      page: 212
