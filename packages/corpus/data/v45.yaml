    release: Spring '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: A new Apex method System.UserManagement.sendAsyncEmailConfirmation() is
      available to trigger asynchronous email verification for users, enabling
      deferred identity confirmation workflows.
    source:
      document: v45-spring19.pdf
      page: 407
      heading: Asynchronous Email Verifications
    confidence: high
