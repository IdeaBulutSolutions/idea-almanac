apiVersion: "45.0"
release: Spring '19
reviewed: true
entries:
  - apiVersion: "45.0"
    release: Spring '19
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: Tooling API requests at API version >= 45.0
    summary: Several Tooling API metadata objects now require View Setup and
      Configuration permission. Users without this permission can no longer
      query ColorDefinition, FormulaFunction, FormulaFunctionCategory,
      FormulaOperator, IconDefinition, or TabDefinition.
    upgradeAction: Verify that integrations querying these Tooling API objects have
      the View Setup and Configuration permission assigned, or handle permission
      errors gracefully.
    source:
      document: v45-spring19.pdf
      page: 12
      heading: Release Note Changes
    confidence: high
    id: v45-rest-001
  - apiVersion: "45.0"
    release: Spring '19
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
      - LWC
      - AuraDefinitionBundle
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Apex method parameters in Lightning components now undergo stricter
      validation and deserialization. Data passed to Apex controllers is more
      rigorously type-checked before method invocation.
    upgradeAction: Test Lightning component interactions with Apex controllers to
      ensure parameter data types conform to method signatures, particularly for
      edge cases involving type coercion.
    source:
      document: v45-spring19.pdf
      page: 12
      heading: Release Note Changes
    confidence: medium
    id: v45-apex-001
  - apiVersion: "45.0"
    release: Spring '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Lightning web components can now be deployed to the utility bar by
      declaring the lightning__UtilityBar target in the component's metadata
      configuration file. Note that utility bar LWCs cannot yet use APIs or run
      as background utilities.
    source:
      document: v45-spring19.pdf
      page: 76
      heading: Use Lightning Web Components in the Utility Bar
    confidence: high
    id: v45-lwc-001
  - apiVersion: "45.0"
    release: Spring '19
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
      - Integration
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version; auto-activated
      October 30, 2019
    summary: AccountShare records switch from the TerritoryManual reason code to
      Territory2AssociationManual for manual territory assignments, breaking any
      Apex or integrations that filter or query on the old value.
    detail: This Critical Update replaces all existing TerritoryManual reason codes
      with Territory2AssociationManual and uses the new code going forward. The
      change is irreversible once activated and propagates across existing
      records.
    upgradeAction: Search Apex code and integrations for references to the
      TerritoryManual reason code on AccountShare and replace with
      Territory2AssociationManual before the auto-activation date.
    source:
      document: v45-spring19.pdf
      page: 115
      heading: Enable Manual Account Sharing in Enterprise Territory Management
        (Critical Update)
    confidence: high
    id: v45-sharing-001
  - apiVersion: "45.0"
    release: Spring '19
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Original Territory Management is fully retired in Summer '20, meaning
      any integrations or Apex code referencing its objects (Territory,
      AccountTerritoryAssignmentRule, UserTerritory, etc.) or API endpoints will
      cease to function.
    detail: After retirement, the feature and its underlying data become
      inaccessible. Organizations must migrate to Enterprise Territory
      Management before Summer '20 to preserve territory-based logic in custom
      code or integrations.
    upgradeAction: Audit Apex, SOQL queries, and API integrations for references to
      original territory management objects; migrate to Enterprise Territory
      Management objects and APIs before the Summer '20 release.
    source:
      document: v45-spring19.pdf
      page: 118
      heading: Original Territory Management Is Being Retired
    confidence: high
    id: v45-rest-002
  - apiVersion: "45.0"
    release: Spring '19
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
      - Flow
    behaviorArea: api-rest
    appliesWhen: org-wide for orgs created in Spring '19 or later
    summary: Organizations provisioned from Spring '19 onward now count email
      alerts, simple email actions, Send Email flow actions, and REST API calls
      against the 5,000 daily external email cap. Older orgs remain limited only
      for Apex and non-REST API sends.
    detail: This is an org-creation-date-based enforcement change, not a component
      version change. Pre-Spring '19 orgs keep the legacy counting (Apex and
      SOAP/Bulk API only). New orgs hitting the limit receive an email
      notification and a debug log entry.
    upgradeAction: For new orgs or sandbox refreshes post-Spring '19, audit total
      external email volume across flows, email alerts, and REST API
      integrations to avoid hitting the combined 5,000/day ceiling.
    source:
      document: v45-spring19.pdf
      page: 132
      heading: Expanded Enforcement of Daily External Email Limit for New Orgs
    confidence: high
    id: v45-rest-003
  - apiVersion: "45.0"
    release: Spring '19
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: other
    appliesWhen: org-wide regardless of component API version
    summary: Connect for Office (Excel and Word add-ons) along with standard Mail
      Merge functionality have been fully retired and are no longer available
      for use.
    upgradeAction: Migrate any workflows relying on Connect for Office or standard
      Mail Merge to alternative solutions documented in Salesforce's product
      retirement resources.
    source:
      document: v45-spring19.pdf
      page: 156
      heading: Connect for Office
    confidence: medium
    id: v45-other-001
  - apiVersion: "45.0"
    release: Spring '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Lightning Web Components become generally available as a new component
      model, enabling developers to build custom elements using standard HTML
      and modern JavaScript that can coexist with Aura components on community
      pages.
    source:
      document: v45-spring19.pdf
      page: 305
      heading: Use Custom Lightning Web Components in Communities
    confidence: high
    id: v45-lwc-002
  - apiVersion: "45.0"
    release: Spring '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: The lightning:container component can now be used within Lightning
      Communities, enabling developers to embed third-party JavaScript framework
      applications (React, Angular, Vue) in community pages.
    source:
      document: v45-spring19.pdf
      page: 305
      heading: Get More Use Out of Your Code with Lightning Container Components in
        Communities
    confidence: high
    id: v45-aura-001
  - apiVersion: "45.0"
    release: Spring '19
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version
    summary: A new org-wide setting lets admins disable the default sharing behavior
      that gives case contacts (and their role hierarchy) automatic access to
      cases. When disabled, developers must implement manual shares or Apex
      managed sharing to grant case access to community users.
    upgradeAction: If this setting is disabled in your org, review any community
      user workflows that assume contacts can see their associated cases and
      implement explicit sharing via Apex managed sharing or manual shares where
      needed.
    source:
      document: v45-spring19.pdf
      page: 321
      heading: Restrict Community User Access to Cases (Generally Available)
    confidence: high
    id: v45-sharing-002
  - apiVersion: "45.0"
    release: Spring '19
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: When the _iframeDomain URL variable is missing in Internet Explorer,
      the platform now falls back to checking an iframeDomain cookie to
      determine allowed iframe embedding domains, enabling a workaround for IE's
      URL variable persistence issues.
    detail: Developers embedding Visualforce pages in iframes for Communities/Sites
      can now set an iframeDomain cookie via the Apex Cookie class to whitelist
      framing domains. This provides a fallback when IE fails to preserve the
      _iframeDomain URL parameter across page navigations.
    upgradeAction: If your Communities or Sites embed Visualforce pages in iframes
      and you support Internet Explorer users, implement the iframeDomain cookie
      pattern shown in the release notes to ensure consistent iframe behavior.
    source:
      document: v45-spring19.pdf
      page: 322
      heading: Set the iframeDomain Cookie in Sites and Communities in Internet Explorer
    confidence: medium
    id: v45-vf-001
  - apiVersion: "45.0"
    release: Spring '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - VisualforcePage
      - ApexClass
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: Community identity verification pages can now be fully customized using
      Visualforce markup and new Apex methods, replacing the
      Salesforce-generated form while retaining verification functionality.
    source:
      document: v45-spring19.pdf
      page: 323
      heading: Create Your Own Verify Page for Community Sign-Ups
    confidence: medium
    id: v45-vf-002
  - apiVersion: "45.0"
    release: Spring '19
    changeType: deprecated
    impact: deprecation
    affectedMetadataTypes:
      - VisualforcePage
      - VisualforceComponent
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: The $Site.AdminEmailAddress merge field stops returning the Site
      Contact email and instead returns an empty string. Code relying on this
      field must switch to a SOQL query against the Site object to retrieve the
      admin email.
    upgradeAction: Search Visualforce pages and components for
      $Site.AdminEmailAddress references. Replace them with an Apex controller
      method that queries SELECT Admin.Email FROM Site WHERE Id =
      :Site.getSiteId() and exposes the result.
    source:
      document: v45-spring19.pdf
      page: 324
      heading: $Site.AdminEmailAddress to Be Deprecated in Summer '19
    confidence: high
    id: v45-vf-003
  - apiVersion: "45.0"
    release: Spring '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: Asset files in managed packages can now be updated and republished,
      with automatic propagation to subscriber orgs. However,
      ContentDocumentLink shares on existing assets cannot be updated through
      the package—only new shares can be added.
    detail: This changes the immutability model for asset files in managed packages.
      Developers can now version asset file documents in the developer org with
      automatic delivery to subscribers. The sharing limitation via
      ContentDocumentLink means integrations that relied on packaging to
      distribute share configurations for assets need adjustment.
    source:
      document: v45-spring19.pdf
      page: 330
      heading: Update Asset Files in Managed Packages
    confidence: medium
    id: v45-packaging-001
  - apiVersion: "45.0"
    release: Spring '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Flow
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: The Flow metadata type gains an isTemplate field (Metadata API) and
      IsTemplate field (Tooling API), enabling processes and flows to be marked
      as clonable templates that can be opened even when installed from managed
      packages.
    source:
      document: v45-spring19.pdf
      page: 370
      heading: Create or Install Pre-Built Business Processes That You Can Customize
    confidence: high
    id: v45-packaging-002
  - apiVersion: "45.0"
    release: Spring '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Flows and processes can now perform lookup, create, and update
      operations on Salesforce Connect external objects, enabling automation
      that spans internal and external data sources within a single flow.
    source:
      document: v45-spring19.pdf
      page: 372
      heading: Access Data Outside Salesforce with Processes and Flows via External
        Objects
    confidence: medium
    id: v45-flow-001
  - apiVersion: "45.0"
    release: Spring '19
    changeType: changed
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: External Services schemas no longer reject variable names that match
      Apex reserved keywords like 'end', 'number', 'object', or 'transaction',
      removing previous naming restrictions when importing external API
      definitions.
    source:
      document: v45-spring19.pdf
      page: 398
      heading: Include Reserved Apex Names in External Services Schema
    confidence: high
    id: v45-rest-004
  - apiVersion: "45.0"
    release: Spring '19
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version (critical update
      auto-enabled May 17, 2019)
    summary: Lightning components must prefix all pageReference.state properties and
      URL query parameters with a namespace (registered or the default 'c__');
      unprefixed parameters are stripped from /lightning/ URLs.
    detail: This critical update resolves naming collisions between package
      components by requiring namespace prefixes on custom query parameters.
      Components lacking the prefix will have those parameters silently removed
      from URLs. Visualforce, Salesforce Classic, Communities, and standard
      report parameters are unaffected.
    upgradeAction: Audit all Lightning components that read or write
      pageReference.state or custom query parameters. Add your registered
      namespace or the default 'c__' prefix. Test navigation flows involving
      /lightning/ URLs both inside and outside managed packages.
    source:
      document: v45-spring19.pdf
      page: 398
      heading: Add a Namespace Prefix to pageReference.state Properties and Query
        Parameters
    confidence: high
    id: v45-lwc-003
  - apiVersion: "45.0"
    release: Spring '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Developers can now implement a custom Apex handler using the
      MyDomainLoginDiscoveryHandler interface to enable identity-first login
      flows, where users enter an identifier (email/phone) and are routed to the
      appropriate authentication method or IdP.
    source:
      document: v45-spring19.pdf
      page: 401
      heading: My Domain Login Discovery
    confidence: high
    id: v45-auth-001
  - apiVersion: "45.0"
    release: Spring '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version (requires My Domain enabled)
    summary: A new UserAuthCertificate object is available via REST API, SOAP API,
      and standard API operations, enabling programmatic management of
      PEM-encoded X.509 certificates for user authentication.
    detail: External API tools like Data Loader can now integrate with the
      UserAuthCertificate object to upload and manage per-user digital
      certificates. This extends the authentication options available to API
      consumers building identity integrations.
    source:
      document: v45-spring19.pdf
      page: 403
      heading: Certificate-Based Authentication
    confidence: medium
    id: v45-auth-002
  - apiVersion: "45.0"
    release: Spring '19
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: OAuth 2.0 dynamic client registration and token introspection endpoints
      are now GA, allowing OAuth clients to programmatically register child
      connected apps and inspect token state across the org.
    detail: Connected apps can now use the RFC 7591 dynamic registration endpoint to
      create child OAuth clients automatically, and the RFC 7662 introspection
      endpoint to query access/refresh token validity. Admins can also grant a
      single connected app permission to introspect all tokens org-wide.
    source:
      document: v45-spring19.pdf
      page: 404
      heading: Integrations with Auth 2.0 Endpoints
    confidence: high
    id: v45-auth-003
  - apiVersion: "45.0"
    release: Spring '19
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version; affects newly created
      connected apps and any existing app whose secret is replaced via Metadata
      API
    summary: OAuth 2.0 connected app client secrets now require a minimum of 32
      characters. Existing apps are unaffected, but any new app or secret
      replacement via Metadata API must meet this length requirement.
    upgradeAction: If you programmatically create or replace connected app secrets
      via Metadata API, ensure the consumerSecret value is at least 32
      characters long.
    source:
      document: v45-spring19.pdf
      page: 405
      heading: Client Secret New Size Requirement
    confidence: high
    id: v45-auth-004
