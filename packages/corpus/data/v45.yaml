    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Cache-only encryption keys can now be managed programmatically via
      Enterprise API, including rotation, generation, and
      certificate/named-credential updates.
    detail: Organizations using the Cache-Only Key Service add-on can now automate
      key lifecycle operations through Enterprise API rather than manual Setup
      configuration. This enables scripted key rotation workflows and
