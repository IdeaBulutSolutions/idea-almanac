    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: Aura component JavaScript controllers can now pass JavaScript objects
      directly to Apex controller methods that accept custom Apex class
      parameters, with automatic type mapping when the Apex class properties
      have @AuraEnabled annotations with getters and setters.
    source:
      document: v45-spring19.pdf
