    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: Data passed from Aura JavaScript controllers to Apex methods now
      undergoes stricter type validation and improved deserialization for
      Integer, Long, Double, Date, Time, List, SObject, and Object parameters.
      Previously silent mismatches now throw detailed errors.
    upgradeAction: Review Aura components that call Apex methods with numeric, date,
      time, or collection parameters. Code relying on loose type coercion or
      workarounds for previous deserialization bugs may fail or behave
