    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Organizations can now enforce high-assurance session requirements for
      UserRole and Role Metadata API operations, meaning integrations using
      standard session tokens may fail if high-assurance is enabled and the
      session does not meet the requirement.
    upgradeAction: If your org enables this setting, ensure Metadata API
      integrations that modify roles use authentication flows that produce
      high-assurance sessions, or handle 401/insufficient-session-level errors
      gracefully.
    source:
      document: v45-spring19.pdf
      page: 410
      heading: Secure Access to Editing Roles
