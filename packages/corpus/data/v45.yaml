  - apiVersion: "45.0"
    release: Spring '19
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Lightning Web Components introduce Shadow DOM encapsulation, which
      hides component internals from traditional DOM queries and breaks existing
      Selenium-style UI tests that rely on global DOM traversal.
    detail: Elements rendered by LWC now contain a shadowRoot property that
      encapsulates their DOM subtree as a DocumentFragment. Standard DOM
      querying methods cannot reach elements inside this shadow boundary,
      requiring test frameworks to use shadow-piercing techniques.
    upgradeAction: Audit existing Selenium WebDriver or similar UI tests for global
      DOM queries against Lightning components. Migrate unit tests to Lightning
      Testing Service (Aura) or lwc-jest (LWC), and update end-to-end tests to
      handle Shadow DOM traversal.
    source:
      document: v45-spring19.pdf
      page: 434
      heading: DOM Inspection Tests Are Subject to Change
    confidence: high
    id: v45-lwc-008
  - apiVersion: "45.0"
    release: Spring '19
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: Aura components created dynamically via $A.createComponent() or
      $A.createComponents() can no longer include <script> tags. This closes a
      security gap that previously allowed script injection in dynamically
      generated components.
    upgradeAction: Audit any code using $A.createComponent() that injects script
      tags. Refactor to upload JavaScript as a static resource and reference it
      with <ltng:require> in the component markup instead.
    source:
      document: v45-spring19.pdf
      page: 435
      heading: Script Tags Blocked in Dynamically Created Components
    confidence: high
    id: v45-aura-005
  - apiVersion: "45.0"
    release: Spring '19
    changeType: changed
    impact: behavior-change
