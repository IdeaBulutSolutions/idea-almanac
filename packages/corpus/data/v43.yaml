    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: The interface for Lightning components usable as flow local actions was
      renamed from flowruntime:availableForFlowLocalActions to
      lightning:availableForFlowActions, and the callback-based control flow was
      replaced with Promise-based resolution.
    detail: "Components built during the pilot must be updated: change the interface
      declaration and refactor any callback usage to return a Promise instead,
      as the flow now resumes when the method completes or the Promise
      resolves."
    upgradeAction: Update any pilot-era local-action components to implement
      lightning:availableForFlowActions and replace callback invocations with
      Promise returns.
    source:
      document: v43-summer18.pdf
      page: 411
      heading: Perform Local Actions in Flows by Using Lightning Components (Generally
        Available)
    confidence: high
    id: v43-aura-004
