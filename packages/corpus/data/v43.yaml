    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: When passing $Flow.ActiveStages or $Flow.CurrentStage to Lightning
      component attributes, the stage label is now returned instead of the fully
      qualified stage name.
    detail: Previously, passing flow stage system variables to Lightning components
      yielded the fully qualified stage name. With GA of flow stages, these now
      resolve to the human-readable label, which may break components that
      parsed or compared the old format.
    upgradeAction: Review any custom Lightning components that consume
      $Flow.ActiveStages or $Flow.CurrentStage and ensure they handle stage
      labels rather than fully qualified names.
    source:
