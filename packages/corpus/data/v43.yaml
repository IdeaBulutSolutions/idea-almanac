  - apiVersion: "43.0"
    release: Summer '18
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Scheduled process actions and waiting flow interviews now batch only
      when they share the same execution time, process/flow version ID, and
      triggering user ID. Previously batches could mix different versions and
      users, leading to unexpected governor limit failures or mixed DML errors.
    detail: This tighter batching scope reduces cross-contamination where one user's
      scheduled action could cause another user's unrelated scheduled action to
      fail. Each homogeneous batch runs in its own transaction, making governor
      limit consumption and Setup-vs-standard DML isolation more predictable.
    upgradeAction: Review scheduled actions that previously failed intermittently
      due to batching with unrelated processes. Failures should become more
      consistent and traceable to specific flows. No code changes required, but
      monitoring and error-handling logic may need adjustment.
    source:
      document: v43-summer18.pdf
      page: 424
      heading: More Granular Batching for Scheduled Actions and Flow Interviews Help
        You Avoid Runtime Errors
    confidence: high
    id: v43-flow-002
  - apiVersion: "43.0"
    release: Summer '18
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (Critical Update
      requiring admin activation)
    summary: When activated, this Critical Update makes Flow and Process Builder
      execute bulkifiable queries together in batches rather than one-by-one,
      reducing SOQL query consumption against governor limits.
    detail: Prior to activation, flows and processes deferred queries for
      bulkification but still executed each query individually. After
      activation, multiple interviews reaching the same query operation within
      one transaction have their queries combined into a single batch operation.
      This affects Record Lookup, Fast Lookup, Record Update, Record Delete,
      Subflow, and Apex elements that generate queries.
    upgradeAction: Test all flows and processes in a sandbox after activating this
      Critical Update. Watch for edge cases where query batching changes
      expected behavior, particularly with objects that do not support bulk
      operations (e.g., UserRecordAccess, IdeaComment).
    source:
      document: v43-summer18.pdf
      page: 425
      heading: Enable Flow and Process Queries to Execute in Batches (Critical Update)
    confidence: high
    id: v43-flow-003
  - apiVersion: "43.0"
    release: Summer '18
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (Critical Update
      activation required)
    summary: When activated, a process failure during batch create/update operations
      no longer rolls back the entire transaction. Instead, only records whose
      processes failed are rolled back, while successful records are saved after
      up to three retry attempts.
    detail: This partial-save behavior applies specifically to Create a Record and
      Update Records immediate actions in record-change processes. Other action
      types (Email Alerts, Flows, Post to Chatter, Processes, Quick Actions,
      Submit for Approval) and actions in platform-event processes, invocable
      processes, or scheduled actions still follow all-or-nothing semantics.
    upgradeAction: Before activating in production, test in sandbox to verify that
      processes relying on all-or-nothing transaction semantics still behave
      correctly. Code or integrations expecting entire batches to fail
      atomically may need revision to handle partial success scenarios.
    source:
      document: v43-summer18.pdf
      page: 426
      heading: Enable Partial Save for Create and Update Operations in Processes
        (Critical Update)
    confidence: high
    id: v43-flow-004
  - apiVersion: "43.0"
    release: Summer '18
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Flow interviews running in Lightning runtime now terminate when the
      user's session ends, matching the existing Classic runtime behavior. Any
      actions queued but not yet committed (pending record operations, emails)
      are lost if a session timeout occurs mid-interview.
    detail: Transactions commit only when the interview finishes, reaches a Screen
      element, or reaches a Wait element. If a user session expires before one
      of those commit points, uncommitted work is discarded.
    upgradeAction: Review flows with long user-facing segments between commit
      points; consider adding intermediate Screen or Wait elements, and adjust
      session timeout settings if users frequently lose progress.
    source:
      document: v43-summer18.pdf
      page: 427
      heading: Flow Interviews End When User Sessions End
    confidence: high
    id: v43-flow-005
