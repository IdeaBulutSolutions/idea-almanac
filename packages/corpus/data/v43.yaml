      to be opened directly in console workspace tabs and subtabs via
      openTab()/openSubtab() navigation methods, replacing the older
      force:navigateToComponent pattern with a URL-stable pageReference
      approach.
    source:
      document: v43-summer18.pdf
      page: 89
      heading: Open Custom Lightning Components in Workspace Tabs and Subtabs
    confidence: high
    id: v43-aura-002
