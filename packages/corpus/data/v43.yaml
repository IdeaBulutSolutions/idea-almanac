    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: Lightning container components now enforce that the component's
      namespace must match the static resource's namespace, and raw iframe
      elements are blocked unless they include a session-unique confirmation
      token query parameter.
    upgradeAction: Verify that all lightning:container components reference static
      resources in the same namespace. Replace any raw iframe elements with
      lightning:container using the $Resource global value provider.
    source:
      document: v43-summer18.pdf
      page: 481
