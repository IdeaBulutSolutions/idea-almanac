      base-64 encoded routes and lets you control which attributes can be set
      during navigation.
    upgradeAction: Replace force:navigateToComponent usage with lightning:navigation
      and ensure target components implement lightning:isUrlAddressable. Test
      navigation flows in Lightning Experience and mobile app contexts.
