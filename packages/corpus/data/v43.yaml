  - apiVersion: "43.0"
    release: Summer '18
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: soql-sosl
    appliesWhen: org-wide regardless of component API version
    summary: Shield Platform Encryption now supports a deterministic encryption
      scheme that preserves exact-match, case-sensitive filtering in SOQL WHERE
      clauses. Fields encrypted deterministically return only exact case matches
      (e.g., 'Acme' won't match 'acme').
    detail: When querying deterministically encrypted fields, SOQL comparisons
      become strictly case-sensitive. Compound name/address fields cannot be
      filtered directly; you must query component fields individually with AND.
      This affects reports, dashboards, list views, external IDs, unique field
      enforcement, and custom indexes.
    source:
      document: v43-summer18.pdf
      page: 464
      heading: Get Exact, Case-Sensitive Matching with Shield Filter-Preserving
        Encryption (Generally Available)
    confidence: medium
    id: v43-soql-002
  - apiVersion: "43.0"
    release: Summer '18
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: EventLogFile REST API queries can now retrieve logs in hourly
      increments by setting the Interval field to 'Hourly', providing faster
      access to event data for security monitoring and performance analysis
      integrations.
    detail: Integrations querying the EventLogFile object can specify
      Interval='Hourly' to receive log files roughly every hour instead of
      waiting for the 24-hour aggregation. Note that hourly files may have 3-6
      hour latency, can contain duplicates during recovery scenarios, and may
      have gaps during site switches or outages. Daily files remain the
      authoritative complete data source.
    source:
      document: v43-summer18.pdf
      page: 468
      heading: Get Hourly Event Logs to Improve Activity Visibility (Generally
        Available)
    confidence: high
