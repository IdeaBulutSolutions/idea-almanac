      generates routes like /cmp/{componentName}?myAttr=attrValue.
    upgradeAction: Audit Aura components for usage of aura:doneRendering,
      aura:doneWaiting, aura:waiting, and force:navigateToComponent events.
      Replace aura:doneRendering with render event handlers, replace
      aura:doneWaiting/aura:waiting with action callback status checks, and
      migrate force:navigateToComponent to lightning:isUrlAddressable plus
      lightning:navigation.
