  - apiVersion: "43.0"
    release: Summer '18
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: Locker Service now permits eval() even with Strict CSP enabled, but it
      always executes in global scope rather than local scope, so code relying
      on local variable access within eval() must be refactored to use
      Function() with explicit parameter passing.
    detail: "Third-party libraries using dynamic code evaluation now work under
      Locker Service. However, the eval() implementation differs from standard
      JavaScript: direct invocation still runs in global scope, not local.
      Developers must pass local variables explicitly via Function() constructor
      if local scope access is needed."
    upgradeAction: Audit any eval() calls in Lightning components that expect local
      scope variable access; refactor to use Function() with parameters passed
      as arguments.
    source:
      document: v43-summer18.pdf
      page: 481
      heading: Changes in Locker Service
    confidence: high
    id: v43-aura-007
  - apiVersion: "43.0"
    release: Summer '18
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
