    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: Lightning Experience URLs switch from /one/one.app to /lightning
      format. Custom Lightning components that parse URLs using window.location
      or aura:locationChange may break if they expect the old path structure.
      Query string parameters are also rewritten with a prefix.
    detail: The URL rewrite changes /one/one.app?myparam1=xyz to
      /lightning?0.myparam1=xyz. Old URLs continue to function via automatic
      translation, but components with URL-parsing logic may behave
      unexpectedly. Visualforce pages retain the old /one/one.app format when
      accessed via /apex/pageName paths.
    upgradeAction: Audit Lightning components that rely on window.location or
      aura:locationChange for URL parsing logic. Update any hardcoded path
      checks from /one/one.app to /lightning and adjust query parameter parsing
      to handle the 0. prefix.
    source:
      document: v43-summer18.pdf
      page: 75
      heading: New URL Format for Lightning Experience and the Salesforce Mobile App
    confidence: high
    id: v43-aura-001
  - apiVersion: "43.0"
    release: Summer '18
    changeType: new
    impact: additive
