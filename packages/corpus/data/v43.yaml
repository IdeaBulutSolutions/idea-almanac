    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: A new Apex method System.UserManagement.obfuscateUser() allows
      permanently scrambling a user's personal data in standard User object
      fields, replacing values with random strings. The operation is
      irreversible.
    detail: The method affects most standard User object fields but excludes user
      ID, time zone, locale, and profile. It does not modify related objects
      like Contact or ThirdPartyAccountLink. Requires enabling 'Scramble
      Specific Users' Data' in User Management Settings before invocation.
    source:
      document: v43-summer18.pdf
      page: 408
      heading: Make Users' Personal Data Unusable by Salesforce at Their Request
    confidence: high
    id: v43-apex-004
