    upgradeAction: If subscribed to beta Real-Time Event Monitoring channels,
      unsubscribe before the Winter '20 org upgrade, then resubscribe after
      completion. Verify Streaming API subscriptions target the new minimum API
      versions (36.0/41.0/46.0 depending on object).
    source:
      document: v47-winter20.pdf
      page: 479
      heading: Real-Time Event Monitoring Generally Available
    confidence: high
    id: v47-rest-008
  - apiVersion: "47.0"
    release: Winter '20
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Enhanced Transaction Security introduces a new Apex interface
      TxnSecurity.EventCondition for programmatically defining transaction
      security policy conditions against standard and custom objects.
    detail: The new framework supports ApiEvent, ListViewEvent, LoginEvent, and
      ReportEvent triggers. Legacy transaction security policies are
      incompatible and must be migrated, as legacy policy failures can disrupt
      real-time event capture in the new framework.
    source:
      document: v47-winter20.pdf
      page: 480
      heading: Enhanced Transaction Security Generally Available
    confidence: medium
