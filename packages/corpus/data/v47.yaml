      page: 453
      heading: Keep Sharing Records When Migrating to Enterprise Territory Management
    confidence: medium
    id: v47-rest-006
  - apiVersion: "47.0"
    release: Winter '20
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; enforced January 3,
      2020 (Spring '20)
    summary: Users lacking the Customize Application permission lose API read access
      to custom settings. Apex code running in system mode remains unaffected,
      but direct API queries from integrations or user-context code will fail
      without the permission.
    detail: This critical update was originally scheduled for September 2019,
      postponed, and now enforces in Spring '20. Organizations relying on API
      integrations to read custom settings under non-admin users must grant
      explicit read access via profiles or permission sets introduced in Winter
      '20.
    upgradeAction: Identify integrations or connected apps that query custom
      settings via API under users without Customize Application. Either grant
      those users the new direct-read permission on the relevant custom
      settings, or refactor to retrieve settings through Apex running in system
      mode.
    source:
      document: v47-winter20.pdf
      page: 463
      heading: Require Customize Application Permission for Direct Read Access to
        Custom Settings (Critical Update, Postponed)
    confidence: high
    id: v47-rest-007
  - apiVersion: "47.0"
    release: Winter '20
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
      - Integration
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version (enforced January 3,
      2020 with Spring '20)
    summary: API access to custom settings is revoked for users lacking the
      Customize Application permission. After the critical update enforcement,
      code or integrations reading custom settings outside system-mode Apex must
      have explicit grants via profiles/permission sets.
    detail: Apex running in system mode remains unaffected, but isAccessible() now
      returns false for custom settings when the running user lacks explicit
      access. Integrations and API calls made by users without Customize
      Application will fail to retrieve custom setting data unless View All
      Custom Settings or per-object Custom Setting Definitions permissions are
      granted.
    upgradeAction: Before enforcement, audit all API integrations and Apex code
      calling isAccessible() on custom settings. Grant Custom Setting
      Definitions or View All Custom Settings permissions to affected
      profiles/permission sets, then test with restricted users.
    source:
      document: v47-winter20.pdf
      page: 463
      heading: Grant Access to Custom Settings After Restricting Org-Wide Access
        (Critical Update)
    confidence: high
    id: v47-sharing-002
  - apiVersion: "47.0"
    release: Winter '20
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - VisualforcePage
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Two new Apex methods let developers build custom Visualforce pages for
      identity verification during user registration, replacing the default
      Salesforce Verify page with branded alternatives.
    detail: The initRegisterVerificationMethod method sends verification codes via
      email or SMS, while verifyRegisterVerificationMethod validates the entered
      code and updates user verification status. This extends to
      self-registration and passwordless login flows.
    source:
      document: v47-winter20.pdf
      page: 468
      heading: Customize Identity Verification Methods
    confidence: high
    id: v47-auth-001
  - apiVersion: "47.0"
    release: Winter '20
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version — opt-in setting per
      authentication provider
    summary: A new option lets admins strip encrypted consumer secrets from Metadata
      API and SOAP API responses when retrieving or deploying authentication
      provider configurations, which can break CI/CD pipelines that rely on
      round-tripping those secrets.
    detail: When enabled, change sets and metadata deploys of authentication
      providers fail if a custom consumer key was used, because the key expects
      a matching secret. Deployments must manually inject the secret during the
      deploy step.
    upgradeAction: If your deployment automation retrieves and redeploys
      AuthProvider metadata, verify whether this setting is enabled; if so,
      update your pipeline to inject the consumer secret externally rather than
      relying on round-trip retrieval.
    source:
      document: v47-winter20.pdf
      page: 472
      heading: Exclude Consumer Secrets from API Responses
    confidence: medium
    id: v47-auth-002
  - apiVersion: "47.0"
    release: Winter '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Custom authorization errors thrown by Apex registration handlers or
      third-party identity providers no longer appear visibly on the Problem
      Logging In page; they are now embedded only in the page URL as query
      parameters.
    upgradeAction: Update any support documentation or troubleshooting scripts that
      rely on reading authorization error messages from the visible page
      content; parse the URL query string instead.
    source:
      document: v47-winter20.pdf
      page: 474
      heading: Improved Security for Authorization Errors
    confidence: high
    id: v47-auth-003
  - apiVersion: "47.0"
    release: Winter '20
    changeType: changed
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: The salesforceLoginUrl field in SamlSsoConfig metadata now includes an
      sc parameter containing the SAML SSO config ID, aligning the Metadata API
      format with the UI. Deploys work with or without this parameter for
