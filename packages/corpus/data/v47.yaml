  - apiVersion: "47.0"
    release: Winter '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: Real-Time Event Monitoring moves from beta to GA with altered streaming
