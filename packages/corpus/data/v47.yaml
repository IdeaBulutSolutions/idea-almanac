    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: A new TxnSecurity.AsyncCondition interface allows transaction security
      policy Apex classes to declare they use asynchronous Apex, enabling async
      patterns within the enhanced transaction security framework.
    detail: The interface is marker-only (no methods) and is used alongside
