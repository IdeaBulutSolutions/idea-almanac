  - apiVersion: "47.0"
    release: Winter '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Legacy transaction security policies using TxnSecurity.PolicyCondition
      no longer fail when the execution user is inactive; the automated process
      user now runs them instead.
    detail: "Previously these policies would fail-close if their execution user was
      inactive. The new behavior prevents unexpected policy failures but changes
      how inactive-user scenarios are handled. Note: the legacy transaction
      security framework is scheduled for retirement in Summer '20, so this
      change is short-lived."
    upgradeAction: Review any logic or monitoring that relied on policies failing
      when the execution user was inactive. Plan migration to the enhanced
      transaction security framework before Summer '20 retirement.
    source:
      document: v47-winter20.pdf
      page: 483
      heading: Policies Don't Fail for Inactive Users
    confidence: high
