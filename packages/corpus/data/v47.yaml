    summary: The legacy Territory Management feature will be fully retired in Summer
      '21, making its data and APIs inaccessible. Organizations using
      territory-related API calls or integrations must migrate to Enterprise
      Territory Management before that release.
    upgradeAction: Identify any integrations or Apex code referencing original
      Territory Management objects/APIs and refactor to use Enterprise Territory
      Management equivalents before Summer '21.
    source:
