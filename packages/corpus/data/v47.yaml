  - apiVersion: "47.0"
    release: Winter '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Apex governor limits in Lightning components are now enforced
      individually per controller action rather than across all batched actions
      in a single request, affecting how limit consumption is tracked and
      reported in EventLogFile.
    detail: Previously when multiple Lightning component actions were batched into
      one request, Apex limits were shared across all actions. Now each action
      has its own limit context, and the Apex Execution event type in
      EventLogFile generates a separate record per action instead of per request
      batch.
    upgradeAction: Review any monitoring or analytics built on EventLogFile Apex
      Execution events that assumed one event per batched request; adjust
      queries and dashboards to account for per-action granularity.
    source:
      document: v47-winter20.pdf
      page: 484
      heading: Better Apex Execution Event Data
    confidence: medium
    id: v47-apex-009
  - apiVersion: "47.0"
    release: Winter '20
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Integration
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: A new EventSettings metadata type lets you configure Event Monitoring
      and Streaming API settings via Metadata API, including the ability to
      enable deletion of monitoring data.
    source:
      document: v47-winter20.pdf
      page: 484
      heading: New Platform Events Org Preferences Type
    confidence: high
    id: v47-packaging-003
  - apiVersion: "47.0"
    release: Winter '20
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - LWC
      - AuraDefinitionBundle
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version, but Aura components
      at API version 39.0 or earlier without Locker are most affected
    summary: Standard DOM query methods like document.querySelector() and
      document.body.querySelector() can no longer traverse into Lightning web
      component shadow trees. Code relying on these global queries to access LWC
