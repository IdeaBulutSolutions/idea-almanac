    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Opportunity Contact Role becomes a fully customizable object, enabling
      Apex triggers and validation rules to fire on contact role changes for the
      first time.
    detail: Previously Opportunity Contact Role was not extensible. It now supports
      custom fields, page layouts, validation rules, and Apex triggers, allowing
      developers to automate actions when contact roles are added, edited, or
      removed on opportunities.
    source:
      document: v47-winter20.pdf
      page: 153
      heading: Contacts
    confidence: high
    id: v47-apex-002
  - apiVersion: "47.0"
    release: Winter '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexTrigger
      - ApexClass
      - Flow
    behaviorArea: apex-runtime
    appliesWhen: org-wide in Lightning Experience only; Salesforce Classic bypasses
      validation rules and Apex triggers for account team operations
    summary: Account Team Member objects now fire Apex triggers, validation rules,
      and workflow rules when records are created, edited, or deleted in
      Lightning Experience. Classic continues to bypass these automations.
    detail: This enables programmatic control over account team membership changes,
      but existing orgs adding triggers or validation rules must account for the
      Lightning-only enforcement. Code that assumes no triggers fire on
      AccountTeamMember will break if moved to Lightning.
    upgradeAction: Review any new Apex triggers or validation rules on
      AccountTeamMember to ensure they handle bulk operations from the multiline
      editor. Test that Classic users are aware their edits bypass these
      automations if consistency is required.
    source:
      document: v47-winter20.pdf
      page: 155
      heading: Accounts
    confidence: high
    id: v47-apex-003
  - apiVersion: "47.0"
    release: Winter '20
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
      - Integration
    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version (auto-activates in Spring '20)
    summary: The AccountShare reason code for territory-based manual account
      assignments changes from TerritoryManual to Territory2AssociationManual.
      Any Apex or integration code querying or writing AccountShare records with
      the old reason code will break.
    upgradeAction: Search Apex classes and integrations for references to the
      TerritoryManual reason code on AccountShare and replace with
      Territory2AssociationManual before activation or the Spring '20
      auto-activation.
    source:
      document: v47-winter20.pdf
      page: 167
      heading: Enable Manual Account Sharing in Enterprise Territory Management
        (Previously Released Critical Update)
    confidence: high
    id: v47-sharing-001
  - apiVersion: "47.0"
    release: Winter '20
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version; retirement effective
      Summer '20
    summary: Customizable Forecasting will be fully retired in Summer '20,
      eliminating API access to its data and functionality. Integrations
      querying or manipulating Customizable Forecasting objects will fail after
      retirement.
    detail: Any code interacting with Customizable Forecasting objects or APIs must
      be migrated to use Collaborative Forecasts instead. The underlying data
      becomes inaccessible post-retirement.
    upgradeAction: Identify all integrations and Apex code referencing Customizable
      Forecasting objects. Migrate to Collaborative Forecasts APIs before Summer
      '20 to avoid runtime failures.
    source:
      document: v47-winter20.pdf
      page: 168
      heading: Customizable Forecasting Is Being Retired
    confidence: medium
    id: v47-rest-001
