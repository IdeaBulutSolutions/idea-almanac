  - apiVersion: "47.0"
    release: Winter '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: Communities created before Winter '20 that upgrade to the new
      template; new communities automatically use the new standard
    summary: Communities now use Google's gtag.js standard for analytics instead of
      the legacy approach. Custom Aura components must switch from firing
      forceCommunity:analyticsInteraction to
      forceCommunity:analyticsInteractionGtag to track events.
    detail: The platform automatically adds googletagmanager.com to CSP Trusted
      Sites. The legacy analyticsInteraction event still works but is deprecated
      in favor of analyticsInteractionGtag.
    upgradeAction: Update custom Aura components that fire
      forceCommunity:analyticsInteraction to use
      forceCommunity:analyticsInteractionGtag instead when migrating to the new
      community template.
    source:
      document: v47-winter20.pdf
      page: 344
      heading: Improve Tracking with the New Google Analytics™ Standard
    confidence: low
    id: v47-aura-001
  - apiVersion: "47.0"
    release: Winter '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: LWC design property default values for Boolean and Integer types now
      correctly coerce to their declared types instead of being passed as
      strings.
    detail: Previously, defaults like `default="true"` or `default="314"` in
      .js-meta.xml were delivered to the component as the strings "true" and
      "314". Now they arrive as actual Boolean and Number values. Components
      with workaround parsing logic may double-convert or break.
    upgradeAction: Remove any custom string-to-Boolean or string-to-integer coercion
      logic in LWC components that was working around the old string-delivery
      behavior; verify component behavior after the fix.
    source:
      document: v47-winter20.pdf
      page: 362
      heading: Use Attributes in Lightning Web Components with Confidence
    confidence: high
    id: v47-lwc-001
  - apiVersion: "47.0"
    release: Winter '20
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
      - Flow
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: LWC components can now be embedded in Flow screens by adding
      lightning__FlowScreen to the component's targets and setting isExposed to
      true, with access to the new lightning/flowSupport module for
      flow-specific events.
    source:
      document: v47-winter20.pdf
      page: 429
      heading: Add Powerful and Performant Lightning Web Components to Your Flow Screens
    confidence: high
    id: v47-lwc-002
  - apiVersion: "47.0"
    release: Winter '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
      - Integration
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (Critical Update
      auto-activates April 9, 2020)
    summary: "Bulk REST API calls to invocable actions now use partial-save
      semantics: a single failed action no longer rolls back the entire
      transaction. Instead, Salesforce retries successful actions up to three
      times and only rolls back the individual failures."
    detail: This Critical Update changes transaction behavior for external REST API
      invocations of flows in bulk. Several action types are excluded from
      partial save (Invocable Apex, External Services, various Order Management
      actions, Skills-based Routing, and others). Be aware that external
      callouts may execute multiple times due to retries, and the retry logic
      can increase transaction duration, potentially causing earlier limit
      exhaustion.
    upgradeAction: Before auto-activation, test bulk invocable action calls in
      sandbox. Review flows that make external callouts to ensure idempotency
      since callouts may repeat. Monitor governor limit consumption as retry
      behavior may cause limits to be reached sooner.
    source:
      document: v47-winter20.pdf
      page: 440
      heading: Enable Partial Save for Invocable Actions (Critical Update)
    confidence: high
    id: v47-flow-001
  - apiVersion: "47.0"
    release: Winter '20
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
      - ApexClass
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (enforcement postponed
      to Spring '21)
    summary: When activated, Flows will check that the running user has access to
      any Apex classes the Flow invokes, blocking execution if access is
      missing. Originally slated for Winter '20 auto-activation, enforcement is
      now delayed until Spring '21.
    detail: "This critical update (introduced Summer '19) adds a security gate:
      users must have explicit access to Apex classes called by a Flow.
      Organizations relying on Flows that invoke Apex where users lack direct
      class access will see failures once enforced."
    upgradeAction: Audit Flows invoking Apex actions and verify all intended users
      have the necessary Apex class access via profiles or permission sets
      before Spring '21 enforcement.
    source:
      document: v47-winter20.pdf
      page: 443
      heading: Require User Access to Apex Classes Invoked by Flow (Critical Update,
        Postponed)
    confidence: high
    id: v47-flow-002
  - apiVersion: "47.0"
    release: Winter '20
    changeType: new
    impact: additive
    affectedMetadataTypes:
