  - apiVersion: "47.0"
    release: Winter '20
    changeType: deprecated
    impact: retirement
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version; legacy policies
      disabled in Summer '20
    summary: The legacy transaction security framework using the
      TxnSecurity.PolicyCondition Apex interface is being retired in Summer '20.
      Policies implementing that interface will stop executing and cannot be
      updated after retirement.
    detail: Apex classes implementing TxnSecurity.PolicyCondition must be rewritten
      to use the new TxnSecurity.EventCondition interface before Summer '20, or
      security enforcement will cease.
    upgradeAction: Identify Apex classes implementing TxnSecurity.PolicyCondition
      and rewrite them using TxnSecurity.EventCondition or Condition Builder
      before the Summer '20 enforcement date.
    source:
      document: v47-winter20.pdf
      page: 481
      heading: Migrate Legacy Transacation Security Policies (Critical Update)
    confidence: high
