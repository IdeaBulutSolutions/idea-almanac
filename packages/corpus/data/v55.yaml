apiVersion: "55.0"
release: Summer '22
reviewed: true
entries:
  - apiVersion: "55.0"
    release: Summer '22
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version — enforcement dates
      vary per org (see MFA Enforcement Roadmap)
    summary: Salesforce now contractually requires MFA for all user logins,
      including direct username/password and SSO flows. Automatic enablement and
      enforcement rollout is underway, meaning integrations or automated
      processes relying on single-factor authentication will eventually fail.
    detail: The MFA requirement became contractually binding February 1, 2022.
      Salesforce will auto-enable then enforce MFA org-wide on a published
      schedule. SSO users must have MFA at the identity provider level to remain
      compliant. Connected apps using username-password OAuth flows or
      session-based integrations may be affected when enforcement activates.
    upgradeAction: Audit all integration authentication paths (OAuth flows,
      connected apps, API users) to ensure they either use MFA-compatible flows
      or are exempt per Salesforce policy. Update any automation that spawns
      browser sessions expecting single-factor login.
    source:
      document: v55-summer22.pdf
      page: 78
      heading: MFA Requirement Is in Effect and Enforcement Is Coming
    confidence: high
    id: v55-auth-001
