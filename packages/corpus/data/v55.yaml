  - apiVersion: "55.0"
    release: Summer '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: Visualforce pages with cspHeader="true" attribute set
    summary: Visualforce pages can now opt into the org's Content Security Policy by
      setting the cspHeader attribute to true, restricting outbound requests to
      domains on the CSP Trusted Sites list.
    detail: Previously CSP enforcement applied only to Experience Cloud sites and
      Lightning Experience. With this change, custom Visualforce pages can
      leverage the same CSP Trusted Sites list to control which external domains
      the page may contact. Developers must explicitly enable this by adding
      cspHeader="true" to the apex:page tag.
    upgradeAction: If enabling cspHeader on existing pages, verify all external
      endpoints (scripts, stylesheets, XHR destinations) are present in CSP
      Trusted Sites or the page will fail to load resources.
    source:
      document: v55-summer22.pdf
      page: 218
      heading: Apply Your Content Security Policy (CSP) to Visualforce Pages
    confidence: low
    id: v55-vf-001
  - apiVersion: "55.0"
    release: Summer '22
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (opt-in feature)
    summary: Admins can now enable Cross-Origin Opener Policy headers for custom
      Visualforce pages, causing each top-level page to open in an isolated
      browsing context group and blocking cross-window DOM access from external
      tabs or pop-ups.
    detail: When enabled, COOP prevents other browser contexts from directly
      accessing the Visualforce page's window object, mitigating certain
      cross-origin attacks. Since this changes how browser tabs interact with
      your pages, integrations or custom code that rely on window references
      across origins may break.
    upgradeAction: Before enabling COOP in production, test in a sandbox to confirm
      that any legitimate cross-window communication (postMessage, window.opener
      references) still works as expected.
    source:
      document: v55-summer22.pdf
      page: 218
      heading: Protect Your Visualforce Pages with Cross-Origin Opener Policy (COOP)
    confidence: high
    id: v55-vf-002
  - apiVersion: "55.0"
    release: Summer '22
    changeType: new
    impact: behavior-change
    affectedMetadataTypes:
      - VisualforcePage
    behaviorArea: visualforce
    appliesWhen: Visualforce pages where COEP is explicitly enabled by the developer
    summary: Enabling Cross-Origin Embedder Policy (COEP) on Visualforce pages
      blocks external resources (images, iframes, widgets) unless the remote
      origin explicitly permits embedding via CORP or CORS headers.
    detail: When activated, the browser enforces that all cross-origin resources
      loaded by the page must include appropriate Cross-Origin-Resource-Policy
      or CORS headers granting permission. Existing pages referencing
      third-party content lacking these headers will see broken images or failed
      resource loads.
    upgradeAction: Before enabling COEP, audit all external resource URLs in your
      Visualforce pages and confirm each origin returns valid CORP/CORS headers
      permitting your domain.
    source:
      document: v55-summer22.pdf
      page: 219
      heading: Restrict Page Resource Requests with Cross-Origin Embedder Policy (COEP)
    confidence: low
    id: v55-vf-003
  - apiVersion: "55.0"
