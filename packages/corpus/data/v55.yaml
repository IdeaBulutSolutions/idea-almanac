    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version (Release Update
      enforced Winter '23)
    summary: Visualforce Expression Language now correctly enforces Apex
      getter/setter access modifiers, blocking calls to non-public methods that
      were previously reachable due to a validation bug.
    upgradeAction: Review custom controllers for getter/setter methods accessed via
      VF expressions. Ensure any methods invoked from pages have appropriate
      public access modifiers before enforcement.
    source:
      document: v55-summer22.pdf
      page: 219
      heading: Validate Getter and Setter Access Modifier Enforcement During
        Visualforce Expression Language Parsing (Release Update)
    confidence: high
    id: v55-vf-004
  - apiVersion: "55.0"
    release: Summer '22
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - VisualforcePage
      - ApexClass
    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version; enforced in Winter '23
    summary: Visualforce JavaScript Remoting now applies stricter CSRF token
      validation and verifies that apexType parameters in $RemoteAction calls
      match valid, accessible Apex types. Invalid or unauthorized object
      references throw errors.
    detail: "The release update hardens remoting security in two ways: CSRF tokens
      are generated differently for the $RemoteAction global variable, and the
      apexType JSON parameter is validated against the actual Apex method
      signature. Guest-user remoting calls receive additional protection. Code
      referencing internal-only Apex types or mismatched apexType values will
      fail once enforcement begins."
    upgradeAction: Before Winter '23, enable the release update in sandbox and
      manually test every Visualforce page that uses JavaScript Remoting. Fix
      any console errors related to invalid CSRF tokens or apexType mismatches.
      Audit guest-user remoting flows and remove references to inaccessible Apex
      objects.
    source:
      document: v55-summer22.pdf
      page: 220
      heading: Enable Visualforce JavaScript Remoting Enforcement (Release Update)
    confidence: high
    id: v55-vf-005
  - apiVersion: "55.0"
    release: Summer '22
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Beta introduces explicit user-mode database operations via WITH
      USER_MODE in SOQL, DML keywords (insert as user), and a new AccessLevel
      parameter on Database/Search methods, letting developers opt into FLS and
      sharing enforcement without changing class-level keywords.
    detail: This beta feature does not change default behavior—Apex still runs in
      system mode unless you explicitly use the new syntax. The AccessLevel
      class and overloaded Database.query, Search.query, and DML methods provide
      granular control over whether individual operations respect the running
      user's object/field permissions and sharing rules.
    source:
      document: v55-summer22.pdf
      page: 222
      heading: Secure Apex Code with User Mode Database Operations (Beta)
    confidence: medium
    id: v55-apex-003
