    id: v55-apex-001
  - apiVersion: "55.0"
    release: Summer '22
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: External Services registrations can now be invoked directly from Apex
      code with strongly-typed classes generated from the service's schema,
      eliminating the need to use Flow or Einstein Bots as intermediaries.
    detail: The platform auto-generates Apex types matching your External Services
      registration schema, providing compile-time type safety and reducing
      boilerplate compared to manual HTTP callouts.
    source:
      document: v55-summer22.pdf
      page: 198
      heading: Call External Services Registrations Natively from Apex
    confidence: high
    id: v55-apex-002
  - apiVersion: "55.0"
    release: Summer '22
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: LWC gains an opt-in light DOM rendering mode that attaches component
      markup directly to the host element rather than a shadow tree, enabling
      standard DOM traversal APIs and global styling but sacrificing
      encapsulation.
    detail: Set static renderMode = 'light' in your component class and add
      lwc:render-mode='light' to the template tag. Light and shadow DOM
      components can nest within each other, but base Lightning components
      remain shadow-only. Use *.scoped.css to prevent style bleed. Avoid light
      DOM for sensitive data since it exposes markup to DOM scraping. Feature is
      beta for Lightning Experience/mobile but GA for Experience Builder sites.
    source:
      document: v55-summer22.pdf
      page: 207
      heading: Enable Third-Party Integrations with Light DOM (Beta)
    confidence: medium
    id: v55-lwc-001
  - apiVersion: "55.0"
    release: Summer '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: "Synthetic shadow DOM corrections align with native shadow behavior:
      assignedSlot now returns the actual slot element for slotted content in
      mixed shadow environments, and elementsFromPoint returns all elements
      including those in shadow trees rather than only visible ones."
    detail: These fixes prepare LWC for eventual native shadow DOM migration. Code
      relying on assignedSlot returning null in mixed shadow scenarios or on
      elementsFromPoint filtering out shadow-contained elements may behave
      differently.
    upgradeAction: Review any code using assignedSlot or elementsFromPoint APIs in
      components that mix native and synthetic shadow DOM. Test that slot
      detection logic and hit-testing code still work as expected with the
      corrected return values.
    source:
      document: v55-summer22.pdf
      page: 208
      heading: Synthetic Shadow Aligns Closer to Native Shadow
    confidence: high
    id: v55-lwc-002
  - apiVersion: "55.0"
    release: Summer '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - AuraDefinitionBundle
    behaviorArea: aura
    appliesWhen: org-wide regardless of component API version
    summary: Aura components no longer fail to save due to general JavaScript
      validation errors; these checks now only run via ESLint as optional
      informational linting rather than blocking deployment.
    detail: Code that previously failed save-time validation for general JS issues
      will now save successfully. Teams relying on save-time rejection to
      enforce code quality must switch to ESLint with the Aura plugin.
    upgradeAction: Integrate the Aura ESLint plugin into CI pipelines if you relied
      on save-time JS validation to catch issues before deployment.
    source:
      document: v55-summer22.pdf
      page: 209
      heading: Relaxed Save-Time Validation Rules for Aura Components
    confidence: high
    id: v55-aura-001
  - apiVersion: "55.0"
    release: Summer '22
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - LWC
    behaviorArea: lwc
    appliesWhen: org-wide regardless of component API version
    summary: Lightning Web Security now intercepts additional browser APIs including
      CacheStorage, History state methods, Node DOM manipulation, Notification,
      Range operations, SVG animation attributes, postMessage, and XSLTProcessor
      transforms. Components using these APIs may encounter modified behavior or
      blocked operations.
    upgradeAction: Review LWC code calling the newly distorted APIs (CacheStorage,
      History.pushState/replaceState, Node insertion/removal, Notification
      constructor, postMessage, structuredClone, XSLTProcessor) and test
      behavior under LWS. Consult the LWS Distortion Viewer for specific
      distortion semantics.
    source:
      document: v55-summer22.pdf
      page: 212
      heading: Distortions Added to Lightning Web Security
    confidence: medium
    id: v55-lwc-003
