    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-soap
    appliesWhen: org-wide regardless of component API version
    summary: "SOAP API now handles malformed endpoint URIs differently: unparseable
      version segments default to v21.0 instead of v7.0, and invalid WSDL type
      segments with extra characters now throw InvalidApiUrlException rather
      than silently defaulting."
    detail: "Two URI parsing changes: (1) When the version number cannot be parsed
      (e.g., 'v55.0' with a literal 'v'), the API now falls back to version 21.0
      rather than 7.0. (2) When the WSDL type segment contains extraneous
      characters alongside 'c' or 'u', the API now rejects the request outright
      instead of accepting it with a v7.0 default."
    upgradeAction: Audit any integration code constructing SOAP endpoint URIs
      dynamically. If malformed URIs were inadvertently hitting v7.0 behavior,
      they will now either run against v21.0 or fail entirely.
    source:
      document: v55-summer22.pdf
      page: 268
      heading: Changes and Updates
    confidence: high
