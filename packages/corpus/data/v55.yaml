  - apiVersion: "55.0"
    release: Summer '22
    changeType: retired
    impact: retirement
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: API versions 7.0–20.0 are fully retired across SOAP, REST, and Bulk
      APIs. Requests targeting these versions now return errors (410 GONE for
      REST, 500 UNSUPPORTED_API_VERSION for SOAP, 400 InvalidVersion for Bulk).
    detail: "This retirement was announced in November 2019 and the release update
      card appeared in Spring '21. Affected versions: Bulk API 16.0–20.0, SOAP
      API 7.0–20.0, REST API 20.0. All REST endpoints under
      /services/data/vXX.X/ for retired versions are deactivated."
    upgradeAction: Audit all integration code, middleware, and third-party packages
      for hardcoded API version references below 21.0. Update SOAP endpoint
      URLs, REST base paths, and Bulk API job version parameters to a supported
      version (21.0+).
    source:
      document: v55-summer22.pdf
      page: 226
      heading: Legacy API Versions 7.0 Through 20.0 Are Now Retired (Release Update)
    confidence: high
    id: v55-rest-003
