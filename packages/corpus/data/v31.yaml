    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Trigger-ready flows now support Apex Plug-in elements but no longer
      permit choice or dynamic choice resources; flows containing these
      resources lose their trigger-ready status.
    upgradeAction: Audit existing trigger-ready flows for choice or dynamic choice
      resources and remove them before upgrading, or the flow will no longer be
      launchable via Apex, workflow actions, or URLs.
    source:
      document: v31-summer14.pdf
      page: 220
      heading: Changes to Trigger-Ready Flows
    confidence: high
    id: v31-flow-001
  - apiVersion: "31.0"
    release: Summer '14
    changeType: new
    impact: additive
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Flows can now traverse relationships from sObject variables to access
      fields on related records using dot notation, enabling cross-object field
      references without additional lookups.
    detail: References follow the syntax {!sObjectVariable.RelatedObject.FieldName}.
      If any intermediate relationship in the chain is null, the element fails
      unless a fault path is defined. The final field being null does not cause
      failure. These references do not count against cross-object relationship
      limits or DML limits.
    source:
      document: v31-summer14.pdf
      page: 223
      heading: Cross-Object Field References in Flows
    confidence: high
    id: v31-flow-002
  - apiVersion: "31.0"
    release: Summer '14
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - Flow
    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version (critical update with
      auto-activation date)
    summary: Flows now count against standard Apex governor limits for DML
      statements and SOQL queries. Create/update/delete elements consume DML
      limits, and lookup elements consume query limits.
    detail: This critical update brings Flow execution under the same transactional
      resource constraints as Apex. Flows invoked from workflow rules share
      their transaction's limits. Screen-based flows start new transactions on
      each Next click, resetting limits per screen.
    upgradeAction: Test all flows before the auto-activation date to identify limit
      violations. Consolidate multiple DML operations into single elements and
      use Fast elements with sObject collections to batch operations on multiple
      records.
    source:
      document: v31-summer14.pdf
      page: 226
      heading: Governor Limits Enforced on All Flows
    confidence: high
    id: v31-flow-003
