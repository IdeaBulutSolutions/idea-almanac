    behaviorArea: visualforce
    appliesWhen: org-wide regardless of component API version
    summary: HTML Area home page components now use a stricter rich text editor that
      blocks JavaScript, CSS, iframes, and manual HTML entry. Components with
      unsupported code will stop working in Summer '15 when the platform removes
      that markup.
    detail: Existing HTML Area components with advanced markup continue functioning
      temporarily but are migrated to a legacy editor. Starting Summer '15, all
      unsupported code (JS, CSS, iframes) will be stripped. Salesforce
      recommends migrating to the new Visualforce Area component for any home
      page content requiring scripts or custom markup.
    upgradeAction: Audit HTML Area home page components for JavaScript, CSS, or
      iframe usage. Migrate any components with restricted markup to Visualforce
      Area components before Summer '15 to avoid breakage.
    source:
      document: v31-summer14.pdf
      page: 207
      heading: Home Page Components
    confidence: high
    id: v31-vf-003
  - apiVersion: "31.0"
    release: Summer '14
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - ApexTrigger
      - Integration
    behaviorArea: soql-sosl
    appliesWhen: org-wide regardless of component API version
    summary: "SOQL queries against ProcessInstance, ProcessInstanceNode,
      ProcessInstanceStep, and ProcessInstanceWorkitem return incomplete data
      for historical approval records: fields like CompletedDate, LastActorId,
      and elapsed time values may be null depending on when the approval was
      completed relative to the Summer '14 rollout."
    detail: Approval processes completed before Summer '14 never have
      ProcessInstanceNode, ProcessInstanceStep, or ProcessInstanceWorkitem data
      populated. Approvals pending during rollout require subsequent action
      before these child objects are populated. CompletedDate is permanently
      null for instances completed before January 1, 2013. Elapsed time fields
      remain zero for workitems whose corresponding steps existed pre-rollout.
      Sandbox copies overwrite SubmittedDate and submitter fields with copy
      metadata.
    upgradeAction: Audit any integration or Apex code querying approval history
      objects; add null-safety checks for CompletedDate, LastActorId, and
      elapsed time fields when processing records that may predate Summer '14.
    source:
      document: v31-summer14.pdf
      page: 218
      heading: Considerations for Approval History Reports
    confidence: high
    id: v31-soql-001
  - apiVersion: "31.0"
