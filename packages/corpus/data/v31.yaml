    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: An OAuth access token can now retrieve identity URLs for multiple users
      within the same org, provided the token was obtained with 'full' or 'api'
      scope and belongs to a user with 'API Enabled' permission.
    detail: Previously, an access token was limited to retrieving only the identity
      URL returned in the original token response. This change allows broader
      identity URL access when scope and permission requirements are satisfied,
      which may affect security assumptions in multi-user integrations.
    upgradeAction: Review integrations that assume access tokens cannot retrieve
      other users' identity URLs; if your security model relied on that
      isolation, add explicit authorization checks.
    source:
      document: v31-summer14.pdf
      page: 236
      heading: New Conditions for Access To Multiple Identity URLs With One Access Token
    confidence: medium
