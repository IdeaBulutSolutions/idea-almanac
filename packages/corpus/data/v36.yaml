    summary: The Recent Items component's entityNames property in FlexiPage XML now
      requires JSON array syntax instead of comma-separated strings. Existing
      pages using the old format will fail validation.
    upgradeAction: Update any FlexiPage XML files containing Recent Items components
      to use JSON array format for entityNames (e.g., change 'Account,obj__c' to
      '["Account","obj__c"]').
    source:
      document: v36-spring16.pdf
      page: 350
      heading: Change in How the Recent Items Component's entityNames Values Are Listed
