    behaviorArea: apex-runtime
    appliesWhen: Apex classes compiled at API >= 36.0
    summary: Five ConnectApi.Recommendations methods lacking the channel parameter
      have been removed and replaced with versions requiring the channel
      argument.
    upgradeAction: Update calls to getRecommendationsForUser,
      getScheduledRecommendations, and createScheduledRecommendation to use the
      new overloads that include the channel parameter.
    source:
      document: v36-spring16.pdf
