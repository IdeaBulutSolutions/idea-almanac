    summary: Custom Lightning components in Community Builder no longer receive
      jQuery automatically; components relying on jQuery will break unless you
      add a manual script reference in the community's head markup.
    upgradeAction: Audit custom Lightning components for jQuery dependencies and add
      an explicit script tag in Community Builder's head markup settings before
      upgrading.
