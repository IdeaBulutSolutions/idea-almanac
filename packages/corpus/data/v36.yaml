    summary: "User.UITheme, User.UIThemeDisplayed, UserInfo.getUiTheme(), and
      UserInfo.getUiThemeDisplayed() now return two new values: Theme4d for
      Lightning Experience and Theme4t for Salesforce1 mobile, in addition to
      the existing theme identifiers."
    upgradeAction: Review code that switches on UITheme return values to handle
      Theme4d and Theme4t; switch statements or conditionals checking only for
      Theme1/Theme2/Theme3 may fall through to unexpected branches when users
      access the app via Lightning Experience or Salesforce1.
    source:
      document: v36-spring16.pdf
      page: 396
      heading: Use User.UITheme and UserInfo.getUiTheme() to Determine User Experience
        Context
