    behaviorArea: apex-runtime
    appliesWhen: Apex classes compiled at API >= 36.0
    summary: The postFeedElement method overload that uploads a binary file while
      creating a feed post has been removed. Code must now upload files
      separately before attaching them to posts.
    upgradeAction: Refactor any code using postFeedElement(communityId, feedElement,
      feedElementFileUpload) to first upload files via ContentVersion, then
      attach using the new postFeedElement method with the files property in
      FeedElementCapabilitiesInput.
    source:
      document: v36-spring16.pdf
      page: 413
      heading: New and Changed Chatter in Apex Classes
    confidence: high
