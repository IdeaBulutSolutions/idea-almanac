  - apiVersion: "36.0"
    release: Spring '16
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - ApexClass
      - Integration
    behaviorArea: authentication
    appliesWhen: org-wide regardless of component API version
    summary: Salesforce introduces org-specific API client certificates as a
      replacement for the older proxy.salesforce.com certificate, affecting
      workflow outbound messages, AJAX proxy, certain Apex PageReference
      methods, and delegated authentication callouts to endpoints using
      Microsoft Trusted Root Certificate Program.
    detail: A Microsoft Windows update on April 19, 2016 retires the root
      certificate for the legacy proxy.salesforce.com certificate. Organizations
      with remote HTTPS endpoints that request or require client certificates
      must switch to the new org-specific certificate via Certificate and Key
      Management in Setup to maintain connectivity.
    upgradeAction: If your Apex callouts, workflow outbound messages, or delegated
      authentication integrations target endpoints requiring client certificates
      under the Microsoft Trusted Root Certificate Program, generate and
      configure an org-specific API client certificate before the April 2016
      enforcement date.
    source:
      document: v36-spring16.pdf
      page: 389
      heading: Use an API Client Certificate for Improved Security
    confidence: high
    id: v36-auth-007
  - apiVersion: "36.0"
    release: Spring '16
    changeType: changed
    impact: behavior-change
    affectedMetadataTypes:
      - Any
    behaviorArea: packaging-metadata
    appliesWhen: org-wide regardless of component API version
    summary: Force.com Migration Tool v36.0 automatically enables TLS 1.1 and 1.2
      when running on Java 7+, and Salesforce has announced plans to discontinue
      TLS 1.0 support entirely.
    detail: Deployments using the Migration Tool with Java 6 will continue using TLS
      1.0, but this will break once Salesforce retires TLS 1.0. The text is
      truncated but signals an impending TLS 1.0 retirement.
    upgradeAction: Ensure your CI/CD and local environments running the Force.com
      Migration Tool use Java 7 or later to avoid deployment failures when TLS
      1.0 is retired.
    source:
      document: v36-spring16.pdf
      page: 391
      heading: Enhanced Security with the Force.com Migration Tool
    confidence: medium
    id: v36-packaging-002
