    summary: The Data.com Social Profile Match API is permanently removed starting
      Summer '16, so any integrations calling this API to retrieve social
      profile handles will fail.
    upgradeAction: Remove or replace any code that calls the Data.com Social Profile
      Match API before Summer '16; social handles must now be managed manually.
    source:
