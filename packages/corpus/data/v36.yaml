  - apiVersion: "36.0"
    release: Spring '16
    changeType: changed
    impact: deprecation
    affectedMetadataTypes:
      - Integration
    behaviorArea: api-rest
    appliesWhen: org-wide regardless of component API version
    summary: The Wave REST API graduates from Pilot to GA at version 36. The
      previously used internal/private API is deprecated and will stop working
      after 12 months; clients using it cannot access dashboards created with
      Spring '16 tools.
    detail: Developers relying on the undocumented internal Wave API must migrate to
      the official GA endpoints. During the 12-month grace period, the internal
      API remains functional but cannot interact with assets built using new
      dashboard designers introduced in this release.
    upgradeAction: Identify any integrations calling the internal Wave API endpoints
      and migrate them to the official Wave REST API GA before the 12-month
      sunset window closes.
    source:
      document: v36-spring16.pdf
      page: 196
      heading: Wave REST API Moves into the Limelight
    confidence: high
    id: v36-rest-002
