    behaviorArea: api-soap
    appliesWhen: org-wide regardless of component API version
    summary: A new JavaScript API enables developers to programmatically select and
      execute macros within custom Service Cloud console components, allowing
      filtered or curated macro displays.
    detail: The API is limited to building new custom console components in
      Salesforce Classic; it does not modify the behavior of the standard macros
      widget. Developers can leverage this to surface contextually relevant
      macros (e.g., by usage frequency or language) to agents.
    source:
      document: v36-spring16.pdf
      page: 221
      heading: Run Macros Programmatically Using the API
    confidence: medium
    id: v36-soap-001
