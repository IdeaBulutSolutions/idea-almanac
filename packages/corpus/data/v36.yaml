    summary: Aloha community templates that do not support Lightning components will
      be retired in Summer '16 (May 2016). Organizations using older
      non-Lightning Aloha templates must upgrade to the Spring '16 version to
      continue functioning.
    upgradeAction: Migrate any Aloha communities to the Spring '16 template version
      before Summer '16 to avoid loss of functionality when non-Lightning
      template support ends.
