    behaviorArea: apex-testing
    appliesWhen: org-wide regardless of component API version
    summary: The @future method workaround for MIXED_DML_OPERATION errors now
      functions correctly within Apex test contexts. Previously, using @future
      to separate setup and non-setup sObject DML still threw errors during test
      execution; this bug has been resolved.
    upgradeAction: If you have test workarounds or skip logic due to this bug, you
      can now rely on the standard @future pattern for mixed DML in tests.
    source:
      document: v36-spring16.pdf
      page: 401
      heading: Use @future to Avoid the Dreaded MIXED_DML_OPERATION Error in Apex Tests
    confidence: high
