    appliesWhen: org-wide regardless of component API version; requires Salesforce
      enablement and Enable Guest Access to the Support API setting
    summary: A new REST API endpoint allows unauthenticated case creation from
      external apps or websites, bypassing Web-to-Case forms. Unauthenticated
      submissions route through the Web-to-Case queue while authenticated
      requests create cases immediately.
    source:
      document: v36-spring16.pdf
      page: 212
      heading: Create Cases from the REST API
    confidence: medium
    id: v36-rest-004
