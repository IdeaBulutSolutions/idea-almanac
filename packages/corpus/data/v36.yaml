    summary: TLS 1.0 will be disabled for all Salesforce connections starting Q1
      2016, requiring TLS 1.2 for all inbound and outbound API traffic including
      Data Loader batch operations.
    upgradeAction: Verify that Java environments, API clients, and integration
      middleware support TLS 1.2 before Q1 2016 enforcement. Update Data Loader
      to Spring '16 version which adds TLS 1.2 support.
