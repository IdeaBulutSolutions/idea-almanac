  - apiVersion: "36.0"
    release: Spring '16
    changeType: changed
    impact: breaking
    affectedMetadataTypes:
      - ApexClass
    behaviorArea: apex-runtime
    appliesWhen: Apex code using ConnectApi compiled at API >= 36.0
    summary: Feed posts can no longer upload a binary file and create the post in a
      single call. Files must be uploaded separately first, then attached via
      the new FilesCapabilityInput and FileIdInput classes.
    detail: The content property on FeedElementCapabilitiesInput is removed for feed
      posts. Code that previously uploaded files inline when creating feed items
      must be refactored to upload files first, then reference them by ID using
      the new files property.
    upgradeAction: "Refactor any Chatter in Apex code that creates feed posts with
      inline file uploads to use a two-step process: upload the file first, then
      attach it using ConnectApi.FilesCapabilityInput with the file ID."
    source:
      document: v36-spring16.pdf
      page: 416
      heading: New and Changed Chatter in Apex Input Classes
    confidence: high
    id: v36-apex-014
