    summary: Wave REST API gains extended metadata representations for dimensions
      and measures, allowing developers to define derived measures and derived
      dimensions with full control over dataset structure and dashboard
      rendering.
    source:
      document: v36-spring16.pdf
      page: 197
      heading: Enhance Dashboard Data with New Extended Metadata Representations in
        the REST API
    confidence: medium
    id: v36-rest-003
