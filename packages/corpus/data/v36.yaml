    summary: Analytics API and SOAP API calls now fail with an error when attempting
      to access resources protected by a high-assurance session policy from a
      standard-assurance session.
    upgradeAction: Review integrations using Analytics or SOAP APIs that access
      connected apps, reports, or dashboards. If your org enforces
      high-assurance session requirements, ensure API clients perform step-up
