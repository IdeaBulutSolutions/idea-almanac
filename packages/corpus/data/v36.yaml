    behaviorArea: apex-testing
    appliesWhen: org-wide regardless of component API version
    summary: Test.startTest() and Test.stopTest() now consistently reset all
      governor limits including SOQL query counts within the enclosed block,
      fixing prior inconsistent behavior where some limits like SOQL queries did
      not always reset.
    upgradeAction: Review tests that may have passed despite exceeding limits due to
      the old inconsistent reset behavior; they may now fail if the code under
      test genuinely exceeds limits.
    source:
      document: v36-spring16.pdf
      page: 401
      heading: Call Test.startTest() to Reliably Reset Limits in Apex Tests
    confidence: high
