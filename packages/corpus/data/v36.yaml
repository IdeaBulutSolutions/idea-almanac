    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: Social Customer Service moderation now uses new ReviewedStatus picklist
      values ('Needed' and 'Reviewed'). Orgs with custom Apex classes that don't
      extend the default must manually update their code to set the
      reviewedStatus field and adjust list filters.
    upgradeAction: If your org uses a custom Apex class for social post moderation
      that was copied from the default rather than extended, add the
      setModeration method to set reviewedStatus='Needed' when no case is
      created, and update your moderation list filter accordingly.
    source:
      document: v36-spring16.pdf
      page: 219
      heading: Moderate Social Posts Easier and Faster (Generally Available)
    confidence: medium
    id: v36-apex-002
