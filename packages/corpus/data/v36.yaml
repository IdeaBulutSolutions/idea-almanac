    behaviorArea: apex-testing
    appliesWhen: org-wide regardless of component API version
    summary: A new System.Test.setCreatedDate method allows test code to assign
      arbitrary CreatedDate values to sObjects after insertion, enabling tests
      that depend on record age or date-based logic.
    source:
      document: v36-spring16.pdf
      page: 400
      heading: Set and Modify the CreatedDate Field in Apex Tests
    confidence: high
