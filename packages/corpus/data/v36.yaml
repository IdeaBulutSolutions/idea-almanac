    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version
    summary: "Sandboxes now support a post-copy hook: implement the new
      SandboxPostCopy interface in an Apex class, and the platform will execute
      it automatically after every sandbox create or refresh operation."
    detail: The interface provides a SandboxContext parameter exposing the org ID,
      sandbox ID, and sandbox name, enabling automated data seeding, config
      changes, or cleanup tasks without manual intervention.
    source:
      document: v36-spring16.pdf
      page: 392
      heading: Run Script After Sandbox Creation and Refresh
    confidence: high
    id: v36-apex-004
