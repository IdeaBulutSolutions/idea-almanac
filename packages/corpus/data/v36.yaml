    behaviorArea: apex-testing
    appliesWhen: org-wide regardless of component API version
    summary: Apex test runs can now be configured to abort after a specified number
      of failures via Developer Console or Tooling API, preventing wasted time
      on doomed runs.
    detail: The new maxFailedTests parameter (Tooling API REST/SOAP) and Developer
      Console setting let you cap failures before the run halts. Values range
      from 0 (stop on first failure) to 1,000,000. Asynchronous runs finish
      in-flight tests before stopping.
    source:
      document: v36-spring16.pdf
      page: 400
      heading: Stop a Test Run That's Failing Miserably
    confidence: high
