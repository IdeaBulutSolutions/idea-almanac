    behaviorArea: flow-runtime
    appliesWhen: org-wide regardless of component API version; deprecation effective
      July 13, 2025
    summary: Agentforce Service Agent verification actions that accept unverified
      Contact Records are deprecated. New secure actions require a verified
      Contact ID instead, enforcing customer identity verification before
      sensitive operations.
    detail: Four legacy actions (Get All Cases for Contact, Update Customer Contact,
      Reset Password, Get Case By Case Number) and one flow (Identify Customer
      By Email) are replaced by secure counterparts that require a verified
      Contact ID from the new Service Customer Verification topic. Existing
      agents continue working until deprecation but cannot use old actions in
      new or updated configurations.
    upgradeAction: Before July 13, 2025, migrate existing Agentforce Service Agents
      to use the Service Customer Verification topic and replace deprecated
      actions with their secure equivalents (e.g., Get Cases for Verified
      Contact, Update Verified Contact).
    source:
      document: v64-summer25.pdf
      page: 207
      heading: Improve Agentforce Service Agent Security with Updated Verification
        Actions
    confidence: medium
    id: v64-flow-003
