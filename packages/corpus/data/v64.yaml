    behaviorArea: apex-runtime
    appliesWhen: org-wide regardless of component API version (enforcement scheduled
      Summer '26)
    summary: Apex classes used as invocable action parameters must have a visible
      no-argument constructor. Previously implicit default constructors
      sufficed, but after enforcement any class lacking an explicit
      public/global parameterless constructor will fail at runtime when used
      with invocable actions.
    detail: Debuted Summer '24 (API 61.0) under its earlier permission-requirements
      name; enforcement moved Winter '26 → Summer '26. At invocation time it
      validates constructor accessibility for custom classes and for the
      standard classes newly exposed to built-in Apex actions.
    upgradeAction: Audit all Apex classes referenced in InvocableVariable or
      InvocableMethod signatures. Add an explicit public no-arg constructor to
      any class that relies on an implicit default constructor or only has
      parameterized constructors.
    source:
      document: v64-summer25.pdf
      page: 183
      heading: Scheduled to Be Enforced in Summer '26
    confidence: high
    id: v64-apex-005
  - apiVersion: "64.0"
