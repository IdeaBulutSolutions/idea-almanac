    appliesWhen: org-wide regardless of component API version; enforced Spring '26
    summary: Shared domain certificates for Salesforce CDN are being retired. When
      enforced, any CDN traffic using shared certificates will fall back to
      non-HTTPS, breaking secure content delivery.
    detail: First offered in Summer '24; the enforcement date slipped from Spring
      '25 to Spring '26. Orgs need to move onto single domain certificates to
      keep HTTPS working.
    upgradeAction: Verify whether your org uses a shared domain certificate for CDN.
      If so, switch to a single domain certificate before Spring '26 to avoid
      losing HTTPS protection.
    source:
      document: v64-summer25.pdf
      page: 183
      heading: Scheduled to Be Enforced in Spring '26
