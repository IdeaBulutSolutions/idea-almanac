    summary: Salesforce will stop routing API traffic that uses hardcoded instance
      URLs (e.g., na1.salesforce.com). All API integrations must switch to the
      org's My Domain login URL before enforcement.
    detail: The legacy service that rerouted API calls containing stale or incorrect
      instance names is being retired. After enforcement, requests using old
      instanced URLs will fail rather than being redirected. This affects any
      external integration, script, or connected app that has a hardcoded
      Salesforce instance hostname instead of the org's My Domain URL.
    upgradeAction: Audit all external systems, middleware, and scripts for hardcoded
      Salesforce instance URLs. Replace them with the org's My Domain login URL.
      Test in sandbox before Winter '26 enforcement.
