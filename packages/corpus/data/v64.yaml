    summary: ICU locale formats replace JDK locale formats org-wide, affecting how
      dates, times, currencies, numbers, and addresses render. Components at API
      45.0+ are subject to automatic enablement.
    detail: This release update enforces ICU-standard locale formatting instead of
      Oracle JDK formatting. The behavioral change originated in Winter '20 (API
      45.0) as opt-in and becomes mandatory in Summer '25. After Summer '25,
      Salesforce pauses further auto-enablement, but orgs already on ICU remain
      on ICU. Format differences can break string comparisons, parsed date
      logic, and hardcoded format expectations in Apex or Visualforce.
    upgradeAction: Audit Apex and Visualforce code that parses or compares
      locale-formatted strings (dates, currencies, numbers). Test with ICU
      formats enabled in sandbox before Summer '25 rollout. Check the en_CA
      locale separately if used.
    source:
      document: v64-summer25.pdf
      page: 357
      heading: Enable ICU Locale Formats (Release Update)
    confidence: high
    id: v64-apex-007
