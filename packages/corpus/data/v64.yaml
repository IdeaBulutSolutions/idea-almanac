    behaviorArea: sharing-security
    appliesWhen: org-wide regardless of component API version (enforced Winter '26)
    summary: The sharing group previously named 'Roles and Subordinates' is renamed
      to 'Roles and Internal Subordinates' when digital experiences are enabled,
      affecting any code or customizations referencing the old group name.
    detail: Salesforce is tightening security for external site users by changing
      how the default subordinates sharing group is named. During a transition
      period, outdated references are dynamically converted, but all code
      including Apex, SOQL queries, and metadata referencing the legacy group
      name must be updated before enforcement.
    upgradeAction: Search codebase for references to 'Roles and Subordinates'
      sharing group and update to 'Roles and Internal Subordinates'. Test
      sharing rules and any programmatic sharing logic in sandboxes with digital
      experiences enabled.
    source:
      document: v64-summer25.pdf
      page: 182
      heading: Scheduled to Be Enforced in Winter '26
    confidence: high
    id: v64-sharing-002
